body:
  text: 學林卷八宋王觀國撰詩重韻杜子美飲中八仙歌曰知章騎馬似乘船又曰天子呼來不上船歌曰眼花落井水底眠又曰長安市上酒家眠歌曰汝陽三斗始朝天又曰舉觴白眼望青天歌曰皎如玉樹臨風前又曰蘇晉長齋繡佛前又曰脫帽露頂王公前此歌三十二句而押二船字二眠字二天字三前字近時論詩者曰此歌自是八段不嫌於重韻也觀國案子美此詩以飲中八仙歌五字為題則是一歌此歌首尾於船字韻中押未嘗移别韻則非分為八段蓋子美古律詩重用韻者亦多况於歌乎如園人送瓜詩曰沉浮亂氷玉愛惜如芝草又曰園人非故侯種此何草草一篇押二草字也上後園山腳詩曰蓐收困用事玄𡨕蔚強梁又曰登髙欲有往蕩析川無梁一篇押二梁字也北征詩曰維時遭艱虞朝野少暇日又曰老夫情懷惡嘔泄卧數日一篇押二日字也夔府詠懷詩曰雖云隔禮數不敢墜周旋又曰淡交隨聚散澤國繞回旋一篇押二旋字也贈李八祕書詩曰事殊迎代邸喜異賞朱虛又曰風煙巫峽逺臺榭楚宮虛一篇押二虛字也贈李雍詩曰放逐早聨翩低垂困炎厲又曰哀贈終蕭條恩波延揭厲一篇押二厲字也贈汝陽王詩曰自多親棣萼誰敢問山陵又曰鴻寶寧全祕丹梯庶可陵一篇押二陵字也喜薛璩岑參遷官詩曰栖遑分半菽浩蕩逐流萍又曰仰思調玉燭誰定握青萍一篇押二萍字也寄賈嶽州嚴巴州兩閣老詩曰討胡愁李廣奉使待張騫又曰如公盡雄雋志在必騰騫一篇押二騫字也子美詩如此類甚多雖然子美詩非創意為此者蓋有所本也案文選載古詩曰晨風懷苦心蟋蟀傷局促又曰音響一何悲絃急知柱促一篇押二促字曹子建美女篇曰明珠交玉體珊瑚間木難又曰佳人慕髙義求賢良獨難一篇押二難字謝靈運述祖德詩曰段生蕃魏國展季救魯人又曰惠物辭所賞厲志故絶人一篇押二人字又南園詩曰樵隱俱在山由來事不同又曰賞心不可忘妙善異皆同一篇押二同字又初去郡詩曰或可優貪競豈足稱達生又曰畢娶類尚子薄遊似邴生一篇押二生字陸士衡擬古詩曰此思亦何思思君徽與音又曰驚颷褰衣信歸雲難寄音一篇押二音字又豫章行泛舟清川渚遙望髙山隂又曰寄世將幾何日昃無停隂一篇押二隂字阮嗣宗詠懷詩曰如何當路子磬折忘所歸又曰黃鵠遊四海中路將安歸一篇押二歸字江淹雜體詩曰韓公淪賣藥梅生隱市門又曰太平多歡娛飛蓋東都門一篇押二門字王仲宣從軍詩曰連舫踰萬艘帶甲千萬人又曰我有素餐責誠愧伐檀人一篇押二人字古人詩自有此體格杜子美亦效古人之作耳韓退之贈張籍詩一篇二更字二陽字又嶽陽樓别竇司直詩押二何字又李花詩押二花字又雙烏詩押二州字二頭字二秋字二休字又和盧郎中送盤谷子詩押二行字又示爽詩押二愁字又乂魚詩押二鎖字寄孟郊詩押二奧字此日足可惜詩押二光字白樂天渭村退居詩押二房字夢遊春詩押二復字元微之詩押二夷字出守杭州路次藍溪詩押二水字遊悟真寺詩押二槃字其餘詩人如此疊用韻者甚多不可具舉意到即押耳奚獨於飲中八仙歌而致怪耶蘇子瞻送江公著詩曰忽憶釣臺歸洗耳又曰亦念人生行樂耳子瞻自注曰二耳義不同故得重用蓋子瞻自不必注李杜李太白宮詞曰山花插寶髻石竹繡羅衣杜子美琴臺詩曰野花留寶靨蔓草見羅裙此相倣之句也案太白宮詞乃開元盛時所撰司馬相如琴臺在西蜀子美琴臺詩乃天寶末避地西蜀時所撰則子美倣太白之詞也太白宮詞曰宮中誰第一飛燕在昭陽子美哀江頭詩乃祿山陷京師後所作亦子美倣太白之句也李杜同時有詩名然子美自負其氣不下人至於太白佳句則子美反竊其意蓋自古文士皆如此澄江淨如練謝元暉佳句也李太白曰解道澄江淨如練令人却憶謝元暉而子美亦曰謝朓每篇堪諷誦蓋李杜心服其人也張祜有詩曰日月光先到山河勢盡來祐嘗以此自負然其實用陳後主所謂日月光天德山河壯帝居者也詩人蹈前塵雖作者猶不免焉青精杜子美贈李白詩曰豈無青精飯使我顔色好注詩者曰梁書安成康王秀傳或橡飯菁羮唯日不足或葭牆艾席樂在其中觀國案菁菜為羮謂之菁羮字書曰菁蔓菁也書所謂菁茅禮所謂菁蒩即此物也子美詩蓋用道書中陶隱居登真訣有乾石青精䭀飯法䭀音迅謂食也其法用南燭草木浸米蒸飯暴乾其色青如黳珠食之可以延年却老此子美所謂青精飯也神農本草木部有南燭枝葉久服輕身長年令人不飢益顔色取汁炊飯又名黑飯草在道書謂之南燭草木在本草謂之南燭枝葉蓋一物也若以菁羮為青精則誤甚矣又如古詩陌上桑羅敷行曰使君從南來五馬立踟蹰杜子美詩用五馬最多注詩者引陌上桑五馬以釋之非也案陌上桑亦用五馬為使君事者也説者謂漢官儀朝臣出使以駟馬太守加一馬為五馬又謂詩孑孑干旟在浚之都素絲組之良馬五之注云周禮州里建旟謂州長之屬因呼太守為五馬然詩云良馬四之良馬五之良馬六之蓋言素絲紕組所見之數非太守之五馬也杜鵑詩杜子美杜鵑詩曰西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑注詩者曰上四句非詩乃題下自注後人誤寫觀國詳此四句非子美自注皆詩也自四句而下繼曰我昔遊錦城結廬錦水邊有竹一頃餘喬木上參天蓋鵑字繼之以邊字天字為韻可以見矣子美絶句詩曰前年渝州殺刺史今年開州殺刺史羣盜相隨劇虎狼食人更肯留妻子此詩正與杜鵑詩相類乃自是一格也隂鏗或曰杜甫李白同時以詩名相軋不能無毁譽甫贈白詩曰李侯有佳句往往似隂鏗此句乃所以鄙李白也觀國案子美夔府詠懷寄鄭監李賔客詩曰鄭李光時論文章並我先隂何尚清省沈宋歘聨翩蓋謂隂鏗何遜沈約宋玉也四人皆能詩文為時所稱者而子美又以隂鏗居四人之首則知贈太白之詩非鄙之也乃深美之也陳書阮卓傳曰武威隂鏗字子堅五嵗能誦詩賦日千言及長博涉史傳尤善五言詩為當時所重有集三卷行於世以此觀之則子美贈太白詩云往往似隂鏗者乃美太白善為五言詩似隂鏗也餐飱小説冷齋夜話曰杜子美彭衙行押二餐飱字韻觀國案彭衙行曰小兒強解事故索苦李餐又曰衆雛爛漫睡喚起霑盤飱然則子美押餐飱二字音義不同小説誤矣餐千安切飱音孫伐檀詩曰不素餐兮又曰不素飱兮毛詩傳云熟食曰飱孟子饔飱而治趙岐注云夕食曰飱蓋盤飱者春秋左傳所謂盤飱置璧者也故凡言盤飱當皆用飱字不當用餐字案廣韻上平聲二十三魂字部中有飱字二十五寒字部中有餐字子美彭衙行於兩部中通押蓋唐人詩文用韻如此本朝始令禮部撮廣韻之要略者使學者用之而限以獨用通用之文故如餐飱二字不得同韻而押矣子美示從孫濟詩曰所來為宗族亦不為盤飱園詩畦蔬繞茅屋自足媚盤飱贈孟氏詩曰承顔眂手足坐客強盤飱别李義詩曰努力慎風水豈惟數盤飱此數詩或於魂字部中押或於寒字部中押者此所謂唐人用韻之例也凡上有盤字則下當用飱字而子美詩集中亦或用盤餐字者當是傳寫刋字之訛子美不應誤用字也大刀杜子美中秋月詩曰滿目飛明鑑歸心折大刀注詩者曰古詩藳砧今何在山上復有山何當大刀頭破鑑飛上天謂殘月也觀國案古詩乃古樂府所載藳砧詩也藳砧者鈇也藳砧今何在者問夫何在也山上復有山者出也言夫已出也大刀頭者環也何當大刀頭者何日當還也破鑑者月半也破鑑飛上天者言月半當還也子美詩云歸心折大刀者言雖有歸心而大刀折則未能還也注詩者初不曉其意乃訓為殘月則誤矣古樂府所載如藳砧詩者數篇其取譬皆淺俚故撰詩者不顯姓名後人但以古詩稱之江右又謂之風人詩有圍棋燒敗襖看子故依然之句圍棋者看子也燒敗襖者故依然也鮑明逺諸集中亦有二篇謂之吳體蓋自雅頌不作迄於魏晉南北朝以來浮靡愈甚始有為此態者悉取閭閻鄙媟之語比類而為之詩道淪喪至於如此誠可嘆也井幹謝玄暉詠銅雀臺詩曰繐幃飄井幹尊酒若平生五臣注文選曰銅爵臺一名井幹樓觀國案史記始皇幽母咸陽宮諫者輒殺於井幹闕下又史記曰漢武帝立井幹樓髙五十丈漢書郊祀志曰武帝立井幹樓髙五十丈顔師古注曰井幹樓積木而髙為樓若井幹之形也井幹者井上木欄也其形或四角或八角然則秦為井幹闕而漢武帝為井幹樓也謝元暉詩蓋言繐幃飄於銅爵臺上若井幹之髙也魏武帝作銅爵臺魏都鄴銅爵臺在鄴中而井幹樓在咸陽銅爵臺未嘗有井幹之名而五臣謂一名井幹樓者誤矣幹音寒井幹又謂之銀牀皆井欄也古詩曰後園鑿井銀作牀杜子美詩曰露井凍銀牀是也魏武帝遺令施繐帳於銅爵臺上朝晡設脯糒之屬向帳作妓樂望吾西陵故謝元暉詩云尊酒若平生者謂此也餳糕劉禹錫嘉話曰為詩用僻字須有來處宋考功詩云馬上逢寒食春來不見餳嘗疑此餳字因讀毛詩鄭氏箋説吹簫處注云今賣餳家物六經唯此中有餳字余作重陽詩欲押一糕字遍尋無據不敢用之觀國謂詩人押韻不出於六經者多矣若必欲六經中取字為韻則詩人何其拘拘耶餳字見於周禮春官小師鄭氏注曰簫編小竹管如今賣飴餳所吹者儀禮笙簫注中亦有之糕字載於許慎説文方言博雅矣夢得尚不之信而必欲出於六經則所慮過也月食詩韓退之月食詩一篇大半用玉川子句或者謂玉川子月食詩豪怪竒挺退之深所嘆伏故退之所作盡摘玉川子佳句而補成之觀國竊以為不然也案退之月食詩題曰效玉川子作而詩中有以玉川子為言者曰玉川子涕泗下中庭獨自行又曰玉川子立於庭而言曰地下賤臣今再拜敢告上天公然則退之幾於代玉川子作也玉川子詩雖豪放然太怪險而不循詩家法度退之乃摘其句而約之以禮故退之詩中兩言玉川子其意若曰玉川子月食詩如此足矣故退之詩題曰效玉川子作此退之之深意也不然則退之豈不能自為月食詩而必用玉川子句然後能成詩耶以謂退之自為月食詩則詩中用玉川子涕泗告天公又非其類矣冬至杜子美至日遣興詩曰何人錯憶窮愁日愁日愁隨一線長注詩者曰引嵗時記云宫中以紅線量日影至日日影添一線又至後詩曰冬至至後日初長逺在劔南思洛陽注詩者曰魏晉間宫中以紅線量日影冬至後添長一線然文士多用一線為繡工之線蓋以冬至後繡工可添一線也栁耆卿樂章曰繡工日永是也荆楚嵗時記多穿鑿不可信又文士用書雲為冬至事案春秋僖五年左氏傳曰凡分至啓閉必書雲物為備故也杜預注曰分春秋分也至冬夏至也啓立春立夏閉立秋立冬雲物氣色天變也素察妖祥逆為之備然則書雲物在八節之日不特冬至而已冬至雖亦預書雲之日然獨言書雲而不言冬至則泛而不切當先敘冬至之日然後用書雲始得事之實改字杜子美寓居同谷縣詩曰黃獨無苗山雪盛短衣數挽不掩脛或改黃獨為黃精案黃獨即神農本草所謂赭魁是也赭魁亦名黃獨江南人謂之土卵形如芋蒸食之甘美可充飢子美太平寺泉眼詩曰三春濕黃精一食生羽毛又丈人山詩曰掃除白髮黃精在君看他時氷雪容此子美所用黃精字也後之淺見者遂改黃獨為黃精耳又江蓮搖白羽天棘蔓青絲今改蔓為夢蓋天門冬亦名天棘其苗蔓生好纒竹木上葉細如青絲寺院亭檻中多植之可觀後人既改蔓為夢又釋天棘以為栁皆非也子美詩集少善本良以妄庸輩改之爾如淵明之採菊東籬下悠然見南山而或改見為望杜荀鶴之燒葉罏中無宿火讀書窗下有殘鐙而或改葉為藥王平甫之春殘葉密花枝少睡起茶親酒盞疏而或改親為多一字之改而清濁遼隔前賢詩文為人所改如此類多矣對屬杜子美田舍詩櫸栁枝枝弱枇杷對對香或説櫸栁者栁之一種其名為櫸栁非雙聲字也枇杷乃雙聲字櫸栁不可以對枇杷觀國案子美此詩題曰田舍則當在田舍時偶見櫸栁枇杷蓋所見景物如此乃以為對爾子美覓松苗子詩曰落落出羣非櫸栁青青不朽豈楊梅以櫸栁對楊梅乃正對也然則以櫸栁對枇杷非誤子美寄髙詹事詩曰天上鳴鴻雁池中足鯉魚鴻雁二物也鯉者魚之一種其名為鯉疑不可以對鴻雁然懷李白詩曰鴻雁幾時到江湖秋水多則以鴻雁對江湖為正對矣又得舍弟消息詩曰浪傳烏鵲喜深負鶺鴒詩烏與鵲二物疑不可以對鶺鴒然偶題詩曰音書恨烏鵲號怒怪熊羆則以烏鵲對熊羆為正對矣又寄李白詩曰幾年遭鵩鳥獨泣向麒麟鵩鳥者鳥之名鵩者疑不可以對麒麟然寄賈嶽州嚴巴州兩閣老詩曰貔虎開金甲麒麟受玉鞭則貔虎對麒麟為正對矣而哭韋之晉詩曰鵩鳥長沙諱犀牛蜀郡憐以鵩鳥對犀牛亦為正對矣子美豈不知對屬之偏正耶蓋其縱橫出入無不合也胡笳秦再思紀異録曰琴譜胡笳曲者本昭君見胡人卷蘆葉而吹之昭君感之為製曲凡十八拍觀國案後漢列女傳董祀妻蔡雍女也名琰字文姬博學有才辨適衛仲道夫亡無子興平中喪亂文姬為胡騎所獲在胡中十二年曹操素與雍善痛其無嗣乃遣使以金璧贖之而嫁於祀後感傷亂離作詩二章辭皆載在本傳今世所傳胡笳十八拍亦或用文姬詩中語蓋非文姬所撰乃後人撰以詠文姬也小説謂昭君製曲則誤矣王荆公作集句胡笳曲十八拍首言中郎有女能傳業顔色如花命如葉者亦詠蔡文姬也王昭君未嘗有曲傳於世霓南史沈約郊居賦有雌霓連蜷之句注曰霓五結切蓋與齧同音也范蜀公召試用彩霓字作平聲考試者引郊居賦以為證於是止除館閣校勘觀國詳考霓字雖有倪齧兩音然文字用倪音多而用齧音少若專用雌霓則當音齧若泛用霓字則倪齧兩音可通用但取平側順而已杜子美石龕詩曰驅車石龕下仲冬見虹霓於迷字韻中押又滕王亭子詩曰尚思歌吹入千騎把霓旌凡此類皆作平聲用霓字也然則范蜀公用彩霓字是泛用霓字讀作平聲何傷也張平子東京賦曰郎將司階虎戟交鎩龍輅充庭雲旗拂霓何平叔景福殿賦曰髙甍崔嵬飛宇承霓綿蠻黮䨴隨雲融泄凡此用霓字其上雖無雌字然皆於入聲韻中押之則自然讀音齧矣前漢天文志曰抱珥􅛆霓如淳注曰霓讀曰齧雄為虹雌為霓􅛆或作虹故張平子西京賦曰亘雄虹之長梁而沈約郊居賦則用雌霓蓋義皆如漢書天文志注也款乃元次山款乃曲曰千里楓林煙雨深無朝無暮有猿吟停橈靜聽曲中意好是雲山韶濩音零陵郡北湘水東浯溪形勝滿湘中溪口石淙堪自逸誰人相伴作漁翁栁子厚漁父詩曰漁翁夜傍西巖宿曉汲清湘然楚竹煙銷日出不見人款乃一聲山水淥黃庭堅題曰元次山款乃曲款音媪乃音靄湘中節歌聲栁子厚漁父詞有款乃一聲山水淥之句誤書款欠少年多承誤妄用之可笑觀國案廣韻上聲款于改切相然譍也然則款音靄乃音媪爾今世所傳栁子厚文集漁父詩作款乃又箋音于其下曰款音襖乃音靄蓋世之誤用字誤切音者皆自栁子厚文集始蓋編類文集者之過也文有合款乃為一字作􅀢者而讀􅀢曰襖副以靄字為􅀢靄此誤之尤甚者也黃庭堅所題今刻永州浯溪石矣飴殍杜牧杜秋娘詩曰厭飫不能飴沈存中曰飴乃餳耳若作飲食當音飼觀國案南史梁武帝紀曰有男子於大衆中自割身以飴飢鳥晉王薈除吳國內史時年飢粟貴人多餓死薈以私米作饘粥以飴飢者所濟活甚衆以此觀之則飴雖餳也至於詩文中言甘食之則謂之飴所謂飴飢鳥者使飢鳥甘食之也所謂飴餓者使餓者甘食之也杜牧詩曰厭飫不能飴者既厭飫矣不能復甘食之也杜牧詩用平聲怡字韻而飼音嗣存中欲以飼字當之如之何其可也存中又謂唐人以小詩著名而讀書滅裂如白樂天題座隅詩云俱化為餓殍作孚音觀國案字書殍字兩音一音芳無切一音平表切其義則皆餓死也樂天於平聲押音孚不誤矣筆談杜子美古柏行曰霜皮溜雨四十圍黛色參天二千尺存中筆談曰無乃太細長乎觀國案子美潼關吏詩曰大城鐡不如小城萬丈餘世豈有萬丈餘城耶姑言其髙耳四十圍二千尺者姑言其髙且大也詩人之言當如此而存中乃拘拘然以尺寸較之則過矣崔融瓦松賦曰謂之木也訪山客而未詳謂之草也驗神農而罕記段成式酉陽雜爼曰崔公博學豈不知瓦松自有著説引梁簡文詩依簷映昔耶筆談曰段成式以昔耶為瓦松不知昔耶乃是垣衣瓦松自名昨葉何草觀國案陸龜蒙苔賦曰髙有瓦松卑有澤葵散巖竇者石髮補空日者垣衣在屋曰昔耶在藥曰陟釐若然則瓦松垣衣昔耶各是一物也存中曰古文己字從一從亡此乃貫通天地人與王字同義同中則為王或左右則為己觀國案己字篆文為弓而古文篆又為􅀢古文篆乃象己字之形而鋭其筆爾非從一從亡也亦非若王字之從三畫也存中既誤析其偏旁又誤訓曰同中則為王或左右則為己蓋不考字書而為臆説殊礙理也存中論詩以謂前人有蹉對假對之格如厨人具雞黍稚子摘楊梅以雞對楊為假對觀國案存中意謂以雞對羊則為真對而以雞對楊為假爾若然則詩人用字唯取同音而不顧義理之何如豈不見笑於士林耶存中又謂防風氏身廣九畝長三丈周室畝廣六尺九畝乃五丈四尺如防風氏之身乃一餅餤耳又謂韋楚老蚊詩曰十幅紅綃圍夜玉十幅為禱方不及四五尺何以伸足觀國竊謂此猶史記漢武帝紀謂作建章宮度為千門萬户故班固西都賦杜牧阿房宮賦皆用千門萬户苐言門户之多耳若以名數核之則户者扉也二户為一門千門萬户則一門有十户矣以此為文誤不可也詩曰嵩髙維嶽峻極于天苐言嶽之髙爾豈果極于天耶物價説者謂祖宗朝嘗問大臣唐時酒價大臣對以一斗三百引杜子美詩速宜相就飲一斗恰有三百青銅錢為據觀國竊謂古今酒價視時而貴賤方兵興多事及飢饉艱食則酒價必貴及時平則賤此乃常理固不可以一槩論也唐書食貨志曰乾元初京師酒貴蓋肅宗復兩京之後不得不貴也建中三年禁民酤酒官置肆釀酒斛收直三千正元二年天下置肆以酤者斗錢百五十蓋德宗時天下復富庶故酒價不得不賤也然則唐之酒價貴賤豈有常耶詩人之言或夸大或鄙小本無定論曹植名都篇曰歸來燕平樂美酒斗十千此夸大之言也設有問魏之酒價者則以十千一斗對之耶前漢昭帝紀曰始元六年賣酒升四錢蓋升四錢則斗為錢四十耳史記平凖書漢興接秦之弊米至石萬錢馬一匹則百金今案石萬錢者米斗為一千也茍米斗一千則斗酒賣錢四十可乎此所謂視時而貴賤者也杜子美鹽井詩曰自公計三百轉致斛六千夫物價低昻在反手之間豈有定也古者百步為畝而漢時二百四十步為畝古者二十四兩為溢十六兩為斤秦以一溢為為一金而漢以一斤為一金古人以黍定樂律而用一稃二米者欲其輕重大小均也權衡度量因黍纍之而後定故同律度量衡者欲其一體也秦漢以來乃創為制度各自遵用於是權衡度量皆不一矣唯唐時權衡與今正合案唐時食貨志曰武德四年鑄開元通寶錢重二銖四參積十錢重一兩得輕重大小之中開元二十年詔所在加鑄開元通寶錢以千錢重六斤四兩為率每錢重二銖四參今以開元通寶積千錢亦為今稱六斤四兩以此觀之唐之權衡與今合也此言千錢者足百錢也唐自皇甫鏄為墊錢法至昭宗時定以八十為一百五代漢隱帝時三司使王章每出官錢以七十七為一百至今循之前漢食貨志曰刁問起數千又曰臨災姓偉訾五千又曰師史致十千又曰張良叔薛子仲訾十千又曰樊嘉五千觀國案此皆錢數也五千錢者五萬緡也十千錢者十萬緡也秦漢之際井田廢未久民無甚富者故五千萬十千萬在當時已為甚富而史書之唐書馬周傳曰周買佳宅直二百萬蓋百萬者二千緡也周任京師號佳宅者不過二千緡則當時錢重可知矣前漢釋之以訾為騎郎如淳注曰漢法訾五百萬得為常侍郎桑𢎞羊為均輸令吏人入粟補郎官至六百石靈帝開鴻都門賣官公千萬卿五百萬崔烈入錢得三公曹嵩輸西園錢位至太尉蓋千萬者一萬緡也五百萬者五千緡也夫以萬緡五千緡而授人以公卿則漢室之衰而不復振雖五尺之童知之矣蹈襲梁昭明太子作陶淵明傳曰濳自以曾祖晉世宰相恥復屈身後代自武帝王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晉氏年號自永初以來唯云甲子觀國案宋受晉禪嵗在庚申淵明以宋元嘉四年卒嵗在丁卯考淵明所著自庚子從都還至丙辰嵗下潠田舍穫稻其詩乃晉時所撰亦止用甲子未嘗須用年號也蓋蕭統一時契勘之誤後人遂以為誠然蘇子瞻次韻謝子髙讀淵明詩曰甲子不數義熙前秦觀作王儉論亦引此事蓋古人之言有不必循者楚詞曰餐秋菊之落英觀國案秋花不落枝上自枯者菊也楚詞之言於義未安而蘇子瞻次韻僧潛見贈詩曰獨依古寺種秋菊要伴騷人餐落英如楚詞之言要當不必循也王羲之蘭亭序亦文之可喜者而不入文選或者謂序用天朗氣清乃秋語非春致又謂絲竹管弦為重疊故為蕭統所不取觀國詳序中語皆不悖理顧當時蕭統掄訪未盡耳前人雄麗之文不在選者甚多豈唯蘭亭而已哉若據或者之謂則易傳言潤之以風雨不當以風為潤矣宋玉文曰豈能料天地之髙哉不當謂地為髙矣後漢楊厚疏論耳目不明不當謂耳為明矣或者之謂不攻自破雙聲疊韻南史謝莊傳曰王元謨問莊何者為雙聲何者為疊韻答曰炫護為雙聲磝碻為疊韻觀國案古人以四聲為切韻紐以雙聲疊韻必以五音為定蓋謂東方喉聲為木音西方舌聲為金音南方齒聲為火音北方唇聲為水音中央牙聲為土音也雙聲者同音而不同韻也疊韻者同音而又同韻也炫護同為唇音而二字不同韻故謂之雙聲磝碻同為牙音而二字又同韻故謂之疊韻若髣佛熠耀騏驥慷慨咿喔霡霂皆雙聲也若侏儒曈朧崆洞巃嵸螳蜋滴瀝皆疊韻也廣韻曰章灼良略是雙聲灼略章良是疊韻又曰廳剔靈歷是雙聲剔歷廳靈是疊韻舉此例則諸音皆視此而紐之可以定矣沈存中論詩之用字曰幾家村草裏吹唱隔江聞幾家村草對吹唱隔江皆雙聲也觀國案村字是脣音草字是齒音吹字是脣音唱字是齒音此非同音字不可謂之雙聲也存中又曰月影侵簮冷江光逼履清侵簮逼履皆疊韻也觀國案侵字是唇音簮字是齒音逼字是唇音履字是舌音既非同音字而逼履二字又不同韻不可謂之疊韻也觀國案李羣玊詩曰方穿詰曲﨑嶇路又聽軥輈格磔聲詰曲﨑嶇乃雙聲也軥輈格磔乃疊韻也詩文疑節南山詩曰上天同雲雨雪氛氛而張九齡和聖製瑞雪詩曰初瑞雪兮霏微俄同雲之濛密其先後之序相反矣杜牧之華清宫詩曰一騎紅塵妃子笑無人知道荔枝來案唐明皇每嵗十月幸華清宮至明年三月始還京師荔枝以夏秋之間熟及其驛至則妃子不在華清宫矣牧之此詩頗為當時所稱賞而題為華清宫詩則意不合也杜子美壯遊詩曰斯文崔魏徒以我似班揚備員竊補衮憂憤心飛揚所謂班楊者班固揚雄也然揚雄之先封於揚而得姓乃從手之揚非從木之楊子美誤以班揚為從木之楊後有押心飛揚蓋可見也又子美夏日楊長寧宅送崔郎常正字入京詩曰醉酒楊雄宅蓋子美因楊長寧宅餞飲而有此句亦以從木之楊為揚雄亦誤矣林逋處士有詩名草泥行郭索雲木叫鉤輈之句尤為士人所嘆美郭索蟹行也鉤輈俗謂之雞聲極響厲然鉤輈帖地飛其行在草茅間不能登雲木也梁昭明太子作陶淵明文集序所謂白璧微瑕者此類是耶四方春夏秋冬東南西北此天序也東西南北先東西而後南北此文言也書曰東作南訛西成朔易周禮六官天地春夏秋冬易曰帝出乎震相見乎離説言乎兊勞乎坎春秋經書春夏秋冬月令以春夏秋冬為次此皆天序也檀弓曰丘也東西南北之人也春秋哀公二十九年左氏傳子展曰東西南北誰敢寧處揚雄羽獵賦曰東西南北騁嗜奔欲杜甫詩曰甫也東西南北之人也又曰愧爾東西南北人蓋東西為緯南北為經東西為廣南北為袤東西為橫南北為縱凡此皆文言也故先東西而後南北唯文王有聲詩曰自西自東自南自北無思不服乃先西而後東者鎬京在西武王於鎬京行辟雍之禮而四方化服自近以及逺故先西而後東也若夫綴文之士則錯舉無先後之序謝元暉之宣城詩曰江路西南永歸流東北騖陸士衡擬古詩曰牽牛西北回織女東南顧又曰招搖西北指天漢東南傾又園葵詩曰朝榮東北傾夕穎西南晞杜子美送舍弟歸藍田詩曰東望西江水南遊北户開又送舍弟赴齊州詩曰岷嶺南蠻北徐關東海西又懷古詩曰支離東北風塵際漂泊西南天地間又遣悶詩曰西嶺紆村北南江繞舍東凡此用四方亦皆文言無先後之序也四聲譜南史陸厥傳曰齊永明時盛為文章沈約謝朓王融以氣類相推轂周融善識聲韻約等文皆用宫商將平上去入四聲以此制韻有平頭上尾蜂腰鶴膝五字之中音韻悉異兩句之內角徴不同不可增減世呼為永明體庾肩吾傳曰齊永明中王融謝朓沈約文章始用四聲以為新變至是轉拘聲韻彌為麗靡復踰往時沈約傳曰約撰四聲以為在昔詞人纍千載而不悟而獨得胸襟窮其妙旨自謂入神之作梁武帝雅不好焉嘗問周捨曰何謂四聲捨曰天子聖哲是也觀國案四聲切韻始自齊梁雖云麗靡而江左文章拘於聲調氣格卑弱間有作者大扺類俳南史曰沈約論四聲妙有詮别而諸賦亦往往與聲韻乖然則約自謂窮其妙旨而反致矛盾何耶陸法言論聲韻曰吳楚則時傷輕淺燕趙則多傷重濁秦隴則去聲為入梁益則平聲似去或參宫參羽或半徴半商以此觀之則理致頗深實難遽曉隋唐以來始有律詩網格婉和殆如樂律愈於江左逺矣而其餘文格尚襲江左之風雕礱磔裂殊之純古之風韓愈學古文以救文敝而不能丕變故唐末五代之際文氣彌弱也雖總古今之字不逃乎音切固有即音切而知其字之義者之乎切為諸而已切為耳如是切為爾何不切為盍不可切為叵此即音切而知其字之義也下至閭閻鄙語亦有以音切為呼者突鸞為團屈陸為曲鶻崙為渾鶻盧為壺忒晒為太咳洛為殼凡此類非有師學授習之也其天成自然莫知所以然者沈約所謂入神殆此類耶陬張平子南都賦曰天封火狐列山之陬上平衍而廣蕩下蒙籠而﨑嶇五臣注文選曰陬子侯反束晳補亡白華詩曰白華絳趺在陵之陬蒨蒨士子涅而不渝五臣注文選曰陬子侯反觀國案字書陬字側留切又子侯切又子于切蓋子侯子于二切皆陬隅之義也張平子賦陬字與﨑嶇同韻當讀作子于切束晳詩陬字與渝字同韻亦當讀作子于切其義則陬隅也而五臣皆音作子侯反非也左太沖魏都賦曰蠻陬夷落譯導而通杜子美送韋判官詩曰西扼弱水道南鎮枹罕陬與侯字同韻凡此陬字皆子侯切者也或用作子于切或用作子侯切各順其韻耳陬音側留切者與聊鄹鄒騶通用乃魯地名也史記孔子世家曰孔子生魯昌平鄉陬邑語曰孰謂鄹人之子知禮乎史記秦始皇紀曰始皇上鄒嶧山又孟子傳曰孟軻鄒人也以上皆一字也其地即漢書地理志魯國騶縣孟子題辭所謂騶本春秋邾子之國是也爾雅釋天曰正月為陬音義曰陬側留切史記厯書曰孟陬殄滅是已離騷曰攝提正于孟陬五臣注文選乃音陬為子侯切又誤也前漢周亞夫傳曰吳奔壁東南陬顔師古注曰陬音子侯反又音鄒又劉向傳向上封事曰厯失則攝提失方孟陬無紀顔師古注曰陬子侯反又音鄒此兩傳顔師古皆説兩音觀國案東南陬子侯反是也孟陬音鄒是也師古説兩音者不素别其義耳凡不素别其義而遽為之音訓則不免於誤也周禮硩簇氏以方書十有二辰之號鄭氏注曰月謂從娵至荼音義曰娵子須反觀國案鄭氏音爾雅正月為陬以釋之而借用娵字耳音義作子須反亦誤矣銅斗孟東野詩曰銅斗飲江水手拍銅斗歌觀國案古未有以銅斗為飲器者唯史記趙世家曰襄子北登夏屋請代王使厨人操銅枓以食代王前漢王莽傳曰鑄威斗以銅為之蓋厨人操銅斗者食器也威斗者厭勝之器也皆非飲酒之器孟東野當時適有銅器其狀方如斗而東野持以貯水而飲又擊之以和歌聲故自形於詩句亦如杜子美以烏皮裹几而自形於詩曰烏皮几在還思鄉又曰拂拭烏皮几又曰憑久烏皮綻子美又有銅瓶詩曰亂後碧井廢時清瑤殿深銅瓶未失水百丈有哀音觀此詩意蓋汲水銅瓶也子美適有之耳凡物不以美惡稍為名士所稱遂亦可貴齊司徒景陵王子良遺何點嵇叔夜酒杯徐景山酒鎗晉謝安報蒲葵扇王導以練製衣此皆一類所謂伯樂一顧其價十倍也辟杜子美夜聽許十誦詩曰離索晚相逢包蒙欣有擊誦詩渾遊衍四坐皆辟易又八哀詩曰潼關初潰散萬乘猶辟易偏裨無所施元帥見手格觀國案前漢項羽傳曰楊喜追羽羽還叱之喜人馬俱驚辟易數里顔師古注曰辟易謂開張而易其本處辟頻亦反蓋頻亦反者讀音闢也易其本處者讀音奕也凡言辟易當從此音前漢景帝紀三年正月濟王辟光舉兵反顔師古注曰辟音璧又音闢其義兩通觀國案其義雖兩通而稱名則必呼一音焉辟音璧者辟除也音闢者辟開也辟光有闢開光明之義於此不可用璧音矣前漢文帝紀二年三月立趙幽王弟辟強為河間王顔師古注曰辟強言辟禦強梁亦猶辟兵辟非耳辟音必亦反強音其良反一説辟讀曰闢強讀曰疆闢疆言開土地也引賈誼書曰衛侯朝于周周行人問其名衛侯曰辟疆行人曰啓疆辟疆天子之號也諸侯弗得用更其名曰燬則其義兩説並通觀國案賈誼書其説通當從誼書讀辟為闢讀強為疆居良反又讀音疆觀國案一字兼通數音者兼數音讀之無傷也唯名與姓當專呼一音而顔師古於辟光辟疆皆説兩音而不決豈有稱名而分兩音稱之哉揚子法言曰張辟疆之覺平勃音義曰辟必益切又蒲必切亦説兩音者彼見漢書説兩音矣無所措其辭也辟又與避通用又與僻通用玉藻曰素帶終辟讀音裨乃假借也五木香古樂府詩曰氍㲣毾㲪五木香迷迭艾納與都梁觀國案畫圖本草引道書為青木香為五木香故古藥方有五香散而其方中止用青木香則五木香乃青木香也風俗通曰織毛褥謂之氍㲣後漢西域傳天竺國有細布毾㲪章懷太子注曰毛席也然氍㲣毾㲪皆蠻夷織毛之有文者如㲲罽之屬也曰迷迭曰艾蒳曰都梁三者皆香名也魏有迷迭樓魏文帝有迷迭賦皆取迷迭香為名異物志曰艾蒳葉似栟櫚而小子似檳榔今本草中有艾蒳注云是松上青衣者蓋自是一物非艾蒳也艾蒳非中國物也古詩曰博山罏中百和香鬱金蘇合與都梁蓋謂鬱金香蘇合香都梁香也然氍㲣毾㲪五木香迷迭艾蒳與都梁凡六物皆蠻所産非中國物也漢制尚書郎口含雞舌香奏事明光殿觀國案雞舌香即母丁香也亦名雞舌香耳今以母丁香湯瀹去皮其肉若卷荷狀大如棗核本草云能辟口氣故奏事者用之酉陽雜俎曰一木五香根旃檀節沉香花雞舌葉藿膠薰陸今案此五物乃五種而謂一木五香者誤甚矣本草木部以沉香薰陸香雞舌香藿香詹糖香同為一條亦非也藿香乃草類其餘香是木類亦各是一種非同條之物也木蘭文士用木蘭舟蘭掉蘭橈無所經見唯小説述異記曰江州有木蘭洲魯班嘗於洲用木蘭造船因謂之木蘭舟文士用木蘭舟自此始觀國案畫圖本草木蘭注文亦引述異記木蘭舟事當止見於述異記他書所不載也屈平九歌曰桂棟兮蘭撩辛夷楣兮藥房五臣注文選曰蘭辛夷藥香草也今案橑者椽也楣者門楣也蘭橑者以木蘭為橑也辛夷楣者以辛夷木為楣也桂棟者以桂木為棟凡此皆謂以木之有香者為屋室也五臣乃以蘭辛夷為香草則誤矣九歌又曰桂棹兮蘭栧蓋栧者船傍板也以桂木為棹以木蘭為栧者也離騷九歌言蕙蘭石蘭椒蘭幽蘭皆蘭草也唯蘭橑蘭栧為木蘭而辛夷亦是木離騷曰朝搴阰之木蘭兮又曰朝飲木蘭之墜露兮此正言木蘭也揚子雲甘泉賦曰列辛夷于林薄五臣注文選曰辛夷香草也亦誤矣杜子美逼仄行曰辛夷始花亦已落韓退之感春詩曰辛夷花髙最先開又曰辛夷花房忽全開王荆公詩曰回首辛夷木下行古人用辛夷為文著矣非香草也張祜宮詞唐張祜有詩名宫詞詩曰故國三千里深宫二十年一聲何滿子雙淚落君前當時人頗稱賞此詩然後人讀之多不曉其句意唐人小説云宣宗時孟才人者本東南人入宫二十年以善歌得寵宣宗不豫才人侍帝使歌才人歌何滿子一聲而泣下故祜宫詞專為此發當時人知其事者無不以為切當也白樂天詩注云明皇時有姓何名滿者因事對獄而案牘奏上猶不免死人憐為作曲名何滿子故白樂天詩曰人言何滿是人名乃為此也張祜在宣宗大中時有詩名唐書藝文志有張祜詩一卷注曰祜字承吉為處士半夜鐘唐張繼詩曰月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺半夜鐘聲到客船世疑半夜非鐘聲時觀國案南史文學傳丘仲孚吳興烏程人少好學讀書常以中宵鐘鳴為限然則半夜鐘固有之矣丘仲孚吳興人而繼詩姑蘇城外寺則半夜鐘乃吳中舊事也茶詩茶之佳品摘造在社前其次則火前謂寒食前也其下則雨前謂穀雨前也茶之佳品其色白若碧緑色者乃常品也茶之佳品芽蘖微細不可多得若取數多者皆常品也茶之佳品皆點啜之其煎啜之者皆常品也齊已茶詩曰甘傳天下口貴占火前名又曰髙人愛惜藏巖裏白硾封題寄火前丁謂茶詩曰開緘試火前須汲逺山泉凡此言火前蓋未知社前之品為佳也鄭谷嘗茶詩曰入坐半甌輕泛緑開緘數片淺含黃鄭雲叟茶詩曰羅憂碧粉散嘗見緑花生沈存中論茶謂黃金碾畔緑塵飛碧玊甌中翠濤起宜改緑為玊改翠為素此論可也而舉一夜風吹一寸長之句以為茶之精華發越不必以雀舌烏觜為貴今案茶至於一寸長則其芽蘖大矣非佳品也存中以此論曲矣盧同茶歌曰開緘宛見諫議面手閲月團三百片薛能謝劉相公寄茶詩曰兩串春團敵夜光名題天柱即維揚茶之佳品珍踰金玉未易多得而以三百片惠盧同以兩串寄薛能者皆下品可知也齊已茶詩曰角開香滿室罏動緑凝鐺丁謂茶詩曰末細烹還好鐺新味更全此皆煎茶啜之也煎茶啜之者非佳品矣唐人於茶雖有陸羽為之説而持論未精至本朝蔡君謨茶録既行則持論精矣以茶録而核前賢之詩皆未有知佳味者也學林卷八
