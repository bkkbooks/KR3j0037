body:
  text: 學林雜家類二雜考之屬提要臣等謹案學林十卷宋王觀國撰觀國長沙人其事迹不見於宋史湖廣通志亦未之載惟賈昌朝羣經音辨篇首載有觀國所作後序一篇署曰左承務郎知汀州寧化縣主管勸農公事兼兵馬監押王觀國末題紹興壬戌秋七月中浣則南渡以後人也考朝公武陳振孫兩家及宋史藝文志是書俱未著録獨吳曽能改齋漫録引之稱曰學林新編而今所傳抄本但題學林無新編二字殆傳寫者又以省文去之矣書中專以辨别字體字義字音為主自六經史漢旁及諸書凡注疏箋釋之家莫不臚其異同折衷至當如論無字謂古但有無亡二字至秦始用無字為有無之無又引説文文甫切今借為有無字玉篇有繁廡茂盛之義考核甚精此類凡數百條多諸儒所未發在南宋諸家中可謂能讀書識字者雖吳曽漫録中頗抉摘其所短如謂左傳季氏介其雞當從髙誘以鎧著雞頭不當作蒙雞之臆佛氏精舍江表傳載于吉事是魏初已有之觀國謂自晉始有者為誤又孟子以言餂之觀國不取郭璞音義而取玉篇音甜之説京索之索觀國以為當音山客反不知陸氏釋文及五臣之注韓退之之詩皆音悉落反固未嘗誤其所駁正皆為切中其病然不過千百之什一其餘則發明小學無不典確精純以視孫奕示兒編項安世家説之類殆為過之信無愧於博洽之士卓然特出者矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3b0095b4570d128ca3b8721d5c3ed8dbfd01580fad66862cec6832bf5685c820
