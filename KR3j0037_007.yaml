body:
  text: 學林卷七宋王觀國撰栁子厚非國語國語曰宣王不藉千畝富辰諫栁子厚非曰古之必藉千畝者禮之飾也未若時使而不奪其力節用而不殫其財通其有無和其鄉閭則食固人之大急不勸而勸矣觀國案禮天子親耕以共粢盛王后親蠶以共祭服粢盛衣服皆備然後可以享宗廟蓋王者身致其誠以盡孝道舉此以率天下皆知勸於耕勸於蠶其意若曰思天下匹夫匹婦有惰於耕而受其饑者有惰於蠶而受其寒者今我以天子之尊且不敢忘耕事也我親率之兾天下皆知勸於耕而民無受其饑者矣以王后之尊且不敢忘蠶事也我親率之冀天下皆知勸於蠶而民無受其寒者矣亦猶聖人躬儉以率天下也聖人豈能必天下之不為侈靡哉吾示之以儉則天下觀而化庶幾侈靡之習可革也然則王者親耕籍實為政之大者至於時使而不奪其力節用而不殫其財通其有無和其鄉閭此亦為政之不可缺者豈為耕籍而遂廢之哉若夫不能時使而奪民之力不能節用而殫民之財以至有無之不通鄉閭之不和是人君失政治之道非藉千畝之過也若曰藉千畝者徒舉也非實惠也則向所謂躬儉者亦徒舉耶國語曰穀洛鬭將毁王宫王欲壅之太子晉諫云云栁子厚非之曰壅之誠是也彼小子之譊譊者又足記耶觀國觀太子晉諫語文而辨實可嘉秦漢以來文士未能過非譊譊之徒也國語曰三川震伯陽父曰周將亡矣栁子厚非曰山川者特天地之物也隂陽遊乎其間者也自動自休自峙自流是惡乎與我謀自鬭自竭自崩自缺是惡乎為我設觀國竊謂天地之有山川猶人身之有支體氣血也天地隂陽之氣不和則有山崩水竭之災一人之身隂陽之氣不和則變而為疾聖人與天地同體懼隂陽之氣不和則為災為疾夫為災為疾者變也故春秋書沙鹿崩梁山崩者記變也左氏傳曰國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉三川震伯陽父曰周將亡矣意謂王者不能修德以召和而變見焉則國有亡之道也國語曰景王將鑄大錢單穆公不可云云可後而先之謂之召災栁子厚非曰病大錢者吾不知周之時何如哉其曰召災則未之聞也觀國案單穆公云可後之者其必時未宜用大錢也先之而召災者其必時未宜用而亟用之則法有不當於民之心者也法不當於民之心則亂之招也豈惟災而已耶國語曰獻公卜伐驪戎栁子厚非曰卜者聖人用以驅陋民也非常用而取信焉雖勿用之勿信之可也觀國案聖人於卜筮有所謂通天下之志成天下之務定天下之業斷天下之疑者其妙至於窮神知化非但驅陋民而已也國語曰獻公問于卜偃曰攻虢何月也對曰童謠有之栁子厚非曰童謠無足取者君子不道也觀國案詩書有曰古人有言有曰夏諺有曰周諺此皆與童謠一體蓋皆君子之言也特假曰古人曰夏諺曰周諺曰童謠爾故詩三百率多婦人女子小夫賤者之所為茍其言有理而不悖於道雖童謠何傷焉國語曰晉饑公問於箕鄭曰救饑何以對曰信栁子厚非曰信政之常不可須㬰去也聖人獨救饑也耶其言則逺矣觀國案箕鄭所對蓋出於孔子所謂自古皆有死民無信不立乃推本而言之也以謂晉君茍信素著於民則饑不足患爾若曰發廩以濟之告糴於鄰國此有司之常典非所以答晉君之問也國語曰平公說新聲師曠曰公室其將卑乎栁子厚非曰耳之於聲也猶口之於味也茍說新味亦將卑乎觀國案聲音與政通故詩有所謂治世之音亂世之音亡國之音以其雅鄭異也正聲雅而鄭聲淫治世之音正聲也亂世亡國之音淫聲也平公說新聲者舍正聲而說淫聲則將溺於亂世亡國之音而政其頺矣師曠知音者也因以發諷曰公室其將卑乎禮曰凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉魏文侯問於子夏曰吾端冕而聽古樂則惟恐卧聽鄭衛之樂則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今君之所好者其溺音乎鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟驕志此四者皆淫於色而害於德為人君者謹其所好惡而已矣由此觀之則師曠之言不為過也書曰甘酒嗜音峻宇雕牆有一于此未或不亡夫口耳之習不慎而至於亡國喪家者有之固不特公室卑而已也古賦題司馬相如子虛賦中雖言上林之事然首尾貫通一意皆子虛賦也未嘗有上林賦而昭明太子編文選乃析其半自亡是公聽然而笑為始以為上林賦誤矣蓋相如以子虛虛言也烏有先生烏有此事也亡是公者亡是人也故空藉此三人為因以風諫奏之其賦曰楚使子虛使于齊齊王悉發車騎與使者出畋畋罷子虛過詫烏有先生而亡是公存焉其末曰二子愀然改容超若自失逡巡避席曰乃今日見教謹聞命矣此子虛賦始終一意不可析其半以為上林賦則意遂中絶不可讀矣班固作兩都賦序曰臣作兩都賦以極衆人之所炫矅折以今之法度其賦始曰有西都賔問于東都主人中曰東都主人喟然而嘆末曰主人之辭未終西都賔矍然失容欲辭主人曰復位今將授子以五篇之詩此首尾貫一賦也其名為兩都賦而其序亦曰兩都賦序可以見也昭明太子乃自東都主人喟然而嘆析而為東都賦然其文與上句相連不可析也後漢張衡傳曰時天下承平日久自王侯以下莫不踰侈衡乃擬班固兩都作二京賦以諷諫其賦始曰有憑虛公子者學乎舊史氏言于安處先生中曰安處先生似不能言者管爾而笑末曰得聞先生之餘論則大庭氏何以尚兹此賦首尾貫通亦一賦也衡自謂擬班固兩都作二京賦蓋與班固兩都一體通為一賦昭明太子自安處先生似不能言析而為東京賦然其文亦與上句相連亦不可析也左思作三都賦序曰余既思摹二京而賦三都蓋亦擬張衡二京而為三都賦其賦始曰有西蜀公子者言于東吳王孫中曰東吳王孫囅然而咍終曰魏國先生有睟其容而其末曰先生之言未卒吳蜀二客䂄焉相顧㥏墨而謝此賦首尾貫通亦一賦也其名為三都賦序昭明太子亦析而為三都賦亦誤矣三都其文上下相連不可析也析之則意亦中絶不可讀矣唯張衡南都賦别是一賦夫賦題者綱領也綱領正則文意通昭明太子何為其多析也古賦序傅武仲舞賦宋玉髙唐賦神女賦登徒子好色賦本皆無序梁昭明太子編文選各析其賦首一段為序此四賦皆託楚襄王答問之語蓋借意也故皆有唯唯之文昭明誤認唯唯之文以為賦序遂析其辭觀國案司馬長卿子虛賦託烏有先生亡是公為言揚子雲長楊賦託翰林主人子墨客卿為言二賦皆有唯唯之文是以知傅武仲宋玉四賦本皆無序昭明太子因其賦皆有唯唯之文遂誤析為序也楊子雲羽獵賦首有二序五臣注文選曰賦有兩序一者史臣一者雄序詳其文第一序乃雄序也第二序非序乃雄賦也賦中用頌曰二字不害於義昭明析頌曰為一段乃見其有二序蓋誤析之也馬融長笛賦首尾兩處有辭曰字潘安仁籍田賦末有頌曰字潘安仁笙賦張平子思𤣥賦鮑明逺蕪城賦謝希逸月賦其末皆有歌曰字王文考魯靈光賦班孟堅幽通賦王子淵洞簫賦顔延年赭白馬賦其末皆有亂曰字謝惠連雪賦嵇叔夜琴賦既有歌曰字又有亂曰字由此觀之則羽獵賦有頌曰字乃賦也非序也亦豈有一賦而兩序耶又文選載揚子雲解嘲有序揚子雲甘泉賦有序賈誼鵩鳥賦有序禰正平鸚鵡賦有序司馬長卿長門賦有序漢武帝秋風辭有序劉子駿移書責太常博士有序以上皆非序也乃史辭也昭明摘史辭以為序誤也三都賦序左太沖三都賦序曰相如賦上林而引盧橘夏熟揚雄賦甘泉而陳玉樹青葱班固賦西都而嘆以出比目張衡賦西京而述以游海若假稱珍怪以為潤色考之果木則生非其壤校之神物則出非其所於辭則易為藻飾於義則虛而無徴觀國案司馬相如賦言上林之盛曰于是乎盧橘夏熟黃柑橙楱枇杷橪柿亭奈厚朴梬棗楊梅櫻桃蒲陶隱夫薁棣答遝離支羅乎後宮列乎北園蓋橘橙枇杷楊梅荔枝皆南方之物非西北所産然而上林者天子之宫苑四海之嘉木珍果皆能移植於其中不但本土所生者而已又賦之所言竒禽異獸明珠香草天臺仙樂青琴虙妃之類亦非上林之所産有以見上林之富麗四方之物畢致也而左太冲責以盧橘夏熟生非其壤亦過矣揚雄甘泉賦曰翠玉木之青葱顔師古注前漢書曰玉木者武帝所作集衆寶為之用供神也非謂自然生之蓋玉木者猶金蓮玉蘂之義以金玉為之以象生物也左太冲意謂真有玉木玉木非秦中所産則誤矣史記封禪書曰古之封禪鄗上黍北里禾所以為盛江淮間一茅三脊所以為藉東海致比目之魚西海致比翼之鳥蓋王者登封告成則四海珍異之物畢萃焉以言其感格之所致也班固西都賦曰招白鷴下雙鵠揄文竿出比目此言西都之盛四海珍異之物畢萃而魚鳥之飛潛有不召而致者皆可以弋釣而得之所以甚言西都文物之富盛無所不有亦如封禪之致庶物也左太冲意謂東海比目之魚西都不應有焉然班固之意則有在也張衡西京賦曰海若游于𤣥渚鯨魚失流而蹉跎五臣注文選曰海若海神也案前漢郊祀志曰武帝好神仙李少君言海中蓬萊仙可見之帝遣方士入海求蓬萊安期生之屬拜齊少翁為文成將軍拜欒大為五利將軍拜公孫卿為郎于是作飛亷桂館益夀延夀館通天臺治太液池有蓬萊方丈瀛洲壺梁象海中神山之宅龜魚之屬以俟神人而張衡西京賦亦言太液漸臺瀛洲方丈蓬萊神山靈芝仙掌與夫少君欒大之事而曰海若游于𤣥渚者蓋述武帝好神仙而於海上候神人不致故即甘泉建章作臺池仙館以象海上仙家之境則必有海若來游實賦於𤣥渚故雖鯨魚之大亦蹉跎而駭伏矣賦言海若來游實賦之意當如此也左太冲謂校之神物則出非其所亦過矣潘嶽閒居賦曰長楊芳枳游鱗菡蓞張公大谷之梨梁侯烏椑之柿周文弱枝之棗房陵朱仲之李三桃表櫻胡之别二奈曜丹白之色石榴蒲陶梅杏郁棣葱韭蒜芋青荀紫薑堇薺蓼荽蘘荷時藿緑葵白薤蓋嶽退居洛涘而作此賦自言其臺池果茹之多如此非皆洛中土産之物也而况上林甘泉西都東都皆王者居處遊燕之地四海九州珍異之物無不畢聚是宜賦者之所夸美而太冲獨責以假稱珍怪虛而無驗則誤矣又王延夀魯靈光殿賦曰玉女窺窗而下視嵇康琴賦曰天吳踴躍于重淵張衡思𤣥賦曰戴玉女而召虙妃馬融長笛賦曰仰駟馬而舞𤣥鶴孫綽遊天台山賦曰八桂森挺以凌霜司馬相如長門賦曰桂樹交孔雀集張華鷦鷯賦曰海鳥鶢鶋避風而至茍如左太冲所責則若此之類皆為假稱珍怪虛而無驗矣蓋亦觀其意之所主如何耳若但責其辭而遺其意固不可也甘泉賦前漢揚雄傳甘泉賦曰翠玉樹之青葱兮壁馬犀之瞵㻞顔師古注曰馬犀者馬腦及犀角也以此二種飾殿之壁文選甘泉賦曰璧馬犀之璘㻞五臣注曰武帝植玉木於此宮以碧為葉青葱色又作碧馬犀牛等物為飾觀國案漢書作壁馬犀文選作璧馬犀蓋壁璧二字其義逈不同故注釋者亦隨其字之義而訓之在漢書則訓為殿壁在文選則訓為璧玉因以不同也前漢藝文志有揚雄賦十二篇雄有文名當時傳雄之賦者帙不一故其用字不能無訛至班固作史蕭統編文選各以其所得雄賦而集録之故其賦用字有不同今讀其賦曰仰嬌首以髙視兮目𡨕眴而亡見正瀏濫以宏惝兮指東西之漫漫徒洄洄以徨徨兮魂渺渺而昏亂據軨軒而周流兮忽坱圠而亡垠翠玉樹之青葱兮璧馬犀之瞵㻞金人仡仡其承鐘簴兮嵌巖巖其龍鱗凡此賦句皆以下句釋上句則璧馬犀為璧玉之璧其上下文句通矣其曰據軨軒而周流兮忽坱圠而亡垠然後言玉木金人者蓋謂依欄檻而回顧見廣大而無際畔但見庭中玉木之青葱金人之巖巖耳玉木植於殿庭金人捧露盤亦在殿庭此皆言望見殿庭中物不應反言殿壁也賦句之義於此判矣案甘泉賦字不同者亦多漢書曰不可乎疆度文選不可乎彌度漢書曰魂固渺渺文選曰魂渺眇漢書曰鬼魅不能自還文選曰鬼魅不能自逮漢書曰薌呹肸以棍根文選曰薌呹肸以堒批漢書曰惟弸彋其拂汨兮文選曰惟首弸彋其拂汨兮漢書曰鸞鳯紛其御㽔文選曰鸞鳯紛其銜㽔漢書曰玉女無所眺其清盧兮文選曰玉女無所眺其清臚兮漢書曰隆厥福兮文選曰降厥福兮此一賦也而漢書文選用字不同如此然他皆可以假意而讀唯壁璧不可假意通用而注釋者又各異固不可不辨也四愁詩序文選張衡四愁詩序曰張衡不樂久處機密陽嘉中出為河間相時國王驕奢不遵法度又多豪右并兼之家衡下車治威嚴能內察屬縣奸猾行巧劫皆密知名下吏收捕盡服禽諸豪俠游客悉惶懼逃出境郡中大治爭訟息獄無繫囚時天下漸弊鬱鬱不得志為四愁詩觀國詳此序非衡所作也豈有為相而斥言國王驕奢不遵法度又自稱下車治威嚴郡中大治者案後漢張衡傳曰陽嘉元年造候風地動儀復遷侍中永和初出為河間相時國王驕奢不遵典憲又多豪右共為不軌衡下車治威嚴整法度隂知姦黨名姓一時收禽上下肅然稱為政理視事三年乞骸骨召拜尚書永和四年卒以知四愁詩序乃史辭也辭有不同者蓋撰後漢書者非一家後之編集衡詩文者增損之耳序言陽嘉中出為河間相而史言永和初出為河間相案順帝陽嘉盡四年始改永和元年永和盡七年衡本傳言陽嘉中遷侍中永和初出為河間相永和四年卒其次第已不紊詩序謂陽嘉中出為河間相者誤也五臣注文選曰陽嘉元年為河間相亦誤也閒情賦梁昭明太子作陶淵明文集序曰白璧微瑕者唯在閒情一賦幸無諷諫何必搖其筆端觀國熟味此賦辭意宛雅傷已之不遇寄情於所願其愛君憂國之心惓惓不忘蓋文之雄麗者也此賦每寄情於所願者若曰我願立於朝而其君不能用之是真譎諫者也昭明責以無諷諫則誤矣然則讀此賦而不知其意者以為詠婦人耶古之言美人佳人皆以比君子賢人簡兮詩曰云誰之思西方美人彼美人兮西方之人兮注曰美人謂碩人大德周室之賢者離騷曰惟草木之零落兮恐美人之遲暮注曰美人謂君也言恐嵗暮而不早用賢也九歌曰望美人兮未來注曰美人謂湘神也以喻望君之使也張衡傳曰衡為四愁詩依屈原以美人為君子以珍寶為仁義故其詩曰美人贈我金錯刀美人贈我金琅玕美人贈我貂䄡褕美人贈我錦繡段江淹詩曰日暮碧雲合佳人殊未來文選注曰佳人謂友人也閒情賦之寄意逺矣以為微瑕者其不見知耶滕王閣序歐陽文忠公集古録跋德州長夀寺舍利碑曰余屢歎文章至陳隋不勝其弊而唐家致治之盛不能遽革其弊及讀斯碑有云浮雲共嶺松張蓋明月與巖桂分叢乃知王勃云落霞與孤鶩齊飛秋水共長天一色當時士無賢愚以為警絶豈非其餘習乎觀國案庾子山馬射賦曰落花與芝蓋齊飛楊柳共春旗一色王勃正倣此聮非摹長夀寺碑句也長夀寺碑亦倣馬射賦而句格又弱者也羅池碑歐公跋羅池碑曰今世傳昌黎集文與碑多同惟集本云涉有新船而碑以涉為步荔子丹兮蕉子黃碑蕉下無子字當以碑為是而碑云春與猿吟兮秋鶴與飛則疑碑之誤也觀國詳羅池碑升鶴字於與字之上則句老而格新古人有此格屈平九歌曰蕙肴蒸兮蘭藉奠桂酒兮椒漿蕙肴蒸不可以對奠桂酒而特倒其語者取夫句老而格新也然則羅池碑云春與猿吟兮秋鶴與飛非誤也亦當以碑為是瘞鶴銘歐公曰瘞鶴銘題云華陽貞逸撰刻於焦山之足常為江水所浸好事者伺水落搨之只得其數字余所得六百餘字獨為多也案潤州圖經以為王羲之書字亦竒放然不類羲之筆法而類顔魯公不知何人書也華陽貞逸是顧況道號今不敢遂以為況者碑無年月不知何時疑前後有人同斯號者也近世士人有論碑者曰道書陶隱居號曰華陽真逸隱居嘗在茅山修養茅山與潤州接境疑華陽真逸即陶隱居也觀國案顔氏家訓曰學二王書之得體者有陶隱居今詳觀瘞鶴銘字王書法也歐以為似顔魯公非也陶隱居既有華陽真逸之號而茅山又近焦隱居又善為二王書則撰銘與書皆隱居矣若顧況乃竊華陽真逸之號爾碑銘甚古缺顧況生唐之中葉距今未逺決非況銘也今世所得瘞鶴銘碑夲不過二百字未嘗有六百餘字者髙氏書歐公曰太原府交城縣石壁寺鐡彌勒像頌者林諤撰參軍房璘妻髙氏書余集録婦人書惟此髙氏一人其書此頌與安公美政碑筆畫字體逺不相類殆非一人之書疑刋刻不同亦不應相逺如此又疑好事者寓名以為竒也識者當為辨之觀國嘗得髙氏所書二碑蓋髙氏學逸少書甚逼真然石壁寺碑乃行書美政碑乃楷書古之善書者楷書與行書自不相類如逸少書蘭亭序樂毅論乃其楷而其草書見於法帖者乃大不相類其餘善書人皆如此然則髙氏二碑皆髙氏書也二碑皆髙大想見當時建立之盛而髙氏書在當時無出其右者故也豈有建碑工力如此其大而反假婦人書字以為竒者亦建碑者所不肯為也栁子厚書趙璘因話録曰栁子厚善書當時重其書湖湘以南士人皆學其書栁氏前有公權後有子厚有此二人歐公集古録有子厚書般舟和尚碑并南嶽彌陀和尚碑歐公跋曰書既非工而字畫多不同疑喜子厚者竊借其名以為重觀國嘗於南嶽山間見此子厚二碑詳觀之乃子厚南貶時書也子厚書體格雖疏靜好藏鋒類崛筆書然在唐未可以名家故唐史及唐人文集未嘗言其善書大扺士人文章稱著則并其書亦為世所貴重子厚嘗以文稱於朝矣及其南貶也湖湘以南士人慕其文章又學其書此古今之常態也因話録謂栁氏有此二人蓋奬飾子厚之過耳千文楊文公談苑曰千字文云勑員外散騎侍郎周興嗣次韻其􅎁字乃梁字傳寫之誤也唐顯慶中詔不經中書門下不得稱􅎁􅎁之名始定於此觀國案梁書周興嗣傳曰武帝以三橋舊宅為光宅寺􅎁興嗣與陸倕製寺碑帝以興嗣所製自題又曰次韻王羲之千字並使興嗣為文又曰興嗣直西省周捨奉􅎁注武帝所製歷代賦啓興嗣助焉興嗣本傳自有􅎁字蓋臣下以奉􅎁撰文為榮故興嗣於千文加􅎁字於官稱之首也古者天子諭臣下以事皆稱􅎁故衛夫人奉􅎁寫急就章梁武帝賜七夕詩與任昉昉謝啓曰昉奉􅎁賜示七夕五韻又卞彬謝修卞忠正墓啓曰彬伏見宣􅎁修臣亡髙祖忠正公壺墳塋唐髙祖武德二年􅎁諸州進士隨方物入貢房𤣥齡等刪武德以來􅎁三十餘條然則􅎁之名久矣非由顯慶中定也唐書顯慶詔不經中書門下不得稱􅎁蓋慮臣下有直取聖㫖而不由中書門下以行之則大臣未嘗商榷而事之利害有未公者固難以行云所以防姦邪也非定􅎁之名也楊文公豈不知此殆編集文公談苑者誤耳歐公集古録曰梁書言武帝得王羲之所書千字命周興嗣以韻次之今法帖有漢章帝書百餘字其言有海鹹河淡之類蓋前世學書者多為此語不獨始於羲之也觀國案法帖中所書千文百餘字皆作章草體當時叙次碑帖者誤題以為漢章帝書其實周興嗣所次之文也以為前世學書者多為此語不獨始於羲之則非也李瀚蒙求唐李瀚撰䝉求五百九十八句每句著一人每人著一事非博學不能為此然其疵在於一人而分作二句或三句既曰孔明龍卧又曰葛亮顧廬又曰亮遺巾幗既曰楊震關西又曰震畏四知既曰揚雄草𤣥又曰子雲投閣既曰杜預建橋又曰元凱傳癖既曰孫欽閉户又曰文寶緝栁既曰平叔傅粉又曰何晏神伏既曰伏波標柱又曰馬援薏苡既曰仲宣獨步又曰王粲覆棋既曰叔寶玉潤又曰衛玠羊車既曰子建八斗又曰陳思七步既曰子房取履又曰張良燒棧既曰陶潜歸去又曰淵明把菊既曰孔融遜果又曰孔融座滿凡此皆一人而分作二句或三句者也瀚之意固患其重復故或用姓名或用表字或用官爵蓋嫌於同而欲異其語也夫諸史中所載人姓名事蹟多矣每用一人為一句不難也何至乃重復用之哉義其所著不皆出於經史而間取小說雜書如毛寶白龜糜竺收資皆出於搜神記壺公摘天初平起石皆出於神仙傳孫晨藁席靈輒扶輪皆出於類林孫鐘設瓜黃尋飛錢宋宗雞窗皆出於幽冥録龎儉鑿井出於風俗通盧充幽婚出於志怪集張氏銅鈎出於三輔決録王果石崖出於神怪志蓋小說雜書多妄誕不可取信而瀚取此與經史同列非訓䝉之所先也三世將史記秦使王離擊趙客曰將三世必敗以其殺伐多也後漢耿弇贊曰三世為將道家所忌觀國竊謂用兵無常勝亦無常敗一勝一敗乃其常理要在持守之如何爾若謂將三世必敗則將二世斯可已矣而三世猶將者是躬蹈敗亡之地也人君茍知其將已二世矣而又使之將者是欲置人臣於必敗而自取亡師之禍也然則將三世必敗決無是理也王翦為秦將有功翦子賁復有功翦孫離復將擊趙為項羽所敗當是時項兵强離輕敵遂敗當自責也非三世將之罪也䝉驁為秦將有功驁子武復將有功驁孫恬復築長城俄而二世賜恬死蓋恬不悟趙髙之窺已貪功而及於難亦當自責也非三世將之罪也李信為秦將有功信裔廣為漢將有功廣孫陵復將而降胸奴陵以寡兵深入不測之地此敗亡之道也亦當自責非三世將之罪也竇融為光武將有功融猶子固復將有功融孫憲復將能空朔庭而獲罪自殺憲恃國戚有軍功而陵肆不軌自取禍亡亦當自責非三世將之罪也陸遜為吳將有功遜子抗復將有功遜孫機復將佐成都王穎以討亂鹿苑之敗機遂遇害機力小而任重難以成功亦當自責非三世將之罪也凡此皆將三世而敗者迹其所由皆失持守之道而至於敗固不可歸諸天也若夫鄧禹為光武將有功禹子鴻為和帝將有功禹孫隲為安帝將有功三世不敗也耿況為光武將有功況子弇復將有功況孫秉復為顯宗將有功而況孫夔恭俱為名將三世不敗也周訪為晉元帝將有功訪子撫復將有功撫子楚復將平禍亂三世不敗也薛仁貴為唐髙宗將有功仁貴子訥復將有功訥孫平復將討蔡疏封三世不敗也康日知為德宗將有功日知子志睦復將有功日知孫承訓復為宣宗名將三世不敗者又如此則非三世必敗矣君子當勉人以持守之道而以三世將為必敗非立教之方也夫殺伐所以止亂也故商湯殺伐多而興商三十世周武殺伐多而興周三十七世漢髙帝殺伐多而漢興四百年晉宣帝殺伐多而晉興一百五十年唐髙祖殺伐多而唐興三百年使其以殺伐為戒則桀紂秦隋之亂何以彌之哉趙客之說王離率爾之辭也後世不可援以為信新唐書釋音南北朝有復姓庫狄者周有少師庫狄峙北齊有宜都郡王庫狄伏連古亦有獨姓庫者後漢有輔義侯厙鈞古又有姓厙者音赦廣韻曰厙始夜切姓也台括有之今案唐史甄權傳有魯州刺史庫狄嶔是復姓庫狄也唐書釋音乃音庫為赦然則字與音兩失之矣唐書釋音饒州老儒董衡所進頗為詳悉然圜字當作户關切乃作胡官切綰字當作烏板切乃作烏管切蘋字當作蒲兵切乃作蒲萌切愎字當作符逼切乃作蒲北切丱字音慣而乃音貫荍字音翹而乃音蕭劉文靜傳曰奮襼大呼從衣所謂袂也而衡注曰木相摩蓋廣韻曰􅀈木枝相摩也衡誤以襼為􅀈矣蕭復傳曰今阽于危阽音鹽臨危之義也衡誤音阽為都念切又注曰下也如此類甚多蓋討論之失也言行聖賢言行要當顧踐無使自相矛盾唐太宗修晉書自製晉武帝論謂惠帝可廢終使傾覆洪基然太宗不自知髙宗之不君其傾覆尤甚於惠帝也太宗謂劉元海當除而不除卒令擾亂區夏然太宗不能除女武之禍其擾亂尤甚於元海也太宗對蕭瑀謂隋文帝事皆自決不任羣臣然自咤曰朕作天子常兼將相之事則與前言異矣太宗對鄧素謂逺人不服則修文德以來之然自將以征髙麗卒不成功則與前言異矣白樂天代宰相請上尊號表至外國求婚則以稟命為天子神武樂天作䇿林欲官吏清亷然又謂凍餒切於身雖巢由不能固其節何其言之不類耶杜子美投贈哥舒開府翰詩曰開府當朝傑論兵邁古風先鋒百勝在略地兩隅空又作潼關吏詩曰哀哉桃林戰百萬化為魚請囑防關將慎勿學哥舒此所謂一貴一賤交情乃見者耶雖然人各有趣茍不悖於道則勿傷於言行郅惲拜將兵長史授以軍政惲恥以軍功取位遂辭歸鄉里而班超投筆以嘆曰當立功異域取封侯安能久事筆研杜預為荆州刻二碑一沉水中一立峴山欲示無窮而楊㻛乃曰書名史氏足矣若碑者徒遺後人作矴石耳謝靈運好山水尋山陟嶺必造幽峻而樂廣乃曰名教內自有樂地王恭曰仕官不為宰相才志何足以騁而張翰乃曰使我有身後名不如即時一杯酒鮑行卿曰作舍人不免貧而王秀之乃恐富求歸凡此其志若甚相反然不悖於道則於言行無傷焉若夫援伊尹放太甲之例而霍光因以廢昌邑終使霍氏不能善其宗援周公居攝之例而王莽因以篡漢終使王氏覆其宗援周公殺管叔之例而唐太宗因以殺建成元吉終久不能全父子兄弟之譏凡此皆悖道而逆施者也可不慎哉封禪書史記封禪書曰齊桓公欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉神農封泰山禪云云炎帝封泰山禪云云觀國案三皇謂太昊伏羲氏也炎帝神農氏也黃帝有熊氏也然則炎帝乃神農氏也而封禪書乃分為二人則誤矣漢髙祖名邦司馬遷作史記為諱之悉代以國字然封禪書曰五嶽皆天子之邦漢文帝名亘改亘山為常山故封禪書曰以常山為郡然又曰至琅邪過亘山吕后名雉改雉為野雞故封禪書曰野雞夜鳴然又曰縱逺方竒蜚禽及白雉凡此用字不一如此何耶太史公封禪書贊曰余從巡祭天地諸神名山大川而封禪焉入夀宫侍祠神語究觀方士祠官之意於是退而論次觀國案封禪具載祠祭事太史公當取其與禮合者而叙武帝方士之言謬悠無根至於夀宫神與人言鬭棋觸擊之類皆世俗巫覡小數虛怪不足以示後世引證周禮玉府曰王齊則共食玉王荆公新義曰北齊李預嘗得食法觀國案李預乃後魏孝文帝時人其祖宗與其子孫世為魏人見於後魏書無在北齊者非北齊人也新義誤也鄭氏注周禮曰玉是陽精之純者食之以禦水氣王齊當食玉屑前漢郊祀志曰武帝作柏梁銅柱承露仙人掌之屬顔師古注曰三輔故事云建章宫承露盤髙二十丈大七圍以銅為之上有仙人掌承露和玉屑飲之張衡西京賦曰立修莖之仙掌承雲表之清露屑瓊蘂以朝餐必性命之可度言食玉屑可以延生也故李預羡古人餐玉法采而食之及其死也形不壞而無穢氣然則周禮玉府王齊共食玉則古之人君未有不食玉者至後世其法稍不傳且後世文物愈備而食玉一事不能追古人何耶王荆公字說牷字解云國語曰毛以告全今案國語無此惟禮記曰毛者告全之物也牟字解云牟者爾雅曰牟進也今案爾雅無此文惟玉篇曰牟進也芼字解云爾雅曰芼擇也今案爾雅無此文惟鄭氏詩注曰芼擇也仔字解云爾雅曰仔肩任也今案爾雅無此文惟鄭氏詩注曰仔肩任也夫引證之誤小疵也然作成書者固不當誤馬周杜甫傳唐書馬周傳曰周舍新豐逆旅主人不之顧周命酒一斗八升悠然獨酌又杜甫傳曰甫嘗從李白髙適過汴州酒樓酣登吹臺慷慨懷古觀國竊謂逆旅獨酌登髙懷古乃人之常情若因可書之事而附見於史可也今此二傳不因可書之事而特書此者所未諭也馬周窮未遇時逆旅獨酌不知何人記此一事設當時有見周獨酌而記之者又何足記也杜甫與李白髙適登吹臺懷古宜有吟咏而集所不載蓋兩傳所書皆不足書也或謂自遷固而下作史者稍放春秋以一字示褒貶有志乎懲惡而勸善其然乎其不然乎六出南史宋孝武帝紀大明五年正月朔華雪降散為六出上悅以為瑞觀國案雪六出古猶今也宋孝武大明五年正月朔雪六出孝武必以是日受元吉之賀因雪六出乃自喜以為瑞道諛之臣飾此說以記之後之修史者不擇遂著於紀爾韓詩外傳曰凡草木華五出雪花獨六出今究觀草木華亦有六出者但不若五出者多爾如梔子花萱草花百合花皆六出也琥珀張茂先博物志曰松脂淪入地千年化為茯苓茯苓千年化為琥珀劉義慶世說曰桃瀋入地化為琥珀廣雅曰楓脂生地中深者八九尺大如斛削去皮成琥珀初時如桃膠凝乃成元中記曰楓脂入地為琥珀酉陽雜俎曰龍血入地為琥珀又曰寧州沙中有細腰蜂岸崩則蜂出土人燒治以為琥珀觀國案琥珀燒之有松氣又其中有蜂蠅狀不壞當是松脂濕時蜂蠅所粘凝結入地嵗久而成琥珀也茯苓亦是松根氣結成如贅疣狀其抱根者謂之茯神初生則小嵗久則大蓋琥珀茯苓自是兩物非茯苓變為琥珀也二物各有大小非必千年而後化也張茂先論物理多險怪如此其餘諸家論琥珀所生皆非也琥珀又為虎魄字蓋假借用之唐髙祖之祖名虎唐人諱虎字故唐人文字皆改虎為武而諱虎珀為武魄也魄又音他各切史記酈食其落魄無依食業是也又音蒲莫切相如封禪書曰旁魄四塞雲布霧散是也前漢律厯志曰周書武成篇惟一月壬辰旁死霸又曰粵若來三月既死霸又曰死霸朔也生霸望也又曰惟四月既旁生霸又曰甲子哉生霸孟康注曰魄月質也顔師古注曰霸古魄字觀國案許慎說文魄與霸通班固好用古文字故每變其體扇枕後漢黃香傳不載扇枕事陶淵明作孝士傳贊曰黃香九嵗失母事父竭力以致孝養暑月則扇牀枕李瀚蒙求曰黃香扇枕注䝉求者引東觀漢記曰黃香事母至孝暑月扇枕在淵明傳則云事父在東觀漢記則云事母世患無所質正觀國案後漢書黃香傳年九嵗失母思慕憔悴殆不免喪鄉人稱其至孝年十二太守劉護聞而召之辟門下孝子香家貧內無僕妾躬執苦勤盡心奉養遂博學經典蓋本傳先云九嵗失母後云年十二太守召為門下孝子家貧盡心奉養則香猶有父在而盡心奉養也然則香為父扇枕可知矣香本傳字文彊而東觀漢記字文孺嘗觀諸史所引東觀漢記其言亦有無倫義而不可取信者蓋當時所記多出於風傳如西京雜記李肇國史補之類未必皆可信而後之修史者往往多取而編入史中不能不招瑕也佛教後漢西域傳曰天竺國一名身毒國其人修浮圖道不殺伐遂以成俗又曰明帝夢見金人長大頂有光明以問羣臣或曰西方有神名曰佛其形長丈六尺而黃金色帝於是遣使天竺問佛道法遂於中國圖畫形像焉楚王英始信其術中國因此頗有奉其道者後漢光武子楚王英傳曰英晚節更喜黃老學為浮圖齊戒祭祀章懷太子注引袁宏漢記曰初明帝夢見金人長大頂有日月光以問羣臣或曰西方有神其名曰佛陛下所夢得無是乎於是遣使天竺問其道術而圖其形像焉廣韻佛字注引牟子曰漢明帝夢神人身有日光飛在殿前以問羣臣傅毅對曰天竺有佛將其神也觀國竊謂人君之於天下茍有可以誘民為善者無不舉而行之漢明帝夢金人而遣使天竺以問佛道必聞其國以好生惡殺省欲去奢為事冀以此可以誘民為善之一端也而溺信者乃至於太過梁武帝溺信太過故登殿受佛戒宗廟薦蔬果數幸佛寺講經捨身設齊贖身此豈人主所當為者耶武帝冀以此銷罪惡獲福利及侯景之叛乃憂憤不能支梧則溺信無益之明驗也天下之事太過則反傷理之必致也後魏太武帝太平真君七年詔諸州坑沙門毁諸佛像至文成帝興安元年始復佛法後周武帝建德三年毁經像沙門道士並令還俗至靜帝大象二年始復佛道二教唐武宗㑹昌三年大毁佛寺令僧尼為民至宣宗大中元年始復佛寺蓋太過反傷之理也南北朝崇信佛法而士人亦多有溺信者南史宋武帝大舉北侵以王元謨為寧朔將軍及魏救至元謨夜遁蕭斌將斬之沈慶之固諫乃止初元謨將見殺夢人告曰誦觀音經千遍則免元謨誦之得千遍明日將刑誦之不輟忽傳唱停刑北史元魏時盧景裕兵既敗繫晉陽獄至心誦經枷鎖自脫當時又有負罪當死者夢沙門教誦經覺時如夢誦千遍臨刑刀折主者以聞赦之此經遂行號髙王觀世音經後世奉佛法者得以此藉口曰昔人誦某經而免枷鎖自脫誦某經而臨刑刀折往往溺信流遁而不反所謂觀世音經者今具有之茍使當刑人誦之欲以免死是刻舟而求劔知其決不可也譬如李廣見石以為伏虎而射之沒矢若效李廣而射石則殆矣南朝梁遣王固聘魏宴昆明池魏人以南人嗜魚大設罟網固以佛法咒之遂一鱗不獲此乃咒詛小數今世巫覡皆能之就使佛法中亦有此咒固不足怪也唐髙祖時傅奕上疏極詆浮圖法髙祖下奕議於有司中書令蕭瑀曰佛聖人也非聖人者無法請誅之奕曰禮始於事親終於事君而佛逃父出家以繼體悖所親瑀非空桑所出蓋所謂非孝者無親瑀不答但合爪曰地獄正為此人設矣唐憲宗遣使者往鳯翔迎佛骨入禁中刑部侍郎韓愈上表言五帝三王皆夀百餘嵗此時佛法未至中國漢明帝時始有佛法其後亂亡相繼運祚不長宋齊梁陳元魏以下事佛漸謹年代尤促梁武帝捨身施佛後為侯景所逼餓死臺城事佛求福乃更得禍表入帝大怒持示宰相曰愈言我奉佛大過猶可容至謂東漢奉佛以後天子咸夭促言何乖剌耶乃貶潮州刺史觀國竊謂蕭瑀云地獄正為是人設此閭閻猥語非大臣所當言韓愈言太剴切乃未信之諫也耶范煜西域論曰佛道神化興自身毒好仁惡殺蠲敝崇善所以賢達君子多愛其法然好大不經竒譎無已又精靈起滅因報相尋若曉而昧者故通人多惑焉蓋導俗無方適物異㑹取諸同歸措夫疑說則大道通矣觀國竊謂茍可以誘民為善而無溺信太過又何傷乎范曄之論頗通攝提前漢天文志曰大角者天王帝坐廷其兩傍各有三星鼎足向之曰攝提攝提者直斗杓所指以建時節觀國案天文志所言攝提乃攝提星也史記厯書曰孟陬殄滅攝提無紀裴駰注曰攝提星乃隨斗杓所指建十二月前漢律厯志曰孟陬殄滅攝提失方孟康注曰攝提星名隨斗杓所指建十二月若厯誤當指辰而乃指已是謂失方凡此言攝提皆謂攝提星也爾雅曰正月為陬太嵗在寅曰攝提格蓋陬者月名也攝提格者嵗名也攝提格但主太嵗居寅一位而已若攝提星則隨斗杓所指遍厯十二辰以正嵗時焉茍攝提無紀則潤餘乖錯而厯數差矣屈平離騷曰攝提正於孟陬兮惟庚寅吾以降五臣注文選曰太嵗在寅曰攝提庚寅日辰也言我攝提嵗正月庚寅日下母之體觀國案離騷云攝提正於孟陬者蓋言攝提星順乎斗杓而不失正朔之紀也孟陬者正朔之紀始於此也言正於孟陬者不失正朔之紀也庚寅者屈平所生之嵗也故曰攝提正於孟陬兮惟庚寅吾以降言斗杓順序正朔不乖而我之生也隂陽和平初無謬戾故曰皇考錫我以嘉名而字我以靈均我之美善如此而不為人所知此作騷之意也五臣以攝提為太嵗則非也夫事有疑似如此類者不可不審憮幠前漢薛宣傳曰或以德顯或以功舉君子之道焉可憮也晉灼曰憮音誣蘇林曰憮同也兼也顔師古曰論語載子夏之言廣韻曰憮音武夫切空也觀國案薛宣傳直用憮字以當誣字耳憮有空之義可以借與誣字通用後漢崔琦作外戚針曰匪賢是上番為司徒荷爵負乘采食名都詩人是刺德用不憮章懷太子注曰憮大也音呼觀國案字書幠音呼大也憮從巾故有大之義若憮字從心則非大也所謂德用不憮亦當音誣為是憮又音武字書曰憮失意也若孟子云夷子憮然為間曰命之矣是也若夫幠字則異於是桑扈詩曰兕觥其觩㫖酒思柔彼交匪敖萬福來求鄭氏箋曰飲酒者柔順中和不幠敖也陸德明音義曰幠火吳反禮記投壺篇曰毋幠毋敖鄭氏箋曰幠敖慢也凡此言幠與憮字音既不同義亦相逺前漢五行志曰古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔匪徼匪傲萬福來求顔師古曰不徼幸不傲慢也觀國案毛詩言彼交匪敖而漢書乃曰匪徼匪傲蓋班固所引者别本詩非毛公詩故其用字有不同也溢鎰史記平凖書曰漢興接秦之弊米至石萬錢馬一匹則百金臣瓚曰秦以一溢為一金漢以一斤為一金前漢食貨志曰秦兼天下幣為二等黃金以溢為名上幣孟康注曰二十兩曰溢顔師古注曰改周一斤之制以溢為金之名數也又食貨志曰漢興黃金一斤顔師古注曰改周之制更以斤名金觀國以史記漢志之言觀之蓋謂周以斤名金秦以溢名金而漢復周之制以斤名金也二十兩為溢十六兩為斤秦以溢名金則一溢為二十兩漢以斤名金則一斤為十六兩矣廣韻曰溢音逸器滿也鎰亦音逸引國語曰二十四兩為鎰蓋溢者洋溢滿盛也鎰者名數也名金當用鎰字而史記漢書用溢字者假借用之耳陳臻問於孟子曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受國語孟子用鎰字乃其本也禮記喪禮大記篇曰朝一溢米莫一溢米鄭氏注曰二十兩曰溢於粟米之法一溢為米一升二十四分升之一禮記漢人所集亦用溢字與史記漢書同也國語以二十四兩為鎰而史漢諸家注訓皆以二十兩為鎰豈非周秦之制不同歟前漢張良傳曰漢元年沛公為漢王賜良金百溢亦以溢為名者當是時漢未改秦制故也而國語孟子亦以鎰名金以此知周亦以鎰名金不特秦而已漢髙祖三年與陳平黃金四萬斤以間疏楚君臣史記趙世家曰燕王令丞相栗腹約歡以五百金為趙王酒史記貨殖傳曰陶朱公十九年之中三致千金又曰販脂辱處也而雍伯千金漢以一斤為一金若五百金則五百斤金也千金則千斤金也漢灌夫傳言萬金良藥者其價值黃金萬斤也此其例也精舍晉書孝武帝初奉佛法立舍於殿內引沙門居之因此世俗謂佛寺為精舍觀國案古之儒者教授生徒其所居之舍皆謂之精舍故後漢包咸傳曰咸住東海立精舍講授又劉淑傳曰淑少明五經隱居立精舍講授又檀敷傳曰敷舉辟不就立精舍教授又姜肱傳曰肱道遇冦兄弟爭死盜感悔乃就精廬求見章懷太子注曰精廬即精舍也以此觀之則精舍本為儒士設至晉孝武立精舍以居沙門亦謂之精舍非有儒釋之别也伯兮詩曰焉得諼草言樹之背毛氏訓曰諼草令人忘憂諼本為萱故古今皆謂萱草忘憂也然春秋昭公二十年左氏傳曰惟食忘憂晉書祖約傳曰奕棋忘憂又顧榮傳曰酒可以忘憂則忘憂之物固多端不特萱草而已也黃鳥哀三良乃秦子車氏之三子奄息仲行針虎而春秋僖公二十四年左氏傳曰鄭有三良叔詹堵叔師叔則言三良者不可不分秦鄭矣史記樗里子滑稽多智秦人號曰智囊而漢鼂錯以辨為太子家令號智囊則智囊有秦漢之别也後漢李膺以聲名自髙士有被其容接者名為登龍門而南史袁昻傳曰入其門者號登龍門晉謝安在官無當時譽去後為人所思而樂廣所在為政無當時功譽每去職遺愛為人所思後漢逸民戴良母喜驢鳴良常學之以樂母而晉孫楚好驢鳴晉羊曼為太山守時號䵬伯而唐常衮為宰相世謂之䵬伯凡此皆名同而實異者也援引之際當有以别之肺附前漢劉向傳上封事曰臣幸得託肺附誠見隂陽不調不敢不通所聞顔師古注舊解云肺附謂肝肺相附著猶言心膂也一說肺謂斫木之肺札也自言於帝室猶肺札附於大材木也又田蚡傳曰上初即位富於春秋蚡以肺附為相又曰天下幸而安樂無事蚡得肺附又曰臣以肺附幸得待罪顔師古注同前又師丹傳曰哀帝少在國邑見外家王氏僣盛常邑邑即位多欲有所救正封拜上傳奪王氏權丹上書曰肺附何患不富貴不宜倉卒觀國案史記惠景間侯者年表曰孝惠孝景諸侯子弟若肺附又前漢王莽傳曰臣莽伏自惟念得託肺腑獲爵土蜀志劉備傳曰備肺腑枝葉宗子藩翰以此觀之則劉向田蚡師丹傳所言肺附皆肺腑也史家或假借作附字耳肺腑謂國戚也猶人之有肺腑連繫相親也劉向乃楚元王交之後陽城侯德之子田蚡乃景帝王皇后同母弟武帝之舅氏師丹所論者戚里丁氏之家王莽乃元后王家之子皆國戚也故皆言肺腑在他人非國戚者不可言也曹娥碑後漢列女傳曰孝女曹娥㑹稽上虞人父溺死縣江不得尸娥年十四沿江號哭晝夜不絶聲旬有七日投江而死元嘉元年縣長度尚改葬娥於江南為立碑焉章懷太子注引㑹稽典録曰上虞長度尚弟子邯鄲淳弱冠有異才為曹娥碑操筆而成無所㸃定其後蔡雍又題八字曰黃絹幼婦外孫虀臼魏志注引語林曰楊修為魏主曹操主簿至江南讀曹娥碑碑背有八字詞曰黃絹幼婦外孫虀臼操不解問修曰卿知否修曰知之操曰且勿言待朕思之行三十里乃得之令修解曰黃絹色絲色絲絶字幼婦少女少女妙字外孫女子女子好字虀臼受辛受辛辭字操曰一如朕意俗云有志無志校三十里觀國讀南史劉顯幼聰敏號神童齊武帝時為尚書郎有沙門訟田帝大書曰卜下貝國諱陟盈切有司未辨遍問莫知顯曰卜貝文為與上人帝因忌其能出之楊修亦以才能敏捷為操所知後操忌修而殺之書曰人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之魏齊二主於此有愧焉衍文君牙曰夏暑雨小民惟曰怨咨而禮記緇衣篇引書曰夏曰暑雨小民惟曰怨咨曰字衍文也太甲曰往省括于度而緇衣引太甲曰往省括于厥度厥字衍文也太甲曰自作孽不可逭而緇衣引太甲曰自作孽不可以逭以字衍文也呂刑曰播刑之迪而緇衣引甫刑曰播刑之不迪不字衍文也君陳曰未見聖若弗克見而緇衣引君陳曰未見聖若已弗克見己字衍文也伐柯詩曰伐柯如何匪斧不克取妻如何匪媒不得而禮記坊記篇引詩曰伐柯如之何匪斧不克取妻如之何匪媒不得之字衍文也易無妄卦六二不耕穫不菑畬坊記引易曰不耕穫不菑畬凶凶字衍文也論語曰貧而樂富而好禮而坊記曰子云貧而好樂富而好禮好字衍文也呂刑曰欽忌罔有擇言在身而禮記表記篇引甫刑曰欽忌而罔有擇言在躬而字衍文也秦誓曰以保我子孫而禮記大學篇引秦誓曰以能保我子孫能字衍文也易大傳曰天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣而禮記樂記篇曰天尊地卑君臣位矣卑髙以陳貴賤位矣動靜有常小大殊矣方以類聚物以羣分則性命不同矣每異其下句者衍文也堯典二十有八載帝乃殂落而孟子引堯典曰二十有八載放勳乃殂落放勳字衍文也大禹謨曰夔夔齊栗瞽亦允若而孟子書曰䕫夔齊栗瞽瞍亦允若瞍字衍文也伊訓曰造攻自鳴條而孟子引伊訓曰天誅造攻自牧宫天誅字衍文也康誥曰暋不畏死罔弗憝而孟子引康誥曰閔不畏死凡民罔不憝凡民字衍文也泰誓曰有罪無罪豫曷敢有越厥志而孟子引書曰有罪無罪惟我在天下曷敢有越厥志惟我在字衍文也論語曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者而孟子引孔子曰惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也亂字恐字衍文也盤庚曰若火之燎于原不可嚮邇而春秋莊公十四年左氏傳引商書曰惡之易也如火之燎于原不可嚮邇惡之易也衍文也采菽詩曰平平左右亦是率從而春秋襄公十一年左氏傳曰詩云便蕃左右亦是帥從便蕃字衍文也仲虺之誥曰取亂侮亡而春秋襄公十四年左氏傳引仲虺曰亡者侮之亂者取之乃衍文也學林卷七
