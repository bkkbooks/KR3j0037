body:
  text: 學林卷十宋王觀國撰孫休四子名吴志孫休永安五年立子雨單為太子注引詔曰名子欲令難犯易避孤今為四男作名字太子名雨單雨單音如湖水灣澳之灣字莔莔音如迄今之迄次子名􅀢􅀢音如兕觥之觥字􅀢􅀢音如𤣥礥首之礥次子名壾壾音如草莽之莽字昷昷音如舉物之舉次子名音如褒衣下寛大之褒字㷏㷏音如有所擁持之擁此都不與世所用者同故鈔舊文會合作之夫書八體損益因事而生今造此名字既不相配又字但一庶易弃避其普告天下咸使聞知觀國案古之字書皆篆文其所従偏旁有隂陽上下左右曲直之形皆義理之所存錙銖之異而義各有取不徒設也至秦始變為𨽻雖變為𨽻然訓釋其義則悉本諸篆文許慎説文之類是也孫氏為四男立名字欲其難犯易避夫古字之難犯易避者多矣不用古字而乃妄意撰造自為之音而不言其偏旁所従之義徒欲立異而失先王制字之法兹所謂好異而不為異者乎又第三子字昷音舉今案許慎説文昷音温即温字之所従也孫氏其閲字書未廣耶廣韻上聲莽字韻既收壾字注曰吴王孫休子名入聲禄字韻又􅀈字注亦曰吴王孫休子名葢古人訛書壾為􅀈而修廣韻者重複誤收之也梁有四公子名曰䨲萬杰桀曰􅞺携闖丑禁切曰仉掌䁈覩曰䴰贖䵎湍亦好恠之甚者也隋文帝本封隨國之爵及即帝位乃去隨之辵而為隋以為國號案字書隋徒果切其義則落也懈也裂肉也玊篇曰隋亦作墮隋文帝不審其字形離合之義而輕於増損祇取笑於後世耳唐書則天武氏自制十有二字曰曌照而天埊地日囝月星君􅖔臣載初年年􅂒正而則天自名曌取古人已制之字而改易之意者古人已制之字未盡善耶兹亦可謂贅矣案集韻載則天自制者十有八字於唐史十有二字之外復有六字如􅙷人字圀國字之類皆見於當時薛稷所書之碑則知則天所自制者不止乎十有二字葢唐史所載未之盡也至五代南唐劉龑初名巖採周易飛龍在天之義為龑音儼以名兹又見其不知量也守守字音首音狩二音太守之守當音狩案廣韻上聲守字音首注曰主守也去聲守字音狩注曰太守也舜典巡守止用守字春秋僖十二年左氏傳曰王以上卿之禮饗管仲仲辭曰臣賤有司也有天子之二守國高在杜預注曰國子高子天子所命為齊守臣陸徳明音義曰守手又反又僖二十四年左氏𫝊曰天子蒙塵於外敢不奔問官守杜預注曰官守王之羣臣又𫝊曰衛人將伐邢禮至曰不得其守國不可得也杜預注曰守謂邢正卿國子又僖二十八年左氏𫝊曰奉夷叔以入守又文七年左氏𫝊曰箕鄭居守又宣十年左氏𫝊曰凡諸侯之大夫違告於諸侯曰某氏之守臣某又昭公二十三年左氏𫝊曰古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟陸徳明音義皆曰守手又反葢手又反者讀音狩也時未稱太守然亦音狩也顔延年五君詠曰仲容青雲器實禀生民秀達音何用深識㣲在金奏郭弈已心醉山公非虚覯屢薦不入官一麾乃出守此正用太守字者狩也然則凡稱太守皆當讀音狩可知矣亦如宿字音肅音秀二音凡天星皆當音秀若二十八宿列宿之類是也又宿㽞二字皆去聲讀為秀溜漢書郊祀志曰天子至東萊宿㽞之數日無所見又曰宿留海上與方士𫝊車孟子曰於崇吾得見王退而有去志趙岐注曰不欲即去故且宿㽞廣韻去聲曰宿留停待也然則宿字二音讀之當分别不可混也又如枕字分上聲去聲二音若枕股而哭枕轡而寝飲水曲肱而枕之枕流潄石與夫枕戈枕江之類皆去聲也上聲為實字去聲為虚字二聲有辨也至如臚𫝊鴻臚之臚音廬而俗讀音盧潁川潁考甫皆音永而俗讀音郢璟玉璟明之璟音烱而俗讀音景若此類皆非有假借音也俗誤讀之耳寧寗史記秦本紀太史公載賈誼過秦論曰六國之士有寧越徐廣注曰或自别有此人不必寗越也觀國案古人寧寗二字通用故史記酷吏𫝊有寧成而前漢酷吏𫝊有寗成乃一人也又前漢地理志上谷郡有廣寧縣晉書地理志上谷郡有廣寗縣則寧寗二字通用也史記魏世家曰通韓上黨於共寗徐廣注曰朝歌有寗鄉劉昭注引史記通韓上黨於共寧則寧寗二字通用也前漢禮樂志樂歌曰泰尊柘漿析朝酲㣲感心攸通修名周流常羊思所并穰穰復正直徃寗寗乃寧也前漢王莽𫝊曰太后詔羣下勸職永以康寗葢康寗即康寧也晉書寧馨兒文士多用作寗馨以此考之則過秦論所謂寧越乃寗越也徐廣以謂自别有此人誤矣春秋左氏𫝊曰陳靈公與孔寧儀行父飲酒又曰納公孫寧儀行父於陳而公羊𫝊曰納公孫寗儀行父於陳葢寧寗通用也禮運曰諸侯非問疾弔喪而入諸臣之家是謂君臣為謔鄭氏注曰陳靈公孔寗儀行父數如夏氏陸徳明音義曰左𫝊作寧公羊作寗各依字讀觀國案陸徳明謂各依字讀則讀寧為平聲讀寗為去聲矣陸徳明初不悟二字通用而云各依字讀非也冰許慎説文仌字音兵冰字音凝亦作凝今詳説文仌字只従重入其冰字乃凝字無他音不知後人何故以冰為仌而音兵也葢冰字従仌従水而音凝則於義為正爾雅曰冰脂也郭璞注曰莊子云肌膚若冰雪冰雪脂膏也爾雅用冰字為凝字而莊子亦用冰為凝字而今之書史書用冰音兵者當是秦漢間變篆為𨽻時所改也許慎後漢人也説文尚以氷為凝者葢説文本纂集古文而後成古文仌音兵冰音凝不可改故也王文公筆録曰李陽冰善篆而不知冰字乃凝字自後只呼為李陽凝葢戱之也唐故事尚書祠部號氷㕔讀氷作去聲言事簡清冷也歐陽文忠公和梅聖俞従登樓詩曰自憐曽預稱觴列獨宿氷㕔夢帝關而用氷作平聲者但欲順詩句平仄用之爾歐公不應誤也韓愈為分司郎官上鄭相公啟曰分司郎官職事唯祠部為煩且重愈獨判二年日與宦者為敵相伺候罪過惡言詈辭狼籍公牒不敢為恥實慮陷禍故前者懐狀乞與諸郎官更判觀國案愈啟所言則祠部非事簡清冷之司也當是憲宗時偶然省曹事多而愈適當其任故爾氷又為箭筩之葢春秋昭公十四年左氏𫝊曰懐錦奉壺飲氷以蒲伏焉又二十五年𫝊曰公徒釋甲執氷而踞又二十七年𫝊曰豈其伐人而脱甲執氷以㳺杜預注曰氷櫝圓葢也櫝圓是箭筩其葢可以取飲參草書法喿字與参字同形故晉人書操字皆作掺今法帖碑本中王操之書皆作掺之殊不知掺字乃音所咸切又音所減切詩曰掺掺女手是也後漢禰衡為漁陽参撾参音七紺切参撾者擊鼓也文士用参撾字或用為掺或用為傪皆讀音七紺切葢假借也徐鍇博學多識時有修字官凡字有従参者悉改従喿鍇曰非可以一例如漁陽参黄塵蕭蕭白日暗則従参者固不可改喿也衆皆服其説古人草書繰字作縿字葢繰音騷乃繹繭為絲者縿音衫乃旌旗之斿也又草書澡字作渗字葢澡音早而渗音所禁切也又草書趮字作䟃字葢趮音躁而䟃音驂也若據草書而改變𨽻體則礙矣又如草書方字類才字故於字改為扵遊字改為逰又草書㡭為􅂒故斷字改為断繼字改為継如此類甚多皆非法也員錯屈唐書員半千其先以忠烈似伍員而賜姓唐書吉王𫝊曰貟半千為控鶴内供奉唐書音義曰貟王問切元和姓纂去聲貟字注備言貟半千其先因慕伍貟而得姓則伍貟之貟音運也貟半千姓亦音運也廣韻去聲貟音運姓也注曰前燕録有金城貟敞唐有棣城刺史貟半千則伍貟之名貟半千之姓同讀音運可知矣春秋左氏𫝊凡言伍貟陸徳明音義皆音云非也音云唯有鄖姓葢貟亦音云而非姓也縁陸徳明音伍貟為云故文士亦作云音用之前賢詩有伍貟忠盡江頭死范蠡功成湖外遊之句作云音也皆陸徳明倡其誤也前漢鼂錯潁川人晉灼注曰錯音厝置之厝顔師古引漢申屠嘉𫝊序曰責通請錯匪躬之故以韻而言則鼂錯音厝也潘安仁西征賦曰殞吴嗣於局下葢發怒於一博成七國之稱亂翻助逆以誅錯恨過聽之无討滋沮善而勸惡此又用鼂錯作入聲倉各切葢隨賦韻之音而借用也然古人假借字音雖多惟姓與名當専一音不可假借他音安仁誤矣廣韻曰屈九勿切屈産出良馬地名也亦姓楚有屈平故春秋左氏𫝊晉使夷吾居屈而楚之諸屈咸為卿大夫陸徳明音義皆曰屈九勿切前漢地理志有北屈縣即晉公子夷吾所居也引汲郡古文曰瞿章救鄭次于南屈顔師古注曰屈九勿切前漢高祖帝紀九年十一月徙齊楚大族昭氏屈氏景氏懐氏田氏五姓闗中與利田宅顔師古注曰屈九勿反然則屈地與屈姓皆九勿反非屈伸之屈也屈伸之屈為區勿切讀之不可不別也稱秤許慎説文稱字分平聲去聲兩音而无秤字廣韻平聲稱字處陵切知輕重也去聲稱字昌證切銓度也俗作秤觀國案禮記月令曰同度量鈞衡石角斗甬正權概鄭氏注曰稱上曰衡稱錘曰權前漢律厯志曰權者銖兩斤鈞石也孟康注曰稱之數始於銖終於石以此觀之則兩漢止用稱字未用俗書秤字也用俗書秤字其晉魏以下乎杜子美寄劉峡州詩曰家聲同令聞時論以儒稱又曰姹女縈新裹丹砂冷舊秤葢稱秤乃一字也一篇詩中押稱秤二字不可也雖然俗書秤字葢生於草書稱字案草書法爯字與草書平字相類因而訛書作秤也字因草書而訛變其體者甚多不特此也扁廣韻扁字注云姓也盧醫扁鵲是也又齧字注云姓也莊子有齧缺又娿字注云姓也莊子有娿荷甘觀國案史記扁鵲姓秦名越人或在趙謂之扁鵲莊子齧缺王倪娿荷甘之属皆寓言非真有是人也説者謂齧缺喻道之不全王倪喻道之端倪娿荷甘喻随流而无決者以至被衣善卷之屬皆類此葢寓言也如子虗賦之亡是公烏有先生也字書豈可遂著以為姓耶又前漢古今人表王倪齧缺被衣皆居第二等誤矣今世𫝊高士𫝊一集盡取列子莊子寓言之人齧缺王倪被衣善卷之類各立一𫝊亦誤矣景古之日影字不従彡只用景字周禮以土圭正日景之法日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸又曰識日出之景與日入之景凡此所用景字葢謂日影也後人加彡而為影故許慎説文無影字而徐炫字義曰景非設飾之物不合従彡以此知是俗書影字於偏旁之義皆不可考詩曰高山仰止景行行止鄭氏箋曰景明也有高徳者則慕仰之有明行者則而行之然則景無欽仰之義而後世遂以仰景為欽慕之義字史記三王世家武帝制曰高山仰之景行嚮之朕甚慕焉曹不與鍾繇曰高山景行私所慕仰凡此用景字未嘗誤也自南北朝人名有景儉景仁之稱當時誤用景字之義故後之循其誤者不已而用景為仰慕者浸廣矣有士人慕陶淵明作景陶軒黄庭堅常見之知其誤用景字用字之際不可不審也射射音麝又音石此二音前賢惟訓説觀國考其義則二音異義也統言射之名則音麝及致力於引矢之事則音石若射御射法射儀大射聘射射以觀徳仁者如射若射之有志凡此皆統言射之名則讀音麝也若射虎侯射熊侯射豹侯射豻射麋射隼於高墉之上射雉一矢亡井谷射鮒弋不射宿孔子射於矍相之圃桑弧蓬矢六以射天地四方左射貍首右射騶虞管仲射齊公中帯鈎射其左越於車下射其右斃於車中子都自下射之顛李廣見草中石射之没羽凡此皆致力於弓矢當讀音石陸徳明諸經音義亦於此音石矣史𫝊多言善騎射亦當音石杜子美醉墜馬詩曰向来皓首驚萬人自倚紅顔能騎射於入聲㦸字韻中押則騎射音石也以此考之則麝石二音其義不同矣漢有大鴻臚射咸姓音麝吴有中書郎射慈姓音石葢姓亦分二音也春秋昭公四年左氏𫝊曰楚沈尹射奔命於夏汭釋音曰射食亦反又昭公五年左氏𫝊曰薳射以繁揚之師會於夏汭釋音曰射食夜反葢名亦分二音也不可以無別劭潘岳河陽縣詩曰誰謂晉京逺室邇身實遼誰謂邑宰輕令名患不劭五臣注文選曰劭平恊韻葢平恊韻者讀音韶也觀國案前漢成帝紀陽朔四年詔先帝劭農薄其租稅寵其强力令與孝弟同科蘓林注曰劭音翹精異之意也晉灼注曰劭勸勉也潘岳詩以遼字劭字為韻則音劭為翹也五臣當別出翹音而曰平恊韻者是於劭音作平恊韻為韶音耳葢五臣未嘗知有翹音而但曰平恊韻而已非也南史宋元凶𫝊曰元凶名劭字休逺初命之曰劭在文召刀為劭後惡焉改刀為力觀國案字書劭字従召従力不従刀也所謂在文召刀為劭者葢初未嘗考䆒字義而遽為臆説耳尊尊字乃古之酒尊字周禮司尊彛禮記有虞氏之尊夏后氏之尊商尊周尊之類是也又有罇樽二字古文所不載當是後人所増許慎説文曰尊酒器也廣韻曰尊亦作罇樽従缶従木後人所加觀國以謂詩賦中若用尊字為韻不可更押罇樽二字杜子美奉漢中王手札詩曰國有乾坤大王今叔父尊又曰從容草奏罷宿留奉清罇雖意各別然其實尊罇只是一字譬猶昬之與婚女之與汝匊之有掬與之有歟本一字也茍出於俗書則不可並用以為韻若一字而二音或三音者可也杜子美贈王倚飲歌曰煎膠續絃奇自見又曰只願无事長相見凡此一字而二音也又子美奉先縣詠懐詩曰幼子饑已卒又曰貧窶有倉卒又曰因念逺戍卒此一字而三音者也若尊罇樽三字既本一字又本一音其可以同韻而押乎字為俗書所増者多矣如回之有迴園之有薗果之有菓欲之有慾席之有蓆裴回之有徘徊仿彿之有髣髴此其顯然者不可同韻而押灼然也刺剌刺字音次又音戚剌字盧達切二字偏旁音義皆不同今案刺字従朿於篆文為剌字従束於篆文為偏旁異也刺字音次若詩之美刺是也又音戚若陳平𫝊解衣羸而佐刺船是也剌音盧達切諡法曰暴民無親曰剌乃惡諡也漢武帝子燕王名旦者謀反自殺諡曰剌王王莽賜平阿侯王仁諡曰剌侯唐高祖子元吉諡曰巢剌王之類是也剌又為乖戾之意前漢劉向𫝊曰朝臣舛午膠戾乖剌顔師古注曰剌音盧達反言相違背也唐書啖助𫝊曰屬綴不倫序事乖剌韓愈上佛骨表憲宗怒曰言何乖剌耶此類是也刺剌二字異體書之乃可辨繦曡前漢食貨志曰萬室之邑必有萬鍾之臧臧繦千萬千室之邑必有千鍾之臧臧繦百萬孟康注曰繦錢貫也顔師古注曰繦音居兩反管子曰凶嵗糴釡十繦葢繦字旁従糸則繦錢貫也今俗謂錢為繦而従金者誤也許慎説文曰曡古理官決罪三日得其宜乃行之従晶従宜王莽以為曡従三日太盛改為三田今為疊字非古也古之戰陳字只用陳字不従車如衛靈公問陳春秋左氏𫝊魚麗陳周禮大司馬教戰陳其字皆作陳晉王羲之作字篇始變為陣字非古也馬廏之廏其字従广下從􅴸去秋切後世俗書多誤為广下既非也字為俗書改其體者甚多如顧之頋霸之覇喬之喬獻之献國之囯廟之庙亂之乱殺之煞趨之趋虧之虧錢之分齊之斉學之斈齋之㪰臺之䑓寳之宝驅之駈棲之栖鹽之塩甕之瓮總之㧾麥之麦兔之兎遲之遟著之着桌日人人之栗繩之䋲飯之飰備之偹凡此皆流俗不曉義理者咸用之而字書如廣韻集韻亦有取而附在正字之下者皆非法也如世俗書蠶字作蚕蚕乃音腆也書舩字作舡舡乃音江也書本字作夲夲乃音滔也書體字作体体乃音坋也書關字作関関乃音卞也書商字作啇啇乃音的也書須字作湏湏乃音古文頮字也又如宜𡨕富寇皆従宀而俗書為冝冥冨冦沖況梁涼皆従水而俗書為冲况梁凉廚廳皆従广而俗書為厨㕔博協皆従十而俗書為慱恊凡此類皆失字之本體者也又如炁字音氣出於道書梵字扶泛切出於釋典乜字彌也切出於畨姓如此猥釀増益者又不可勝紀字學之敝甚矣盼眄盻盼眄盻三字三音偏旁不同義亦不同盼従分普莧切字書曰黒白分也詩所謂美目盼兮是已眄従丐音面字書曰邪視也列子所謂始得夫子之一眄鄒陽書所謂莫不按劍相眄是已盻従兮音睨字書曰恨視也孟子所謂使民盻盻然將終嵗勤動不得以養其父母是已三字音義雖異而偏旁易於相亂故世俗多誤書當書盼或誤為眄當書眄或誤為盻左太沖詠史詩曰左眄澄江湘右盼定羌胡其用眄與盼不相混也俗自易於混疑耳世言顧眄謂邪視也而多誤讀為顧盼袁彦伯三國名臣賛曰六合紛紜民心將變鳥擇高梧臣須顧眄杜子美石硯詩曰公含起草姿不逺明光殿致乎丹青地知汝隨顧眄葢於義則有顧眄而無顧盼古之文士未嘗誤用也世俗多誤讀顧眄為顧盼爾世俗雖誤讀然文士不可誤讀也邵卲邵従召従邑於篆文為卲従召従卩於篆文為二字同音市照切而偏旁不同諸字書曰郡晉邑也又姓邵公奭之後亦作召詩之召公召南是也諸字書曰卲高也揚雄法言曰種蠡不强諌而山棲賢皆不足卲也又曰年彌高而徳彌卲者是孔子之徒與程秘注皆曰卲高也邵卲二字訓義不同不相通用今禮部韻畧去聲收邵字而不收卲字設或賦中用彌卲字為韻遂無韻可押胄胄甲胄之胄與世胄之胄同音伷然甲胄之胄下従冐世胄之胄下從肉若一體書之則為無別矣又如杲字古老切上従日也杲字側狡切上従冐也曰音冒従冂従二也又如郤字去㦸切右従邑卻字去略切右従卩葢卻姓也晉有大夫郤獻子俗作㕁者是也卻退也俗作却者是也又如伏字右従犬音服字書曰藏隠也㐲字右従大音大字書曰地名在海中也亦如笑字音肖下従夭笑字音替下従大車笑也又如陜音閃從夾内二入也陜音洽従夾内二人也陜州在𢎞農本陜縣後魏改為州陜亦作狹亦作陿其義則隘也又如受音夀下従又容納也爱音到下従丈姓也字形相疑似者多互書之不可不詳別也术字於篆文為不従木也而玉篇於木部中收术字則誤矣字書猶不免誤焉而況於流俗乎曽爾雅曰子之子為孫孫之子為曽孫郭璞注曰曽猶重也爾雅又曰父為考母為妣父之考為王父父之妣為王母王父之考為曾祖王父王父之妣為曽祖王母郭璞注曰曽猶重也觀國案曽孫曽祖之曽當讀為層古人用層字只書作曽字曽孫者言重叠層層為孫也曽祖者言重叠層層為祖也故郭璞注爾雅曰曽猶重也則曽孫曽祖之曽音層可知矣信南山詩曰曽孫田之又曰曽孫之穡又曰曽孫夀考甫田詩曰曽孫来止又曰曽孫不怒又曰曽孫之稼又曰曽孫之庾大田詩曰曽孫是若行葦詩曰曽孫維主維天之命詩曰曽孫篤之鄭氏箋曰曽猶重也自子孫之子而下事先祖皆稱曽孫案鄭氏箋曰曽猶重也則詩凡言曽孫皆讀音層亦可知矣書曰惟有道曽孫周王發周禮詔女曽孫諸侯百福禮記曰曽孫侯氏四正具舉凡此類言曽孫一體也卝許慎説文曰磺胡猛切僕也亦作卝古文也故周禮有卝人掌金玉錫石之地鄭氏注曰卝之言礦也金石未成器曰磺觀國案磺亦作磺卝亦作􅀈則卝者古文礦字也周禮釋音卝音胡猛切王荆公引詩總角丱兮以釋卝人之義取其有分別之義若然則丱兮音慣而卝人亦音慣矣若卝人音慣則字書卝人之卝當弃而不用也故荆公字説收礦字而不收卝字恐卝字未可遽爾削去也禮記曰天子之六府有司貨鄭氏注曰司貨卝人也陸徳明音義曰卝胡猛切義甚明也廣韻上聲於礦字訓曰金礦璞也於卝字訓曰金玊未成器也又二字分二切則誤矣禮部韻略上聲卝字胡猛切金玉未成器也礦字古猛切銅鐵間石也亦誤矣葢卝礦乃一字一義也廣韻禮部韻略皆分作二字二義而所訓二義又同而無別葢廣韻唱其誤而禮部韻略襲其誤也湛浮沈之沈亦作湛廣韻引漢書曰且従俗浮湛是也俗書有従冗作沉者非是考之字書冘字甚字偏旁作通用者亦多故訦亦作諶忱亦作愖㽸亦作瘎妉亦作媅􅞶亦作踸然則沈亦作湛葢古文也沈又音去聲讀音鴆春秋宣公三年左氏𫝊曰蔡侯歸及漢執玊而沈又襄公十八年左氏𫝊曰晉侯伐齊以朱絲係玉二㲄而禱沈玉而濟周禮以牡橭午貫象齒而沈之列子曰流於北極沈於大海史記屈原𫝊曰屈原沈汨羅前漢溝洫志曰自臨決何湛白馬玊璧又瓠子歌曰搴長茭兮湛美玊後漢祭祀志曰沈用白馬珪璧各一晉書杜預𫝊曰預為二碑紀其勲績一沈萬山之下一立峴山之上凡此沈字皆讀音鴆者也當讀音鴆者不可移而為平聲葢義各有所歸耳戲下前漢高祖紀曰沛公已定關中羽大怒使黥布等攻破函谷闗遂至戲下高祖紀又曰諸侯罷戲下各就國顔師古注曰戲音許宜反亦讀曰麾前漢衛青𫝊曰都尉韓説従大軍出窴渾至匈奴右賢王庭為戲下摶戰獲王封説為龍頟侯顔師古注曰戲讀曰麾又音許宜反言在大將麾旗之下不別統衆也前漢灌夫𫝊曰馳入吴軍至戲下顔師古注皆曰戲大將軍之旗也讀與麾同又音許宜反觀國案顔師古每注皆存兩音者非也今以史辭考之則戲下讀音麾是也其音許宜反者非麾旗之戲葢秦中自有地名戲者漢高帝紀曰陳涉之將周章西入關至戲顔師古注曰戲許宜反戲在新豐縣東今有戲水驛案後漢郡國志京兆新豐縣東有戲亭師古注此新豐之戲已得當矣而於戲下之注又每引許宜反葢師古牽於疑似而不能痛決之也灌夫𫝊又曰坐乃起稍稍去嬰去戲夫又曰蚡乃戲騎縳夫案此二戲字皆讀音麾嬰去戲夫者竇嬰去而招麾令灌夫亦去也戲騎縳夫者田蚡指麾其従騎收縳灌夫也與戲下之戲同意他音字識志二字通用前漢溝洫志賛云孔子曰多見而識之知之次也顔師古曰識亦作志記也劉歆移書責五經博士曰文武之道未墜于地在人賢者志其大者不賢者志其小者武成曰武王伐商徃伐歸獸識其政事孔安國曰記商家政事以為法周禮匠人營國為規識日出之景與日入之景列子曰小子識之前漢郊祀志曰鼎文鏤無欵識凡此類識字皆讀為志也廣韻平聲曰料落蕭切料理也去聲曰料力弔切度量也然則用料理字當讀為落蕭切莊子曰疾走料虎頭編虎須音義曰料音聊左太冲蜀都賦曰敷蘂葳㽔落英飄颻神農是嘗盧附是料葢作平聲用料字也廣韻平聲曰屏府盈切傍偟也又薄經切扆也去聲曰必郢切蔽也然則用屏營字當讀作府盈切故李陵與蘓武詩曰屏營衢路側執手野踟蹰五臣注文選曰屏營恐懼也字書去聲先音霰故緜詩云予曰有先後瞻仰詩曰不自我先小弁詩曰尚或先之周禮虎賁氏掌先後王大司馬以先愷樂春秋左氏𫝊曰先人有奪人之心引詩曰元戎十乗以先啓行凡此類音義皆曰蘓荐切故毛氏詩曰相道前後曰先後也巾字讀為去聲者若歸去来云日暮巾紫車左太沖吴都賦曰巾玉輅張景陽七命曰巾雲軒凡此皆讀作去聲唯周禮巾車作平聲葢周禮巾車王禮也餘讀作去聲者上下通用也王字讀作去聲者若詩之七月陳王業噫嘻成王春秋左𫝊曰霸王之器也杜預春秋左氏𫝊序曰吾乃今知周公之徳與周之所以王又曰修春秋立素王又曰會成王義易𫝊曰包犧氏之王天下孔安國尚書序曰㐲羲氏之王天下陸徳明諸經釋音皆音為去聲也幹字上聲音管者若賈誼弔屈原賦曰幹棄周鼎前漢百官公卿表曰治粟内史有斡官又食貨志曰有五均六斡又曰斡在縣官如淳注曰斡監鐵㩁酒酤凡此皆讀音管也防字讀作去聲者若杜預左氏𫝊序曰聖人包周身之防此類是也胥字讀作上聲私吕切者若周禮以比追胥七嵗屬象胥桑扈詩曰君子樂胥受天之祜揚雄長楊賦曰酌兕鑠肴樂胥聽廟中之雍雍受神人之福祜諸家音義皆作音私吕切先逹有通譯詩曰象胥尊周徳偏師偉漢功作去聲用胥字也㡬字讀作去聲音兾者若春秋宣公十二年左氏𫝊曰庸可㡬乎列子曰衆人守一狀以求至智未可㡬也揚雄解難曰孔子作春秋㡬君子之前覩也前漢郊祀志曰方士求神者莫驗然益遣㡬遇之又曰㡬至殊庭焉漢文帝詔曰朕㡬郊祀上帝諸神王莽𫝊曰㡬加元服委政而屬之凡此皆讀音兾者也革字讀音棘者若禮器曰詩云匪革其猶聿追来孝檀弓曰夫子之病革矣又曰若疾革雖當祭必告此類是也史記汲黯𫝊曰大將軍青侍中上踞厠而視之如淳注曰厠音側孟康注漢書汲黯𫝊曰厠林邉側也今案字書厠初吏切圊也間也次也側字韻中不收厠字以此知厠字惟初吏切一音而已史記范雎𫝊曰卷以簀置厠中春秋左氏𫝊曰如厠陷而卒史記李斯𫝊曰見吏舎厠中䑕前漢吕后紀曰逐産殺之郎中府吏舎厠中此皆厠圊之厠也史記樂􅐧𫝊曰厠之賔客之中前漢谷永𫝊曰厠之争臣之末此皆間次之厠也然則厠字唯一音而如淳孟康皆出側音誤甚矣凡此皆字有他音者童蒙多誤讀當先諭之不不字舉世讀為奔物切而諸字書並不收此音許慎説文曰吊鳥飛上翔不下来也音方九切又甫鳩甫救二切廣韻平聲曰不弗也甫鳩切又甫九切甫救切入聲曰不與弗同分物切觀國竊詳廣韻入聲既收不字作分物切又注釋曰與弗同則讀不為弗矣考古人用不弗二字㡬於通用論語曰公山弗擾以費叛而春秋定公十二年左氏𫝊曰公山不狃帥費人以襲魯書𦙍征曰辰弗集於房而春秋昭公十七年左氏𫝊曰辰不集于房論語曰舉一隅不以三隅反則不復也又曰夫子之言性與天道不可得而聞也而史記孔子世家曰舉一隅不以三隅反則弗復也又曰夫子言天道與性命弗可得聞也已此古人以不弗二字通用之也葢許慎説文不收為奔物切故諸家字書皆不收然觀古人多以不弗二字並句用之則知字書收字有未盡者而不字當有奔物切之音也節南山詩曰天子是毗俾民不迷不弔昊天不宜空我師弗躬弗親庶民弗信弗問弗仕弗罔君子緜詩曰鼛鼓弗勝肆不殄厥愠亦不隕厥問山有樞詩曰子有庭内弗洒弗埽子有鐘鼓弗鼓弗考子有酒食何不日鼓瑟雨無正詩曰浩浩昊天不駿其徳昊天疾威弗慮弗圖生民詩曰克禋克祀以弗無子不坼不副無菑無害抑詩曰人亦有言靡哲不愚女雖湛樂従弗念厥紹桑柔詩曰匪言不能胡斯畏忌維此良人弗求弗迪凡此詩皆於一篇中用不弗二字相聨屬而成文也大禹謨曰罰弗及嗣與其殺不辜寧失不經益稷曰帝不時敷同啟呱呱而泣予弗子甘誓曰汝不恭命弗用命戮于社五子之歌曰十旬弗反民可近不可下湯誓曰予畏上帝不敢不正有衆率怠弗協湯誥曰弗忍荼毒將天命明威不敢赦伊訓曰山川鬼神亦莫不寧于其子孫弗率太甲曰兹乃不義予弗狎于弗順盤庚曰汝曷弗告朕若火之燎于原不可向邇説命曰兹故弗言㒺不同心康誥曰暋不畏死罔弗憝召誥曰奈何弗欽王不敢後用洛誥曰厥攸灼叙弗其絶儀不及物君奭曰天命不易弗克經厯泰誓曰惟日不足弗克若天凡此書皆於一篇中用不弗二字相聫属而成文也周禮弓人曰居旱亦不動居濕亦不動苟有賤工雖善亦弗可以為良矣禮記祭義曰先王之教因而弗改錯諸天下無所不行曽子問曰不得嗣而為兄弟女氏許諾而弗敢嫁檀弓曰豈不得以噫弗果従王制曰不及以政示弗故生也中庸曰不勉而中不思而得有弗學學之弗能弗措也緇衣曰未見聖若已弗克見既見聖亦不克由聖凡此禮皆於一篇中用不弗二字相聨属而成文也易大壯象曰君子以非禮弗履又小象曰不能退不能遂不詳也隨卦初九小象曰出門交有功不失也六二小象曰係小子弗兼與也由此觀之則不字當有奔物切之音而字書收字有未盡葢可見矣許慎説文不載之字甚多要當以類求之爾神農本草于菜部載落蘓世謂之茄子讀茄為伽音而字書茄子止音加無伽音也打字世呼作丁寡切而字書打字唯音頂無丁寡切之音也若此者古今呼之久矣雖欲廢之不可得也羡字書曰羡似面切欲也又延面切餘也延也采芑詩曰方叔涖止其車三千師干之試鄭氏箋曰司馬法兵車一乗甲士三人步卒七十二人宣王承亂羡卒盡起陸徳明音義曰羡似面切今案鄭氏所謂羡卒盡起者謂餘卒盡起也當音羡為延面切音義誤也周禮小司徒曰凡起徒役毋過家一人以其餘為羡鄭氏注曰羡饒也陸徳明音義曰羡似面切今案以其餘為羡者家一人之外有餘夫則免其常役以備非常唯田與追胥竭作則凡有田獵盗賊之事雖饒餘之夫盡行矣當音羡為延面切音義亦誤也所謂無然歆羡所謂臨淵羡魚皆似面切也所謂璧羡以起度所謂𦵏有羡道皆延面切也其它經史所稱羡字皆當以義推之灼然知其音矣又衍延二字亦有延面切之音板詩曰及爾游衍陸徳明音義曰衍以戰反後漢安帝紀曰罷魚龍曼延百戯章懐太子注曰延以戰反葢延面切與以戰反同一音也前漢地理志江夏郡有沙羡縣晉灼注曰羡音夷此又羡字之有別音者字書不載葢地名有別音者字書多不載如前漢地理志右扶風有斄縣斄音胎東海郡有承縣承音證越嶲郡有卑水縣卑音班樂浪郡有黏蟬縣蟬音提此類是也攘甫田詩曰曽孫来止以其婦子饁彼南畆田畯至喜攘其左右嘗其㫖否鄭氏箋曰攘當讀作饟觀國案玊篇曰攘仁尚切揖攘也又汝羊切攘竊也廣韻平聲曰攘汝羊切去聲曰攘仁尚切引文字指歸曰揖攘也然則古之揖攘字用此攘字詳詩言攘其左右當為揖攘之攘也鄭氏謂攘當為饟者饟音餉其義則饋也爾雅曰饁饋饟也詩先言饁彼南畆則既已饟饋矣然後揖攘其左右而嘗其㫖否於先後之序為不紊若讀攘為饟則既收其字形又改其字音併與其義而紊焉陸徳明音義曰攘音饟又音餉亦誤矣良耜詩曰其饟伊黍詩中自有饟字豈可改攘為饟也前漢藝文志道家者流曰此君人南面之術也合於堯之古攘又司馬遷𫝊曰孔子至於今五百嵗有能紹而明之正易𫝊繼春秋本詩書禮樂之際意在斯乎小子何敢攘焉又司馬相如𫝊封禪書曰進攘之道何其爽與顔師古注皆曰攘仁尚反古人固每用此攘字為揖攘之攘矣理甚明也彎關貫許慎説文彎字烏環切持弓彎關矢也南史蒯恩𫝊曰彎弓三石是也而古人以關貫二字與彎通用之春秋昭公二十一年左氏𫝊曰城怒而反之將注豹則關矣杜預曰關引弓也陸徳明音義曰關烏環反孟子曰越人關弓而射之其兄關弓而射之凡此皆用關字為彎字也史記陳涉世家引賈誼過秦論曰士不敢貫弓而報怨又伍子胥𫝊曰使者捕伍胥伍胥貫弓執矢向使者裴駰注曰貫烏環反凡此用貫字為彎也關貫二字於字書未嘗音作彎古人假借依其聲類而用之也亦如藏者隠藏也贓者姦贓也臧者臧否也史家於三字皆以臧字當之葢藏贓臧三字義不同亦不同音是亦依其聲類而借用之取其意通而已閼字書閼字分三音一音烟一音謁一音曷爾雅曰太嵗在甲曰閼逢此閼字讀音烟也史記厯書曰其更以七年為太初元年年名焉逢攝提格史記用焉字以代閼字則閼逢音烟可知矣太嵗在寅曰攝提格焉逢攝提格者甲寅年也而爾雅釋音曰閼烏割反誤矣前漢匈奴𫝊曰冒頓閼氏生少子顔師古注曰閼氏匈奴皇后號閼音烟氏音支凡閼字讀音烟字者此類是也爾雅曰太嵗在夘曰單閼此閼字讀音謁廣韻曰閼於歇反引爾雅太嵗在卯曰單閼則單閼之閼音謁可知矣賈誼鵩鳥賦曰單閼之嵗兮四月孟夏史記賈誼𫝊前漢賈誼𫝊文選服鳥賦皆音閼為烏葛反皆誤矣若夫閼音曷者如夭閼壅閼之類是也夫字有忽於目前之習而誤為音呼者皆此類耤許慎説文曰耤秦昔切帝耤千畮也故天子躬耕謂之耤田前漢食貨志曰文帝即位時民近戰國背本趨末賈誼上書上感誼言始開耤田躬耕以勸百姓南朝宋有耤田令皆只用耤字耤以借民力為義天子躬耕三推借民力以勸天下也漢文帝詔曰農天下之本也其開藉田漢書於食貨志用耤字而於帝紀用藉字二字義同可通用之也葢藉字有二音一音秦昔切一音慈夜切其音秦昔切者若藉田若狼藉若晉大夫藉談之類是也其音慈夜切者若繅藉五采若藉用白茅若一茅三脊以為藉若藉手以拜之類是也古人用字多假借亦或作藉甚至於藴藉字又或用緼耤史記義縦傳曰敢行少藴藉前漢義縦𫝊曰敢徃少温藉顔師古注曰藉慈夜切史記漢書又皆以藉字為慈夜切用之葢所謂假借者如此揚子法言曰破楚入郢鞭尸藉館釋音藉慈夜切又慈亦切觀國案左𫝊曰庚辰呉入郢以班處宫是假楚之宫以為己宫當音藉館之藉為慈夜切而揚子釋音不能決乃列兩音則非也春秋襄公二十三年左氏𫝊曰孟氏將辟藉除於臧氏杜預注曰辟穿藏也於臧氏借人除葬道陸徳明音義曰藉音借觀國案杜預謂借人除葬道故藉字當讀作慈夜切而音義者不悟遂音藉為借誤矣爾㐱許慎説文曰兒氏切麗也爾詞之必然也廣韻曰爾汝也義與爾同然則爾者乃爾字之首也後世既書為爾而平其首又改爾為尔是俗書也姓有爾朱氏爾綿氏只用爾字葢得姓之始用爾字固不可變爾而為爾也後世俗書乃作爾字故書彌為弥書嬭為妳書禰為祢書獮為狝皆非字法也而俗書㐱字亦作尔如書珍為珎書軫為􅎮書診為侯書參為叅之類皆因草書㐱字為尔形故𨽻書亦從而變之然失字法益逺矣説文曰㐱稠髪也引詩㐱髪如雲亦作鬒而今世所𫝊毛公詩君子偕老篇曰鬒髪如雲毛公訓曰鬒黒髪也葢黒者色也與稠義不同既曰㐱稠髪又曰鬒黒髪則㐱與鬒異訓矣然則許慎所引詩當是別本詩作㐱字而毛公詩作鬒字㐱鬒二字雖通用而訓釋者不當有二義也鯫鯖鱣鯫字案字書七逾切淺鯫也又徂鉤切魚名也又仕垢切小人貌也史記張良世家云沛公曰鯫生教我距關無内諸侯徐廣注曰鯫魚也仕垢反前漢張良𫝊云沛公曰鯫生説我距關母納諸侯服䖍注曰鯫七垢反小人也觀國案鯫生小人也當讀為仕垢反徐廣以為鯫魚非也史記貨殖𫝊曰鯫千石鮑千鈞徐廣注曰鯫音鮿鮿魚也觀國案鯫千石者鯫音徂鈎切魚也若夫鯫音輒雖亦魚名豈可變鯫為鯫也葢鯫従取鮿従耴亦音輒偏旁皆異也徐廣謂鯫音輒亦誤矣廣韻上聲曰鯫仕垢切一曰姓漢有鯫生觀國案廣韻所謂漢有鯫生者豈非以張良𫝊鯫生為姓鯫之人邪誤又甚矣鯖音青魚名也南史虞悰𫝊曰悰善為滋味齊帝就悰求飲食方悰秘不出帝醉後體不快悰乃獻醒酒鯖酢一方而已鯖又音征亦作亦作􅙰煮魚煎食謂之五侯鯖葢魚之熟羞者也後漢楊震𫝊曰有冠雀銜三鱣魚飛集講堂前章懐太子注曰案續後漢書及謝承書鱣字皆作鱓又引郭璞注爾雅曰鱣知然反大魚似鱘而短鼻口在頷下大者長二三丈江東呼為黄魚觀國案字書鱓字亦作鱣謝承漢書作三鱓范蔚宗改為鱣字鱓鱣一也章懐太子不當引郭璞注爾雅故後人皆誤讀作知然反也葢音知然反者若碩人詩曰鱣鮪發發四月詩曰匪鱣匪鮪詩有鱣有鮪注皆曰鱣大魚也賈誼弔屈原賦曰横江湖之鱣鱓兮固將制於螻蟻文中子曰江湖鱣鯨非溝瀆所容郭璞江賦曰江豚海狶叔鮪王鱣凡此言鱣即爾雅注所謂長二三丈者也一冠雀豈能銜三大魚長二三丈者耶然則三鱣為三鱓明矣韓子曰鱣似蛇正謂此也案字書字之従單者與従亶多通用故禪亦作䄠蟬亦作蟺僤亦作儃鱓亦作鱣則三鱣為三鱓可以無疑矣杜子美夔府詠懐詩曰敕厨惟一味求飽或三鱣作平聲旃音葢承誤用之也糃南史顔峻𫝊曰宋明帝時嵗旱人饑中書令顔峻上言禁糃一月息米萬斛觀國案集韻曰糃音唐精米也諸字書皆無糃字唯集韻收此字葢因顔峻𫝊有此字而集韻收之耳凡米初出糠秕而未精熟則謂之麤糲其得米則多及精熟之則得米少禁糃者唯食粗糲而不得精熟米也然人之常情與其食粗糲之十寧且食精熟之八不知顔峻當時禁糃如何設法而月能息米萬斛其公米耶其民米耶不可得而知也字書有䑗字音蕩又有䑔字音伐二字皆訓曰精米也今江浙荆湖間人凡精米皆呼此二音其字義則與糃同茸佴前漢司馬遷荅任少卿書曰李陵既生降隤其家聲而僕又茸以蠶室蘓林注曰茸次也顔師古注曰茸音人勇反推也蠶室乃腐刑所居温宻之室謂推致蠶室之中也文選司馬遷荅任少卿書曰李陵既生降頽其家聲而僕又佴之蠶室五臣注曰佴次也音二觀國案班固作司馬遷傳去司馬遷未逺必據司馬遷文用茸字其義如顔師古注文意通也字書曰搑人勇切推也當用搑字班固省其偏旁故用茸字耳自班固作漢史後又厯四百餘年梁昭明太子始集文選既不依司馬遷𫝊作茸字而變為佴字是必得於它書也它書所𫝊司馬遷文厯年既久豈無訛謬然則茸佴二字義雖均通猶當以漢書為正况佴之義偏乎蛾禮記學記篇曰夫然後足以化民易俗近者悦服而逺者懐之此大學之道也記曰蛾子時術之其此之謂乎鄭氏注曰蛾蚍蜉也蚍蜉之子㣲蟲耳時術蚍蜉之所為其功乃復成大垤釋音曰蛾魚倚反觀國案爾雅曰蚍蜉大螘小者螘廣韻曰螘蚍蜉也同作蟻亦作蛾葢蛾者蟻之省文也學記之文自始學積而至於大學自小成充之至于大成従㣲至著積習有漸故取譬以蛾子自㣲積功以成大垤也其云記曰蛾子時術之則古書有此語矣説禮之家引此語以為喻也書史亦多用螘為蛾字者春秋僖公二十五年左氏𫝊曰蛾析謂鄭慶盍行乎釋音曰蛾魚倚反列子曰先會鬼神魑魅次達八方人民末聚禽獸蟲蛾揚雄長楊賦曰稽䫙植頷扶服蛾伏顔師古注曰蛾與蟻同言伏如䖝蛾也漢元帝紀建昭元年秋八月有白蛾羣飛蔽日従東都門至枳道顔師古注曰蛾若今之蠶蛾案此言白蛾者乃白蟻也非蠶蛾若蠶蛾之蛾則與俄同音與俄同音者若詩曰螓首蛾眉爾雅曰䖸羅之類是也姓名異音禮記檀弓篇曰知悼子卒未葬平公飲酒杜蕢自外来聞鐘聲鄭氏注曰杜蕢或作屠蒯春秋昭公九年左氏𫝊曰晉荀盈卒未葬晉侯飲酒樂膳宰屠蒯趨入釋音曰屠音徒觀國案蕢與蒯同音苦恠切音同而字不同毋傷也若杜與徒乃二音唯姓與名當専一音不可以呼二音當是屠字亦讀音杜左氏假借用屠字耳史記孟嘗君𫝊有馮讙裴駰注曰驩音歡又作煖音許袁反觀國案驩煖二字不同音當是有兩名如袁盎又名絲之類是也若夫左𫝊言驪姬又言麗姬而字書有孋姬三字不同而同音驪也史記言酈山漢書言麗山唐書言驪山三字不同音而同音驪也史記言朝錯又言晁錯漢書言鼂錯三字不同而同音晁也書史諡閔者或作愍或作湣三字不同而同音閔也諡僖者亦作釐福禧者亦作釐裁成者亦作財才智者亦作財凡此字異而音同者意通斯可矣漢書匃奴𫝊言犬夷又言畎夷又言昆夷而顔師古注又云與混夷緄夷同音工本反凡此字雖不同而各有一義或出於假借亦不為舛也蕰許慎説文曰蕰積也於粉切玉篇曰蕰藏也積也聚也蓄也廣韻曰蕰藏也俗作藴引春秋蕰利生孽觀國案春秋隠公三年左氏𫝊曰蘋蘩蕰藻之菜杜預注曰蕰藻聚藻也又六年𫝊曰見惡如農夫之務去草焉芟夷蕰崇之絶其本根杜預注曰蕰積也又襄公十一年左氏𫝊曰凡我同盟毋蕰年杜預注曰蕰積也葢皆用従温之蕰則知藴為俗書矣藴又音於問切史記酷吏義縦𫝊曰敢行少藴藉前漢義縦𫝊曰敢徃少温藉顔師古注曰少温藉言無所含容也又馬宫傳賛曰服儒衣冠𫝊先王語其醖藉可也顔師古注曰醖藉如醖釀及薦藉道其寛博重厚也唐書李林甫𫝊曰兵部侍郎盧絢按轡絶道去帝愛其醖藉凡此或用藴字或用温字或用醖字皆讀為於問切有含蓄重厚之意古人多假借用字故藴温醖三字雖不同而其義則皆同於蕰以此知訓醖為醖釀者非也易曰乾坤其易之緼耶韓康伯注曰緼淵奥也案字書緼枲也絮也緜也亂也與易意不合葢亦當用藴字易省文用緼字耳所謂淵奥亦含蓄之異稱也雲漢詩曰旱既太甚藴隆蟲蟲毛氏𫝊曰藴藴而暑史記義縱𫝊用藴藉皆用俗書藴字者葢變古文為𨽻變𨽻為今文書史中字多失其原不足恠也南史王藴字彦深以俗書為名尤不可瞷史記酷吏郅都𫝊曰濟南瞷氏宗人三百餘家豪滑二千石莫能制裴駰注引漢書音義曰瞷音小兒癎病之癎前漢郅都𫝊曰濟南瞷氏宗人三百餘家應劭注曰瞷音馬瞷眼之瞷顔師古注曰瞷音閑觀國案玉篇曰瞷胡間切眄也廣韻曰瞷胡間切人目多白又姓史記有濟南瞷氏然則音閑是也馬一目白為􅀈而人目白為瞷孟子曰王使人瞷夫子果有以異於人乎又曰而未嘗有顯者来吾將瞷良人之所之也此瞷字亦音閑其義則所謂眄也眄者斜視也成覸謂齊景公曰彼丈夫也我丈夫也此覸字音古莧切其義則視也史記十二諸侯年表宋恵公名覸與成覸之名同陽貨矙孔子之亡也而饋孔子烝豚孔子亦矙其亡也而徃拜之此矙字音苦暫切亦視也在字書為瞰亦作矙揚雄解嘲曰鬼瞰其室光武紀曰雲車十餘丈瞰臨城中此類是也瞷覸矙三字三音其義各有攸處鶡前漢黄霸𫝊曰霸代丙吉為丞相京兆尹張敞舍鶡雀飛集丞相府霸以為神雀議欲以聞蘓林注曰今虎賁所著鶡也顔師古注曰此鶡音芬字本作鳻此通用耳鳻雀大而色青出羌中非武賁所著也武賁鶡者黒色出上黨以其鬬死不止故用其尾飾武臣今時俗所謂鶡鷄者也音曷非鳻雀也觀國案玉篇曰鶡何葛切鳥似雉而大青色有毛角鬬死乃止又曰鳻扶云切鳻雀似鶡以此觀之則黄霸𫝊所謂鶡雀者鳻雀也以其似鶡故亦謂之鶡雀耳顔師古以為鶡鳻通用非也蘓林以為虎賁所著鶡亦非也虎賁所著者鶡鳥乃鷄雉之属不謂之雀後漢輿服志曰虎賁武騎皆鶡冠虎文單衣襄邑嵗獻織成虎文鶡者勇雉也其鬬對一死乃止故趙武靈王以表武士秦施之焉徐廣注曰鶡似黒雉出于上黨荀綽晉百官表注曰冠挿兩鶡鷙鳥之暴䟽者也每所攫撮應爪摧衂天子武騎故以冠焉傅五賦注曰羽騎戴鶡廣韻曰鶡鳥似鷄鬬必至死推此類以觀之則鶡非羣飛集於舎屋之物則黄霸𫝊鶡雀非鬭死之鶡可知已前漢藝文志道家者流有鶡冠子一篇班固注曰楚人也居深山以鶡為冠顔師古注曰以鶡鳥羽為冠然鶡冠子不顯姓名葢其人當時偶以鶡羽為野服因名曰鶡冠子非取於武勇之義也韓愈有讀鶡冠子文曰鶡冠子十有六篇其辭雜黄老刑名其博選篇四稽五至之説當矣使其人遇其時援其道而施於國家其功徳豈少哉觀國嘗讀其書矣以虚無為宗而變至於参合機會之際其説不純乎先王之仁義葢戰國之際好異之人也並史記秦始皇紀曰並海上北至瑯邪又曰遂並海西至平原津又曰並海南至會稽又封禪書曰上乃遂去並海上北至碣石又大宛傳曰留嵗餘還並南山欲従羌中歸前漢郊祀志曰始皇南至湘江遂登會稽並海上又曰二世元年東巡碣石並海又曰皆在齊北並渤海又溝洫志曰並北山東至洛三百餘里又薛宣𫝊曰三輔賦歛無度酷吏並縁為姦以上並字顔師古注曰並步浪反列子曰孔子使人並涯止之唐書李適𫝊曰春幸梨園並渭水祓除此並字亦皆讀音步浪反者也並音步浪反者其義與旁字遵字同前漢揚雄𫝊曰武帝廣開上林旁南山而西至長楊五柞孟子曰吾欲觀於轉附朝儛遵海而南放于瑯邪是也字書並字無步浪反之音古人借音用之耳前漢地理志䍧牱郡有同並縣應劭注曰並音伴字書亦無此音亦借音也貲訾字書貲字即移切貨財也訾亦即移切思也二字雖同音而義不同然古人于二字通用之史記司馬相如𫝊曰相如以貲為郎前漢司馬相如𫝊曰相如以訾為郎顔師古注曰訾讀與貲同訾財也以家財多得拜為郎觀國案司馬相如𫝊在史記用貲字在漢書用訾字則貲訾二字通用之也前漢張釋之𫝊曰釋之以貲為騎郎如淳注曰漢法貲五百萬得為常侍郎所謂以貲為郎者乃今之入粟也故黄霸𫝊曰武帝末以待詔入錢賞官補侍郎謁者後復入榖補左馮翊卒史又卜式𫝊曰輸家財半助邉拜中郎楊僕𫝊曰以千夫為吏顔師古注曰千夫武功賞官令民出錢榖為之凡此皆入貲補官者也司馬相如張釋之黄霸卜式皆漢名臣而皆以入貲進後世乃或恥居之何邪漢景帝後元二年詔曰今訾算十以上廼得官㢘士無訾又不得官朕甚愍之訾算四得官亡令㢘士久失職以此觀之則漢時㢘士亦不以入訾為恥也史記貨殖𫝊曰擅其利數世家亦不訾前漢枚乗𫝊曰舉其兵以訾于漢譬猶蠅蚋之附羣牛又食貨志曰豪富吏民訾數鉅萬又貨殖𫝊曰成都羅裒訾至鉅萬臨菑姓偉訾五千萬雒陽張長叔薛子仲訾亦十千萬長安王君房樊少翁王孫大卿為天下高訾凡此言訾當用貲借用訾字爾訾又音紫字書曰訿病也毁也書史與啙呰二字通用小旻詩曰翕翕訿訿亦孔之哀毛氏𫝊曰訿訿然思不稱其上也召旻詩臯臯訿訿曽不知其玷毛氏𫝊曰訿訿窳不共事也曲禮曰不苟訾鄭氏注曰不欲見毁訾也史記貨殖𫝊曰以故啙窳偷生無積聚徐廣注曰啙窳茍且惰懶之謂也前漢地理志曰啙窳偷生而亡積聚潘安仁西征賦曰呰孝元於渭塋曺子建與楊徳祖書曰罪三王呰五霸此類是也訾又姓也前漢元帝功臣侯年表有樓虚侯訾順雎睢雎字七余切與徂同聲旁從且也睢字息遺切與雖同聲旁従目也又許葵切詩曰關關雎鳩在河之洲毛氏𫝊曰雎鳩王雎也鳥摯而有別后妃樂君子之徳慎固幽深若雎鳩之有別也爾雅曰雎鳩王雎郭璞注曰雎鳩雕類今江東呼之為鴞好在江渚水邉食魚鳥摯而有別也玉篇曰雎七余切王雎也又次雎行難也凡此謂雎字従且者也前漢地理志臨淮郡有睢陵縣梁國有睢陽縣班固曰睢陽故宋國顔師古注曰睢音雖玊篇曰睢息遺切水名又許葵切視貌廣韻曰睢息遺切水名在梁郡亦作濉春秋成公十五年左氏𫝊曰出舍于睢上史記漢書高祖紀皆曰大戰彭城靈壁東睢水上多殺士卒睢水為之不流後漢郡國志梁國睢陽縣劉昭注引北征記曰睢陽城周三十七里又引地道記曰梁孝王築睢陽城小鼓唱節杵下而和之稱睢陽曲凡此睢字皆睢水之睢也其音許葵切者睢盱也視貌也莊子所謂而睢睢而盱盱是已睢睢二字音與義皆不同葢其字偏旁實異也封窆周禮冡人掌公墓之地以爵等為丘封之度與其植數共喪之窆器鄭氏注曰丘封之度與其植數別尊卑也窆器下棺豐碑之属引喪大記曰凡封用綍去碑負引釋音曰封音彼驗反觀國案易大𫝊曰古之葬者厚衣之以薪葬之中野不封不植喪期無數後世聖人易之以棺椁葢取諸大過檀弓云國子高曰葬也者藏也藏也者欲人之弗得見也反壤植之哉所謂壤植乃封植也封者封土為墳也植者植木為飾也窆者下棺也後世説禮之家乃假封字為窆字故鄭氏訓窆器引喪大記凡封用綍則假封字為窆字可知矣學林卷十
