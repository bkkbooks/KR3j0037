body:
  text: 學林卷九宋王觀國撰饗饗字亦音香詳觀詩中饗字以音韻協之當音香烈祖詩曰自天降康豐年穰穰來格來饗降福無疆顧豫蒸嘗湯孫之將楚茨詩曰祝祭于祊祀事孔明先祖是皇神保是饗豳風曰九月肅霜十月滌場朋酒斯饗曰殺羔羊凡此詩詞以上下文音韻協之當讀饗為香緣陸德明未嘗稽考至此而於釋文不載故後學但以上聲讀之也按前漢禮樂志樂歌曰闢流離抑不詳賓百僚山河饗此以平聲用饗字也張又曰告靈既饗德音孔臧惟德之臧建侯之常亦以平聲用饗字也張平子東京賦曰萬舞奕奕鐘鼓喤喤靈祖皇考來顧來饗神具醉止降福穰穰此亦以平聲用饗字也饗亦通用享字古人於享字亦或平聲用前漢禮樂志郊祀詩曰發梁揚羽申以商造兹新音永久長聲氣逺條鳯鳥翔神夕掩虞蓋孔享此以平聲用享字也古人如此類用字者甚多後漢靈帝紀贊曰徴亡備兆小雅盡缺麋鹿霜露遂棲宫衛此以入聲用衛字也曺子建贈丁翼詩曰吾與二三子曲宴此城隅秦筝發西氣齊瑟揚東謳此以驅音用謳字也劉公幹雜詩曰方塘含白水中有鳬與鴈安得肅肅羽從爾遊波瀾此以去聲用瀾字也陸士衡樂府曰親友多零落舊齒多雕喪市朝互遷易城闕或丘荒此以平聲用喪字也又士衡為顧彥先贈婦詩曰辭家逺行遊悠悠三千里京洛多風塵素衣化為緇此以上聲用緇字也左太沖雜詩曰高志局四海塊然守空堂壯志不恆居嵗暮常慨慷此以平聲用慷字也顔延年登巴陵城樓詩曰水國周地險河山信重復却倚雲夢林前瞻京臺囿此以入聲用囿字也又赭白馬賦曰總六服以收賢掩七戎而得駿代驂象輿厯配勾陳此以去聲用陳字也劉越石答盧諶詩曰握中有𤣥璧本自荆山璆惟彼太公望昔在渭濵叟此以平聲用叟字也江淹望荆山詩曰寒江無留影秋月垂清光悲風繞重林雲霞肅川漲此以平聲用漲字也杜子美衡山縣學詩曰耳聞讀書聲殺伐災髣佛於地字韻中押則以佛作沸字用也韓退之答孟郊江漢詩曰終宵處幽室華燭光爛爛於艱字韻中押則以爛作䦨音用也詩人如此類用字不可勝紀姑舉其略於戲王言多用於戲二字乃於乎二字也俗讀戲為嬉則誤矣案字書於烏嗚三字通用又乎呼呼呼戲五字通用史記世家齊王策曰於戲小子閎受兹青社燕王策曰於戲小子旦受兹𤣥社廣陵王策曰於戲小子胥受兹赤社大雅抑詩曰於乎小子未知臧否於乎小子告爾舊止史記册文乃用詩辭也烈文詩曰於乎前王不忘而禮記大學引詩曰於戲前王不忘然則於戲為於乎字可知矣前漢武五子列傳載齊王燕王廣陵王策文乃變於戲為嗚呼王莽傳加九錫文曰於戲豈不休哉顔師古注曰於戲讀曰嗚呼蓋於乎者歎戒之詞也若讀戲為嬉則是嬉樂之義非嘆戒之辭矣廣韻於字注曰古作於戲今作嗚呼蓋譯篆為𨽻者變為嗚呼字耳唯尚書諸篇並用嗚呼字乃孔安國作尚書𫝊時無識科斗古文者而以𨽻古定之唐文皇不好𨽻古而以今文寫之遂一切用嗚呼字非古也敇敕字亦作敕此詔敕之字敇不若敕之從力則順于行草書而美看故古今寫敇字惟用從力之敕然世俗寫束字來字並作來形如棗字作萊字作萊之類是也寫敕為𠡠者蓋俗書變束為來也而楷書者不察其由遂真書來字作勑則誤矣許慎說文玉篇廣韻勑字皆音賚無他音唯集韻來字韻中有勑字又於敇字下收勑字注曰相承用作敇字蓋言相承用則無非敕字世俗自妄用之爾集韻本朝所修當明言用勑字之非而不能決判反有相承用之說集韻誤矣其實勑字止音來賚二音非敇字也前漢成帝紀曰申敕有司以漸禁之又食貨志曰屢敕有司以農為務又元后傳曰敕令親屬引領以避丁傅南史梁元帝紀曰帝敕有司即日取數萬千錢又周興嗣傳曰武帝以三橋舊宅為光宅寺敕興嗣與陸倕各製寺碑唐書韋溫傳曰后敕溫盡總內外兵守省中韋庶人傳曰墨敕斜封出矣劉幽求傳曰號令詔敕一出其守史家多用敕字蓋知勑字之非也唯後漢書並用勑字蓋范曄商榷未至爾汜泛泛汜音祀泛音泛泛音凡又音泛此三字俗多疑混案字書汜從水從巳于篆文為詩曰江有泛許慎說文曰水别復入為汜河南有汜水有汜水關是也汜從水從弓於篆文為弓音憾函字含字范字皆從弓蓋汜濫也亦姓也泛從水從凡於篆文為亦作泛此三字偏旁不同音義亦異春秋僖公十九年左氏傳曰王出適鄭處於汜杜預注曰鄭南汜也陸德明音義曰汜音凡又僖三十年左氏傳晉侯秦伯圍鄭秦軍汜南杜預注曰汜南在滎陽中牟縣南陸德明音義曰汜音凡又襄公二十六年左氏傳曰楚子伐鄭涉于汜而歸陸德明音義曰汜音凡又昭公五年左氏傳曰鄭伯勞子蕩於汜陸德明音義曰汜音凡又成公四年左氏傳晉救許伐鄭取汜祭杜預注曰汜祭鄭地成臯縣東有汜水陸德明音義曰汜音凡或音祀觀國案後漢郡國志河南郡有汜水杜預或言中牟南或言成臯東其實即汜水一水也音祀是也音凡非也音凡者自是一水不在鄭地陸德明不能分别乃於春秋成公四年取汜祭既音凡又音祀存兩音者非也前漢高祖紀曰漢果挑成臯戰楚軍不出使人辱之數日大司馬咎怒渡兵汜水顔師古注曰此水舊音凡今呼音祀案此汜水乃河南汜水音祀者也顔師古見陸德明釋春秋左傳皆因汜作凡師古亦不能分别乃曰此水舊音凡今呼祀亦存兩音則非也夫字音期於當而已豈有舊音某而今音某者耶惟其存兩音而不能決故後學莫之適從也汜音泛又為姓漢有汜勝之子輯為燉煌太守是也泛音凡者河內有泛亭春秋隱七年冬天王使凡伯來聘杜預注曰凡周卿士凡伯爵也汲郡共縣東南有凡城後漢郡國志曰河南郡有泛亭章懷太子注曰凡伯國也然則泛音凡在河內汜音祀在河南不相亂也前漢張良傳曰良常間從容步遊下邳圯上服䖍注曰圯音頥楚人謂橋曰圯應劭注曰汜水之上也文頴注曰沂水上橋也顔師古注曰下邳之水非圯水又非沂水觀國案許慎說文曰東楚謂橋曰圯音頥今傳寫漢書者或改圯為汜蓋誤也無亡無無亦作亡自古只用此二字至秦時始用無字為有無之字案無字篆文偏旁有蕃庶之義而不見有無之義許慎說文曰無文甫切今借為有無字玊篇曰文甫切繁豐盛也今為有無字徐鉉修字義曰古本尚書庶草蕃無後人變無為廡蓋廡乃廊廡也無繁盛之義以此觀之則無字乃秦以來始用為有無字非古也古之經書乃篆文秦變篆為𨽻多改其字形詩書周禮春秋禮記儀禮論語等皆用無字乃變篆為𨽻者改之也惟周易首尾盡用無字蓋變𨽻時偶不曽改也至於亡字亦多有存而不改者周禮曰亡者使有又曰害者使亡春秋左氏傳曰其貴亡矣其寵弃矣論語曰有若亡又曰亡而為有又曰人皆有兄弟我獨亡又曰日知其所亡又曰焉能為亡又曰不如諸夏之亡也孟子曰若夫君子所患則亡矣以此亡字皆無字也獨此不改為無者蓋變𨽻者誤讀為存亡之亡故存而不改也史書亦多用亡為無漢亡尺寸之階義曰內亡骨月本根之輔外亡尺土藩翼之衛又曰朝亡廢官邑亡敖民地亡曠土國亡捐瘠司馬相如子虛賦曰亡是公者亡是人也賈山曰錢者亡用器也翟方進曰茍得亡恥班固用此二字甚多皆無字也李濟翁資暇集曰亡字亡字㸃畫各有區分一㸃一畫下者存亡之亡也􅡊中有人者有無之亡也今案此二字只是一字或為存亡之亡或為有亡之亡一字二音也濟翁初不曉字畫而遽啓臆說亦可怪也翰猷翰字在平聲音寒者羽翼儀翰也在去聲音悍者詞翰也文王有聲詩曰王公伊濯維豐之垣四方攸同王后維翰以垣翰二字為韻則翰平聲也板詩曰價人維藩大師為垣大邦維屏大宗維翰亦以垣翰二字為韻則翰平聲也嵩高詩曰維申及甫維周之翰四國于藩四方于宣以宣翰二字為韻則翰平聲也江漢詩曰王命召虎來旬來宣文武受命召公維翰亦以宣翰二字為韻則翰平聲也又嵩高詩曰既入于謝徒御嘽嘽周邦咸喜戎有良翰常武詩曰王旅嘽嘽如飛如翰此二詩亦以嘽翰字為韻蓋亦以平聲用翰字也以上詩辭用翰字皆取藩屏羽翼儀翰之義則翰讀音寒可知矣後人取名與字用維翰周翰宗翰良翰之類亦當讀音寒若取詞翰之義乃讀音悍陸德明江漢詩音義曰翰户旦反又音寒設兩音者不能區别而設兩音也晉書有張翰字季鷹其名當讀音寒南史循吏傳吉翰字休文其名正當讀音悍蓋義之所在有不可易者也字書猷亦作猶離騷曰心猶豫而狐疑兮欲自適而不可漢書蒯通傳曰猛虎之猶與不如蜂蠆之致蠚孟賁之狐疑不如童子之必至此析離騷之句以為之文也漢書高后紀曰祿然其計使人報産及諸吕老人或以為不便計猶豫顔師古注曰猶獸名性疑慮善登木故不決者稱猶豫顔氏家訓曰爾雅猶如麂善登木猶對狐以獸對獸也觀國案猶豫者心不能自決定之辭也爾雅釋言曰猷圖也釋獸曰猶如麂善登木所謂猷圖者圖謀之而未定也猶豫者爾雅釋言所謂猷圖是已顔師古注漢書與顔氏家訓不悟爾雅釋言自有猷圖之訓而乃引釋獸猶如麂以訓之誤矣廣韻去聲曰猶音救注引爾雅猶如麂善登木然則猶獸音救也且先事而圖之為猶後事而圖之為豫故曲禮曰卜筮者所以使民決嫌疑定猶豫也以嫌疑對猶豫則猶非獸也離騷曰心猶豫而狐疑兮此一句文也非以猶對狐疑也猶或為冘後漢書馬援傳曰諸將多以王師之重不宜逺入險阻計冘豫未決廣韻曰冘豫不定也以此觀之則猶非獸益明矣爾雅曰猷圖也郭璞注曰周禮以猷鬼神祗謂圖畫觀國案周禮春官凡以神仕者掌三神之法以猷鬼神示之居鄭氏注曰猷圖也謂制神之位次而為之牲器時服以圖之乃謀圖之圖非圖畫也郭璞誤矣猶猷冘三字通用預豫與三字通用奉朝請晉書職官志曰奉朝請者奉朝會請召而已觀國案前漢書東方朔傳曰奉朝請之禮備臣妾之儀顔師古注曰請才姓反又竇嬰傳曰嬰病免太后除嬰門籍不得朝請顔師古注曰請才姓反義吳王濞傳曰使人為秋請顔師古注曰請才姓反孟康注曰律春曰朝秋曰請如古諸侯朝聘也如淳注曰濞不自行使人代已致請禮然則奉朝請之請讀音才姓反漢律所謂春朝秋請是也吳王濞傳所謂秋請乃漢律也廣韻去聲靚字注曰古奉朝請亦用靚字然則晉志謂奉朝會請召者誤矣蓋朝請者臣見君者也若曰請召則是君召臣也自晉以來奉朝請之官受俸祿而不𨽻事奉車都尉駙馬都尉騎都尉之類是也後世嫌疑滋起故皇朝戚里之官及百官宫祠之任咸受俸祿而不𨽻事於是奉朝請者遍四方矣澠春秋左氏傳曰晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興杜預注曰澠水出齊國臨淄縣北入時水故列子曰口將爽者先辨淄澠蓋謂淄水與澠水也劉沆丞相嘗使契丹契丹與之宴契丹曰有酒如繩繫行人而不住謂劉曰未有以對也劉應聲曰在北曰狄吹出塞以何妨案字書澠水名在齊繩直也索也此自是兩字不通用然古人多假借字故用澠為繩杜子美贈汝陽王詩曰且持蠡測海況挹酒如繩又簡薛華醉歌曰願吹野水添金杯如繩之酒常快意如此類借用繩字固無害如契丹使云繫行人而不住則真訓釋以為繩索之繩恐不可也又杜子美寄劉峽州詩曰伏枕思瓊木臨軒對玉繩又曰展懷詩誦魯割愛酒如繩一篇押二繩字命意不同然莫若用如繩為如澠則適得其當或是編集子美詩者誤爾始李希聲詩話曰皂鵰寒始急千呼萬喚始出來人皆以為語病然始有二音有所宿留而今甫然者當從去聲二詩自非語病觀國嘗考其故矣始終之始則音上聲有所宿留而今甫然者則音去聲所謂有太始所謂萬物資始所謂始畫八卦所謂有始有卒此皆終始之始也杜子美安西兵詩曰臨危經久戰用意始知神韓退之月臺詩曰直須臺上看始奈月明何此皆有所宿留而今甫然者也如禮記月令蟬始鳴陸德明音義始作試則李希聲之說不妄矣暴暴字日下今作日下恭為暴者俗書也暴音薄報切疾也猝也又音蒲木切日乾也所謂一日暴之所謂春暴練所謂晝暴諸日所謂暴其過惡所謂九蒸九暴所謂暴露其精神所謂使二國暴骨諸家音義皆音作蒲木切者也凡義當讀音蒲木切者不可移而讀作薄報切蓋二義異也又俗書有曝字且暴上已有日矣旁又加日豈不贅哉亦如莫字從日而俗又加日而為暮基字從土而俗又加土而為􅀈然字從火而俗又加火而為燃岡字從山而俗又加山而為岡凡此皆不可遵用者也奉亹萬俸字俸祿也捧字捧持也案諸史言奉祿無所受又言計日受奉則古之奉祿字不從人也春秋左氏傳曰奉匜沃盥禮記曰奉者當心又曰主人奉矢司射奉中則古之捧持字只用奉字不從手也然則俸之從人捧之從手出於後世增益之古篆所不載非字法也易曰成天下之亹亹者亹字篆文所不載徐鉉字義曰亹字後人又加文為文亹亦無篆文古本周易作成天下之娓娓者當是變𨽻時改之也萬字自古書史皆以為數左傳亦曰萬盈數也至許慎說文萬字獨訓曰蟲也而不訓以為數今詳萬字所從偏旁無盈數之義苟有盈數之義則說文固已訓說矣說文無訓說則後之訓說者不亦難乎後人又以万字代萬字蓋万字說文所不載則無篆文既無篆文則不知萬字所從偏旁為何如亦不能推其義也万又音墨虜復姓有万俟氏廣韻曰万十千也萬蟲也詳廣韻以万為十千而以萬為蟲亦不以萬為數也似以万為十千之數而萬乃代万字者也古之字畫少者易於訛改故以㸃畫多而同音者代之如一二三四五六七八九十則以一二叁肆伍陸㭍捌玖拾代之百千則以伯阡代之尺則以赤代之匹則以匹代之是以万以萬代之也所代之字初無意義唯取㸃畫之多耳說文曰草自保切櫟實可以染帛為黑故黑色曰草後世既用皂字故草字用為草木之字說文曰雅烏加切楚烏也秦謂之雅後世既用鴉字故雅字用為雅正之字說文曰創楚良切傷也書史多用此字後世既用瘡字故創字用為創造之字凡字之變古者類如此黮諼桑椹之椹亦作􅀈亦作椹然泮水詩曰食我桑黮而不用上三字案字書黮音他感切黭黮黑也萱草之萱亦作萱亦作萱然伯兮詩曰焉得諼草而不用上三字案字書諼音暄作也忘也古人假借字取其意而已桑椹用黮字取其色也萱忘憂草也用諼字取其忘也字雖假借而意則不失也書史中如此類借用字者若以說命為兊命以條侯為修侯以女工為女紅以取贍為取淡以仰為卬以藏為臧以愈為俞以酢為昨以譬為辟以儺為難若此類固多亦皆不失其意也贙左太沖魏都賦曰回淵漼積水深蒹葭贙籊蒻森五臣注文選曰贙分别也杜子美寄劉峽州詩曰乳贙號攀石饑鼯欣落藤注詩者曰乳贙乳虎也觀國案爾雅釋獸曰贙有力郭璞注曰贙出西海大秦國有養者似狗多力獷惡爾雅釋音曰贙音鉉諸字書皆曰贙音鉉獸名也然則贙自是一獸非虎也亦無分别之義文選注與杜詩注皆誤矣蒹葭詩曰蒹葭蒼蒼白露為霜鄭氏箋曰蒹葭在衆草之中蒼然强也左太沖賦曰蒹葭贙者豈非以爾雅謂贙有力而蒹葭蒼然若强有力者耶然爾雅言有力者多矣曰魚有力者鰴又曰麋絶有力狄又曰麂絶有力䴢又曰麕絶有力豜又曰豕絶有力􅙊又曰熊絶有力麙又曰馬絶有力駥又曰羊絶有力奮又曰牛絶有力欣犌又曰犬絶有力狣所謂贙有力贙之為獸有力者耳其他物有力者固不可謂之贙也若以蒹葭强有力而因謂之蒹葭贙則非也字書又有到一虎為贙者俗書不可用稿槀字書槀從高從禾謂禾稈也草創也槀從髙從木謂藥名槀本也亦枯槀也周禮封人共其水藁禹貢三百里納秸服孔安國曰秸槀也又蠻夷邸館謂之稿街撰文起草謂之草藁凡此皆從禾者也其從木者許慎說文有槀字故周禮有槀人禮記曰止如槀木而後世移其木於旁為槁案周易說卦離為科上槁孟子曰旱則苗槁矣此槁字乃變古文後用之也又有於槀上加草字為藁者廣韻以為俗字固不可用也藁下從木者又音犒尚書訓典曰作九共九篇槀飫是也周禮地官有槁人亦音犒蓋槁人掌共內外朝冗食則音犒是也其字不用槀而用槁亦變古文為𨽻者改之也薄郊特牲曰薄社北牖使隂明也鄭氏注曰薄社商之社商始都薄然則本用亳社字記禮者借用薄字爾薄音泊又音博又音逼其音泊者厚薄也林薄也草木叢生曰薄故揚雄甘泉賦曰列辛夷於林薄左太沖蜀都賦曰翕響揮霍中網林薄陸士衡君子有所思行曰清川帶華薄又挽歌詩按轡遵長薄若此類是也音博者其義則激搏也易曰風雷相薄史記天官書曰日月薄食謝瞻詠張子房詩曰鴻門銷薄蝕若此類是也音逼者相逼近也春秋左氏傳曰宋師未陳而薄之敗諸鄑又曰晉公子重耳及曺曺共公聞其駢脅欲觀其裸浴薄而觀之又曰不待期朝而薄入於險又曰寧我薄人無人薄我陸士衡文曰高義薄雲天又塘上行曰願君廣末光照妾薄暮年范彥龍效古詩曰朝驅左賢陳夜薄休屠營杜子美彭衙行詩曰高義薄層雲江淹恨賦曰薄暮心動若此類是也凡此三音其義皆逈不同讀之不可混而無别史記周勃傳曰勃以織薄曲為生蘇林注曰薄一名曲顔師古注漢書曰許慎云葦薄為曲案薄曲蠶具也本用從竹簿字亦通用從草薄字耳亦如䒼者蠶具也亦通用曲字耳欂字弼㦸切司馬相如賦曰施瑰木之欂櫨揚雄甘泉賦曰香芬茀以穹隆兮擊欂櫨而將榮顔師古注曰欂櫨枅也五臣注文選曰欂櫨曲枅栱也韓退之曰欂櫨侏儒乃謂此也廣韻曰欂櫨户上木也今案欂櫨者枅栱是也非户上木也欂亦通用薄字前漢王莽傳曰起九廟為銅薄櫨飾以金銀雕文顔師古注曰欂櫨柱上枅也其說是已眀元祐中京師試止戈為武賦張弼首選頗以此賦馳名第七韻曰亦猶日並月以為明紀天之象王居門而曰閏重嵗之餘今案字書明字從眀非從日也賦誤用之害理之甚儤北教反廣韻曰忁直也所謂忁直者連直宿也自唐以來翰林院有忁直例本朝翰林學士院亦有忁直格蓋言儤直之日數也李濟翁資暇集遂改忁作豹又訓解曰豹隱山林晝伏夜逰濟翁初不曉儤直之義妄自穿鑿殊可怪也葭莩者附麗相親之義前漢王莽傳曰與陛下有葭莩之故顔師古注曰葭蘆也莩者其筒裏白皮也言其輕薄而附著也唐書員半千傳曰無葭莩親而唐書釋音曰葭葦之未秀者莩草也其說誤矣穀春秋宣四年左氏傳曰鬭伯比生子文棄諸夢中虎乳之遂使收之楚人謂乳穀謂虎於莵故命之曰鬬穀於莵實為令尹子文陸德明音義曰穀奴口反於音烏莵音徒觀國案廣韻上聲㝅乃后切乳也去聲㝅奴豆切乳也而入聲榖字無音奴口反者左氏多假借用字故用榖字亦或變篆為𨽻時變作榖字也於義當作㝅字觀國又案玊篇曰䖚䖘虎也左氏用於莵字蓋假借耳而前漢班固叙傳引左氏傳曰楚人謂乳為穀謂虎為烏檡顔師古注曰檡字亦作莵觀國案玊篇廣韻檡音奭又音宅梬棗也字書未有音檡為徒者亦無或作莵之文班固好借用字然此為取義太逺飲食票姚經書中泛言飲食與夫自飲自食則皆當讀如本字若以飲飲人以食食人則飲當音䕃食當音嗣各從其義也如論語一簞食一瓢飲飯蔬食飲水曲肱而枕之簞食豆羮見於色周禮膳獻飲食食用六榖飲用六清禮記食居人之左子卯稷食菜羮春秋左氏傳粢食不鑿聞師將傳食凡此類皆自飲自食者也陸德明音義皆音作䕃嗣誤也前漢霍去病傳曰去病年十八為侍中善騎射再從大將軍大將軍受詔豫壯士為票姚校尉服䖍注曰票姚音飄搖顔師古注曰票音頻妙反姚音羊召反票姚徑疾之貌也荀悅漢紀作票鷂字去病後為票騎將軍尚取票姚之字今讀音飄搖則不當其義也觀國案字書票姚字於平聲去聲兩音皆收杜子美寄董嘉榮詩曰居然雙捕虜自是一嫖姚又後出塞詩曰借問大將誰恐是霍嫖姚又觀燕將士詩曰漢朝頻選將應拜霍嫖姚又贈田判官詩曰宛馬總肥春苜蓿將軍只數漢嫖姚子美於嫖姚作平聲用又哭嚴武詩曰風送蛟龍雨天長驃騎營則於驃字自作去聲用蓋皆於義無害也顔師古謂讀音飄搖則不當其義者非也票姚平聲去聲皆輕疾之義讀史則從去聲作詩文則用為平聲皆無害也杜子美别崔潩詩曰如何不磨礪但取不磷緇讀論語則磷音吝而詩用為平聲義皆通也奕奕奕下從廾奕下從大許慎說文曰奕圍棋也奕大也行也美容也玉篇廣韻曰奕博奕也美貌也奕大也行也盛也輕麗也觀國案那詩曰萬舞有奕頍辨詩曰憂心奕奕論語曰不有博奕者乎孟子曰使奕秋誨二人奕凡此類皆從廾之奕也閟宫詩曰新廟奕奕鄭氏箋曰奕奕佼美也韓奕詩曰奕奕梁山又曰四牡奕奕毛氏傳曰奕大也凡此類皆從大之奕也世俗書奕奕二字不預分二字之義而書之或從廾或從大混而無别則害於義矣亦如弊字下從大而俗書則變為弊㢡字下從廾而俗書則變為奬蓋字法為俗書所變者多此類也沫屈平離騷曰芳菲菲而難虧兮芬至今猶未沫今猶未沫五臣注文選曰沫已也宋玊招魂曰朕幼清以廉潔兮身服義而未沫五臣注文選曰沫已也觀國案易豐卦曰豐其沛日中見沫王弼注曰沫微昧之明也音莫貝切蓋屈平自謂我之芳芬未至于晦昧也宋玉自謂身服義而未至于晦昧也沫無已之義五臣以沫為已誤矣前漢王商傳引易曰日中見昧折其右肱蓋沫與昧義則同也故通用之玊篇水部曰沫亡活莫蓋二切觀國案亡活切者旁從本末之末所謂浮沫所謂避沫水之害是也莫蓋切者旁從午未之未即易所謂日中見沫詩所謂爰采唐矣沫之鄉矣是也二字偏旁不同而玊篇同為一字而分二切以訓之則誤矣廣韻於去聲收沫字莫貝切與昧字同音皆從午未之未於入聲收沫字莫撥切與秣字同音皆從本末之末二字不同也曺子建應詔詩曰𤣥駟藹藹揚鏕漂沫流風翼衡輕雲承蓋五臣注文選曰漂沫謂馬行急口中沫出審如此則當用入聲沫字曺子建借用去聲沫字然去聲沫字非口中沫也傅武仲舞賦曰良駿逸足愴悍淩越龍驤橫舉揚鏕飛沫此用為入聲不誤矣舀臽取耴舀臽二字易于相亂舀以沼切又音逾又音由杵臼也臽音坎又音陷水穽也故滔淹二字皆從水滔音洮水流也淹乙咸切沒也諂諂二字皆從言諂音洮疑也諂音丑琰切諛也慆惂二字皆從心慆音洮說樂也惂音坎憂困也幍㡊二字皆從巾幍音洮亦作絛也㡊音口洽切帽也搯掐二字皆從手搯音洮搯捾也掐音若合切瓜掐也然則舀臽易於相亂可見矣取耴二字亦易於相亂取七庾切受也收也又倉口切又音娶耴陟葉切耳垂也又魚乙切故㖩􅀈二字皆從口㖩音子于切􅳅㖩也耴音丁愜切多言也鯫鮿二字皆從魚鯫音組鈎切魚名又七逾切淺鯫也鮿音輒魚名也菆􅀢二字皆從草菆音鄒又在寒切蓐也􅀢音輒又音帖衣領專也棷㭯二字皆從木棷音鄒薪也㭯音輒木小葉也齱􅀈二字皆從齒齱音鄒齱齵齒偏也􅀈音􅀈角切急促也掫􅀈二字皆從手掫子侯切又側九子于二切擊也􅀈音輒又丁愜切拈也然則取耴易於相亂可見矣曰􅀈曰蹈曰韜曰縚曰瑫曰槄皆從舀者也曰閻曰輡曰􅀈曰啖曰欿皆從臽者也曰聚曰最曰趣曰娶曰叢曰緅皆從取者也曰輒曰􅀈曰銸曰䳖曰􅀈曰􅀢皆從耴者也然則握筆之際貴在不誤啖袴噉啖啖三字諸家字書同音徒濫切又同音杜覽切雖有二音切其義則同為噉食之字趙璘因話録緣唐武宗廟諱炎遂辨此三字謂玉篇噉字是正啖字是俗觀國案說文出啖字篆文則啖字非俗也玉篇亦未嘗以啖字為俗字廣韻曰前秦録有將軍噉鐵而元和姓纂作啖鐵唐亦有啖助則啖固非俗書也晉武帝諱炎唐武宗亦諱炎司馬遷父名談故字之從炎者多改易之以致疑也史記韓信傳曰信能死刺我不能死出我袴下信熟視之俯出於袴下徐廣注曰袴亦作胯胯股也前漢韓信傳曰衆辱信曰能死刺我不能出跨下於是信熟視俯出跨下顔師古注曰胯下兩股之間也觀國案玊篇曰胯口故切注曰史記云不能死出我胯股也廣韻跨有兩音一曰苦瓦切行不進貌也一曰苦化切胯越也以此考之則當從史記玊篇用袴股二字讀音口故切者是也班固漢書借用跨字其跨字無用口故切之音蓋班固改史記袴字作跨字義雖可用而音韻不通矣史家用字多為後人假借改易其本體而音訓者或誤為之說遂傳襲以成其疑皆此類也辨辨音卞又音辦廣韻曰辨蒲莧切具也俗作辦然則古無從力之辨止用辨字儀禮中辨字甚多皆不用從力之辦惟用辨字爾周禮考工記審曲靣勢以飭五材以辨民器鄭氏注曰辨具也釋音曰辨皮莧反具也史記子貢傳曰兵不先辨不可以勝敵前漢王欣傳曰上數出幸過扶風宫館馳道修治供張辨凡此辨字皆音辦也辨者字母也𨽻書雖用辦字及施於篆止用辨字亦如篆善為譱篆雪為䨮篆星為曐篆夢為㝱篆奔為奔篆塵為􅀢篆雷為靁篆原為厵篆畝為畝篆看為翰篆頂為􅨉篆夏為篆曹為􅔟篆强為彊篆㮚為篆香為篆覃為􅀢篆雍為雍篆集為雧凡此皆字之有母者𨽻文從省而施於篆則用字母也榷前漢武帝紀天漢三年二月初𣙜酒酤應劭注曰縣官自酤𣙜賣酒小民不復得酤也韋昭注曰以木渡水曰𣙜謂禁民酤釀獨官開置如道路設木為𣙜獨取利也顔師古注曰𣙜者步渡橋爾雅謂之石杠今之𣙜彴是也禁閉其事總利入官而下無由以得有若渡水之𣙜因立名焉又昭帝紀始元六年二月詔議罷鹽鐵榷酤七月罷榷酤官又食貨志曰昭帝罷鹽鐵酒𣙜均輸官今考漢書於武帝紀用榷字昭帝紀食貨志用𣙜字觀國案字書榷𣙜同音古嶽切榷從手揚榷大舉也𣙜從木以木渡水也榷酤者揚舉其事使人曉然知之而不得侵吾利然則榷酒酤當用從手之榷也史多假借用字故或用從木之𣙜注釋之家因其用從木之𣙜乃用橫木渡水以訓之誤矣史家又或用㰌字為㰌酤今案字書㰌音苦角切枳木有實似柚蓋音與義皆與𣙜不同雖曰假借實無意義字書格古百切擊也鬭也史言格鬭格殺本用從手之挌而皆用從木之格者蓋古人書從木之字多變為從手如極字從木而或書為拯欃槍從木而或書為攙搶然則書榷為𣙜書挌為格皆假借也若核其義則當各有所歸耳寰寰字音環又音眩廣韻平聲曰寰戶關切王者封畿內縣也又音黃練切廣韻去聲縣黃練切古文作寰郡縣也楚莊王滅陳為縣縣名自此始也觀國案文士多用寰宇字寰雖亦音環而究其義則當為縣字蓋王者封畿內縣則讀寰字為縣字宜矣其曰楚莊王滅陳為縣縣名自此始者案史記楚世家曰楚莊王至洛觀兵於周郊周定王使王孫滿勞楚王楚王問鼎小大輕重則楚莊王與周定王同時也然史記秦本紀秦武公十年伐邽冀戎初縣之十一年初縣杜鄭蓋秦武公十年當周莊王之八年自周莊王又厯六世始為周定王則縣名非始於楚莊王也秦武公初縣邽冀戎初縣杜鄭者乃伐而取之初以其地為縣亦非縣名之始也周禮有井邑丘甸縣鄙之法故許慎說文曰周制天子地方千里分為百縣然則縣之名久矣非楚莊王所創也狃午論語曰公山弗擾以費畔春秋定公十二年左氏傳曰公山不狃率費人以襲魯在論語用擾字在左氏傳用狃字疑若不同者案前漢古今人表第九等有公山不狃顔師古注曰狃人九反即公山不擾也然則擾狃二字皆讀為人九反通用之也午五二字古人亦通用之而李濟翁資暇集以為端午當作端五不當用午字今案古篆五字為乂象隂陽交乂之義而午字亦取交互之義周禮壺涿氏掌除水蟲以牡橭午貫象齒而沈之則其神死鄭氏注曰午故書為五杜子春注曰五貫為午蓋用象齒交五貫於橭木之上也故書者别本周禮也故書作五則午五通用可知矣史言旁午者四方八達皆通亦交午之義也十二辰在五月屬午則午五其義同然則端午端五通用之不疑矣嗛古人以銜字與嗛字通用史記韓嫣傳曰太后由此嗛嫣徐廣注曰嗛讀與銜同前漢韓嫣傳曰太后由此銜嫣史記義縱傳上怒曰縱以為我不復行此道乎嗛之徐廣注曰嗛讀音銜前漢義縱傳曰上忿銜之史記大宛𫝊曰昆莫生弃於野鳥嗛肉蜚其上又外戚王太后𫝊曰景帝恚心嗛之而未發也然則司馬遷用嗛字班固用銜字二字之義一也班固或用嗛字為謙字前漢司馬相如封禪書曰陛下嗛遜而未發也顔師古曰嗛古謙字而史記司馬相如封禪書曰陛下嗛遜而弗發也班固又用嗛字為歉字前漢郊祀志曰今榖嗛未報顔師古曰嗛少意苦簟反遷固作史間用古文以祛俗學之蔽然至於字書音訓所不載則後世反滋其疑抑書籍散亡有不可考者耶此後學之所以為難也雕字書曰雕都聊切鶚屬也籀文作鵰觀國案字書偏旁從佳與從鳥者多通用故雞與雞同雍與􅀈同雇與鳸同􅀢與鴽同㕍與鴈同然則雕與鵰同也後世乃用雕字為雕刻之字蓋字書自有雕雕凋三字雕者雕琢也雕者雕鏤也凋者凋落也三字雖分三義而與雕字並通用之雕雕二字皆刻鏤之義而凋乃凋落也雕乃鵰鶚此二字無刻鏤之義乃假借用之是故前漢郊祀志曰賜爾黼黻雕戈顔師古曰雕與凋同王莽𫝊曰起九廟飾以金銀雕文顔師古曰雕與雕同顧命曰雕玊仍几郊特牲曰丹漆雕幾之美明堂位曰玉豆雕纂少儀車不雕幾論曰松柏之後雕又曰朽木不可雕史記優孟曰請以雕玉為棺揚子曰童子雕蟲篆刻又曰雕刻象形又曰玊不雕璵璠不作器長楊賦曰除雕琢之巧張平子西京賦曰雕楹玊磶又東京賦曰雕弓斯張司馬相如子虛賦曰乘雕玉之輿左太沖蜀都賦曰雕鶚鴆其隂杜子美詩曰雕鶚在秋天凡此正字與假借互用之其來久矣枚乘七發用雕弓相如子虛賦用雕弓其義一也七發曰右夏服之徑箭左烏號之雕弓子虛賦曰左烏號之雕弓右夏服之徑箭此二句同者案枚乘事梁孝王恐孝王反作七發以諫之武帝即位以蒲輪迎乘死於路司馬相如事景帝時梁孝王來朝從遊說之士鄒陽枚乘莊忌之徒相如見而說之因病免客遊梁居數月乃著子虛之賦會梁孝王卒相如歸久之因狗監侍上武帝讀子虛賦而後召相如則七發在前而子虛賦當在後相如竊七發之文而顛倒其句耳褖緣緑禮記玊藻曰士褖衣鄭氏注曰鞠衣展衣褖衣者諸侯之臣皆分為三等其妻以次受此服也觀國案此三衣皆祭服也所謂其妻以次受此服者士褖衣則士之妻亦褖衣也故周禮內司服曰辨外內命婦之服鞠衣展衣緣衣素紗鄭氏注曰緣衣褖衣也蓋內命婦則女御服褖衣外命婦則士妻服褖衣與玉藻士褖衣其制合矣周禮用緣字者褖從彖緣亦從彖可通讀音彖也緑衣詩衛莊姜傷已也妾上僭夫人失位而作是詩緑兮衣兮緑衣黃裳緑兮衣兮緑衣黃裏緑兮絲兮女所治兮毛氏訓曰緑當為緣鄭氏箋曰諸侯夫人祭服鞠衣為上展衣次之褖衣次之鞠衣黃展衣白褖衣黑今反以褖衣而黃裏黃裳喻妾上僭亂禮也觀國詳緑衣詩辭皆褖衣之義也當讀緑作褖而詩用緑字者假借用字耳亦如菉王芻也而詩曰終朝采緑不盈一掬又曰瞻彼淇奧緑竹猗猗皆用緑字蓋菉緑二字皆從録亦可通用也幽黝玉藻曰一命緼韍幽衡再命赤韍幽衡鄭氏注曰幽讀為黝候人詩曰彼其之子三百赤芾毛氏訓曰一命緼芾黝珩再命赤芾黝珩觀國案北方謂之幽都幽之色黑也黝黑色也在玊藻言幽讀為於虬切在毛氏訓詩言黝讀為於糾切二字不同音其為黑色則一也鄭氏因毛公訓詩用黝字遂以玊藻幽字亦讀黝非也周禮牧人凡陽祀用騂牲毛之隂祀用黝牲毛之鄭司農注曰黝讀為幽又周禮守祧曰其祧則守祧黝堊之鄭司農注曰黝讀為幽案鄭康成注玉藻曰幽讀為黝則讀為於糾切也鄭司農又曰黝讀為幽則又讀為於虬切何其反覆之不一耶唯詩與禮相𫝊名家者其用字多不同苟不悖於義則各如本字讀可也詩曰顯顯令德而中庸引詩曰憲憲令德詩曰鵲之疆疆而表記引詩曰鵲之姜姜如此類甚多不可槩舉攌僒史記賈誼𫝊服鳥賦曰拘士繫俗兮攌若囚拘徐廣注曰攌音華板反前漢賈誼𫝊服鳥賦曰愚士繫俗僒若囚拘李奇注曰僒音塊蘇林注曰僒人肩傴僒爾音欺全反顔師古注曰蘇音是觀國案史記攌如囚拘漢書曰僒若囚拘用字不同者蓋賈誼文當時相𫝊非一本其用字固有不同處司馬遷班固各以其所𫝊賈誼文纂而作史故其用字有不同也攌乃擐束之意字書窘亦作僒然則攌僒二字雖不同音而其義則皆有囚束拘繫之意於文無嫌也文選服鳥賦曰愚士繫俗兮窘若囚拘蓋用漢書編入選也止用窘字而李善五臣注皆曰窘拘困也然則僒為窘可知矣李奇曰僒音塊蘇林曰僒音欺全反顔師古曰蘇音是三人之說皆非也摴樗從手南史宋高祖紀曰劉毅家無擔石之儲摴蒲一擲百萬蓋用此摴字廣韻曰樗丑居切摴蒲也又姓史記丞相摴里疾樗亦丑居切惡木也玊篇曰摴丑居切摴蒲也㯉亦丑居切惡木也擭胡霸切木名亦作樗觀國案樗從木讀為胡霸切而書史皆用樗為丑居切蓋變㯉為樗而借用之也唯禮部韻略於攄字韻中有樗字注曰惡木也於古字書皆不合未得所安詩曰我行其野蔽芾其樗又曰采荼薪樗食我農夫蓋皆假借變㯉為樗又或變古文為𨽻者改之不必出於字書然則修字書者固不可以假借之字而著為正字也若摴里之摴從手而史記摴里子𫝊用從木之樗者亦假借無傷焉案史記樗里子𫝊曰樗里子名疾秦惠王之弟也秦封摴里子為嚴君蓋秦乃嬴姓而廣韻以樗為樗里之姓誤矣樗里子𫝊又曰樗里子疾室在於昭王廟西渭南隂鄉樗里故俗謂之樗里子本𫝊言之詳矣而字書反以樗為樗里之姓何耶苴菹蒩周禮鄉師之職大祭祀共茅蒩杜子春曰蒩當為菹以茅為菹若葵菹也鄭大夫讀菹為藉謂祭前藉也鄭康成曰蒩士虞禮所謂苴刌茅長五寸束之所以承祭既祭束而去之觀國案字書苴子魚切禮所謂包苴所謂苴麻所謂苴杖是也菹側魚切亦作葅酢菜菹也周禮醢人所謂韭菹菁菹茆菹葵菹芹菹箈菹筍菹凡七菹是也蒩資都切蒩藉也鄉師共茅蒩司巫共蒩館是也苴菹蒩三字三音而義各不同杜子春以蒩為菹非也以茅為菹豈可食哉鄭大夫讀蒩為藉亦非也菹乃所以為藉豈假讀菹為藉耶鄭康成以為藉祭是也而引士虞禮苴為蒩音義不同蓋士虞禮亦當用蒩字而省文用苴字耳所謂蒩者設茅為藉以承祭也周禮甸師祭祀共蕭茅而司巫祭祀共蒩館鄉師乃共茅蒩者甸師共其茅而已鄉師以其而為之蒩司巫則共其承蒩之館所謂館者承藉之箱也周官大抵聨事合治類如此能能字奴登切又奴代切又奴來切又土來切其音奴登切者多技藝也所謂有能奮庸所謂獻賢能之書所謂以能問于不能之類是也又與耐通用禮運曰聖人耐以天下為一家樂記曰人不耐無樂樂不耐無形形而不為道不耐無亂鄭氏注曰耐古能字也其音奴代切者姓也何氏姓苑曰能姓出長廣亦與耐通用史記淮南王安𫝊曰有耐罪以上赦令除其罪應劭注曰輕罪不至於髠全其耐鬢故曰耐古耐字從彡髮膚之意如淳注曰律耐為可魁冠耐為鬼薪白粲耐猶任也蘇林注曰一嵗為罰作二嵗刑以上為耐耐能任其罪前漢高祖紀曰郎中有罪耐以上請之顔師古注曰耐謂頰旁毛也又文帝紀曰罪有耐以上不用此令又郊祀志曰中都官耐罪囚徒觀國案許慎說文曰耐罪不至髠也玊篇曰耐如時切頰須也廣韻曰耐奴代切須也然則耐與耐二字音與義通用也所謂耐罪者去其頂髮而存其鬢頰之毛故曰罪不至髠也前漢高惠孝文功臣侯年表曰宣曲侯丁通有罪耐為鬼薪史家或用耐或用耐則通用可知矣諸家注解訓耐為頰鬢毛者是也謂能任其罪者非也其音奴來切者爾雅云鱉三足曰能是也其音土來切者與台通用史記天官書曰魁下六星兩兩相比名曰三能又封禪書曰有星茀於三能前漢天文志曰三能色齊君臣和然則能與台通用此類是也若夫春秋左𫝊曰盟于耐外此水名音而也宋有耐班此姓音而也唐司空圖自目為耐辱居士此音奴代切也凡此皆專一音不可兼他音讀之譸無逸曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻孔安國曰譸張䛘也君臣以道相正故下民無有相欺䛘幻惑也釋音曰譸竹求反爾雅曰侜張䛘也郭璞注引書曰無或侜張為幻謂幻惑欺䛘人也玊篇言部曰譸竹尤切譸張䛘也人部曰侜竹尤切侜張䛘也廣韻曰譸竹尤切譸張䛘也爾雅作侜以此觀之則譸侜二字通用也防有鵲巢詩曰誰侜豫美心焉忉忉誰侜豫美心焉惕惕毛氏𫝊曰侜張䛘也鄭氏箋曰誰侜張䛘欺我乎然則譸侜通用可知矣史又用輈張字後漢孝仁董皇后紀曰汝今輈張怙汝兄耶章懷太子注曰輈張猶彊梁也今案董皇后兄子重為票騎將軍何太后兄進為大將軍重與進權勢相害董后每欲參于政事太后輒相禁塞董后忿恚詈言曰汝今輈張怙汝兄耶蓋言何太后輈張欺䛘以怙其兄進也輈張亦當為欺䛘之辭而章懷太子以輈張為彊梁非也舍舍字與赦同音者其義則止息也與捨同音者其義則釋去也子在川上曰逝者如斯夫不舍晝夜此言川流晝夜無止息逝者已往愈逺而不可追猶川流之無止息孔子所以興嘆也舍當讀音赦孟子曰原泉混混不舍晝夜義與此同揚子法言或問進曰水或曰為其不捨晝夜與又曰車航混混不捨晝夜乃用捨字與孔子意不合矣易乾九二曰見龍在田時舍也井初六曰舊井無禽時舍也此皆謂止以待之也屯六三曰君子幾不如舍謂往則徒行不如止也春秋威公二年左氏𫝊曰舍爵䇿勳謂飲酒置爵則書勳勞於策也文公十八年𫝊曰舍爵而行謂飲酒置爵即行也僖公三十年𫝊曰若舍鄭以為東道主謂止鄭毋伐也宣公四年𫝊曰乃舍之皆為大夫謂止子良使毋去也定公四年𫝊曰舍舟於淮汭謂止舟於淮水之汭弗乘舟也凡此舍字皆讀音赦也文公六年𫝊曰晉舍二軍七年𫝊曰樂豫舍司馬襄公二十三年𫝊曰盡舍旃昭公十九年𫝊曰舍前之忿書曰舍已從人詩曰舍旃舍旃又曰舍彼有罪孟子曰姑舍是又曰人病舍其田而藝人之田凡此舍字皆讀音捨也舍又與釋同音亦同義禮曰舍奠舍菜舍萌舍幣舍中舍算列子曰其人舍然大喜此類是也書史釋音多誤音訓當逆其義而讀之趣趨趣字一音七俱切一音蒼狗切一音七喻切一音親足切其音七俱切者趣走也視去就而趣走者也其音蒼狗切者周禮夏官有趣馬以下士為之鄭氏注曰趣養馬者也又校人曰八師一趣馬八趣馬一馭夫詩曰蹶惟趣馬書虎賁綴衣趣馬凡此言趣馬勸駕之意也若夫養馬則有牧師圉師焉其音七喻切者趣向也詩曰濟濟辟王左右趣之易曰變通者趣時也詩易釋音皆音趣作七喻切其義則視嚮背之宜而行者也晉孟嘉𫝊言酒中趣之類是矣其音親足切者速行之意史記曺參世家曰蕭何卒參聞之告舍人趣治行吾將入相史記漢書張良𫝊曰幾敗乃公事令趣銷印顔師古注曰趣音促後漢光武詔曰其顯效未訓名籍未立者大鴻臚趣上章懷太子注曰趣音促此類是也若夫趨字唯七俱切一音而已其義則行之疾也綿蠻詩曰豈敢憚行畏不能趨猗嗟詩曰巧趨蹌兮射則臧兮周禮縣正趨其耕事鄼長里宰趣其耕耨旅賁氏夾王車而趨夫馭趨以采齊論語趨進翼如孟子趨者蹶者是氣也又曰其子趨而往視之又曰趨而迎之又曰其趨一也記曰堂上不趨執玊不趨鄭氏注曰行而張足曰趨也爾雅曰堂上謂之行門外謂之趨凡此趨字皆七俱切一音也與趣異矣杜預春秋𫝊序曰厭而飫之使自趨之陸德明釋音曰趨七住反又七俱反觀國案杜預注又曰其經無義例因行事而言則𫝊直言其歸趣而已此趣字乃七住反也則知前言使自趨之者為七俱反矣陸德明於趨字立兩音非也前漢禮樂志曰文巧則趨末背本者衆顔師古注曰趨讀曰趣今案趨末背本者如水趨下之趨當音七俱切顔師古讀音趣亦非也許慎說文曰趍直離切趍趙久也玊篇廣韻皆曰趍直離切趍俗本音池然則趍與趨不同音而世多以趨為趍者誤也又俗書趨為趨蓋憚㸃畫之多而變芻而芻又如變鄒為鄒變騶為􅀈變雛為􅀈如此類無意義不可循襲刀許慎說文曰刀都高切兵也玉篇曰刀都高切兵也所以割也亦名錢以其利於人也亦名布分布人間也又丁么切引莊子曰刀刀乎亦姓俗作刁廣韻曰刀都高切引釋名曰刀到也以斬伐到其所也又都聊切引軍器纂文曰刁斗持時鈴又姓出渤海引風俗通曰齊大夫豐刀之後俗作刁觀國案諸字書刀都高切又音都聊切一字而異音者也於篆文則一而已未有倒其筆為刁者倒其筆為刁者俗書也史記貨殖𫝊曰齊俗賤奴虜而刁閒獨愛貴之故曰寧爵母刁此乃用俗書刁字為姓傳至於今也夫以俗書為姓則於譜牒無所宗考其必出於番夷之音既入中國遂繼𫝊而不泯矣河廣詩曰誰謂河廣曾不容刀鄭氏箋曰小船曰刀案字書舠小船也詩人從省文用刀字耳漢書李廣不擊刁斗自衛孟康注曰刁斗以銅作鐎受一斗晝炊飯食夜擊持行夜名曰刁斗顔師古注曰鐎音譙其說是也軍器纂文以為鈴非也邑歇史記聶政𫝊云政姊乃於邑曰其是吾弟與前漢成帝紀贊曰趙氏亂內外家擅朝言之可為於邑顔師古注曰於邑短氣貌於音烏邑音一合反又中山靖王勝𫝊曰雍門子一微吟孟嘗君為之於邑顔師古注曰於音烏邑音一合反又揚雄𫝊反離騷曰唯增欷以於邑兮吾恐靈修之不纍改顔師古注曰於音烏邑音遏凡此言於邑者於讀為烏邑讀為遏其義則氣鬱而不舒之貌也前漢酷吏𫝊贊曰張湯以知阿邑人主與俱上下蘇林注曰邑音人相悒納之悒顔師古注曰邑烏合反史記商君𫝊曰安能邑邑待數十百年以成帝王乎屈平離騷曰曽歔欷豫鬱邑兮哀朕時之不當如此類用邑字亦皆讀音遏其義則鬱塞也史記陳餘𫝊曰立趙後扶以義可就功乃求得趙歇立為趙王徐廣注曰歇音烏轄反前漢高祖紀曰立趙後趙歇為趙王注引鄭氏曰歇音遏絶之遏然則史家音訓字有字書所不載者此類是也紾任人有問屋廬子曰以禮食則飢而死不以禮食則得食必以禮乎孟子曰紾兄之臂而奪之食則得食不紾則不得食則將紾之乎趙岐注曰紾戾也齊宣王欲短喪公孫丑曰為朞之喪猶愈於己乎孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦教之孝悌而已矣趙岐注曰紾戾也觀國案玉篇曰紾徒展切紾轉也又音軫廣韻曰紾知演切轉繩也又音軫單衣也以此觀之則紾有兩義其音徒展切知演切者其義則轉也其音軫者單衣也紾兄之臂者轉其臂使不得順而伸若轉繩然也紾兄之臂而奪之食非禮也有以見禮重食輕也齊宣王欲短喪公孫丑不能以孝悌教之乃告以為朞之喪是猶紾兄之臂既已非禮而又助之曰姑徐徐是則助其為不孝不悌也然則紾臂之紾當讀為徒展切周禮考工記弓人為弓凡相角稚牛之角直而澤老牛之角紾而昔凡相膠欲朱色而昔昔也者深瑕而澤紾而摶廉鄭司農注曰紾讀為抮縳之抮陸德明釋音曰紾抮皆徒展反蓋稚牛之角直則老牛之角紾轉而曲矣紾而摶廉則雖屈曲之而猶嚴利也凡此紾字與紾臂之紾義皆同專剸鱄春秋昭公二十年左氏𫝊曰員如吳言伐楚之利乃見鱄設諸焉而耕於野鄙又二十七年左氏𫝊曰鱄設諸置劍於魚中以進史記吳世家曰公子光使専諸置匕首於炙魚之中又刺客𫝊曰専諸者吳堂邑人也伍子胥亡楚而如吳也知専諸之能乃進専諸於公子光前漢賈誼𫝊疏曰既疑有剸諸荆軻起於兩柱之間在左𫝊曰鱄在史記曰専在前漢曰剸觀國案玊篇曰鱄市戀切魚名也専職緣切亦姓吳刺客専諸或作鱄也剸㫖兖切細割也亦作剬以此觀之則専諸者是其姓也左氏用鱄字皆借音耳核其義則鱄剸二字夲無専音因其左𫝊漢書有借音故修字書者亦附於正字之下也春秋成公十四年左氏𫝊曰天禍衛國也夫吾不獲鱄也使主社稷杜預解曰鱄子罕之母弟釋音曰鱄市戀反剸亦作剬所謂陸剸犀象所謂剸繁治劇揚子法言云魯仲連蕩而不割藺相如剬而不蕩皆讀音㫖兖切凡此乃鱄剸二字正音也非姓也市􅙻案字書市甫味切象草木市市然之形從肉則為肺方味切金藏也詩曰自有肺腸周禮以肺石達窮民月令祭先肺是已肺又音普貝切詩曰東門之楊其葉肺肺是已從草則為芾方味切詩曰蔽芾甘棠是已從水則為沛溥蓋切地名沛郡是已沛又音普蓋切孟子曰沛然下雨是已從木則為柿方味切斫木札也凡此皆以市為字母者也􅙻嗟似切其義則止也從肉則為胏俎吏切脯有骨曰胏易噬嗑卦曰噬乾胏是已從禾則為秭蔣几切詩曰萬億及秭是已從女則為姊蔣几切爾雅曰女子先生為姊是已從木則為柿鉏里切果名潘嶽閒居賦曰梁侯烏椑之柿是已從水則為泲即里切亦作濟書曰濟河惟兖州前漢地理志曰泲河惟兖州是已從竹則為笫狙吏切牀簀也凡此皆以􅙻為字母者也市甫勿切許慎說文曰市韠也上古衣蔽前而已市以象之天子朱市諸侯赤市從巾象連帶之形亦作芾亦作韍也市時止切許慎說文曰買賣所之也易曰日中為市周禮有司市之官是已觀國案市字甫味切􅙻字嗟似切市字甫勿切市字時止切此四字篆文不同其義與音皆異而𨽻書者多互書之易於疑亂惟循其字母以求之則各有攸歸可以類見也後漢方術𫝊楊由蜀郡人為郡文學掾有風吹削哺太守廉范以問由由對曰當有薦木實者頃之五官掾獻橘數包章懷太子注曰哺當作柿音孚廢切削札也史家假借為肝肺字觀國案顔師古注漢書肺附云肺者削木札也然則史家以削柿為削肺古人假借字有之而楊由𫝊用哺字義雖當作柿而借音太逺矣省文古文篆字多用省文及變篆為𨽻亦或用省文者循古文耳周禮小宗伯掌建國之神位鄭康成注曰故書位作立鄭司農注曰立讀為位古者立位同文古文春秋徑公即位為公即立以此知在古文為立在𨽻為位蓋古文用省文也禹貢曰東過洛汭而漢書溝洫志曰及盟津洛內顔師古注曰內讀曰汭班固用省文耳禹貢曰嵎夷既略濰淄其道此言濰水淄水皆復其故道也而漢書地理志曰維災其道後漢郡國志北海國有災川縣齊國有臨菑縣本用淄字而災者省文也又用菑者假借用之耳變濰為維者亦省文也史記項羽紀曰人言楚人沐猴而冠沐猴者獼猴也而揚子法言曰生捨其木侯而謂人木侯變沐為木變猴為侯者皆省文也樂記曰於是有淫佚作亂之事而漢書地理志曰漢中淫失枝柱與巴蜀同俗顔師古注云失讀曰泆班固用省文也詩曰疆埸有瓜而漢書食貨志云瓜瓠果蓏殖於疆易用易字者省文也禹貢曰厥草惟繇厥木惟條而漢書地理志云屮繇木條蓋草字篆文為草而屮又其省文也後漢班固𫝊曰幕府新開廣延羣俊然史記漢書並用莫府者乃幕之省文也史記有伍子胥𫝊而漢書藝文志隂陽家有五子胥十篇用五字者省文也史記貨殖𫝊曰玳瑁珠璣齒革而漢書郊祀志曰毒冒犀玊二十餘物用毒冒字者省文也史記平凖書曰皆仰給縣官無以盡贍而漢書食貨志曰卬以給淡又曰必卬於市用卬字者省文也用淡字者假借也周禮考工記曰圓者中規方者中矩而史記禮書規矩誠錯則不可欺以方員規矩方員之至也用員字者省文也武成曰乃偃武修文而漢書郊祀歌曰興文匽武用匽字者省文也字書曰忀徉者徙倚也而離騷曰聊逍遙以相羊用省文也字書曰搸搸聚也而宋玊招魂曰蝮蛇秦秦用省文也詩曰玁狁之故又曰薄伐玁狁而漢書胸奴傳引詩曰獫允之故薄伐獫允用獫允者省文也盧同詩曰盧子躘蹱也賢愚總莫驚字書曰躘踵行不進貌而文士皆用龍鍾字者用省文也語曰鄉人儺而禮記月令季冬命有司大難者用省文也史記貨殖傳曰愈於織嗇而漢書食貨志曰民俞貧困用俞字者省文也長發詩曰何天之龍敷奏其勇龍讀作寵用省文也史記遊俠𫝊曰以睚眦殺人而漢書孔光𫝊曰崖眥莫不誅傷用崖字者省文也史記聶政𫝊曰因自皮面決眼當用披面而用皮字者省文也七月詩曰四之日舉趾而漢書食貨志引詩曰四之日舉止用止字者省文也長發詩曰聖敬日躋而孔子閒居曰聖敬日齊用齊字者省文也前漢地理志清河郡鄃縣音輸而高祖功臣年表有俞侯吕它用俞字者省文也孟子曰雖有鎡基不如待時而前漢樊噲傳贊曰雖有兹基不如逢時用兹字者省文也說命曰斆學半而禮記學記篇引兊命曰學學半用兊字學字者省文也學林卷九
