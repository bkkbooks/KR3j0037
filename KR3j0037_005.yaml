body:
  text: 學林卷五宋王觀國撰蒲栁爾雅曰檉河栁旄澤栁楊蒲栁所謂蒲栁者乃栁之一種其名為蒲栁是一物也春秋左氏傳曰非子之求而蒲之愛董澤之蒲可勝既乎杜預註曰蒲栁可以為箭崔豹古今註曰蒲栁水邊生葉似青楊亦名蒲楊則蒲栁為一物可知矣後漢馬融傳廣成頌曰樹以蒲栁被以綠莎用蒲栁對綠莎不誤也晉書顧悅之與簡文帝同年而髪早白帝問其故對曰松柏之姿經霜猶茂蒲栁之質望秋先零以松柏對蒲栁意為蒲草與栁為二物也誤矣杜子美重過何氏詩曰手自移蒲栁家纔足稻粱亦以蒲栁為二物蓋循悅之之悞也歐陽文忠公乞解政事表曰念其蒲栁質易朽而先衰譬若馬牛力已疲而則止又表曰四體癯羸甚已衰之蒲栁雙瞳眊瞀幾不辨于騧驪皆承襲用之耳孟子曰曽晳嗜羊棗而曽子不忍食羊棗案爾雅曰遵羊棗郭璞註曰實小而圓紫黒色俗呼為羊矢棗蓋羊棗者棗之一種其名為羊棗是一物也與蒲栁同矢矢以木為之亦以竹為之北方皆以木為矢南方皆以竹為矢蓋北方少竹而南方竹多各因其土俗所生之物而為之也易曰弦木為弧剡木為矢此以木為矢也禹貢荆州厥貢惟箘簵楛孔安國曰楛中矢榦武王克商肅愼氏貢楛矢石砮此以楛木為矢也爾雅曰楊蒲栁郭璞註曰可以為箭此以栁木為矢也前漢匈奴傳曰匈奴生竒材木箭竿就羽北齊郎基為海西鎭將削木為矢玉篇木部枸榾木㮧槦木桭木嬴木註曰皆中箭笴此皆以木為矢也顧命曰和之弓倕之竹矢此以竹為矢也所謂箭者竹箭也竹箭其材可以為矢故周禮職方氏揚州其利金錫竹箭爾雅曰東南之美者有㑹稽之竹箭言竹箭之材可以為矢故廣韻曰箭竹節間三尺可以為矢淮南子曰齊桓公欲征伐甲兵不足令訟而不中者出一束箭乃矯箭為矢此以竹箭為矢也故周禮弓人為弓矢人為矢自古唯言弓矢而未嘗謂矢為箭至後世乃或謂之弓箭夫呼矢為箭則不當其義矣若唐書薛仁貴三箭定天山之類是也矢刃又謂之鏃又謂之砮周禮矢人曰刃長寸爾雅曰金鏃箭羽謂之鍭字書曰石為矢鏃曰石砮所謂楛矢石砮也史記李廣為右北平太守出獵見草中石以為虎而射之中石沒矢劉向新序曰楚熊渠夜行見伏石當道以為虎而射之應弦沒羽左太冲吳都賦曰應弦而飲羽或曰沒矢或曰沒羽或曰飲羽其義則一也尺一後漢酷吏楊球傳曰不得稽留尺一又後漢陳蕃傳諫書曰陛下宜採求失得擇從忠善尺一選舉委尚書三公章懷太子註曰尺一謂板長尺一以寫詔書也觀國案後漢輿服志劉昭註引漢舊儀曰璽書以武都紫泥封青囊白素裏兩端無縫尺一板中約書封璽使者乗馳傳其驛騎也然則雖用尺一板以寫詔書而必封之以囊中約之而書題其封又用璽焉故謂之璽書人君降詔命謂之賜璽書春秋襄公二十九年左氏傳曰季武子取卞使公冶問璽書追而與之是也史記酷吏杜周傳客有謂周曰君為天子決平不循三尺法裴駰註引漢書音義曰以三尺竹簡書法律也觀國案法律者一定之制故以三尺竹簡書之明示其凡目使百官萬民循守之故謂之三尺若夫人君有所損益廢興有所誥誡奬諭則必為詔令而以尺一板書之囊而封之加璽焉故謂之尺一蓋與三尺異矣㱾改許愼說文曰㱾音開改音以㱾改大剛卯以逐鬼鬽玉篇曰㱾改剛卯也大印以辟鬼也廣韻曰㱾改大堅也觀國案前漢王莽傳曰百姓咸言皇天革漢而立新廢劉而興王夫劉之為字卯金刀也正月剛卯金刀之利皆不得行服䖍註曰剛卯以正月卯日作佩之長三寸廣一寸四分或用玉或用金或用桃著革帶佩之銘其一靣曰正月剛卯也金刀莽所鑄之錢也晉灼註曰剛卯長一寸廣五分四方當中央從穿作孔以采絲茸其厎如冠纓頭蕤刻其上靣作兩行書文曰正月剛卯既央靈殳四方赤青白黄四色是當帝令祝融以教蘷龍庶疫剛癉莫我敢當其一銘曰疾日嚴卯帝令夔化順爾固服化兹靈殳既正既直既觚既方庶疫剛癉莫我敢當顏師古註曰今往往有土中得玉剛卯者莽以劉字上有卯下有金旁又有刀故禁剛卯及金刀也又案後漢輿服志曰佩雙印長寸二分方六分乗輿諸侯王公列侯以白玉中二千石以下至四百石皆以黑犀三百石以至私學弟子皆以象牙刻書文曰正月剛卯既央靈殳四方赤青白黄四色是當帝命祝融以教蘷龍庶疫剛癉莫我敢當疾日嚴卯帝令蘷化順爾固服化兹靈殳既正既直既觚既方庶疫剛癉莫我敢當凡六十六字劉昭註曰以正月卯日作觀國以兩漢所載剛卯制度考之則㱾改者佩印也以正月卯日作故謂之剛卯又謂之大堅佩之以辟邪所謂佩雙印則一印刻三十有四字一印刻三十有二字總為六十六字其長廣分寸制度因時不同其刻文則同亦猶人日戴符勝之類蓋袚除不祥之一端也王莽欲簒而心惡劉字之文故正月剛卯與夫金刀之錢皆禁而不得行夫卯金刀之兆已形矣雖禁之無補也莽以貨泉為錢布之文而卒有白水真人之應豈偶然哉姓名同司馬相如慕藺相如而名相如李綱慕張綱而名綱姓異而名同可也若夫姓同而名又同惡知其非本宗耶漢之李廣顯矣北齊又有侍御史李廣漢之孔安國顯矣晉又有尚書左僕射孔安國漢之張衡顯矣隋又有御史大夫張衡魏之王肅顯矣後魏又有鎮南將軍王肅晉之劉洪顯矣北齊又有濩澤縣公劉洪晉之王雅顯矣隋又有宜陽郡公王雅晉之李宻顯矣唐又有邢國公李宻後漢顯宗時大司農鄭衆顯矣和帝時又有宦者鄭衆晉武帝時光祿大夫劉毅顯矣安帝時又有荆州刺史劉毅唐代宗時武威郡王李光進顯矣憲宗時又有振武節度使李光進唐徳宗時左散騎常侍韋綬顯矣穆宗時又有山西南道節度使韋綬唐代宗時涇原節度使李觀顯矣正元中又有太子校書郎李觀凡此皆姓名同者姓名同則必有以别其非本宗茍無以别其非本宗則是可與祖先同名也於義不安矣若夫晉安帝時司馬徳宗字徳宗晉恭帝時司馬徳文字徳文晉會稽王司馬道子字道子晉孔安國字安國南史蔡興宗字興宗王僧孺字僧孺劉孝綽字孝綽任孝恭字孝恭師覺授字覺授唐李神符字神符李元嘉字元嘉張嘉正字嘉正髙崇文字崇文郭子儀字子儀張孝忠字孝忠尚可孤字可孤劉允濟字允濟孟浩然字浩然田承嗣字承嗣張巡字巡李脩字脩劉濟字濟田緒字緒凡此皆名與字同乃一身所呼無所嫌也巫覡國語說文漢書郊祀志鄭康成注周禮註禮記集韻類篇皆云在男曰覡在女曰巫玉篇廣韻皆云在男曰巫在女曰覡觀國案周官有司巫掌羣巫之政令又有男巫有女巫通謂之巫而不謂之覡若言巫覡則必有别矣今案檀弓曰嵗旱穆公召縣子而問然曰天久不雨吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎謂巫為愚婦人則女為巫矣女為巫則男為覡也春秋僖公二十一年左氏傳曰公欲焚巫尫杜預註曰巫尫女巫也史記西門豹傳曰其巫老女子也史記封禪書曰髙祖於長安置祠祝官女巫有梁巫晉巫秦巫荆巫九天巫河巫南山巫皆女巫也前漢地理志曰齊襄公令國中民家長女不得嫁名曰巫兒為家主祀然則當以女巫男覡為是顏師古見諸家之說不同故於漢書郊祀志曰巫覡亦通稱耳非也唐書安祿山傳曰祿山本姓康母阿史徳為覡居突厥中此以女為覡者蓋作史者但知男巫女覡之語而為之說未之究耳叒玉篇廣韻皆曰叒而灼切摶桑叒木也然則摶桑即扶桑也叒木即若木也后之文士變叒為若耳扶桑在東若木在西事見山海經故離騷曰飲余馬於咸池兮總余轡於扶桑折若木以拂日兮聊逍遙兮以相羊蓋扶桑者日出之處若木者日入之處折若木以拂日者日既西矣猶能抓若木以揮拂其日使之不暮而我尚逍遥安舒以遊也謝希逸月賦曰嬗扶桑於東沼嗣若英於西㝠若英即若木也此理甚明然李賀詩曰天東有若木豈賀誤耶桑字上從叒又有桒字乃俗書不可用若又為香草名曰杜若屈平九歌曰采芳洲兮杜若故謝元暉詩曰芳洲采杜若唐貞觀中敇下度支求杜若省郎責坊州貢之其事謬誤遂傳而不可冺若又音人者切北魏複姓有若干氏若久氏周書有若干惠後燕錄有若久和是也又釋典言般若者於華言為濟彼岸南史梁武帝中大通三年十一月幸同泰寺說般若經是也釋典或作惹凡音人者切者皆出於西域釋典之語欿春秋僖公二十四年左氏傳曰王遂出及坎欿陸徳明釋音曰欿大感反又襄公二十六年左氏傳曰至則欿用牲加書徵之陸徳明釋音曰欿口感反孟子曰附之以韓魏之家如其自視欿然則過人逺矣張鎰釋音曰欿音坎觀國案字書欿字口感切胡感切口含切三音其義則欲得也貪惏也未嘗有大感切之音左氏傳曰欿用牲孟子曰自視欿然皆音欿為坎是也唯左氏傳王遂出及坎欿音欿為大感反於字書無此音蓋坎欿地名也杜預註曰坎欿周地在河南鞏縣東後漢郡國志河南鞏縣有坎欿聚是也易坎卦曰入於坎窞釋音曰窞徒坎反而此坎欿用欿字蓋地名有自古相傳呼他音而字書不收其音者如蓮勺之蓮音輦堵陽之堵音者橐臯之臯音姑襄賁之賁音肥此類是也然則坎欿之欿皆音大感反乃自古所呼之音固不可以字書繩之也欿用牲加書徵之者穴坎以埋牲而加書為騐詐作盟處也此欿字讀音坎其義則穴地也自視欿然者附之以韓魏富貴之盛而自視闕然不自矜滿非知道者不能如此故曰過人逺矣此欿字亦讀音坎其義則虛已也案字書臽音坎穽也故字凡從臽者皆有虛闕之義餂孟子曰士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿踰之類也趙岐註曰餂取也未可與言而强與之言欲以言取之也是失言也知賢人可與言而反欲以不言取之是失人也章指注曰取人不知失其臧否孫奭音義曰今案古書及諸書並無此餂字郭璞方言註云音忝謂挑取物也其字從金今此字從食與方言不同蓋傳寫誤也本亦作䬯奴兼切觀國案玉篇食字部有餂字註曰達兼切古甜字然則字書非無此字第與孟子言餂之義不合耳今以孟子之文考餂之義則趙岐以餂訓取是也當如郭璞方言其字從金為銛案玉篇廣韻曰餂他㸃切取也其義與孟子之文合矣廣韻上聲銛音忝而平聲又有銛字音纎訓曰利也許慎說文以銛為臿屬乃音纎者其義與音忝者不同各從其義也孫奭曰本亦作䬯奴兼切此别本孟子也古之經書皆有别本其用字皆有異同廣韻曰䬯音黏食麥粥也於孟子之文愈不合蓋别本孟子誤為尤甚臯前漢地理志河南郡成臯縣河内郡平臯縣後漢郡國志河南有成睾縣河内有平睾縣在前漢書用臯字後漢書用睾字觀國案許慎說文臯字下从大刀切進也亦作夲亦作从大十大十者猶兼十人也故臯字亦作皋於偏旁之義皆不失也古人多假借用字故後漢書用睾字今案字書睾羊益切又尼輒切伺視也其字从日从㚔蓋㚔音聶其字形與其音其義皆與臯不同臯之為義澤也因其有澤之義故變臯為睾以澤字从睪故也雖云假借實失其義史記天官書曰其色大圜黄􅗍裴駰注曰􅗍音澤蓋司馬遷變澤為􅗍故范蔚宗以臯睪二字通用之也今以偏旁推之嘷橰鷱與夫譯嶧檡鸅音與義皆異不可假借通用明矣後漢馬援傳曰交阯女子側貳反璽書拜援伏波將軍章懷太子注引東觀記曰援上書臣所假伏波將軍印書伏字犬外嚮城臯令印臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章蓋古人假借用字者多而承流淺學者遂從而支離改作自非曉古文字者不能是正之也徧許慎說文曰徧方見切帀也廣韻曰徧方見切周也俗作遍堯典曰徧于羣神北門詩曰室人交徧讁我室人交徧摧我天保詩曰徧為爾徳周禮行人曰王之所以撫邦國諸侯者歳徧存三歳徧覜五歳徧省春秋昭公十三年左氏傳曰乃徧以璧見於羣望曲禮曰徧祭之曽子問曰五日而徧過孟子曰堯舜之仁不徧愛人爾雅曰宣徇徧也前漢禮樂志曰海内徧知上徳又郊祀歌曰徧觀此望瑶臺凡此皆用徧字不用俗書遍字也文王詩曰宣昭義問鄭氏箋曰宣徧也賚詩曰敷時繹思鄭氏箋曰敷徧也然則漢人亦皆用徧字至後世乃多用俗書遍字陸徳明撰諸經音義於徧字下皆注曰音遍又於見字下皆註曰賢遍反又如樂章次第謂之遍疊皆用俗書遍字至今用之者多也辨辯二字皆有徧音春秋定公八年左氏傳曰子言辨舍爵於季氏之廟而出杜預曰辨猶周徧也陸徳明音義辨音遍禮記内則曰子師辯吿諸婦諸母名宰辯吿諸男名樂記曰其治辯者其禮具雜記曰啟皆辯拜玉藻曰先飯辯嘗鄭氏註皆曰辯徧也尚書舜典曰徧于羣神史記帝堯紀引書曰望于山川辯于羣神凡此辨辯二字皆讀作徧也然則隋唐以來用俗書遍字者始多艾閟宫詩曰荆舒是懲鄭氏箋曰懲艾也陸徳明音義曰艾魚肺反小毖詩曰予其懲而毖鄭氏箋曰懲艾也陸徳明音義曰艾五蓋反今案二詩言懲艾之意則同而音義分二音者爾雅曰艾長也艾歴也艾相也艾養也字書曰艾魚肺切治也又五蓋切老也長也養也然則所謂懲艾者懲治之也當以閟宫詩音為是禮記表記曰以怨報怨則民有所懲鄭氏註曰懲謂創艾陸徳明音義曰艾音乂蓋與閟宫小毖詩言懲艾之意則同也小旻詩曰或肅或艾臣工詩曰奄觀銍艾祭統曰草艾則墨月令曰毋艾藍以染春秋隱公元年左氏傳曰楚雖無徳亦不艾殺其民凡此艾字皆魚肺切者也訪落詩曰朕未有艾鴛鴦詩曰福祿艾之南山有臺詩曰保艾爾後閟宫詩曰俾爾耆而艾春秋隱公二年左氏傳曰猶有知在憂未艾也凡此艾字皆五蓋切者也乂治也書曰有能俾乂政乃乂俊乂在官萬邦作乂亦克用乂之類皆訓治而書史亦或借用艾字史記封禪書曰方内艾安人民靡疾又曰漢興已六十餘歳矣天下艾安前漢五行志曰從作艾又曰艾時陽若如此類是也格格亦讀音閣前漢文三王傳曰太后欲以梁王為嗣大臣袁盎等有所關說於帝太后議格蘇林注曰格音閣又酷吏義縱傳曰楊可方受吿緡縱以為此亂民部吏捕其為可使者天子聞使杜式治以為廢格沮事漢書音義曰廢格詔書沮已成之事孟康曰武帝使楊可主吿緡沒入其財物縱捕為可使者此為廢格詔書沮已成之事也顏師古注曰格音閣又淮南王安傳曰安雍閼奮擊匈奴者雷被格明詔顏師古註曰格音閣史記平凖書曰張湯為廷尉而廢格沮誹窮治之獄用矣凡此格字音閣其義則廢塞而不用之意也吾丘壽王傳曰以義格五待詔蘇林注曰格五博之類不用箭但行梟散孟康注曰格音各行五相各故言格而廣韻格字注曰古伯切亦格五博屬也觀國案格五者鬬行棊也當音各於義為通廣韻各字韻中亦有格字註云木枝也故許慎說文曰㦸有枝兵也而釋名曰㦸格也旁有枝格也以此知凡言枝格者格當讀音各也史記楊璞傳曰置伯格長徐廣曰格古村落字街陌屯落皆設督長也而前漢楊璞傳曰置伯落長顏師古曰置伯及邑落之長以此知史記格字讀音落也禮記曰大學之法禁於未發之謂豫發然後禁則扞格而不勝鄭氏注曰格讀如凍􅏖之􅏖扞堅不可入之貌案字書􅏖胡革反則扞格讀音胡革反也字書格字從手古伯切擊也鬬也文選相如子虛賦曰乃使專諸之倫手格此獸五臣注曰格擊也左太冲呉都賦曰猩猩啼而就擒􅍛􅍛笑而被格五臣注曰格殺也史書言格殺格鬬者當用從手之挌而亦或用從木之格如漢書子虛賦用從木之格蓋古人於從木從手之字多通用之如欃槍攙搶之類是也書曰伊尹格于皇天而王莽傳曰臯陶伊尹咸有聖徳假于皇天蓋假亦音格義可通用貙劉後漢禮儀志曰立秋之日武官肄兵習戰陣之儀斬牲之禮名曰貙劉章懷太子注引古今注曰永平元年六月乙卯初令百官貙膢又引風俗通曰韓子書山居谷汲者膢臘而相遺以水又嘗新始殺禽曰貙膢又後漢祭祀志曰立秋之日以一特牲祭先虞于壇天子射牲以祭宗廟名曰貙劉觀國案古謂之貙膢至漢名曰貙劉蓋漢人呼膢為劉故婁敬傳曰婁者劉也賜姓劉氏然則貙劉貙膢其事一也爾雅曰貙似貍郭璞注曰今貙虎也大如狗文如貍字書曰貙敇俱切獸似貍劉者殺也以此考之則貙劉者殺禽獸以祭也託此以肄兵習戰耳必於立秋日者講武之時也字書曰膢者飲食祭也冀州八月楚俗二月獵取禽獸以祭楊子法言曰不膢臘也歟是也前漢武帝紀太初二年令天下膢五日祠門户比臘蓋漢人膢在八月而云比臘者其獵取禽獸以祭其禮比于臘耳若蜡臘則在十二月合聚萬物而索饗之與膢異矣至後漢乃定以立秋日貙劉其禮得也冒名冒名以冀利達從古有之前漢王莽傳曰立國將軍奏一男子遮臣建車自稱漢氏劉子輿成帝子也收繫即常安姓武字仲大逆不道請論奏可後漢王郎傳曰初王莽簒位常安中或自稱成帝子子輿者莽殺之郎緣是詐稱真子輿趙林等因此宣言當立劉子輿以觀衆心遂入邯鄲城立郎為天子光武自薊引兵拔邯鄲斬郎唐代宗睿真皇后沈氏吳興人開元末以良家子入東宫太子以賜廣平王實生徳宗天寳亂賊囚后東都而河南為史思明所沒遂失后所在代宗立以徳宗為太子訪后不得徳宗立詔遣使者分行天下物色咨訪故中官高力士女頗能言禁中事與女官李貞一嘗從后遊李見高疑問之含糊不堅而年狀差似后常削脯哺帝傳傷左指高亦常剖𤓰傷指於是迎還宫力士子知非是具言其情詔貸之唐穆宗正獻皇后蕭氏閩人初去家入長安不復知其家存亾惟記有弟后生文宗及文宗立封后為太后帝為訪其弟有男子蕭洪因后姊婿白見之后謂真弟拜金吾將軍出為河陽三城節度使徙鄜坊會閩有男子蕭本自稱太后弟乃召洪下獄按治流驩州賜死擢本贊善大夫會福建觀察使唐扶上書泉州男子蕭宏自言太后弟詔與本辨皆妄本流愛州宏流儋州然太后真弟庸輭莫能自達觀國竊謂中人之性未有不為利祿之所誘者然至於不顧後患而冒居之其愚亦甚矣當蕭太后求弟時其真弟決不存矣夫以太后之尊求弟如此其篤豈有庸輭莫能自達者史辭誤也徳宗終不能得沈太后蕭太后終不能得真弟所謂物之不齊物之情也知此可以無怨尤矣寓錢史記張湯傳曰會有人盜發孝文園瘞錢如淳注曰瘞埋錢於園陵以送𦵏唐書王璵傳曰漢以來𦵏喪皆有瘞錢後世里俗稍以紙寓錢為事至是璵乃用之觀國案王璵傳曰璵少為禮家學明皇在位久推崇老子道好神仙事廣修祠祭靡神不祈璵上言請築壇東郊祀青帝天子入其言擢太常博士侍御史為祠祭使璵専以祠解中帝意有所祈禱大抵類巫覡至是乃以里俗紙寓錢用之是國家凡有祠祭皆用紙寓錢也璵少為禮家學當推先王典禮之不紊於經者以吿於上而乃專託鬼神以諂人主肅宗立璵又以祠禳見寵俄拜平章事又為淮南節度使故史臣曰璵望輕無他才不為士議許可既驟得政中外悵駭又曰始璵託鬼神致位將相當時以左道進者紛紛出焉然則上有好者下必有甚可不慎哉璵既以紙寓錢用於祠祭世俗常情多信鬼神於是公私沿襲用之信彌篤矣五代史晉天福八年寒食望祭焚御衣紙錢史譏其不經也上之化下速於影響導之失宜久則難革人君一舉錯其可輕耶於於字讀音烏者如詩曰於乎前王不忘於乎小子之類皆歎辭也於亦與烏通用後世因改於乎為烏乎又改為嗚呼其實一也後漢蔡邕篆石經用於乎字本朝章友直篆石經用烏虖字義亦皆通書稱禹曰於帝念哉蘷曰於予擊石拊石僉曰於鯀哉孔氏傳曰都於歎美之辭也詩稱於皇武王又曰於皇時周又曰於皇來牟又曰於鑠王師又曰於赫湯孫又曰於穆清廟又曰於穆不已又曰於昭于天又曰於萬斯年凡此於字皆讀音烏毛氏訓曰歎辭也靈臺詩曰王在靈沼於牣魚躍毛氏訓曰言靈道行於沼也詩又曰於論鼓鐘於樂辟廱鄭氏箋曰於得其倫理乎鼓與鐘也於喜樂乎諸在辟廱中者凡此於字讀為央居切者也清廟詩曰無射於人斯毛氏傳曰不見厭於人也賚詩曰時周之命於繹思鄭氏箋曰於女諸臣發封者陳繹而思行之雝詩曰於薦廣牡鄭氏箋曰於進大牲之牡堯典曰黎民於變時雍毛氏傳曰萬民皆變化化上是以風俗大和凡此於字亦讀為央居切而釋音或音作烏世或讀音烏者皆誤也史記張儀傳曰儀說楚王請獻商於之地六百里又楚世家曰取故秦所分楚商於之地六百里裴駰注曰商於之地在今順陽郡南鄉丹水二縣有商城在於中故謂之商於然則商於之於亦音央居切廣韻曰於央居切地名商於也劉禹錫送陳郎中召直史舘詩曰若問舊人劉子政如今頭白在商於與除字同韻則用為央居切不誤也世俗多誤讀商於之於為烏不可不慎也蓺唐書閻立本傳曰太宗與侍臣泛舟春苑池見異鳥容與波上詔坐者賦詩而召閻立本傳狀閣外傳呼畫師閻立本是時立本已為主爵郎中俯伏池左研吮丹粉望坐者羞悵流汗歸戒其子曰吾少讀書不減儕軰今獨以畫見名與厮役等若曹慎毋習也立本後為右相而姜恪以戰功擢左相故時人有左相宣威沙漠右相馳譽丹青之嘲觀國案孔子曰志於道據於徳依於仁㳺於藝蓋蓺非不可為也特不可使蓺勝徳耳徳咸而上蓺成而下君子可使徳勝蓺不可使蓺勝徳蓺太精則掩徳古今之常理也師曠晉之賢人也而以知音勝養由基楚之賢人也而以善射勝王羲之獻之劉伶嵇康石崇皆晉之賢人也而二王以書勝劉伶以酒勝嵇康以琴勝石崇以富勝嚴君平管輅司馬季主皆漢三國之賢隱也而皆以卜勝虞世南禇遂良歐陽詢薛稷顏真卿栁公權皆唐之賢人也而皆以善書勝而閻立本以畫勝凡此諸賢皆以蓺勝徳者也後世稱其人者不稱其徳而唯蓺之稱蓋蓺太精斯掩徳矣閻立本雖知悔恥而名譽已著欲自避免且不可得君子擇術不可不慎如此晉戴逵字安道善鼓琴武陵王晞召逵對使者打破琴曰戴安道不能為王門伶人殷羨字洪喬作豫章太守臨去都下人因寄百許函書既至石頭悉擲水中曰沈者自沈浮者自浮殷洪喬不能作致書郵觀國以謂二子能辯之於早矣觚甬陸機文賦曰或操觚以率爾或含毫而邈然五臣注文選曰觚木也古人用之以為筆觀國案廣韻曰䉉方也亦作觚禮部韻畧曰䉉竹簡也玉篇曰䉉破䉉為圜也以此考之則操觚者操竹簡也觚方也角也破䉉為圜者改方以為圜也漢書郊祀志曰甘泉秦畤紫壇八觚宣通象八方顏師古注曰觚角也又漢書律厯志曰其筭法用竹徑一分長六寸二百七十一枚而成六觚為一握蘇林注曰六觚六角也是則八觚者八方角也六觚者六方角也但有方角則可謂之觚竹簡有方角者也故竹簡謂之觚然陸機文賦所謂操觚者非木也亦非筆也明矣若牘者乃木簡也觚又為酒器其容二升蓋亦酒器之有方角之形者也禮曰獻以爵而酬以觚語曰觚哉觚哉之類是也所謂觚稜者屋角瓦脊成方角稜瓣之形故謂之觚稜班固西都賦曰設壁門之鳳闕上觚稜而棲金爵蓋謂以銅鐵為鳳雀安於闕角瓦脊之上今時宫殿亦然班固傳注曰三輔故事建章宫闕上有銅鳳凰乃金雀也班氏賦取此爾五臣注文選曰觚稜闕角是也許慎說文曰觚稜殿堂上最高處也說文但言殿堂上最髙處而不顯言其為觚稜之義故後學多疑焉觚亦或用柧字禮記月令曰仲春之月同度量鈞衡石角斗甬正權概鄭氏注曰甬今斛也角者平之也觀國案諸字書皆曰甬音勇草華甬甬之貌無訓甬為斛者史記商君傳曰平斗桶權衡丈尺裴駰注引鄭元曰桶音勇今之斛也案諸字書桶他孔切木桶器也惟禮部韻畧于勇字韻收桶字注曰斛也蓋禮部韻畧因商君傳用桶字而收之耳周禮考工記鳬氏為鐘舞上謂之甬甬上謂之衡鄭氏注曰此二名皆鐘柄也史記秦始皇紀曰咸陽之旁二百里内宫觀二百七十複道甬道相連凡用甬字無為斛之義當以桶為斗桶字甬乃省文而已霓裳羽衣曲李肇國史補曰客有以案樂圖示王維維曰此霓裳第三疊第一聲也客引工按曲乃信今新唐書王維傳亦載此事蓋用國史補語也觀國竊謂圖畫奏樂者皆但能舉一聲豈知其為霓裳第三疊第一聲也沈存中亦嘗辨之蓋國史補雖唐人小説然其記事多不實修唐史者一槩取而分綴入諸列傳曽不核其是否故舛誤類如此也鄭愚津陽門詩注云葉法善引上入月宫聞仙樂及上歸但記其半遂於笛中寫之㑹西涼府都督楊欽述進婆羅門曲與其聲調相符遂以月中所聞為散序用欽述所進為其腔而名霓裳羽衣曲唐書禮樂志曰明皇時河西節度使楊欽忠獻霓裳羽衣曲十二遍凡曲終必遽唯霓裳羽衣曲將畢引聲益緩觀國案鄭愚詩注頗怪誕不可信當以唐志所記為是摭言曰唐末試進士以霓裳羽衣曲為詩題明年又以為賦題觀國案明皇以聲色而敗度後之文士咸指霓裳羽衣曲為亾國之音故唐人詩曰霓裳一曲千峯上舞破中原始下來亦如陳主之玉樹後庭花也固不可以為詩題賦題而訓多士夫唐之祖宗典故其美且善者多矣奚獨霓裳之取耶草歐陽公詩話曰平明諫草朝天去詩雖美而入諫固不可用草藁觀國案論語曰為命裨諶草創之草創謂制作也古之命令後世改為制詔鄭之為命之文有裨諶以制作之言得人也前漢郊祀志曰黄龍見成紀文帝召公孫臣拜為博士與諸生申明土徳草改厯服色事顏師古注曰草謂創造之也又王莽傳曰孫竦為大司徒陳崇草奏稱莽功徳顏師古注曰草謂創立其文也凡臣僚掌制誥文字謂之視草故杜子美送李校書詩曰汝翁草明光天子正前席蓋謂草制於明光殿也司馬遷報任少卿書曰成一家之言草創未就五臣註文選曰草創制作也然則凡言草者謂制作也非草藁也諫草者諫章也前漢郊祀志曰上令諸儒習射牛草封禪儀蓺文志曰漢興蕭何草律揚雄傳曰雄方草太𤣥有以自守泊如也揚子法言曰載使子草律曰吾不如洪恭草奏曰吾不如陳湯凡此言草皆謂創造制作之也亦非草藁也若進藁削藁焚藁之類乃為草藁䆃導史記司馬相如封禪書曰囿騶虞之珍羣徼麋鹿之怪獸䆃一莖六穂於庖犧雙觡共抵之獸徐廣注曰䆃瑞禾也前漢司馬相如傳封禪書曰導一莖六穂於庖注引鄭氏曰導擇也史記用䆃字漢書用導守古人於䆃導二字通用然在相如封禪書則當訓擇也非禾也詳觀封禪書四句每句首一字皆虛字非實字曰囿曰徼曰䆃曰犧乃一類也其義可見若以䆃為瑞禾則其句曰禾一莖六穂於庖於句法為無義矣前漢百官公卿表少府屬官有導官今顏師古注曰導官主擇米唐書百官志有䆃官令二人掌䆃擇米麥而供在漢書用導字在史記用䆃字而其官皆以擇米麥為職則䆃導皆訓擇又可知也周章屈平九歌曰龍駕兮帝服聊翺翔兮周章五臣注文選曰周章往來迅疾也左太沖吳都賦曰輕禽狡獸周章夷猶五臣注文選曰周章夷猶恐懼不知所之也王文考魯靈光殿賦曰俯仰顧盼東西周章五臣注文選曰顧盼周章驚視也觀國案五臣訓周章三說不同然皆非也周章者周旋舒緩之意蓋九歌有翺翔字吳都賦有夷猶字靈光殿賦有顧盼字皆與周章文相屬而翺翔夷猶顧盼亦皆優游不廹之貌則周章為舒緩之意可知矣前漢武帝紀元狩二年南越獻馴象應劭注曰馴者教能拜起周章從人意也所謂拜起周章者其舉止進退皆喻人意而不怖亂者也而五臣注文選反以為迅疾恐懼驚視則誤矣節令三月上巳祓禊本無定日三月始遇巳之日即為之故謂之上巳後漢禮儀志曰三月上巳官民皆絜於東流水上洗濯祓除去宿垢疢觀國案魏晉以來始不用巳日而專用三月三日至今循之以為故事若專用三日則不可謂之上巳矣蓋名存而實亡也春秋左氏傳曰晉文公以緜上為介之推田後漢郡國志太原郡界休縣有界山有緜上聚章懷太子注曰推焚死之山故太原俗有寒食劉向新序曰晉文公反國介之推無爵去而之介山文公求之不得乃焚其山推不出而焚死後漢周舉傳曰太原一郡舊俗以介之推焚骸有龍忌之禁至其亡月咸言神靈不樂舉火由是士民每冬中輒一月寒食莫敢煙爨老小不堪嵗多死者舉為并州刺史作弔書於是衆惑稍解觀國案寒食者以其不舉火但食已熟寒冷之食故寒食亦謂之熟食日亦謂之禁煙節太原寒食在冬中則之推必以冬中亡也而今世則以清明前三日為寒食何耶假令之推亡在春時猶當有定日而清明則無定日不應常以清明前三日為寒食蓋沿襲之誤也屈平投汨水而死楚人以色絲繫角黍而祭之書史不言平死之日而至今楚俗五月五日以色絲為索繫手足而食角黍又競渡乃招魂之遺意而後世惟以禳烖疾鬬遲速為戲皆失其實也之推之焚屈平之溺一體也今寒食以為大節而比於正旦冬至而以端午為小節何耶五姓五姓分宫商角徵羽隂陽家專以此言禍福觀國案姓氏古今無定系有因功而改賜姓者有遷居而改姓者有避諱而改姓者有避仇而改姓者有為人之養子而改姓者前日嘗為宫姓矣一旦改姓又轉而為商姓前日嘗為角姓矣一旦改姓又轉而為羽姓則是天道亦隨姓而遂改也又兩字姓如公孫司馬諸葛歐陽拓拔慕容宇文吐突之類半出於四裔部落之號又有三字姓如侯莫陳庫傉官之類於五音何所從也然則專以五姓言禍福其不可信也明矣禮天子七月而葬諸侯五月而葬大夫士庶人三月而葬此古之成典不可易也春秋僖公三十三年十二月乙巳公薨明年正月文公即位四月丁巳葬僖公左氏傳曰葬僖公緩也杜預注曰僖公實以三十三年十一月薨并閏七月乃葬然則僖公諸侯也七月而葬則是諸侯用天子七月之禮而葬故曰緩者譏之也古人於禮制不敢踰如此後世始撰為葬書乃曰某年未利葬也某年亦未利葬也至某年始利葬也問其故則曰音徵有利有不利也然則聖人典禮遂廢矣世又有廣濟百忌歴所載一舉措無不惟五姓音徵是從蓋此書乃日者裒聚諸家隂陽之說務欲部秩厚大而鬻書籍之家賴之以得利多其書假吕才之名而猥冗泛雜不足取信世俗多為此書所誤庳文選嵇叔夜琴賦曰閒遼故音庳五臣注曰閒音閑庳下也言聲緩閑而相去逺故音下也東坡曰庳㪇聲也㪇音癬五臣不曉妄注觀國案琴之有㪇聲者以琴面不平或焦尾與嶽髙低不相應則阻絃而其聲㪇此琴之病聲也嵇叔夜賦曰論其體勢詳其風聲器和故響逸張急故聲清閒遼故音庳弦長故徽鳴此四句曰逸曰清曰庳曰鳴皆美聲也蓋琴操弄中自有庳下聲非病聲也非病聲則非㪇聲矣閒音去聲謂徽閒也閒遼者徽之逺處若十三徽外近焦尾處聲以手取之自然庳下五臣音閒為閑又誤矣朕尚書伊訓曰朕哉自亳此伊尹自稱朕也洛誥曰朕復子明辟此周公自稱朕也離騷曰帝髙陽之苖裔兮朕皇考曰伯庸此屈原自稱朕也招魂曰朕幼清以廉潔兮身服義而未沬此宋玉自稱朕也秦始皇初并天下以命為制令為詔自稱曰朕自是唯人君稱朕臣下不敢稱也漢晉以來臣下相呼皆曰卿今唯君呼臣為卿而臣下不敢自相呼為卿何也漢晉以來卑者呼尊者為足下平交相呼亦以足下今自髙而侮人則曰足下而稱尊者為坐下几下席下閣下又何耶不宣不具不備不次其義一也今平交用不宣而尊者與卑者用不具卑幼與父母尊長則稱不備而居䘮則用不次其輕重又何别耶古者卑稟於尊則稱白今不敢用也頓首稽首叩首其為恭敬之禮則同也今居父䘮者用叩首母䘮者用叩頭又何謂耶凡此皆出於近世吉凶書儀世俗不考其是否而咸遵用之且謹守之而不敢踰問其義則不能别也此亦循俗之太過也杜子美舊唐史杜甫傳曰甫永泰二年卒觀國考子美詩有大厯二年九月三十日詩大厯十月一日詩大厯三年春白帝城放船出瞿唐詩大厯五年正月追酬髙適人日詩甫誌與傳皆云年五十九卒案甫生於睿宗先天元年癸丑嵗卒於大厯五年辛亥嵗為年五十九則史云永泰二年卒者誤也元祐中胡資政知成都作草堂先生詩碑序曰蜀亂先生下荆渚泝沅湘上衡山卒於耒陽王内翰注子美詩序曰大厯三年甫下峽入湖南逰衡山寓居耒陽五年夏一夕醉飽卒元祐中吕丞相作子美詩年譜曰大厯五年夏甫還襄漢卒於岳陽觀國嘗考究杜陵遺迹及襄漢岳陽皆無子美墓唯耒陽縣有子美墓前賢多留題則子美當卒於耒陽也近世有小說麗情集者首序子美因食牛肉白酒而卒此無據妄說不足信今注子美詩者亦假王原叔内翰之名謂甫一夕醉飽卒者毋乃用小說麗情之語耶盧前漢食貨志曰官作酒以二千五百石為一均率開一盧以賣如淳注曰酒家開肆待客設酒鑪故以鑪名肆顏師古注曰盧者賣酒之區也以其邊髙形似鍜家盧故取名耳又司馬相如傳曰盡賣車騎買酒舎乃令文君當盧顏師古注曰賣酒之處壘土為盧以居酒甕四邊隆起其一面形髙如鍜盧故名盧耳而俗之學者皆謂當盧為對温酒火盧失其義矣觀國案字書鑪從金為鍜鑪爐從火為火爐􅫈從瓦為酒􅫈食貨志相如傳所言盧皆酒􅫈也班固用省文故用盧字趙廣漢傳曰推破盧嬰之類是也史記司馬相如傳曰令文君當鑪韋昭注曰酒肆也以土為墮其髙似鑪然則史記用鑪字可通用也漢書揚雄甘泉賦曰玉女欣視其青盧注曰盧目童子也而文選甘泉賦作清矑案字書矑目童子也班固亦省文用盧字耳古之人臣有征伐之功者君賜之以彤弓矢玈弓矢玈音盧黑色也而王莽傳九錫有盧弓矢盧亦黑色也故通用之揚雄法言曰彤弓黸矢不為有矣黸者黑之甚也於義無傷焉孟子有屋廬子列子有長廬子皆讀廬作盧蓋皆漢複姓也盧者字母也加金則為鑪加火則為爐加瓦則為􅫈加目則為矑加黑則為黸凡省文者省其所加之偏旁但用字母則衆義該矣亦如田者字母也或為畋獵之畋或為佃田之佃若用省文唯以田字該之他皆類此莽前漢武帝紀後元元年六月侍中僕射莽何羅與弟重合侯通謀反孟康注曰征和三年言重合侯馬通今此言莽明徳馬皇后惡其先人有反易姓莽顏師古注曰莽莫戸反觀國案後漢馬援傳曰曽祖父通以功封重合侯坐兄何羅反被誅章懷太子注曰何羅與江充相善充既誅遂懼罪及已謀反伏誅又明徳馬皇后紀曰伏波將軍援之小女也然則馬通於明德皇后為四世祖矣馬后讀書知古今明帝崩肅宗即位尊后曰皇太后在位二十三年肅宗咨政事馬后惡其祖叛誅之迹而羣臣希㫖皆為諱之班固作史正在章肅之際故改其姓曰莽也雖然武帝紀征和三年正月匈奴入五原三月遣重合侯馬通四萬騎出酒泉昭帝始元二年正月大將軍光右將軍桀皆以前捕斬反虜重合侯馬通功封光為博陸侯桀為安陽侯且班固既為馬氏改姓莽矣而征和始元皆書馬通者班固於馬氏謀反則改之其他即不改也屈原懷沙賦曰陶陶孟夏兮草木莽莽傷懷永哀兮汨徂南土莽與土字同韻則莽亦讀為莫户切也又離騷曰汩余若將不及兮恐年嵗之不吾與朝搴阰之木蘭兮夕擥洲之宿莽日月忽其不淹兮春與秋其代序此莽字與字序字三字同韻則莽亦讀為莫戸切也鮭鮭字一與圭同音魚名也一與暌同音漢複姓也漢有博士鮭陽鴻是也一與鞋同音魚菜之總名也類篇曰吳人謂魚菜之總稱曰鮭故南史庾杲之傳曰杲之清貧自業食唯有韭葅卄瀹韭生韭任昉嘗戲之曰誰謂庾郎貧食鮭常有二十七種昉以三韭寓意於二十七之數託此以戲杲之也先達李建中詩曰頻年水國飫鮭羞所謂鮭羞不特菜茹也鰕魚之屬皆在其中吳地近江海菜茹海錯之物名品最多故以鮭該之也南朝蔡撙為吳興太守不飲郡井齋前自種白莧紫茄以為常餌周顒於鍾山立隱舎休沐則歸之衛將軍王儉曰山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒曰菜食何味最勝顒曰春初早韭秋末晚菘古之賢者清貧多食菜茹而何曽日食萬錢猶云無下箸處吹餅上不拆作十字則不食朱异子鵞包鰌不輟於口而庾亮噉薤留白陶侃問之對曰固將以種也舉此例言之則賢否判矣好癖凡人有所好癖者鮮有不為物所役杜預有左傳癖和嶠有錢癖王武子有馬癖梁簡文有詩癖李憕有地癖王福畤有譽兒癖陸羽有茶癖曽晳嗜羊棗公儀休嗜魚屈到嗜芰周太子嗜鮑魚魏明帝好槌鑿聲宋明帝好食蜜漬鱁鮧衛懿公好鶴葉公好龍鄭子咸好聚鷸冠襧衡好參檛謝靈運好山水王羲之好鵞劉伶好酒嵇康好鍜阮孚好屐孫楚好驢鳴桓伊好吹笛王元象好發冢蕭思話好打細腰鼓沈慶之好著狐皮帽陳伯之好戴獺皮冠劉之遴好古器庾仲文何佟之皆好潔朱异好飲食蕭宏好食鱧魚頭王僧孺好聚書陶洪景好松風何思澄好造謁顧凱之好丹青王筠唐文宗皆好抄書陸龜蒙好茶蘇威好古物觀國案諸家所嗜好雖皆不免役於物而校其優劣則好聚書者為勝也晉張華徙居載書三十乗范平有書七千卷齊劉善明有書八千卷王僧孺有書萬餘卷率多異本梁沈約有書二萬卷都下無比任昉有書萬餘卷率多異本宗室蕭勵聚書三萬卷隋許善心有舊書萬餘卷唐韓王元嘉有書萬卷蔣乂有書萬五千卷蘇弁有書二萬卷當時稱與秘府埓田洪正有書萬餘卷李磎有書萬卷號李書樓夫聚書多則子孫必多博學者蓋其所習者然也矢人惟恐不傷人函人惟恐傷人巫匠亦然擇術不可不愼也如此飲食禍福春秋宣公二年二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績左氏傳曰將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟以其私憾敗國殄民又宣公四年左氏傳曰春楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以吿及食大夫黿召子公而勿與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先夏弑靈公前漢灌夫傳曰丞相田蚡取夫人詔列侯宗室皆往賀夫行酒至蚡蚡膝席曰不能滿觴夫怒畢之蚡不肯行酒至灌賢賢方與程不識耳語又不避席夫罵賢曰平生毀程不識不直一錢今日長者為壽乃效女曹兒呫囁耳語蚡曰程李俱東西衛尉今衆辱程將軍獨不為李將軍地乎夫曰今日斬頭穴匈何知程李蚡怒縛夫以他事誣罪之棄市觀國案此三事皆因飲食細故而遂至於結禍甚大誠可畏哉子公之食指動必嘗異味及靈公食大夫黿召子公而勿與者欲使指動之不騐蓋以此戲子公也而戲乃生患如此易傳曰飲食必有訟故受之以訟而訟卦象曰君子以作事謀始君子圖患於未萌若至於怨禍已形則無及矣晉顧榮傳曰榮與同僚飲酒見行炙者有異於常乃割已炙噉之同坐悉笑榮曰豈有終日執之而不知其味後趙王倫簒逆榮在其難有一人救之問其故曰我是省中受炙臣也南史隂鏗傳曰鏗嘗與賔友宴飲見行觴者因回酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗為賊禽或救之獲免問之乃前所行觴者觀國觀古人有一飯之徳必報者皆賢者於施報不敢忘也今行炙執爵者皆皂𨽻賤夫非素懷廉恥者偶然有合於君子施報之義亦可恠也流離旄丘詩曰瑣兮尾兮流離之子毛氏傳曰瑣尾少好之貌流離鳥也少好長醜始而愉樂終以微弱鄭氏箋曰衛之諸臣初有小善終無成功似流離也觀國案爾雅曰鳥少美長醜為鶹鷅郭璞注曰鶹鷅猶畱離詩所謂畱離之子故廣韻曰鶹鷅鳥少美長醜鶹亦作流又曰鶹鷅流離鳥也以此觀之則本用鶹鷅字詩人借為流離郭璞引詩畱離之子者别本詩用畱字亦鶹之省文其義一也旄丘黎之臣子責衛伯之詩也狄人迫逐黎侯黎侯寓於衛衛不能修方伯連率之職黎之臣子賦此詩以責於衛也瑣兮尾兮流離之子者言衛之諸臣雖有小善而不能迎我君而復之終無所成功亦猶流離之鳥少雖美而可觀長則醜而不足觀也流離又為寳玉名前漢西域傳罽賔國出珠璣珊瑚虎魄璧流離顏師古注曰流離光潤踰於衆玉揚子雲羽獵賦曰堆夜光之流離五臣注文選曰流離玉也左太沖吳都賦曰流離與珂瑊五臣注文選曰流離寳也凡此言流離本用琉璃亦借用流離耳若以流離本字之義言之則流徙離散而不能安居者也前漢食貨志曰百姓流離予甚悼之又禮樂志郊祀歌曰闢流離抑不祥此類是矣流連孟子曰方命虐民飲食若流流連荒亡為諸侯憂從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡先王無流連之樂荒亡之行惟君所行也前漢班固叙傳曰漢成帝張畫屏風畫紂醉踞妲己作長夜之樂上指圖問侍中班伯曰此圖何戒伯對曰沈湎於酒微子所以吿去也式號式謼大雅所以流連也觀國案孟子漢書言流連其義各不同孟子所言乃齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放於琅邪吾何脩而可以比於先王觀也晏子乃以流連荒亾之語對之蓋齊景公志在於慢遊不恤國事故晏子以驕君之行吿之流連荒亾者驕君之行也以此戒景公冀景公之悟而毋為海上之遊也趙岐注孟子曰或浮水而下樂而忘反謂之流或使人徒引舟船上行而忘反以為樂謂之連此流連乃慢遊之名也若班伯所謂大雅流連者乃詩人嗟嘆泣涕流連也蕩詩曰式號式呼俾晝作夜此言醉則號呼用晝作夜沈湎於酒故作詩者為之嗟嘆泣涕流連而傷之也顏師古曰流連言作詩者泣涕流連不為飲酒之人以此觀之則孟子漢書言流連義各不同可知矣前漢師丹傳曰哀帝策免丹曰百姓流連無所歸心此亦與班伯所謂流連同意齊居東海之濵晏子以海上之遊戒景公故以流連吿之切時事也孥帑夏書甘誓曰弗用命戮於社予則孥戮汝孔安國訓曰孥子也非但止汝身辱及汝子商書湯誓曰爾不從誓言予則孥戮汝孔安國訓曰古之用刑父子兄弟罪不相及今云孥戮汝權脅之使勿犯常棣詩曰宜爾室家樂爾妻孥毛氏訓曰孥子也禮記中庸篇引詩曰宜爾室家樂爾妻帑鄭氏注曰古者謂子孫曰帑觀國案許愼說文玉篇廣韻皆曰孥乃都切妻子也帑乃都切又他㒺切金帛所藏舎也蓋孥字下從子故為子孫之稱帑字下從巾故為金帛之藏兩字其義不同然詩人多借音用字故常棣詩用妻帑字後之文士因詩用妻帑字故亦用之耳春秋文公六年左氏傳曰賈季奔狄宣子使臾駢送其帑又襄公二十五年左氏傳曰退謂其宰爾以帑免杜預皆曰帑妻子也史記秦始皇紀曰鄉使二世除去收孥汙穢之罪前漢文帝紀曰盡除收帑相坐律令鼂錯傳曰肉刑不用辠人亡帑國語曰鄭桓公寄帑與賄於􅉑會之間如此類用帑字為妻子蓋因詩人借音用帑字而後世亦用之也若夫孟子曰罪人不孥趙岐注曰孥妻子也止其身不及妻子也前漢武帝紀詔赦吳楚七國孥輸在官者應劭注曰七國反時妻子沒入為官奴婢武帝赦遣之如此類用孥自依本字義非借音也孥帑二字覈其義各有歸不通用後世不當專循借音之字而易其本體也學林卷五
