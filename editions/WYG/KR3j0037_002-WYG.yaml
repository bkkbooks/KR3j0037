body:
  text: 學林卷二宋王觀國撰春秋古經前漢藝文志曰春秋古經十二篇經十一卷左氏傳三十卷盖古本春秋經自為一帙至左氏作傳三十卷自為一帙杜預作春秋經傳集解乃分經之年而居傳之首於是不復有古經春秋矣杜預春秋經傳集解序曰分經之年與傳之年相附比其義類各隨而解之名曰經傳集解是也公羊經止獲麟而左氏經止孔丘卒盖小邾射不在三叛人之數則自小邾射以下皆魯史記之文孔子弟子欲記孔子卒之年故録以續孔子所脩之經也顔氏家訓曰春秋絶筆於獲麟而經稱孔丘卒顔氏以此為疑盖非所疑也孔子曰君子於其所不知盖闕如也故春秋書正月甲戌己丑陳侯鮑卒左氏傳曰再赴也盖雖孔子不知陳侯卒在何日因其再赴故書曰甲戌己丑二日從魯史之文也又桓公十四年夏五鄭伯使其弟語來盟左氏傳曰夏鄭子人來尋盟盖夏五無月日者闕文也左氏亦止言夏而不言月日則是左氏作傳時經已闕月日矣莊公二十四年冬書郭公而左氏無傳盖亦經之闕文也僖公元年十有二月丁巳夫人氏之喪至自齊左氏傳曰夫人氏之䘮至自齊君子以齊人之殺哀姜也為已甚矣左氏亦言夫人氏而不言姜是左氏作傳時經已闕姜字矣孔子作春秋不應書夏五郭公夫人氏而已盖孔子卒而後闕其文也左丘明與孔子同時又為魯太史魯史記盡在太史則左氏於傳豈不能補正之而於傳亦闕而弗補者以此知作經已乆經之文已闕而不可知然後傳始作也前漢藝文志曰仲尼以魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定厯數藉朝聘以定禮樂有所褒諱貶損不可書見口授弟子弟子退而異言丘明恐弟子各安其意故論本事而作傳審如此則丘明親受孔子之㫖也然以闕文校之則漢志之言復窒而不通盖班固之言未可深信爾汲冢書杜預春秋集解後序曰汲郡汲縣有發其界内舊冢者大得古書皆簡編科斗文字發冢者不以為意徃徃散亂科斗書久廢推尋不能盡通始者藏秘府余晩得見之周易及紀年最為分了周易上下篇與今正同别有隂陽說而無彖文言繫辭紀年稱商仲壬即位居亳其卿士伊尹仲壬崩伊尹放太甲于桐乃自立也伊尹即位於太甲七年濳出自相殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之此為大與尚書叙說太甲事乖異觀國按前漢藝文志曰虙犧作八卦文王重易六爻作上下篇孔子為之彖象繫辭文言序卦之屬十篇盖文王作上下篇自為一編不與彖象文言等相雜至費直學易名家始以彖象雜八卦中汲冢易有上下篇而别有隂陽說無彖象文言之屬者當是學易之家自立隂陽之說而上下篇自為一編不與彖象相雜之易也孔子定書自堯至秦凡百篇而為之序太甲序曰太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇盖孔子親為之序而太甲書曰王徂桐宫居憂克終允徳惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳此其可以取信于後世也若謂伊尹自立則是簒也太甲殺伊尹則是誅簒臣也伊陟相太戊則是以簒臣之子為相也其誣天下甚矣汲冢之語意其戰國以來好異說者為之辭伯春秋成公二年左氏傳曰五伯之霸也勤而撫之杜預注曰夏伯昆吾商伯大彭豕韋周伯齊桓晉文史記鄒陽傳上呉王書曰秦用戎人由余而霸中國又曰誠能用齊秦之義後宋魯之聽則五霸不足稱三王易為比也文選載此書五臣注曰五伯齊桓秦穆晉文宋襄楚莊王前漢諸侯王表曰盛則周召相其治致刑措衰則五伯扶其弱與共守顔師古注曰伯讀曰霸此五伯謂齊桓宋襄晉文秦穆呉王夫差也又異姓諸侯王表曰秦既稱帝十餘年間猛敵横發乎不虞適戍疆於五伯顔師古注曰五伯謂昆吾大彭豕韋齊桓晉文也曹子建與楊徳祖書曰田巴毁五帝罪三王訾五霸五臣注文選曰五霸秦穆楚莊齊桓晉文宋襄也觀國按霸伯二字古人通用然左傳曰五伯之霸也勤而撫之杜預注曰夏伯昆吾商伯大彭豕韋周伯齊桓晉文則此伯字當音百故曰五伯之霸也一句之中用伯霸二字則伯音百可知矣其他散言五霸則或用霸字或用伯字可通用也然鄒陽書曰秦用由余而霸又曰五伯不足稱一篇文字用霸伯二字也史記李斯傳曰秦穆公之霸終不東并六國者諸侯尚衆周徳未衰故五伯迭興更尊周室一篇文中用霸伯二字也春秋閔公元年左氏傳曰霸王之器也僖公二十二年傳曰是以知其不遂霸也襄公元年傳曰以是求伯必不行矣此左氏用霸字又用伯字也前漢元帝紀曰漢家自有制度本以霸王道雜之又十二諸侯年表曰周厲王奔於彘亂自京師始而政由五伯又郊祀志曰合十七年而伯王出焉此班固用霸字又用伯字也觀國竊謂一篇文中當用一色字用霸則不須用伯用伯則不須用霸今一篇文中既用霸又用伯二字音義皆同别無兩意何苦為此多岐也顔師古漢書於諸侯王表五伯注曰齊桓晉文宋襄秦穆呉王夫差於異姓諸侯王表五伯注曰昆吾大彭豕韋齊桓晉文師古自立二説何耶觀國案師古於二表所釋者皆周秦間事不當用昆吾大彭之說也五臣注文選於鄒陽書曹子建書有楚莊而無呉王夫差顔師古於諸侯王表有呉王夫差而無楚莊又何耶觀國案齊晉秦楚為大國夫差雖亦霸而最在後豈有捨楚而稱呉者師古所引呉王夫差則誤矣慶字書慶字於平聲音羌又音卿於去聲音丘映切訓曰福也賀也觀國考詩書易所用慶字皆當音羌楚茨詩曰祝祭于祊先祖是皇孝孫有慶萬夀無疆爾殽既將莫怨具慶甫田詩曰與我犧羊以社以方我田既臧農夫之慶又曰乃求千斯倉乃求萬斯箱黍稷稻梁農夫之慶裳裳者華詩曰芸其黄矣維其有章矣是以有慶矣閟宫詩曰白牡騂剛犧尊將將毛炰胾􅅅籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾夀而臧保彼東方魯邦是常書曰聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟徳罔小萬邦惟慶易曰先迷失道後順得常西南得朋乃與類行東北䘮朋乃終有慶安正之吉應地無疆又曰積善之家必有餘慶積不善之家必有餘殃又曰損上益下民説無疆自上下下其道大光利有攸徃中正有慶凡此所用慶字皆與疆字常字同韻則慶音羌可知矣揚雄甘泉賦曰直嶢嶢以造天兮厥髙慶而不可乎彌度顔師古注曰慶讀音羌班固幽通賦曰恐蝄蜽之責景兮慶未得其云已顔師古注曰慶讀音羌以此知漢人盖嘗用慶字作羌音不妄也史記天官書曰若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲前漢天文志曰若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂慶雲古人以卿慶二字通用班孟堅白雉詩曰發皓羽兮奮翹英容潔明兮於淳精彰皇徳兮作周成永延長兮膺天慶此慶字亦音卿也投壺禮曰一馬從二馬以慶三馬既備請慶多馬此慶字音丘映切也詩書易史記慶字音羌音卿者其義則福也投壺請慶多馬音丘映切者其義則賀也一字三音訓義不同而世一切讀音丘映切者良因陸徳明不能稽考經書用字之義而於釋文闕而不載故後學莫之悟焉沈存中筆談言詩易慶字多與章字同韻自謂古人諧聲有不可解者盖存中亦未嘗稽考爾非不可解也文中子叙篇阮逸注文中子又作叙篇曰文中子之教繼素王之道故以王道篇為首聖王俯仰二儀必合其徳故次之以天地篇天尊地卑故次之以事君篇事君莫如周公故次之以周公篇周公之道神乎易中故次之以問易篇易之教化莫大乎禮樂故次之以禮樂篇禮樂著明則史故次之以述史篇興文立制燮理為大故次之以魏相篇既燮理則至於命故次之以立命篇通性命者關氏之易故次之以關明篇終焉觀國案王通死門人薛收姚義綴通之説名之曰中說杜淹為御史大夫索其書於通弟王凝凝退而求之得中説百餘紙雜記不著篇目貞觀十九年凝以中說授通之子福畤福畤始編為十篇勒成十卷其事備見於福畤所撰王氏家書雜録其篇目但以篇首二字為之如文中子曰甚矣王道難行也即以王道為目房𤣥齡問事君即以事君為目劉炫問易即以問易為目十篇皆此類非通所自定亦如論語篇目乃門弟子所纂集止取篇首二字為目如學而時習之即以學而為目為政以徳即以為政為目非有他意義也阮氏不察乃以文中子十篇作叙篇曲折傅㑹而為之説則誤矣今世傳杜子美詩集第三十卷首二十餘篇皆以兩字為題如宿昔能畫鬭雞鸚鵡之類皆非本題詳其詩意皆追憶開元之盛歎天寳之亂子美初必各自有題後之編類者失其本題但取篇首二字為題爾恐誤後生學詩者天地晉書天文志曰日去地常八萬里又曰地上去天之數得八萬一千三百餘里又晉書地理志曰八極之廣東西二億三萬餘里南北二億三萬餘里自地至天半八極之數段成式酉陽雜俎曰自地至天十一萬餘里觀國案周禮以土圭之灋測土深正日景日至之景尺有五寸謂之地中鄭氏注曰凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里地與星辰四遊升降於三萬里之中是以半之得地之中也以夏日至立八尺之表其景適與土圭等謂之地中今潁川陽城地為然此乃古之聖人推測天地髙深之灋其法不可易也是則自地至天萬五千里爾而晉史與雜俎其言至於八萬里十一萬里又無推測之灋荒唐無根可怪也已肆爾雅曰治肆古故也肆故今也郭璞注曰肆既為故又為今觀國案爾雅釋詁一篇皆用一字為訓曰治曰肆曰古此三字皆訓故也曰肆曰故此二字皆訓今也若從郭璞注則是以故今二字而訓肆字也此篇未有以二字為訓者爾雅曰勰燮和也苞蕪茂豐也尼定曷遏止也顯昭覲釗覿見也盖勰燮二字訓和也苞蕪茂三字訓豐也尼定曷遏四字訓止也顯昭覲釗覿五字訓見也他皆類此爾雅釋詁釋言二篇皆用一字為訓郭璞誤析其句反以故今二字而訓肆字義雖亦通而非爾雅句法也詩曰肆成人有徳王荆公詩義謂肆為故今乃循郭璞之語爾又爾雅釋言曰肆力也郭璞注曰極力也玉篇曰肆次也陳也緩也放也列也遂也恣也踞也量也廣韻曰肆陳也恣也極也放也經書所言肆各有一義唯大明詩曰肆伐大商毛氏傳曰肆取也皇矣詩曰是伐是肆毛氏傳曰肆疾也肆無此二義於詩意亦不盡合盖毛氏臆説也周禮宗伯以肆獻祼事先王鄭氏注曰肆者進所解牲體也陸徳明音義曰肆他歴切觀國案肆者解牲體而陳之故陳牲之官又有肆師則肆如本字音四其義則明矣而陸徳明遽變其音為他歴切取剔解牲體之義故凡經書言肆牲及詩或肆或將並以肆音他歴切豈不蔓疑於後學耶周行鹿鳴詩曰吹笙鼓簧承筐是將人之好我示我周行鄭氏謂周之行列也人有以徳善我者我則置之於周之列位維賢是用也禮記緇衣篇曰詩云人之好我示我周行鄭氏注曰行道也言示我以忠信之道觀國案鄭氏之訓周行也在詩則訓為周之行列在禮則訓為忠信之道盖周之行列者周家之周也忠信為周者比周之周也二義實不同盖鄭氏自矛盾也今以鹿鳴詩辭考之將字與行字同音韻則周行之行音航也若以周行為忠信之道則行音幸矣案卷耳詩曰采采卷耳不盈頃筐嗟我懐人寘彼周行則筐字行字為韻言思君子賢人置周之列位也大東詩曰糾糾葛屨可以履霜佻佻公子行彼周行則霜字行字為韻言財貨盡使行周之列位者而發幣焉二詩言周行與鹿鳴之周行同皆音航也春秋襄公十五年左氏傳曰君子謂楚於是乎能官人官人國之急也能官人則民無覦心詩云嗟我懐人寘彼周行能官人也王及公侯伯子男甸采衞大夫各居其列所謂周行也然則詩凡言周行音航可知矣周者周家之周也若君子周而不比乃忠信為周之周鄭氏訓禮記誤矣鯀􅕐音衮亦作􅦡其字皆从骨諸字書皆曰禹父名也鯀音衮亦作鮌其字皆从魚諸字書皆曰魚也古人多借用字故尚書禹父名用鯀字其實當用􅕐字也古文乃科斗文字至孔安國時無識古文者乃以𨽻古定之唐孝明不喜𨽻古更以今文行於世司馬遷史記本紀已用鯀字後之變𨽻亦因用之故經書唯尚書多用俗字如古文景字尚書變為影古文敕字尚書變為勅變爾女之女為汝變多蓺為藝秦始皇改辠為罪尚書乃用罪字漢文帝改對為對尚書乃用對字以至變說為悦變􅀢為費變懖懖為聒聒變於乎為嗚呼凡此皆用俗字而代古文也國語曰鮌殛於羽山化為黄熊以入於羽淵王子年拾遺曰鯀治水無功舜殛鯀於羽山化為𤣥魚入於羽淵鯀字或從𤣥魚也二說怪誕不經君子當略而弗論中興烝民詩曰任賢使能周室中興焉陸徳明音義曰中丁仲反杜預春秋左氏傳序曰若平王能祈天永命紹開中興陸徳明音義曰中丁仲反觀國案中字有鍾衆二音其義異也音鍾者當二者之中首尾均也音衆者首尾不必均但在二者之間爾中興者在一世之間因王道衰而有能復興者斯謂之中興首尾先後不必均也商之世嘗衰矣髙宗能復興商道故髙宗謂之中興周之世嘗衰矣宣王能復興周道故宣王謂之中興漢之世嘗衰矣光武能復興漢室故光武謂之中興晉之世嘗衰矣元帝能再造晉室故元帝謂之中興唐之世嘗衰矣肅宗能復興唐室故肅宗謂之中興凡此皆在一世之間因衰而復興故皆謂之中興其時之首尾先後不必均也此中興之中所以音衆若中年中葉中天中塗中詘之類皆當音鍾盖義當音鍾也杜子美喜達行在所詩曰今朝漢社稷新數中興年又送鄭䖍貶台州詩曰萬里傷心嚴譴日百年垂死中興時二詩皆律詩並用中字作去聲前賢用字皆有所本不妄舉也粊周禮雍氏春令為阱擭秋令塞阱杜擭鄭氏注曰書粊誓􅖏乃擭敜乃阱盖粊者古文費字也科斗古文尚書用粊字孔安國以𨽻古定之故變為費字以至論語為費宰以費畔春秋帥師圍費季氏城費之類皆變古文為𨽻字也粊亦作鄪亦作費許慎說文曰䉾音祕魯東郊地名也廣韻曰鄪亦作費邑名在魯又列粊字曰魯東郊地名也盖粊者古文也鄪費皆𨽻文也廣韻當先列粊字而以鄪費二字續之為是而乃先列鄪費二字訓曰邑名在魯後又别列粊字訓曰魯東郊地名殊不知邑名在魯者乃東郊地名也一事而分兩訓盖不悟其粊為古文也當鄭氏注周禮時尚知用古文自漢以徃古文㡬絶矣今禮部韻略收鄪費二字而不收粊字可以見也又如􅀢字乃俗書劀字玉篇既出劀字又别出􅀢字㳅字乃古文流字玉篇既出㳅字又别出流字皆字書之訛也史記魯世家曰淮夷徐戎亦並興反伯禽率師伐之於肸作肸誓裴駰注曰尚書作粊誓然則司馬氏假借用肸字肸非古文粊字也許慎說文作䉾為北下米與比下米一也鳥獸言周禮秋官夷𨽻掌與鳥言貉𨽻掌與獸言鄭司農注曰夷狄之人或曉鳥獸之言觀國案二𨽻所謂與鳥獸言者乃人言也非鳥獸言也盖人與鳥獸言而鳥獸喻人之言也若謂鳥獸言而人有曉之者誤矣前漢武帝紀元狩二年南越獻馴象能言鳥應劭注曰馴象者教能拜起周章從人意也顔師古注曰能言鳥即鸚鵡也盖馴象喻人言故能拜起從人意儛馬與此同也能言鳥者人教之言非人教之則不能言今世多有之凡此皆人言而鳥獸喻人之言非鳥獸自能言而人曉之也春秋僖公二十九年左氏傳曰介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信且聞牛鳴而知其生三犧猶今人有聞人聲鵶鳴而能知其吉凶禍福者盖自是一術數介葛盧聞牛鳴能以其術數求之當知生三犧非牛能言之也介葛盧神其事而文其辭耳譬猶東方朔射覆之義也若謂牛音云生三犧皆用之則厚誣天下矣列子曰東方介氏之國其國人數數解六畜之語此盖因左氏傳有介葛盧之語而為之說亦寓言方外者所不厭其怪也擭尚書費誓曰杜乃擭敜乃穽孔安國傳曰擭捕獸機檻陸徳明書音義曰擭華化反周禮雍氏春令為阱擭秋令塞阱杜擭又㝠氏掌為阱擭以攻猛獸鄭氏注曰阱穿地為壍也擭柞鄂也堅地阱淺則施柞鄂於其中陸徳明周禮音義曰擭胡化反禮記中庸曰予知驅而納諸罟擭䧟阱之中陸徳明禮記音義曰擭胡化反觀國案廣韻去聲擭胡化切木名也入聲擭胡郭切柞鄂也阱淺則施之以此考之則阱擭之擭當音胡郭切其胡化切者乃木名也陸徳明諸經音義皆誤矣酺前漢文帝紀詔曰朕初即位其赦天下賜民爵一級女子百户牛酒酺五日服䖍注曰酺音蒲文頴注曰酺音步漢律三人以上無故羣飲酒罰金四兩今詔酺賜得令會聚飲食五日也顔師古注曰酺之為言布也王徳布於天下而合聚飲食為酺觀國案周禮族師曰月吉則屬民而讀邦灋書其孝弟睦婣有學者春秋祭酺亦如之鄭氏箋曰酺者為人物烖害之神也族長無飲酒之禮因祭酺而與其民以長幼相獻酬焉陸徳明周禮音義曰酺音步盖六鄉有鄉大夫興賢者能者而以禮禮賔之所謂以禮禮賔之者以鄉飲酒之禮而禮賓之也有州長以禮㑹民而射於州序有黨正以禮屬民而飲酒於序惟族師閭胥比長則無飲酒之禮族師所掌百家乃五比四閭之民也無飲酒之禮則曠於長幼貴賤升降揖遜之儀故因春秋祭酺以除人物烖害而聚此百家以飲酒使知獻酬之節然後孝弟睦婣有學者可書矣然則春秋祭酺者嵗二酺也故後之里社聚飲者亦謂之酺漢律無故羣飲者有罰因㤙詔賜酺而後始得會聚飲食焉賜酺五日者使得㑹聚飲食五日也井田之灋已廢而酺之名猶在故也顔師古乃曰酺布也王徳布於天下而合聚飲酒為酺此非賜酺之本意也許慎說文曰王徳布大飲酒盖王徳布者謂㤙賜也酺乃祭名也非王徳之名也廣韻酺音蒲而步字韻不收酺字當讀音蒲為是今汴京城西有酺池乃因酺而得名者矣壺瓠爾雅釋木曰􅀥壺􅀥郭璞注曰今江東呼􅀥大而銳上者為壺壺瓠也又爾雅釋器曰康瓠謂之甈郭璞注曰瓠壺也既曰壺瓠也又曰瓠壺也則壺瓠一物矣觀國案尚書禹貢曰壺口治梁及岐史記河渠書曰秦鑿涇水自中山西邸瓠口為渠則古之人以壺瓠通用為一字也故七月詩曰八月斷壺毛氏傳曰壺瓠也後漢郡國志河東垣縣有壺丘亭章懐太子注曰春秋襄公元年左傳晉討宋五大夫寘諸瓠丘杜預注曰垣縣東南有壺丘亭凡此皆以壺為瓠者也賈誼弔屈原賦曰斡棄周鼎兮而寳康瓠鶡冠子曰中流失舩一壺千金盖皆通用之也瓠亦讀音壺廣韻平聲曰瓠音胡瓠􅀈瓢也魯禮記明堂位曰魯王禮也天下傳之乆矣君臣未嘗相弑也禮樂刑法政俗未嘗相變也天下以為有道之國觀國案春秋魯桓公弑隠公而自立共仲殺子般又弑閔公而立僖公襄仲殺太子惡而立宣公則魯之君臣嘗相弑矣躋僖公立煬宫丹桓公楹刻桓公桷閏月不告朔宗婦覿用幣則魯之禮嘗變矣季氏八佾舞於庭三家者以雍徹襄仲卒壬午猶繹萬入去籥則魯之樂嘗變矣伐莒獻俘始用人於亳社則魯之刑嘗變矣宣公初稅畆成公作丘甲哀公用田賦則魯之法嘗變矣魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏則魯之政嘗變矣海鳥爰居止於魯東門臧文仲以為神命國人祀之則魯之俗嘗變矣明堂位之言盖美魯也然美魯不當如此坊記曰取妻不取同姓以厚别也買妾不知其姓則卜之以此坊民魯春秋猶去夫人之姓曰呉其死曰孟子卒盖呉魯同姓魯昭公取呉姬是謂取同姓魯人諱取同姓故謂之呉孟子論語陳司敗問昭公知禮乎孔子曰知禮曰君取於呉為同姓謂之呉孟子君而知禮孰不知禮且孔子豈不知昭公取同姓之為非而曰知禮者孔子為魯諱也故禮記於坊記則具言昭公之失盖記禮者無所諱故也明堂位乃曰君臣未嘗弑禮樂刑法政俗未嘗相變其誣後世耶呉㕦絲衣詩曰兕觥其觩㫖酒思柔不㕦不敖胡考之休毛氏傳曰㕦譁也鄭氏箋曰飲美酒者皆思自安不及譁不敖慢得壽考之休祥陸徳明毛詩音義曰㕦胡化切敖五誥切泮水詩曰烝烝皇皇不㕦不揚鄭氏箋曰㕦譁也言多士之於伐淮夷皆勸之不諠譁不失聲也陸徳明音義曰㕦音話觀國案玉篇廣韻曰㕦胡化切大聲也故史記封禪書曰鼎至甘泉公卿大夫請尊寳鼎引詩曰鼐鼎及鼒不㕦不敖胡考之休然則本用㕦字或變為呉耳呉亦有大聲之義然既變用呉則不可音呉為胡化切蓋呉字未嘗有胡化切之音故也史記漢武帝紀引詩曰自堂徂基自羊徂牛鼐鼎及鼒不虞不驁胡考之休又變吴為虞蓋司馬遷於封禪書用㕦字於武帝紀用虞字何其相逺如此案字書呉字五乎切虞字麌俱切二音不相通雖云假借其失經意逺矣後漢戴就傳曰燒鈠斧使就挾於肘腋章懐太子注曰鈠從㕦毛詩曰不㕦不敖又引何承天纂文曰臿今之鈠也又引張揖字詁曰鈠音華觀國案字書鋘音華鍫也章懐太子注曰鈠從㕦蓋㕦與呉古人通用之當為鈠鋘二字通用史借為鈠耳屬周禮考工記函人為甲犀甲七屬兕甲六屬合甲五屬犀甲壽百年兕甲壽二百年合甲壽三百年鄭氏注曰屬讀如灌注之注謂上旅下旅札續之數也觀國案字書無以屬音注者當音屬為聨屬之屬蓋七屬六屬五屬者綴札聨屬之數也合甲最堅其次兕甲又其次犀甲堅甲聨屬少而柔甲聨屬多此自然之理也音屬為注實為無義前漢刑法志曰魏氏武卒衣三屬之甲操十二石之弩負矢五十个如淳注曰上身一髀褌一踁繳一凡三屬也顔師古曰屬之欲反觀國考魏氏三屬之甲亦聨屬之屬音蜀是也顔師古音之欲反誤矣觀國按古之為甲皆以革為之故函人用犀兕之革為甲合甲者削革裏肉但取其表合以為甲函人曰比為甲必先為容然後制革又曰凡察革之道蓋函人一官皆言用革為甲之法此周制也不言以金為甲則知古人唯用革甲而已出其東門詩曰公子五爭兵革不息野有蔓草詩曰君子澤不下流民窮於兵革溱洧詩曰兵革不息男女相棄中庸曰袵金革死而不厭北方之强也樂記曰左射貍首右射騶虞而貫革之射息也孟子曰兵革非不堅利也家語曰南山有竹不柔自直斬而用之達於犀革淮南子曰貫兕甲於三百步史記禮書曰楚人鮫革犀兕以為甲前漢藝文志曰後世燿金為刀割革為甲凡此皆言以革為甲未聞用金甲也然則用金為甲者秦漢以後乎釋名曰甲亦曰介亦曰鎧故苻堅使熊邈造金銀細鎧蔡文姬詩曰金甲耀朝日杜子美詩曰未聞細栁散金甲凡言金甲皆見於後世也事有出於古人創法而後世更加精者甲之類是也復覆春秋成公十三年左氏傳曰吾與汝同好棄惡復修舊徳陸徳明音義曰復音服又扶又反成公十八年夏楚子鄭伯代宋宋魚石復入於彭城左氏傳曰鄭伯侵宋遂㑹楚子代宋納宋魚石向為人鱗朱向𢃄魚府焉以三百乘戍之而還書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入陸徳明音義曰復入扶又反復歸音服觀國案字書復有二義扶又反者其義則再也若隱公四年左氏傳曰諸侯復代鄭桓公元年左氏傳曰鄭人請復祀周公之類是也音服者其義則反也若周易復卦詩宣王復古之類是也成公十三年左氏傳所謂復修舊徳者乃再修舊徳也當音扶又反十八年傳曰復歸復入者乃反歸反入也當音服陸徳明皆存兩音則何所適從也又襄公十三年左氏傳曰呉侵楚飬叔曰子為三覆以待我杜預注曰覆伏也陸徳明音義曰覆扶又反觀國案字書覆亦有二義扶又反者其義則蓋覆也音福者其義則敗也倒也為三覆以待我者為傾覆之兵以伺我而發也若成公傳所謂覆師徒所謂傾覆我社稷若襄公傳所謂傾覆無所控告所謂大懼社禝之傾覆此類是已而陸徳明於三覆音為扶又反誤也弔節南山詩曰不弔昊天陸徳明音義曰弔如字瞻卬詩曰不弔不祥陸徳明音義曰弔如字又音的觀國案字書弔字去聲多嘯切弔生曰喭弔死曰弔也入聲都歴切至也此二音分二義不同考節南山瞻卬詩言不弔者至也當作都歴切而陸徳明於瞻卬詩列兩音者不能考其義而别之也又於節南山瞻卬詩皆音曰如字所謂如字者讀為多嘯切亦非也論語曰羔裘𤣥冠不以弔春秋隱公元年左氏傳曰弔生不及哀曲禮曰知生者弔又曰弔喪弗能賻不問其所費檀弓曰魯婦人之髽而弔又曰死而不弔者三周禮曰以弔禮哀禍烖凡此類皆多嘯切者也大誥曰弗弔天䧏割於我家君奭曰弗弔天䧏喪於殷盤庚曰弔由靈費誓曰善􅙀乃甲胄敿乃干無敢不弔天保詩曰神之弔矣凡此類皆都歴切者也義各有所歸不可混而無别亟亟字書史中用之最多一曰欺兾切一曰紀力切義若相似而難於區别觀國案字書欺兾切者數也紀力切者急也無衣詩曰亟用兵而不與民同欲蓋言數用兵也東門之枌詩曰亟㑹於道路蓋言數㑹也春秋隱公元年左氏傳曰亟請於武公蓋言數請也成公十六年傳曰吾先君之亟戰蓋言數戰也少儀曰亟見曰朝夕蓋言數見也講武類禡詩曰屢豐年鄭氏箋曰屢亟也蓋言數豐年也前漢刑法志曰師旅亟動蓋言數動也如此類亟字並音欺冀切其義則皆數也靈䑓詩曰經始勿亟蓋言勿急也七月詩曰亟其乘屋蓋言急於治屋也何人斯詩曰爾之亟行遑脂爾車蓋言急行不暇脂車也春秋隱公十一年左氏傳曰乃亟去之蓋言急去也定公五年傳曰歸粟於蔡以周亟矜無資蓋言周急也昭公五年傳曰屑屑焉習儀以亟蓋言以習儀為急也史記秦楚之際月表曰未始有受命若斯之亟也蓋言受命之急也如此類亟字並音紀力切其義則皆急也以此考之則亟有二音自分二義各有區别矣亟棘革三字皆訓急文王有聲詩曰匪棘其欲遹追來孝注曰棘急也革亦讀音棘故禮器引詩曰匪革其猷聿追來孝檀弓曰夫子之病革矣古人以棘革二字通用也抑詩曰俾民大棘江漢詩曰匪疚匪棘雨無正詩曰孔棘且殆凡此言棘亦皆訓急也禮記明堂位曰越棘大弓天子之戎器也鄭氏記曰棘㦸也引春秋傳曰子都㧞棘廣韻棘字注曰棘小棗又越㦸名廣韻􅀈字注引埤蒼云垂􅀈地名出美玉而左氏傳孟子皆只作棘字蓋不害於義也假假古雅切與檟同音又古訝切與稼同音又古伯切與格同音又胡駕切與暇同音其與檟同音者大也其與稼同音者借也休假也其與格同音者至也其與暇同音者嘉也長發詩曰昭假遲遲雲漢詩曰昭假無贏泮水詩曰昭假烈祖噫嘻詩曰既昭假爾烝民詩曰昭假於下凡此詩言昭假則同而陸徳明音義於長發雲漢詩則音古雅反於泮水噫嘻烝民詩則音古伯反凡分兩音則非也考其義則皆當音格為是文王詩曰假哉天命雝詩曰假哉皇考二詩言假哉則同而音義於文王則音古雅反於雝則音胡駕反凡分兩音者亦非也考其義皆當音古雅反為是若夫假樂嘉成王音暇維天之命曰假以溢我音暇小弁詩曰假寐永嘆音檟那詩曰湯孫奏假音檟思齊詩曰烈假不瑕音檟烈祖詩曰鬷假無言以假以享來假來饗音格𤣥鳥詩曰四海來假來假祁祁音格凡此詩各有一義其音亦與義通也至於假道於虞以伐虢音檟王假之音格之類皆顯然無疑者孫諤申明禮部韻略謂假字許於上聲去聲通押今考左氏傳曰假許田惟名與器不可以假人止當用上聲音檟去聲唯有休假之義雖有借貸意而經書未嘗用之難於通押文士亦用假字為遐字前漢禮樂志郊祀歌曰沇沇四塞假狄合處顔師古曰假即遐字假狄逺夷也說文作假亦通用假耳說文曰叚古雅切借也於篆為叚又段字徒玩切分段也於篆文為段盖叚字如前漢地理志琅邪郡有雩叚縣假暇遐嘏蝦霞之類皆従叚也段字如前漢段會宗後漢段光段珪唐段成式鍛腶毈碫椴之類皆従段也叚段二字偏旁不同然其形易於相亂應當分别魏有段干木乃複姓段干而名木史記老子傳曰老子之子名宗宗為魏將封於段干裴駰注曰段干魏邑名有段干木段干子田段干朋盖因邑為姓也前漢班固幽通賦曰木偃息以蕃魏兮乃舉段干木之名也周禮考工記曰攻金之工六築冶鳬㮚段桃而段氏闕曲禮曰天子之六工土工金工石工木工獸工草工鄭氏注曰金工築冶鳬㮚鍛桃而陸徳眀音義曰鍛丁貫反盖古之周禮傳者非一本鄭氏用鍛字必别本周禮而今世所傳周禮作段字亦當讀作丁貫反且攻金之工當用鍛字耳鍛段通用乃一義也副苹生民詩曰不坼不副無菑無害曲禮曰為天子削瓜者副之陸徳明音義皆曰副孚逼反觀國案周禮大宗伯以疈辜祭四方百物又鬯人曰凡疈事用散陸徳明音義皆曰疈孚逼反盖副與疈一字也副乃疈字之半耳疈辜者疈牲胷磔裂之以祭四方百物之神也酒尊無飾謂之散尊疈事用散尊散列不一也為天子削瓜者副之則既削又四析而横斷之也為國君者華之則中裂之而不四析也為大夫累之累倮也為士㚄之去㚄而已不坼不副者無分裂之患也副疈皆取四達開裂之義字書當於入聲收副字在疈字之下乃立兩字各為訓義非也鹿鳴詩曰食野之苹毛氏傳曰苹蓱也鄭氏箋曰苹藾蕭觀國案爾雅曰萍蓱其大者蘋郭璞注曰萍水中浮蓱爾雅又曰苹藾蕭郭璞注曰今藾蒿也然則苹與萍乃二物其字不相通用詩曰食野之苹食野之蒿食野之芩皆鹿食地上所生之物非水中物則苹非萍矣藾蕭是也謝靈運擬鄴中集詩曰自從食蓱來唯見今日美五臣注文選曰蓱苹也食苹之詩天子宴諸侯也靈運以食苹為食蓱五臣謂蓱苹也皆誤矣玉篇曰苹蓱也又藾蕭也兩存之者因毛鄭訓詩而為説也亦誤矣斚旂周禮司尊彛曰秋嘗冬烝祼用斚彛黃彛鄭氏注曰􅕸讀為稼稼彛畫禾稼也陸徳明音義曰斚音稼禮記明堂位曰夏后氏以琖商以斚鄭氏注曰斚畫禾稼也陸徳明音義曰斚音稼觀國案字書曰斚古雅切玉爵也故行葦詩曰洗爵奠斚音義曰斚古雅反周禮鬱人曰大祭祀與量人受舉斚之卒爵而飲之音義曰斚古雅切以此觀之凡斚字皆當讀為古雅切畫禾稼者斚之飾而遂改斚音稼恐非義也司馬温公詩話曰庭燎詩云夜鄉晨言觀其旂旂當讀音芹而釋音為祈或言周人土語謂芹為祈觀國又案采菽詩曰觱沸檻泉言采其芹君子來朝言觀其旂泮水詩曰思樂泮水薄采其芹魯侯戾止言觀其旂此二詩與庭燎詩旂字皆與芹晨同韻則旂當音芹可知也春秋左氏傳晉獻公時童謠曰丙之辰龍尾伏辰杓服振振取虢之旂鶉之賁賁天䇿焞焞火中成軍虢公其奔舉此言之則旂當音芹亦可知矣旂字當有祈芹二音字書不収芹音蓋闕典也敦爾雅釋丘曰丘一成為敦丘郭璞注曰成猶重也音義曰敦都昆反觀國案前漢地理志東都有頓丘縣顔師古注曰丘一成為頓丘以此知爾雅云丘一成為敦丘者敦當讀作頓若爾雅釋天曰太嵗在子曰困敦音義曰敦音頓此類是也而爾雅音義乃音敦丘為都昆反誤矣爾雅釋丘又曰如覆敦者敦丘郭璞注曰敦盂也音義曰敦音堆觀國案字書去聲敦字都内切珠盤玉敦也然則爾雅云如覆敦者是若覆盂狀玉敦之形亦如盂貯挿血之酒於玉敦當讀覆敦之敦為都内切若周禮戎右曰盟則以玉敦辟盟明堂位曰有虞氏之兩敦音義皆音敦作對此類是也而爾雅音義乃音覆敦為堆誤矣爾雅釋丘凡有兩敦丘而音義皆誤訓之蓋敦字旁音􅇰多故易於疑亂如東山詩曰敦彼獨宿箋曰敦敦然獨宿於車下讀敦作都回反又曰有敦𤓰苦訓曰敦專專也讀敦作徒端反行葦詩曰敦彼行葦訓曰敦聚也讀敦作徒端反又曰敦弓既堅訓曰敦弓畫弓也音敦作雕觀國案許慎說文曰弴音雕畫弓也然則本用弴弓詩人假借用字為敦弓讀音雕是也常武詩曰鋪敦淮濆仍執醜虜箋曰敦當作屯陳屯其兵於淮水大防之上也觀國案敦字徒端切者其義則聚也陳聚其兵於淮上當讀鋪敦之敦為徒端切而鄭氏箋乃欲改敦為屯其取訓逺矣有客詩曰有萋有且敦琢其旅閟宫詩曰敦商之旅克咸厥功二詩音義皆音敦為都回反此二詩言敦皆敦治之義讀音都回反是也周禮司几筵曰凡䘮事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几鄭氏注曰敦讀曰燾燾覆也棺在殯則椁燾觀國案檀弓曰天子龍輴而椁幬諸侯輴而設幬鄭氏注曰幬覆也鄭氏注司几筵每敦一几讀敦作燾蓋用檀弓之文以訓之耳然讀敦為燾於音訓不相附近而取義迂逺今案司凡筵之文乃喪事設席設几者也敦當讀音徒端切其義則聚也每席聚處設一几則文與義通矣若夫數數變易字形而為之音訓不唯取義太逺而導多疑於後學是誰之過與春秋經字數史記太史公自序曰春秋文成數萬其指數千張晏注曰春秋萬八千字當言減而云成數字誤也裴駰注曰太史公此辭是述董生之言董仲舒自治公羊經傳凡有四萬四千餘字故云文成數萬也前漢司馬遷傳曰春秋文成數萬其指數千顔師古注曰一萬之外即以萬言之故云數萬學者又為曲解云公羊經傳凡四萬四千餘字史遷豈謂公羊之傳為春秋乎觀國案今世所傳春秋經一萬六千五百餘字張晏云萬八千字非也太史公論春秋豈以公羊傳㕘計其文數耶裴駰注亦非也顔師古云一萬之外即以萬言之故云數萬觀國案前漢食貨志曰發吏卒間嵗萬餘人齊王僧孺有書萬餘卷梁沈約有書二萬卷蕭勵聚書三萬卷前漢藝文志曰説五字之文至二三萬言又食貨志曰發車三萬兩然則古人於一萬之外則稱萬餘至二萬則稱二萬至三萬則稱三萬自一二三萬之外則差多矣故稱數萬前漢儒林傳曰后倉説禮數萬言又食貨志曰馬往來食長安者數萬匹又曰通西南夷道作者數萬人故凡言數萬者差多也不止乎一二三萬也猶之數十數百數千也積十之多為數十積百之多為數百積千之多為數千是則積萬之多乃為數萬春秋經萬六千餘字當言文成萬餘而云數萬者太史公之言不確也而顔師古又云一萬之外謂之數萬其注釋亦不確也譬如易大衍之數二篇之策萬有一千五百二十而訓之曰二篇之策數萬可乎若孟子題辭曰三萬四千六百八十五字而變之云其文數萬則言意合矣以此觀之則顔師古之訓不確益可知也曲臺前漢儒林傳曰后倉説禮數萬言號曰后氏曲臺記服䖍注曰在曲臺校書著記因以為名顔師古注曰曲臺殿在未央宫前漢藝文志禮家有曲臺后倉九篇如淳注曰行禮射扵曲臺后倉為記故名曰曲臺記引漢官曰大射於曲臺晋灼注曰天子射宫也西京無太學於此行禮也觀國案前漢蓺文志曰漢興髙堂生傳士禮十七篇訖孝宣世后倉最明戴徳戴聖慶普皆其弟子三家立扵學宫以此觀之則后倉所説曲臺記非獨射禮而已也天子大射雖在曲臺而后倉著書則不專為射也前漢儒林傳曰后倉説禮數萬言號曰后氏曲臺記授聞人通漢戴徳戴聖慶普普授夏侯欽又傳族子咸大戴授徐良小戴授橋仁楊子榮然則禮學相傳如此之盛其書今在者禮記儀禮是也曲臺所記不止乎射禮亦可知矣法言揚雄法言曰或問甘羅之悟吕不韋張辟疆之覺平勃皆以十二齡前漢外戚傳曰恵帝崩太后發䘮哭而泣不下留侯子張辟疆年十五為侍中謂丞相陳平曰帝無壯子太后畏君等今請拜諸吕居中用事則太后心安法言云十二齡而漢書云十五者者觀辟疆啓陳平之語殆非十二齡所能言當従漢書年十五也法言曰蔡生欲安項咸陽項不能移又烹之前漢項羽傳曰韓生説羽都關中羽曰富䝿不歸故郷如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之斬韓生觀國案史記項羽紀曰人或説項王都關中項王烹説者史記但言人或説項王而不言其人姓名蓋以其人不足書也班固作漢書欲致其詳故載其姓名曰韓生然古之作漢書者非一家揚雄班固各以其所傳漢史而用之故在揚雄則言蔡生在班固則言韓生揚雄法言乃王莽作安漢公時所撰班固在後漢永平間作史已知法言用蔡生之非而寔之以韓生也法言曰叔孫通欲制君臣之儀召先生於齊魯所不能致者二人觀國案史記漢書叔孫通傳皆曰通使召魯諸生三十餘人魯有兩生不肯行此云魯而法言云齊魯者法言方論齊魯有人臣而繼以叔孫通召諸儒故亦言齊魯承上文言之也法言問神篇曰淮南太史公者其多知與何其雜也重黎篇曰或問太史遷曰實録君子篇曰淮南説之用不如太史公之用也太史公聖人將有取焉多愛不忍子長也觀國案雄論太史公始言雜者不純乎仁義也中言實録者不虛美不隱惡也末言聖人將有取焉者亦可取而用之也又曰多愛不忍則於去取之際未為勇决然則雄論太史公可否相半故其設對問者三意各不同也班固作司馬遷傳贊曰自劉向揚雄博極羣書皆稱遷有良史之材而法言所論殆責備於賢者之論也孔子誄春秋哀公十六年左氏傳曰孔丘卒公誄之曰旻天不弔不憖遺一老俾屏余一人以在位㷀㷀余在疚烏乎哀哉尼父無自律禮記檀弓曰魯哀公誄孔子曰天不遺耆老莫相予位焉嗚呼哀哉尼父史記孔子世家曰孔子卒哀公誄之曰旻天不弔不憖遺一老俾屏余一人以在位㷀㷀余在疚嗚呼哀哉尼父毋自律前漢五行志曰哀公十六年孔丘卒公誄之曰旻天不弔不憖遺一老俾屏余一人觀國案節南山詩曰不弔昊天十月之交詩曰不憖遺一老俾守我王閔予小子詩曰嬛嬛在疚然則魯哀公誄孔子之辭蓋集詩辭而為誄辭耳書史引孔子誄惟史記與左氏傳辭同蓋司馬遷采左氏作史記則辭同可知也檀弓所記禮尚簡要漢書五行志記災異之迹而已故所載誄辭皆不全也字書曰憖魚覲切且也傷也閑也不憖遺一老者不且遺一老也鄭氏箋詩曰憖者心不欲自彊之辭所謂心不欲自彊之辭亦且也春秋昭公二十八年左氏傳曰憖使吾君聞勝與臧之死也以為快杜預注曰憖發語之音觀國案此憖字亦且也發語之音多端不特此一字耳又文公十二年左氏傳曰兩軍之士皆未憖也杜預注曰憖缺也觀國案憖缺者即字書所謂傷也三等國周之封國分為三等有大國有次國有小國周禮大司馬曰大國三軍次國二軍小國一軍孟子曰大國地方百里次國地方七十里小國地方五十里王制曰大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君又曰次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫春秋成公三年左氏傳曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫觀國案此乃五等之諸侯分為三等之國公為大國侯伯為次國子男為小國五等之諸侯出封有國則其禮儀名數分三等之國而定其制焉周禮大司馬所言乃三等之國所制之軍也孟子所言乃所制之地也王制與左氏傳所言乃所制爵祿之位也周禮行人上公之禮其數皆以九諸侯諸伯之禮其數皆以七諸子諸男之禮其數皆以五此乃所制三等之命數也又司儀曰公于上等侯伯于中等子男于下等此乃所制三等擯相之禮也王制曰三公不過九命次國之君不過七命小國之君不過五命此言三等之服也周之封建之法唯此而已故齊侯使管夷吾平戎於王王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在管仲受下卿之禮而還國子髙子上卿也管仲畏扵義而不敢踰焉至周之衰諸侯僭天子大夫僭諸侯無復遵分守而盟㑹之際方且争長焉呉楚之君自稱王春秋削之而書之曰吳子楚子其它僭竊踰禮制者不可勝數文武周公之法至是其敝乃如此何耶矜大田詩曰大田刺幽王也言矜寡不能自存焉釋音曰矜古頑反烝民詩曰不侮矜寡不畏彊禦釋音曰矜古頑反春秋定公四年左氏傳曰詩云柔亦不茹剛亦不吐不侮矜寡不畏彊禦釋音曰矜古頑反觀國案矜字皆音作古頑反者讀矜為鰥也然鴻雁詩序曰萬民離散不安其居而能勞來還定安集之至於矜寡無不得其所焉而其詩曰之子于征劬勞于野爰及矜人哀此鰥寡既曰矜人又曰鰥寡故作詩序者以為矜寡無不得其所焉然則矜寡之矜不可讀為古頑反亦明矣毛氏詩傳曰矜憐也偏喪曰寡鄭氏箋曰矜人可憐之人也所謂矜寡者離亂失所羇獨可憐之人也矜字當讀為居陵反而陸徳明釋音皆音作古頑反非也春秋昭公元年左氏傳亦引詩曰不侮鰥寡不畏彊禦乃改矜寡為鰥寡者左氏多假借改易詩書之字取其意通而已若援此而遂音矜為鰥則于鴻雁詩辭大不合也小旻詩曰戰戰兢兢如臨深淵如履薄氷而春秋僖公二十二年左氏傳引詩曰戰戰矜矜如臨深淵如履薄氷乃改兢兢為矜矜者兢兢戒慎之意與矜矜不同故無羊詩曰爾羊來思矜矜兢兢不騫不崩則矜矜兢兢自是兩意左氏改戰戰兢兢為矜矜假借而已釋音當隨其所用之字而訓之不當遽讀矜為鰥也矜又巨巾反亦作􅚙字書曰矛柄也史記淮南王安傳曰非直適戍之衆鐖鑿棘矜也賈誼過秦論曰鉏耰棘矜非銛于句㦸長鎩也前漢徐樂傳曰起窮巷奮棘矜顔師古注曰棘㦸矜㦸之把也杜甫寄峽州詩曰張兵橈棘矜蓋用此事耳沓十月詩曰噂沓背憎職競由人毛氏傳曰噂猶噂噂沓猶沓沓鄭氏箋曰噂噂沓沓相對談語背則相憎釋音曰沓徒合反觀國案字書噂沓語多也噂亦作譐兹損切􅊱亦作誻徒合切其字従口或従言其義一也詩人多用省偏旁之文故用沓字乃􅊱之省文耳核其義則沓者重也合也列子曰鏑矢復沓方矢復寓前漢郊祀歌曰騎沓沓左太冲吳都賦曰雜沓縦萃凡此沓字皆重也詩曰芄蘭之葉童子佩韘鄭氏箋曰韘之言沓所以彄沓手指前漢趙皇后傳曰昭陽殿上銅沓冐凡此沓字皆合也此皆沓字本義無語言多之意孟子曰天之方蹶無然泄泄泄泄猶沓沓也事君無義進退無禮言則非先王之道者猶沓沓也此與詩噂沓之沓相類無誠心之意也春秋僖公十五年左氏傳引詩曰僔沓背憎職競由人亦循詩用沓字而用僔字者案字書僔衆也與噂義不同左氏假借用字耳唐書許敬宗傳曰敬宗饕沓以女嫁蠻酋馮盎子多私所聘此沓字讀為它合切蓋貪婪之稱也六尺論語曽子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也觀國案周禮鄉大夫之職以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之鄭氏注曰國中城郭中也晩賦税而早免之以其所居復多役少野早賦税而晚免之以其復少役多又案韓詩外傳曰國中二十行役然則七尺者二十嵗也其升降皆以五年則六尺者十五嵗也國中自七尺以及六十者自二十嵗以至六十嵗皆征之也野自六尺以及六十有五者自十五嵗以至六十五嵗皆征之也征之者謂給公上之賦役也國中近而復多役少故二十嵗始征之比野晚征五年也六十嵗而免比野早免五年也野逺而復少役多故十五嵗則征之比國中早征五年也六十有五嵗而免比國中晚免五年也其升降早晚皆以五年為率此周之成法也以此觀之則六尺之孤為十五嵗可知矣孔穎達周禮䟽引鄭氏注論語云六尺之孤年十五以下案周禮賦役之法言六尺者必以十五嵗而論語云六尺之孤則十五嵗以下皆可以六尺該之也後漢明帝詔曰髙宻侯禹元功之首東平王蒼寛博有謀並可以受六尺之託章懐太子注曰六尺謂十五以下此乃用鄭氏之説也朋詩曰菁菁者莪在彼中陵既見君子錫我百朋鄭氏箋曰古者貨貝五貝為朋錫我百朋得祿多言得意也前漢食貨志曰王莽變漢制作金銀龜貝錢布之品元龜直二千一百六十為大貝十朋蘓林注曰兩貝為朋朋直二百一十六元龜十朋故直二千一百六十又有公龜壯貝十朋伯龜幺貝十朋子龜小貝十朋是為龜寳觀國案鄭氏箋詩曰五貝為朋王莽變法以兩貝為朋者廣韻朋字注云五貝曰朋武王悦箕子之對賜十朋以此知古以五貝為朋至王莽改其名品更以兩貝為朋耳易損卦六五或益之十朋之龜弗克違益卦或益之十朋之龜弗克違案此二爻皆在中正之位以柔謙自居而天下之美利不期自至故曰十朋之龜弗克違以譬則羣賢皆願為用者也而王弼注釋以朋為朋黨非也許慎説文曰貝海介蟲也玉篇曰貝如車渠又貝甲也古貨貝而寳龜前漢食貨志曰金刀龜貝所以通有無也顔師古注曰貝以表飾然則龜貝古人記此以為寳貨而朋則其名數也寘塡塵桑柔詩曰不殄心憂倉兄塡兮毛氏傳曰塡久也鄭氏箋曰䘮亡之道滋久長也釋音塡音塵召旻詩曰兢兢業業孔塡不寧鄭氏箋曰天下之人戒懼危怖甚久矣釋音曰塡音塵瞻卬詩曰孔塡不寧降此大厲毛氏傳曰塡久也鄭氏箋曰幽王不愛民甚久矣釋音曰塡音塵觀國案東山詩曰蜎蜎者蠋烝在桑野毛氏傳曰烝寘也鄭氏箋曰蠋蜎蜎然持行久處桑野有似勞苦者古者聲寘塡塵同也釋音曰寘塡塵同音田又常棣詩曰每有良朋烝也無戎毛氏傳曰烝寘也戎相也鄭氏箋曰當急難之時雖有善同門來久矣猶無相助己者古者聲寘塡塵同也以此觀之則寘塡塵三字皆同音田也而釋音於桑柔召旻瞻卬詩又皆音填為塵者乃鄭氏箋所謂寘塡塵同聲蓋田塵二音通讀之耳其義則寘塡塵三字皆訓久也南有嘉魚詩曰烝然罩罩鄭氏箋曰烝塵也塵然猶言久如也喻求賢之遲也爾雅曰塵久也於東山常棣詩訓烝為寘於南有嘉魚詩訓烝為塵則寘塵同聲可知矣若夫小宛詩曰哀我塡寡宜岸宜獄毛氏傳曰塡盡也鄭氏箋曰我窮盡寡也此塡字專讀音田卷耳詩曰寘彼周行此寘字專訓為置止之寘無將大車詩曰祗自塵兮此塵字專訓為塵垢之塵蓋詩非一人之所作其用字各有旨趣亦不可一槩論也塡陟刃切與鎭同義史記封禪書曰嵗星塡星又太史自序曰以塡江淮之南又齊悼惠王世家曰大封同姓以塡萬民之心前漢郊祀志曰獨見塡星出又母將隆傳曰使在國邸以塡萬方又王莽傳曰屯雒陽塡南宫又田蚡傳曰上所塡撫多蚡賔客顔師古注皆曰塡竹刃反至後漢書則皆用鎮字其義一也學林卷二
