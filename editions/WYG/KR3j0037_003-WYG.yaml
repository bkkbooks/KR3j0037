body:
  text: 學林卷三宋王觀國撰名諱夏商無所諱諱自周始然而不酷諱也五子之歌曰太康尸位以逸豫滅厥徳𦙍征曰惟仲康肇位四海此皆稱其君之名也太甲既立不明伊尹放諸桐三年復歸伊尹作太甲三篇沃丁既𦵏伊尹于亳咎單遂訓伊尹事作沃丁此臣以其君之名為書之篇目也然則夏商無所諱可見矣周文王父也武王子也文王名昌箕子為武王陳洪範曰使羞其行而邦其昌是斥其父之名也武王祖也穆王孫也武王名發穆王作冏命曰發號施令又作吕刑曰發聞惟腥是穆王作誥命自斥其先祖之名也周康王名釗而其孫有昭王此立諡之字與祖先之名同音者也周昭王名瑕而春秋時有彌子瑕與孔子同時周穆王名滿而定王時有周大夫王孫滿此臣用其君之名以為名者也魯獻公名具魯武公名敖范獻子聘于魯問具敖二山魯人對曰先君獻武之所諱也而春秋時魯大夫有公孫敖與魯武公同名在武公之後是與國君同名也然則諱自周始而不酷諱可知矣晉僖侯名司徒故廢司徒而改為中軍宋武公名司空故廢司空而改為司城凡此類雖或諱之鮮有避者秦漢以来始酷諱矣秦始皇名政故正月讀音征而書史釋音皆音正月之正為征也漢髙祖名邦故史記前漢書不用邦字凢邦字皆改國字也吕后名雉前漢吕后紀注曰雉之字曰野雞故漢人文字皆謂雉為野雞史記封禪書曰野雞夜聲前漢郊祀志曰野雞夜鳴杜鄴傳曰野雞著怪若此類是也漢文帝名恒前漢地理志常山郡張晏注曰恒山在西避文帝諱改為常山郡自此北嶽恒山改為常山也漢景帝名啟故史記改微子啟為微子開之類是也漢武帝名徹故徹侯改為通侯蒯徹改為蒯通史記天官書改循車徹之徹為通是也漢宣帝名詢故荀况改為孫卿之類是也宣帝紀元康二年詔曰百姓多上書觸諱以犯罪者朕甚憐之更諱詢諸觸諱在令前者赦之盖宣帝為皇曾孫時名病已至是改為詢其詔曰令前者赦之則令以後觸諱者罪不赦也漢元帝王皇后父名禁王莽諱之改禁中為省中前漢孔光傳曰孔莽嗣侯避王莽更名均後漢光武名秀故秀才改茂才光武叔父名良故東郡夀良縣改為夀張縣之類是也漢明帝名莊故姓莊者皆改姓嚴前漢藝文志莊忌改為嚴忌莊助改為嚴助莊尤改為嚴尤又五行志春秋莊公改為嚴公楚莊王改為楚嚴王異姓諸侯王表秦昭莊改為昭嚴又班固叙傳謂老莊之術為老嚴之術謂莊子為嚴子之類是也漢殤帝名隆故前漢地理志河内隆慮縣改為林慮縣之類是也漢安帝父清河孝王慶也凡姓慶者皆改為賀氏鍾慶純改為賀純之類是也司馬遷父名談故史記不用談字而改趙談為趙同范煜父名泰故後漢書不用泰字鄭泰郭泰傳皆改為太字而兩傳文並稱鄭公業郭林宗盖避泰音而呼其字也案後漢安帝名祐而後漢書有朱祐吴祐劉祐殤帝名隆而書有劉隆伏隆王隆靈帝名宏而書有衛宏范煜於漢臣名犯漢帝之名則不改避而犯其父之名則改避何私于父而畧于君耶魏武帝名操故杜操改為杜伯度之類是也晉文帝名昭故王昭君改為王明君經史中昭穆之昭本音招以避晉文帝諱皆呼昭音韶徵招角招亦音為韶而經史釋音並音昭作韶矣北齊文宣太子名商改商州為趙州石勒諱胡字故本草呼胡萎為香萎呼胡𤓰為黄𤓰又諱勒字呼羅勒為蘭香羊祜牧荆州荆州人為諱其名改户曹為辭曹孔安國父名愉安國除侍中乞不與侍中王愉連書王舒授㑹稽内史以父名㑹求換他郡于是改會為鄶舒猶不得已而行張稷為永寧太守以父名永故改永寧為長寧王彧字景文名與宋明帝諱同故景文以字行孔靖字季恭名與宋武帝祖諱同故季恭以字行王懿字仲徳王獻字元徳當晉太元末徙居彭城以懿字犯晉宣帝名獻字犯晉元帝名故王仲徳王元徳兄弟皆以字行謝裕字景仁褚裕之字叔度張裕字茂度以宋武帝諱裕而三人名皆與宋武帝諱同故皆以字行隋室諱忠字改中書省為内書省凡中字皆改為内也隋煬帝名廣故廣平郡改為永平郡廣宗縣改為宗城縣之類是也唐髙祖之祖名虎父名昞故唐人文字改虎為武改昞為景唐髙祖名淵故劉淵改稱劉元海戴淵改稱戴若思公孫淵改稱公孫文懿之類是也唐太宗名世民故唐人書世為世書民為民又改枼為􅀢以避世字改昬為昏以避民字而唐人文字皆改民為人也唐髙宗名治故唐人文字皆改治為理武后名曌音照故髙宗懿徳太子名重照改名為重潤而鮑照文集改為鮑昭之類是也武后父名士彠韋思謙本名仁約以近武后父名為嫌而以字行唐明皇名隆基故睿宗子恵文太子隆範薛王隆業皆去隆字之類是也唐睿宗名旦張仁愿本名仁亶以近睿宗諱改為仁愿之類是也髙宗子封孝欽皇帝名洪徐有功名洪敏以避孝欽皇帝名而以字行唐憲宗名純故王純改為王紹之類是也唐穆宗名亘故亘州改為鎮州之類是也李涵擢太子少傅吕渭建言涵父名少康當避源乾曜以父名師民不拜太子少師賈曽以父名言忠不拜中書舍人李賀父名晉肅有言賀不當應進士舉者韓愈為作諱辨是也朱温祖名茂琳改戊為武至今北人呼戊為武又温父名誠温簒唐居汴州人為諱城字故韋城考城胙城襄城等縣至今但呼為韋縣考縣胙縣襄縣也李克用父名國昌克用立州縣名有昌字者悉改避之又人名有昌字者亦改避之髙季昌改為季興之類是也自秦漢以下至五代其酷諱可知也夫名者所以别同姓而欲知其宗系之次也前漢髙祖十年徙代王如意為趙王平帝元夀二年立代孝王𤣥孫之子如意為廣宗王且劉氏同宗而同名如意何以别之哉唐書太宗子紀王慎慎之子義陽王名琮而奉天皇帝名琮又太宗子鬱林王名恪而憲宗子建王名恪且李氏同宗而同名琮又同名恪何以别之哉夏商之時質質則事簡故無所諱周之時文文則事備故有諱而不酷諱也秦漢以来文乎文者也文乎文則多事多事則疑疑則為之防也宻矣此其所以酷諱之也古今人表前漢書古今人表列九等之叙而最下第九等謂之愚人班固以不道之君逆惡之臣皆置之九等此貶惡勸善之意也桀紂妲己管蔡幽厲州吁趙髙之徒皆在九等宜矣而鯀與周平王亦在九等之列盖鯀在舜之時羣臣僉舉以為可治水則其才智固已素稱于朝不幸而績用弗成則智有所困而力有所不足故也舜殛鯀所以戒羣臣使後之治水者不可踵鯀之無功也然則鯀非愚也譬猶戰而敗績爾戰而敗績豈遽爾為愚人耶周平王為西戎所逼是時周室已弱不能枝梧故平王東遷以避之迫于不得已也平王非不道之君鯀非逆惡之臣班氏列在愚人之等則誤矣又如荀卿居第二而孔子弟子則居第三老子嘗為孔子師乃居第四列子者有道之賢莊周嘗師之乃與師曠扁鵲同居第五孔文子為孔子之所稱美而反居第七如此之類升降不倫者不可勝計奚足以盡公議耶表無漢人則是有古人而無今人豈書未成歟挏馬前漢禮樂志曰師學百四十二人其七十二人給太官挏馬酒李竒注曰以馬乳為酒撞挏乃成也顔師古注曰挏音動馬酪味如酒而飲之亦可醉故呼為酒也又前漢百官公卿表曰武帝太初元年更名家馬為挏馬應劭注曰主乳馬取其汁挏治之味酢可飲因以名官也如淳注曰主乳馬以韋革為夾鳬受數斗盛馬乳挏取其上肥因名曰挏馬今梁州亦名馬酪為馬酒晉灼曰挏音挺挏之挏觀國案挏馬者乃官號非酒名也前漢百官公卿表曰太僕掌輿馬有家馬令五丞一尉顔師古注曰家馬者主供天子私用非大祀戎事軍國所須故謂之家馬武帝太初元年更名家馬為挏馬則改家馬之官名為挏馬耳若然則太僕有挏馬令一人有挏馬丞五人有挏馬尉一人其所治亦主供天子私用之馬則挏馬者乃太僕之屬官也字書曰挏擁也引也以擁引其馬為義故曰挏馬禮樂志曰師學百四十二人其七十二人給太官挏馬酒者乃是以七十二人給事太官令役以造酒而供挏馬官也以禮樂志上下文考之可以見志曰河間獻王獻雅樂至成帝時謁者常山王禹世受河間樂其弟子宋煜等上書言之事下公卿以為久逺難分明議寢是時鄭聲尤甚哀帝自為定陶王時疾之及即位乃下詔罷樂官在經非鄭衛之樂者條奏丞相孔光大司馬何武奏其不應經法或鄭衛之聲皆罷其名號數十或罷或不罷者也師學百四十二人其七十二人給太官挏馬酒其七十人可罷者盖師學乃習樂之有祿食者也師學百四十二人者冗員如此之多也其七十二人給太官挏馬酒者以此七十二人撥𨽻太官使之役之以造酒而供挏馬之所用也盖挏馬令五丞一尉其官吏必多當時挏馬所用之酒太官合供之故給此七十二人使從役于太官而使之造酒而其七十人則罷而不用盖師學百四十二人以七十二人撥𨽻他局而其餘七十人又罷而不用是師學百四十二人皆省而不在樂府矣此皆不應經法者也哀帝疾鄭聲而省樂官本志首尾甚詳而諸家注釋漢書乃以挏馬為酒名則誤矣志曰郊祭樂人員六十二人給祠南北郊又曰給祠南郊用六十七人又曰鄭聲㑹員六十二人一人給事雅樂六十一人可罷凡此皆稱給盖給屬别局與給太官之給同也如諸家注釋漢書者乃以給為給酒則愈誤矣顔氏家訓牽于漢書注釋之説不能稽考辨明而卒取撞挏之義又謂挏為桐當桐花開時造馬酒其鑿愈甚矣耳孫前漢惠帝紀曰太子即皇帝位上造以上及内外公孫耳孫有罪當刑及當為城旦舂者皆耐為鬼薪白粲應劭注曰耳孫者𤣥孫之子也李斐曰耳孫曾孫也晉灼曰耳孫𤣥孫之曽孫也顔師古曰耳孫諸説不同據平帝紀諸侯王表耳音仍仍耳聲相近盖一號也觀國案平帝紀曰元始五年立梁孝王𤣥孫之耳孫音為王又諸侯王表梁孝王表曰元始五年二月丁酉王音以孝王𤣥孫之曽孫紹封然則漢書在紀言耳孫在表言曽孫當從漢書以耳孫為曽孫是也若以耳音仍則誤矣又匈奴傳曰握衍朐鞮單于者烏維單于耳孫也以匈奴傳考之自烏維單于而下或立弟或立子以世次定之則握衍朐鞮單于與烏維單于之曽孫同行又以知耳孫者曽孫也文身斷髮史記周本紀曰古公亶父有長子曰泰伯次曰虞仲太姜生少子季歴季歴生昌有聖瑞古公曰我世當有興者其在昌乎太伯虞仲知古公欲立季歴以傳昌乃二人亾如荆蠻文身斷髮以遜季歴應劭注曰常在水中故斷其髮文其身以象龍子故不見傷害觀國案禮記曰東方曰夷被髮文身有不火食者矣南方曰蠻彫題交趾有不火食者矣西方曰戎被髮衣皮有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣泰伯虞仲知古公之欲立季歴以傳昌也乃犇荆蠻文身斷髮盖自同于蠻夷之習以示無爭立之心乃得以全其生也使二人不犇荆蠻則見忌于父子兄弟之間其能全其生乎唐太宗初為秦王時功既髙矣建成元吉不知㡬卒以取斃古今一理也若謂常在水中故㫁其髮文其身以象龍子而不見傷害則其説疎矣前漢地理志曰粤地牽牛婺女之分野也其君禹后帝少康之子云封于會稽文身斷髮以避蛟龍之害盖文身斷髮者粤俗之所好也非避蛟龍之害也班固誤訓其文故應劭注史記有象龍子之語爾酎酒奪爵前漢景帝紀曰元年髙廟酎張晏注曰正月旦作酒八月成名曰酎酎之言純也武帝紀曰元鼎五年九月列侯坐獻黄金酎祭宗廟不如法奪爵者百六人服䖍注曰因八月獻酎祭宗廟時使諸侯各獻金来助祭也顔師古注曰酎文救反三重釀醇酒也觀國觀古之諸侯自非大惡不道則不至于奪爵失侯今酎金不如法辠不至于奪爵而武帝削奪之典如此其重者讀食貨志然後知其事有所因志曰南粤反西羌侵邊齊相卜式上書願父子死南粤天子下詔褒揚賜爵闗内侯黄金四十斤田十頃布告天下天下莫應列侯以百數皆莫求從軍至飲酎少府省金而列侯坐酎金失侯者百餘人案武帝數事征伐末年國耗民貧四方騷然及南粤反西羌侵邊中國困乏卜式知其危故身先以率天下武帝擢式既峻欲以此動諸侯而覬諸侯之来應也然諸侯憚於從軍各自顧望莫有應者武帝因此發怒乃以酎金不如法而列侯奪爵者百餘人此在漢法未之有特以私怒而加威故酎金之辠雖輕而削奪之典特重權一時之宜可也非不刋之法也古之舉賢不當者削爵黜位而已古之五刑犯淫者待之以宫刑司馬遷坐舉李陵降匈奴而下蠶室其辠與刑頗不從類觀國案裴駰注史記太史公自序引衛宏漢書舊儀注曰司馬遷作景帝本紀極言其短及武帝過武帝怒而削去之後坐舉李陵降匈奴故下蠶室有怨言下獄死張晏曰遷没之後亾景紀武紀元成之間禇先生補缺作武帝紀由此觀之則司馬遷坐舉李陵而下蠶室實武帝私忿之刑故辠與刑所以不從類也景武之紀亾則知當時諱其書無敢傳者耳度曲前漢元帝紀賛曰元帝多材藝善史書鼔琴瑟吹洞簫自度曲被歌聲應劭注曰自隠度作新曲臣瓉注曰度曲謂歌終更授其次顔師古注曰度音大洛反觀國案賛所謂自度曲者能製其音調也被歌聲者以所製之音調播之歌聲而皆合其節奏也臣瓉以謂歌終更授其次者誤矣盖歌終更授其次者歌曲也後之文士多援臣瓉之説以度曲為歌曲故張平子西京賦曰度曲未終雲起雪飛則以度曲為歌曲矣杜子美陪李梓州泛江詩曰翠眉縈度曲雲鬢儼分行亦用為歌曲矣徐陵曰奏新聲于度曲唐書段安節善樂律能自度曲此乃元帝自度曲之本意也令甲律令有成法者文士皆稱曰著于令甲觀國案古之律令書有甲乙丙丁之篇次故前漢書音義曰令有先後有令甲令乙令丙前漢蕭望之傳曰永惟邊境之不贍故金布令甲曰邊郡數被兵流離饑寒令天下共給其費顔師古注曰金布者令篇名也令甲者其篇甲乙之次也後漢章帝紀元和元年七月詔曰令丙箠長短有數章懐太子注曰令丙為篇之次也盖箠令在令丙之篇故也然則古之法書以甲乙丙丁分其篇次而其事則各有目舉其事則兼舉其目也若不問其事之在何篇目而一槩稱曰著于令甲則非也世之符祝之巫有急急如律令之語李濟翁資暇集曰令音平聲律令者雷部中鬼名能疾行故符呪者以為言觀國案漢以来朝廷行詔勅約束之文其末必有餘如律令之語盖約束該載不盡餘事自有律令常法但言如律令則庶目自舉矣巫覡符呪之語其告誡鬼神亦猶朝廷之告誡臣民也故符呪亦有如律令之稱朝廷約束之文末必有勅字故符呪如律令之末亦用敇字此其可見也豈有朝廷詔敕約束之文引雷部鬼名以喻其疾速者乎濟翁誤矣揚子法言曰或問先知曰不知知其道者其如視忽忽眇綿作炳先甲一日易後甲一日難觀國案甲者教令之始也當民未犯故先甲一日以示之則易及民已犯而後令之則晩矣故後甲一日以示之則難此荅先知之問故有先後難易之言也易蠱卦曰先甲三日後甲三日巽卦曰先庚三日後庚三日觀國案甲主仁庚主義先甲後甲者先後皆以寛令示之也先庚後庚者先後皆以嚴令示之也先王之于民始則三令五申之而猶有犯焉乃刑之而不疑所以取信于天下慎之至也前漢武帝紀元鼎五年詔云易曰先甲三日後甲三日朕躬飭齋戒拜祀于郊觀國案先甲三日為辛後甲三日為丁言自新丁寧以臨祭祀故舉先甲後甲之文也春秋宣公八年六月辛巳有事于太廟又成公六年二月辛巳立武宫又十七年九月辛丑用郊又昭公二十五年七月上辛大雩季辛又雩又襄公元年夏四月辛巳郊尚書武成篇曰丁未祀于周廟召誥篇曰丁巳用牲于郊後漢禮儀志曰正月上丁祀南郊凢此皆用辛丁之日以接事盖古法也開元錢今之錢中開元通寳錢􅆟多俗或謂是唐明皇開元年號所鑄錢背有半月手甲文俗謂是楊妃甲痕皆非也案唐書食貨志曰武徳四年鑄開元通寳錢有司進錢模太穆皇后誤以指甲損其模遂鑄甲文盖開元者唐髙祖所撰錢寳之號非年號也自古未有以年號鑄文者唯唐乾封元年鑄乾封重寳以一當十又乾元初鑄乾元重寳以一當十復鑄重輪乾元錢以一當五十此皆因經費不足權宜而行之未㡬皆寢罷然則終唐三百年皆鑄開元通寳錢毋怪乎此錢之多也至五代有天祐天福唐國等錢而本朝始専以年號鑄錢然宋通元寳皇宋元寳非年號宋通乃開寳時所鑄皇宋乃寳元時所鑄盖錢文不可用二寳字故變其文也戊巳校尉前漢西域傳曰元帝置戊巳校尉屯田車師前王庭前漢百官公卿表曰元帝初元元年置戊巳校尉顔師古注曰甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳今所置校尉亦無常居故取戊巳為名也有戊校尉有巳校尉一説戊巳居中鎮䕶四方今所置校尉亦處西域之中撫諸國也後漢西域傳曰武帝時西域内属有三十六國漢置校尉領䕶之宣帝改曰都䕶元帝又置戊巳二校尉屯田于車師前王庭章懐太子注引漢官儀曰戊巳中央鎮䕶四方又開渠播種以為厭勝故稱戊巳觀國案西域自有都䕶以統之元帝又置戊巳二校尉屯田于車師前王庭則都䕶之外又添置戊巳二校尉是戊巳校尉為都䕶之屬官也所置校尉専主屯田於車師前王庭爾鎮䕶四方則非其任也盖戊巳土也屯田以耕土為事故取戊巳為名既専主屯田於車師前王庭則有常居矣非寄治也前漢西域傳曰都䕶治烏孫壘城于西域為中都䕶治焉以此觀之則居中鎮䕶實都䕶之職戊巳校尉所不預焉况車師王庭亦非西域居中之地諸家訓說皆非也厭勝之說尤謬所謂戊巳二校尉者若後漢耿恭傳曰以恭為戊巳校尉屯車師後王部金蒲城闗寵為戊巳校尉屯前王栁中城此類是也慮囚前漢雋不疑傳曰不疑為京兆尹每行縣錄囚徒顔師古注曰省録之知其情狀有寃滯與否也今云慮囚本錄聲之去者耳音力具反而近俗不曉其意訛其文遂為思慮之慮失其源矣觀國案前漢後漢皆稱錄囚唐史五代史皆稱慮囚二字皆是也錄者省錄之也慮者謀議之也周禮朝士若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶鄭氏注曰慮謂謀也謂當圖謀緩刑貶減也雨無正詩曰昊天疾威弗慮弗圖舍彼有罪既伏其辜鄭氏箋曰慮圖皆謀也由此觀之則史言慮囚者謀議之欲不失其情也顔師古乃謂近俗不曉其意訛為思慮之慮失其源盖師古未嘗稽考而遽生非訾爾同姓史記本紀虞舜父曰瞽瞍瞽瞍父曰蟜牛蟜牛父曰句望句望父曰敬康敬康父曰窮蟬窮蟬父曰帝顓頊又夏禹之父曰鯀鯀之父曰帝顓頊觀國案舜禹同時人也同出於顓帝之系是為同姓然自顓帝歴六世而至舜自顓帝歴二世而至禹何其逺近不等之甚耶其世次脫誤司馬遷不能究而又不言闕疑故後世無所考焉盖自戰國迄于秦火譜系散亾而同姓異姓混而無别春秋左氏傳曰昔周公弔二叔之不咸故封建親戚以藩屏周管蔡郕霍魯衛毛耼郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凢蔣邢茅胙祭周公之𦙍也盖文之昭十六國皆文王子為文之同姓也武之穆四國皆武王子為武之同姓也周公之嗣六國皆周公之同姓也同姓不可為婚所以别人倫也故陳司敗問昭公知禮乎君取于吴為同姓謂之吴孟子君而知禮孰不知禮盖吴實泰伯之後與魯同姓也魯昭公取吴姬是為取同姓魯人諱取同姓故謂之孟子孟子其字也春秋哀公十二年五月甲辰孟子卒不書姓不稱夫人不言薨不言𦵏小君皆因魯人諱之春秋不改但書曰孟子卒而已以言其不用夫人禮者也左氏傳曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問曰寡君之疾病子産曰内官不及同姓男女辨姓禮之大司也今君内實有四姬焉其無乃是也乎四姬有省猶可無則必生疾矣杜預曰同姓姬四人也春秋之際同姓之禮已紊矣晉假道於虞以伐虢宫之竒諫曰泰伯虞仲大王之昭也虢仲虢叔王季之穆也為文王卿士勲在王室藏在盟府將虢是滅何愛于虞且虞能親於桓莊乎桓莊之族何罪猶尚害之況以國乎杜預曰桓叔莊伯之族晉獻公之從祖昆弟獻公患其偪盡殺之當時同姓猶路人也無罪而且殺之而況于婚豈有禁哉前漢元后傳曰王莽自謂黄帝之後姓姚氏八世至舜以媯為姓至周封于陳為胡公十三世奔齊姓田氏田和有齊國稱王至漢失國齊人謂之王家因以為氏後徙魏郡元城為魏郡人王莽傳曰莽妻宜春侯王氏女顔師古注曰王訢為丞相封宜春侯傳爵至孫咸莽妻咸之女莽傳又曰姚媯陳田王氏凡五姓予之同族也皆以為宗室其元城王氏勿令相嫁娶前漢王訢傳曰訢代車千秋為丞相封宜春侯薨子譚嗣譚薨子咸嗣王莽妻即咸女顔師古注曰莽本以與譚姓不同祖系各别故為婚娶觀國案莽自序曰齊人謂之王家因以為氏後徙魏郡元城為魏郡人盖雖徙元城為魏郡人然得王姓則自齊也王訢傳曰王訢濟南人也訢雖無家譜可考然據列傳云濟南人則是亦齊之王氏也訢莽同為齊之王氏則同姓矣若夫以元城濟南為異是異居也非異宗也後漢一字名後漢書人名惟一字無以二字為名者觀國案前漢匈奴傳曰漢造設四條遣中郎將王駿王昌副太尉甄阜王尋使匈奴班四條與單于令奉行時王莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大悦白太后遣使者答諭厚賞賜焉又前漢王莽傳曰莽念中國已平惟四夷未有異乃遣使者齎黄金幣帛重賂匈奴單于使上書言聞中國譏二名故名囊知牙斯今更名知慕從聖制由此觀之則是平帝時莽奏中國不得有二名故後漢人皆以一字為名也莽雖簒敗光武中興而漢制則不改故終後漢之世人惟一字名也無害史記蕭何沛豐人也以文無害為沛主吏掾注引漢書音義曰文無害有文無所枉害也律有無害都吏如今言公平吏一曰無害者如言無比陳留間語也前漢蕭何傳服䖍注曰為人解通無嫉害也應劭注曰雖為文吏而不刻害也蘇林注曰無害若言無比也一曰害勝也無能勝害之者晉灼注曰酷吏傳趙禹為丞相亞夫吏亞夫曰極知禹無害然文深不可居大府蘇說是也顔師古注曰害傷也無人能傷害之者觀國考諸家說或曰無所枉害或曰無比或曰無嫉害或曰不刻害或曰無能勝害之者或曰無人能傷害之者然皆未當也文無害者謂不侮文則不害法也不侮文不害法則公私平允而稱為能吏矣史記酷吏傳減宣以佐史無害給事河東守府衛將軍青使買馬河東見宣無害言上召為大廐丞又張湯給事内史為寧成掾以湯為無害言大府調為茂陵尉又杜周為廷尉史張湯數言其無害凢此皆以不侮文不害法而見稱於時也凢不侮文不害法者持文必深若非有道以輔之則皆為酷吏矣蕭何能輔之以道則不沈於刀筆之間也戈舩前漢武帝紀元鼎五年夏四月越王相吕嘉反秋遣伏波將軍路博徳出桂陽下湟水樓舩將軍出豫章下湞水歸義越侯嚴為戈舩將軍出零陵下離水張晏注曰越人於水中負人船又有蛟龍之害故置戈於船下以為名也臣瓉曰伍子胥書有戈船以載干戈因謂之戈船顔師古注曰以樓船之例言之則非為載干戈船此盖船下安戈㦸以御蛟鼉水蟲之害觀國案今全桂二州之間有陽海山有水自山出至山下則分流為二其一向南流者為離水其一向北流者為湘水其地在漢屬零陵郡二水皆石險而離水南過桂林入蒼梧尤為嶮澀盖兩山之間亂石潄水或石灘延亘屈曲湍瀧舟之行也縈回避石阻礙萬端然則船下不可安戈信矣夫船下安戈雖大江滄海猶不免挂觸而况于山谿石險之水乎戈船者將軍之號也言能乗船而用戈以戰故謂之戈舩將軍以其善水戰也亦非載干戈者也載干戈者載任器之舟耳史記五帝紀史記本紀首叙五帝一曰黄帝二曰顓帝三曰帝嚳四曰帝堯五曰帝舜觀國案周禮外史掌三皇五帝之書鄭氏注曰楚靈王所謂三墳五典也春秋左氏傳曰左史倚相趨過王曰是能讀三墳五典八索九丘故孔安國尚書序曰伏羲神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也三皇五帝自古聖人言之著矣孔子定書斷自唐虞以下者取其告命之文可以垂法於後世者耳堯舜之前非無告命之文諒其質畧不足垂法于後世故孔子刪而弗取至孔子傳易則曰庖犧氏之王天下也始作八卦作結繩而為㒺罟庖犧氏沒神農氏作斵木為耜揉木為耒日中為市神農氏沒黄帝堯舜氏作垂衣裳而天下治然則孔子未嘗不稱三皇也特不取其吿命之文耳史之有帝統盖紀帝王之名與徳也三皇五帝之名徳均在可紀而史册削去三皇惟取五帝者豈以伏羲神農為不足紀與以為三皇洪荒不可紀則五帝之顓頊帝嚳亦與三皇等矣史記紀顓頊帝嚳而削三皇何耶黄帝在三皇之數史記紀五帝乃取黄帝為五帝而獨遺少昊又何耶若謂尚書始堯舜而作史者不當紀三皇則誤甚矣太史公賛曰學者多稱五帝尚矣余嘗西至空峒北過涿鹿東漸于海南浮江淮矣至長老皆各往往稱黄帝堯舜之處風教固殊焉余并論次擇其言之尤雅者故著為本紀書首觀國案太史公作史乃採摭經傳而為之固不待聞四方長老之言然後可紀也至于易傳言伏羲神農之類反不足取信耶五運五運之見于史者伏羲氏以木木生火故神農氏以火火生土故黄帝氏以土土生金故少昊氏以金金生水故顓頊氏以水水生木故帝嚳氏以木木生火故陶唐氏以火火生土故有虞氏以土土生金故夏以金金生水故湯以水水生木故周以木凡皆以五行相生為序也周以木木生火則秦當以火矣秦反以水則非相生之序也秦以水水生木則漢當以木矣漢反以火則亦非相生之序也前漢律厯志曰秦以水徳在周漢木火之間顔師古注曰秦為閏位不當五徳之序觀國案周至赧王為秦所滅秦滅六國而兼天下則正統在秦矣使其子孫擇善改轍而持之則其歴世未可量不幸二世而亾亦猶隋室止傳二世而亾盖其世祚長短自有數而史家乃以秦為閏位不當五徳之序其説不通矣以漢之火而傳于魏之土以魏之土而傳于晉之金以為相生之序則可也然自晉元帝渡江之後天下分裂而為南北兩朝居南朝者曰晉宋齊梁陳相繼而立則正統在我也彼北朝者外域之入據者耳居北朝者曰吾據中原而臨天下則正統在我也彼南朝者偏方之僣奪者耳南北兩帝並立者二百餘年則正統果何在哉漢文帝時魯人公孫臣上書曰始秦得水徳及漢受之推終始傳則漢當土徳時丞相張蒼好律厯以為漢乃水徳之時河決金隄其符也及黄龍見成紀文帝乃申明土徳武帝亦據土徳色尚黄數用五然漢卒以火則漢之一代無定論矣文中子謂隋髙祖曰陛下真帝無踵偽亂必紹周漢以土襲火色尚黄阮逸注曰周木徳漢火徳隋當為土徳然隋卒以火則隋之一代無定論矣茍無定論則何以遵之哉前漢郊祀志曰齊威宣時騶子之徒論著終始五徳之運如淳注曰五徳各以所勝為行今考之前代或以五行所生為序或以所勝為序或越諸代而上承一代以為序皆無定論盖堯舜文武周公孔子之所不道而儒者各以臆見鼓其説斯亦贅矣春秋哀公十四年春西狩獲麟公羊傳曰麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為来哉孰為来哉反袂拭面而涕沾袍何休解曰夫子素案圖錄知劉季當代周見薪采者獲麐知為其出麟者木精薪采者庶人然火之意此赤帝將代周居其位西狩獲之者從東方王于西也東卯西金也言獲者兵戈文也言漢姓卯金刀以兵得天下也又曰得麟之後天下血書魯端門明日血書飛為赤烏夫子却觀未来豫解無窮知漢當繼大亂之後故作撥亂之法以授之又曰孔子絶筆于春秋不書下三時者起木絶火王制作道備當授漢也觀國案孔子因魯史記而作春秋者也以魯史記所書之事而以褒貶之法修成春秋筆則筆削則削皆據魯所書之事而已魯史記之所不書者孔子未嘗創増其事也哀公十四年春獲麟當時魯史記所書止于此故孔子于此而絶筆也若謂有告者曰有麕而角者孔子曰孰為来哉反袂拭面而涕沾袍則是孔子不用魯史記而創増其說矣春秋書甲戌己丑陳侯鮑卒盖魯史記因其再赴而書二日春秋亦書二日不改魯史記之文也茍魯史記不書獲麟則孔子豈遽増其事哉冬獵曰狩于春書狩者譏哀公變禮也言西而不言地者譏逺狩而非一地也雖非常之獸亦獲焉見哀公之荒于畋也魯史記止于此故孔子亦絶筆于此若謂絶筆于春秋不書下三時則非也案左氏傳哀公盡二十七年乃孔子卒後左氏取魯史記所書之事自小邾射来奔而下續以為傳故有傳而無經則知孔子作春秋自小邾射来奔而下魯史記未書其事也何以知其未書其事也盖小邾射以句繹来奔與邾庶其襄二十一年莒牟夷昭五年邾黑肱昭三十一年三叛人同而不在三叛人之數是以知作春秋時魯史記未書小邾射之事也以此考之則哀公十四年止書春而不書下三時又何疑哉觀國竊謂孔子作春秋以堯舜文武周公之道而示之以褒貶之法彼圖錄䜟緯之書皆虚怪不可必信之語也而謂孔子憑此以作春秋則誣聖人甚矣自魯哀公十四年獲麟至周赧王五十九年凡二百二十有四年而秦昭襄王滅周自秦昭襄王滅周後五十年嵗在乙未當漢髙帝之元年然則自獲麟至漢元年凡二百七十有四年其間十二諸侯變而為戰國七雄秦能合而為一是則滅周者秦也及秦衰然後漢乃興盖其反覆變態授受不一孔子乃預知劉季有天下而書獲麟以應之將誰欺耶謂漢以火代周之木則為秦者又何以處之哉至于木精赤帝血書赤烏皆不經怪誕之説以駭俗聽而何休援此以釋經亦已過矣卯金刀者假借文字形聲耳西狩止有西字可以象金而初不言東亦不言兵則卯之與刀義無從出有以見其傅㑹之不合也沈存中曰卯金刀為劉貨泉為白水真人出於緯書乃漢人之語劉字従丣不従卯貨字從貝非真字字書與本史必有一誤觀國案圖緯之文但象形取義而已如以天保為一大人只十以甄舒仲為予西土瓦舍中人以董為千里草以趙為小月走以亨為二月了以卓為十日卜以李為十八子以昌為二日以岳為丘山以運為軍走以隆化為降死以業為苦未以三刀為州以召刀為劭以破田為丑凢此皆象形取義者非字書偏旁之法也若夫止戈為武反正為乏毁則為賊皿蟲為蠱此正言字書之義至于亥有二首六身為二萬六千六百有六旬以知絳人之年後世猶以左氏傅㑹其事為誣而況圖緯之家多鄙俗之語尚何字書之責耶漢髙功臣前漢髙祖功臣表曰漢王即皇帝位八載而天下迺平始論功而定封封爵之誓曰使黄河如帯泰山若礪國以永存爰及苗裔于是申以丹書之信重以白馬之盟又作十八侯之位次髙后二年後詔丞相陳平盡差列侯之功觀國案十八侯者一蕭何二曹參三張敖四周勃五樊噲六酈商七奚涓八夏侯嬰九灌嬰十傅寛十一靳歙十二王陵十三陳武十四王吸十五薛歐十六周昌十七丁復十八蟲達也髙后二年盡差列侯之功總一百五十三人皆在功臣表今考十八侯之位次張敖本無勲勞而居第三張良陳平佐髙祖定天下而不預十八侯之列此其可疑也觀國竊謂當時吕后以魯元公主之故曲意取張敖為第三非天下之公論也張良陳平雖無被堅執鋭之勞然實謀主也蕭何以謀主而佐漢與張良陳平一體蕭何居第一而張良陳平乃不預十八人之末耶然則當時無公論可知矣若謂以封戸計則蕭何五千户而張良為萬户也若謂以封之先後則張良在六年正月丙午封而曹參以下則在十二月甲申封也以此觀之則十八侯之位次果非公論矣至髙后二年復詔丞相平盡差列侯之功而張良居六十二在鄂千秋之下陳平居四十七在華毋害之下盖列侯之功一百五十三人可謂衆矣張良陳平不應位次之降如此觀國竊謂髙帝崩髙后専制諸吕雖未用事而髙后已有疑大臣將相之心時陳平為丞相承詔差功臣則主差功臣者平也平多智謀輒自降其名位所以示無爭功之心而為自全之計也然則功臣一百五十有三人而張良陳平乃居其中實陳平之隂計也人君第功臣必能合天下之公論然後可案前漢髙祖功臣侯年表實百三十有七人而表作百四十有七人班固誤也周吕建成二人在外戚羮頡合陽沛徳四人在王子侯實百四十有三人班固作百五十有三人誤也唐史疑近時有唐史辨疑一帙疏新唐史之舛誤其事數百頗為詳悉觀國讀唐史于辨疑之外復有可疑者今列於下方宰相世系曰房𤣥齡字喬松本傳字喬世系曰髙士亷名宗儉本傳名倫世系曰裴世矩字洪大本傳名矩世系曰温彦將字大有本傳大有字彦將世系曰崔安上字敦禮本傳敦禮字安上世系曰薛振字元超本傳只作元超世系楊琳字再思本傳只作再思世系薛禮字仁貴本傳只作任貴世系曰劉晏相肅宗代宗據帝紀只相代宗世系曰崔仁師相太宗髙宗據帝紀只相太宗世系曰杜審權相宣宗懿宗據帝紀只相懿宗世系曰薛稷相中宗睿宗據帝紀只相睿宗世系曰李嶠相武后據帝紀又相中宗世系曰郭待舉相髙宗據帝紀又相武后世系曰白敏中相宣宗據帝紀又相懿宗世系曰鄭餘慶相徳宗據帝紀又相憲宗宗室世系曰終唐之世宰相十一人宗室宰相賛曰唐宰相以宗室進者九人觀國案宗室宰相實十有二人世系謂十一人者無李麟賛謂九人者無李麟李宗閔薛王知柔髙氏宰相四人少髙季輔當作五人也崔氏宰相二十三人少崔沅崔敦禮崔造當作二十六人也趙氏宰相四人少趙隠當作五人也韋氏宰相十四人少韋承慶韋安石當作十六人也趙郡李氏宰相十七人無李藩世系也張氏宰相十七人無張光輔世系也陳氏宰相三人無陳希烈世系也世系三入相者武承嗣崔湜而帝紀乃四入相也世系再入相者張𢎞靖杜鴻漸而帝紀乃一入相也世系再入相者褚遂良而帝紀乃三入相也觀國案史再入相者又有髙士亷李固言陳夷行夏侯孜四人而世系皆不書也宰相年表有武什方李景諶孫元亨王本立杜景佺王知古王及善于惟謙相武后有李義府相髙宗有侯希逸相徳宗有李訓相文宗有鄭肅李遜夷相武宗有豆盧琢相僖宗有鄭綮朱朴相昭宗而世系皆不書也世系有韓滉相徳宗而年表則不書也凢此皆修史之際討論之失也史互疑史記陳杞世家曰當周厲王時杞武公生武公立四十七年乃卒今案孔子作春秋當周平王四十九年去厲王已六十年則知把武公在春秋前也然春秋襄公六年三月壬午把伯姑容卒姑容者杞桓公也自襄公六年去隠公元年一百六十一年矣以史記世家攷之自杞武公至把桓公卒之年纔一百一十有三年是杞武公生在春秋中也然則世家謂周厲王時生武公盖世家之誤也春秋襄公二十九年閽弑吴子餘祭左氏公羊穀梁史記十二諸侯年表皆同惟吴世家稱十七年餘祭卒是餘祭享國十七年而卒也案史記年表餘祭嗣位四年被弑魯襄公二十九年也餘祭既弑矣年表猶書五年終于十七年十七年乃魯昭公十一年也魯昭公十二年表方書吴餘昧元年豈餘祭被弑吴國歴十三年無王越十二年然後餘昧始立耶以此考之則年表之誤可知也年表吴王十七年亦不書餘祭卒亦年表之失也吕武帝紀漢書立髙皇后吕氏帝紀唐書立則天皇后武氏帝紀其名相類而其事有大不相類者漢惠帝即位太后立帝姉魯元公主女為皇后無子取後宫美人子名之以為太子惠帝崩太子立為皇帝年㓜太后臨朝稱制方惠帝崩太后哭而泣不下及陳平等請拜諸吕為將居中太后悦其哭乃哀盖吕后獨生惠帝惠帝無子取後宫子為太子者欲繼統出于惠帝也惠帝崩太后哭而泣不下者太子㓜太后心疑大臣未有自全之䇿及陳平請用諸吕太后哭乃哀盖吕后不過内欲繼統出于惠帝而外崇諸吕之名位庶可以固吕氏之宗而享富貴之安也吕后有假寵外戚太過之罪而無盜漢之心及吕后崩大臣誅諸吕此亦必然之理使諸吕不誅則諸吕果能廢劉氏而革天命乎若夫武后則不然方且廢中宗改國號周自稱神聖皇帝立武氏七廟方是時天下已移為周矣非復有唐也然則武后真篡唐者也及大臣誅二張中宗復即位徙太后上陽宫復唐宗廟然後天下復有唐由此觀之則武后之與吕后其事大不相類可知也觀國案春秋魯季平子之逐昭公也昭公奔齊故春秋書曰公孫于齊及昭公居鄆故春秋書曰公至自齊居于鄆及昭公適晉至乾侯春秋書曰公如晉次于乾侯昭公復自乾侯歸鄆春秋書曰公至自乾侯居于鄆昭公又自鄆往乾侯春秋又書曰公如晉次于乾侯昭公三十年三十一年三十二年皆在乾侯故春秋于此三年正月皆書曰公在乾侯凡此乃春秋紀年之法也劉元海刼天子以僣帝號時晉帝在平陽故晉史書曰帝在平陽此乃春秋書公在乾侯之法也唐中宗雖被廢然而後復即位當其居于均州宜書曰帝在均州當其遷于房州宜書曰帝在房州史既不書則無以見唐祚之不絶武后簒唐罪惡至大列諸帝紀者為唐正朔設不為其人設也武后淫刑踵及無辜凢用宰相七十五人而被殺者二十有一人被流者九人被貶者十有五人當是時簮纓之流宜知㡬而退遯矣乃復接武而競進浮名之誘人也如是哉律厯志前漢律厯志引易曰參天兩地而倚數天之數始于一終于二十有五地之數始于二終于三十觀國案易言參天兩地者為一三五為參二四為兩此五行之生數也一三五為九二四為六九六者老隂老陽之數以此揲蓍而變為卦爻也故曰幽賛于神明而生蓍參天兩地而倚數觀變于隂陽而立卦發揮于剛柔而生爻此一節言五行之生數也若天始于一終于二十有五地始于二終于三十此五行之成數也易曰天一地二天三地四天五地六天七地八天九地十故一三五七九為二十有五二四六八十為三十凢天地之數五十有五此五行之成數也班固援易于先後之意差矣志又曰衡平也權重也衡所以任權而均物平輕重也其道如底其在天也佐助璇璣斟酌建指以齊七政故曰玉衡論語云立則見其參於前也在輿則見其倚于衡也此衡在前居南方之義也孟康注曰權衡量三者為參觀國案論語子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行此孔子戒子張以忠信篤敬茍立則若參然在前茍在輿則若倚于衡造次顛沛不可忘也班固援此以釋權衡取義僻逺而孟康又以權衡量三者為參義益逺矣又曰凡律度量衡用銅者所以同天下齊風俗也銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然常有似於士君子之行是以用銅也觀國案班固所訓銅之義乃金玉之義銅之義不如此也後漢律厯志曰靈帝熹平四年五官郎中馮光沛相上計掾陳晃上言厯元不正自開闢至獲麟二百七十五萬九千八百八十六嵗志又引元命苞乾鑿度皆以為開闢至獲麟二百七十六萬嵗觀國案此數人言厯皆假圖䜟以為言者夫推實厯以較之尚多不密而况假圖䜟以為言殆不根之論也適以蔓疑非史家所宜道也除前漢景帝紀曰中元二年令諸侯太傅初除之官有司奏策如淳注曰凡言除者除故官就新官觀國案朝廷簡擢賢才不次任用故曰除某官除某差遣若據如淳注謂除故官者是除去之也無乃非美稱耶字書除有三義曰除開也曰除盡也曰除去也天保詩俾爾單厚何福不除毛氏傳曰除開也東門之墠詩毛氏傳曰墠除地也國語曰九月除道禮曰雨畢而除道凢此皆開道也春秋莊公四年左氏傳曰除道梁溠杜預注曰開直道也史記曰始皇除道道九原抵雲陽壍山堙谷直通之所謂除道亦開道也易萃卦曰君子以除戎器戒不虞盖除者開新簡擢使戎器精且備也以此觀之則除官者亦如此類盖開新簡擢之也除又訓盡者顔延年秋胡詩曰良人為此别日月方向除五臣注文選曰除盡也故階除謂之除者階至此而盡也嵗除謂之除者一嵗至此而盡也除又訓去者如淳注漢記以除官為除故官則是除去之也以除去之為除官固非美稱如淳誤矣弧弓前漢韓安國傳曰匈奴畜牧為業弧弓射獵顔師古注以木曰弧以角曰弓觀國案顔師古所訓出于易曰弦木為弧剡木為矢弧矢之利以威天下故云以木曰弧以角曰弓然周禮考工記弓人為弓取六材必以其時榦也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也􅁝也者以為固也漆也者以為受霜露也凡取榦之道七柘為上檍次之檿桑次之橘次之木𤓰次之荆次之竹為下然則為弓者以木為榦而加以角筋膠􅁝漆以為之糾約耳是弓未嘗不用木也獨用角豈能為弓哉特假角以副其木也上古時質朴故其始創弧矢則弦木為弧至周時禮樂庶事備矣故為弓也有角筋膠絲漆參合而為之史記云宣王立女童謡曰檿弧箕服實亾周國服䖍注曰檿桑也顔師古注曰檿山桑之有文者前漢五行志曰檿弧桑弓也禮記曰桑弧蓬矢凡此言弧皆以木為弧也然列子曰乃以燕角之弧朔蓬之幹射之此又以角為弧是或以木或以角無定制矣周禮司弓矢掌六弓之法王弓弧弓以授射甲革椹質者夹弓庾弓以授射豻侯鳥獸者唐弓大弓以授學射者葢往體寡来體多謂之王弧往體多来體寡謂之夹庾往来體若一謂之唐大射豻侯鳥獸與學射者皆近射也近射用弱弓則射甲革椹質者用强弓矣王弓弧弓合九而成規往體寡而来體多强弓也然則弧弓者乃六弓之一弓其名為弧弓惟强有力者能挽之以其能射逺也韓安國傳所謂弧弓射獵豈以强弓射獵耶不然則必以木弧弓又何意也讀史前漢石奮傳曰石建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今乃四不足一獲譴死矣顔師古注曰馬字下曲者為尾并四㸃為四足凢五觀國案石建奏牘以書馬字下少一㸃乃拖三㸃以當四㸃古今書馬字皆為此亦小疵未至於得罪而建驚曰獲譴死矣其憂如此之甚者案前漢藝文志曰漢興蕭何草律亦著其法太史試學童能諷書九千字以上乃得為史又以六體試之課􅇰者以為尚書御史史書令史吏民上書字或不正輒舉劾盖吏者百官上書也民者萬民上書也吏民上書字或不正則令史舉劾石建憂其譴死慮有舉劾之者故其憂如此之甚也唐書張嘉正傳曰嘉正厯并州長史奏事京師明皇善其政且許以相及宋璟等罷帝欲用嘉正而忘其名夜詔尚書侍郎韋抗曰朕常記其風操而今為北方大將張姓而複名卿為我思之抗曰張齊丘今為朔方節度使帝即使作詔以為相夜且半因閲大臣表疏舉一則嘉正所獻遂得其名即以為平章事觀國竊謂明皇心疑張齊丘非其人唯大臣表疏可以知之故明皇特閲大臣表疏以求嘉正之名遂得之非因閲也外廷記事者以為因閲大臣表疏修史者不改其文也史家事必有所繫不得其繫則有可怪者此類是矣史訛晉書和嶠傳曰嶠遷潁川太守太傅從事中郎庾敳見而嘆曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用又庾敳傳曰敳有重名而聚斂積實都官從事温嶠奏之敳更器嶠曰嶠森森如千丈松雖磥砢多節施之大厦有棟梁之用觀國案兩傳所譽之辭則同一則以為和嶠一則以為温嶠史必有一失焉今案庾敳嘗參東海王越太傅軍事自惠懐以来敳仕漸顯正與温嶠同時而温嶠傳亦曰嶠舉奏庾敳以此知庾敳所稱者乃温嶠非和嶠也和嶠早顯與張華等同佐武帝又在前矣隋書賀若弼傳曰若弼為吴州總管與夀州總管源雄並為重鎮觀國案源雄傳曰拜徐州總管遷朔州總管自朔州拜行軍總管以伐陳未嘗為夀州總管則知賀若弼傳誤也隋書曰許智藏醫秦孝王謂孝王夜夢亾妃崔氏曰本来相迎即發癎而薨觀國案秦孝王傳云妃崔氏進毒于孝王孝王薨崔氏以毒之故賜死于家然則夜夢妃而發癎者悮矣隋栁述傳曰文帝在仁夀宫述與楊素元巖侍文帝怒煬帝令述召房陵王述與元巖作勅書楊素聞之與煬帝協謀矯詔執述巖以屬吏觀國案宣華陳夫人傳曰述巖為勅書以示楊素素以事白煬帝非召房陵王而執述巖也南史梁昭明太子傳曰三年三月游後池乗彫文舸摘芙蓉觀國案三月未有芙蓉史誤記其月也唐書李賀父名晉肅不敢舉進士韓愈為作諱辨然卒不就舉觀國案韓愈諱辨曰賀舉進士有與爭名者毁之曰賀父名晉肅不舉進士為是以此知賀常舉進士矣爭名者毁之故韓愈作諱辨欲以全賀之名也唐史與諱辨意不同矣唐人康駢作小説劇談錄曰元稹以明經擢第願結交李賀執贄造賀門賀覽刺不答稹慚憤而退稹登要路因指賀祖稱諱進不合應進士舉遂致轗軻韓愈惜其才為著諱辨觀國案唐人小説雖未可全信然記賀事與諱辨合則知史辭所載未之盡也䲭夷史記伍子胥傳曰子胥自剄吴王怒取子胥尸盛以䲭夷革浮之江中應劭注曰取馬革為䲭夷䲭夷榼形前漢食貨志曰范蠡報强吴刷㑹稽之恥乃乗扁舟浮江湖變姓適齊為䲭夷子皮顔師古注曰自號䲭夷者言若盛酒之䲭夷多所容受而可卷懐與時張弛也䲭夷皮之所為故曰子皮觀國案古之貯酒器多以陶或木為之皆有擊觸破碎之患故䲭夷者以皮為之可卷舒以貯酒無破碎之患前漢陳遵傳引揚雄酒箴曰子猶瓶也觀瓶之居居井之湄處髙臨深動常近危酒膠不入藏水滿懐不得左右牽于纆徽一旦礙為瓽所轠自用如此不如䲭夷䲭夷􅉸稽腹大如壺盡日盛酒人復借酤觀此箴意盖為以瓶汲井綆礙瓶破不如䲭夷盛酒安而不敗以喻人之飲酒不可自取困敗也范蠡自號䲭夷子皮又號陶朱公托鄙名以自晦其跡耳杜子美酬薛判官詩曰欲學䲭夷子待勒燕山銘此詩意非為欲隠也乃欲富貴强兵如范蠡故其下句曰志在麒麟閣無心雲母屏聊膠前漢嚴助傳曰武帝得東方朔枚臯膠蒼終軍等並在左右又藝文志從横家待詔金馬聊蒼三篇顔師古注曰嚴助傳作膠蒼而志作聊志傳不同未知孰是觀國案廣韻聊字落蕭切語助也亦姓也風俗通有聊倉為漢侍中著子書又有聊氏為潁川太守著萬姓譜以此觀之則藝文志云聊倉者是也廣韻者陸法言等諸賢士裒集古今氏姓譜牒天文地理經史百家之書而類之為可信也膠姓亦有膠鬲當是班固假借用字然聊膠二字音與義皆不同于假借為難合惟姓與名雖有假借字當専呼一音朝字古文為鼂亦作晁史記有朝錯傳前漢有鼂錯傳太史公自序曰賈生晁錯明申韓朝鼂晁雖三字而一音也史記孔子弟子有虙不齊字子賤儒林傳有濟南伏生名勝後漢有服䖍皆是同姓虙伏服雖三字而一音也史記有袁盎傳前漢有爰盎傳袁爰二字亦同音也若夫聊膠二字乃兩音則于假借為難合矣秘祝官前漢文帝紀十三年夏除秘祝官應劭注曰祕祝之官移過于下國家諱之故曰秘也又郊祀志曰文帝十三年下詔曰秘祝之官移過于下朕甚弗取其除之觀國案史記封禪書曰秦祝官有祕祝郎有災祥輒祝祠移過于下此秦法也漢因之至文帝始詔除之耳觀國讀湯誥曰其爾萬方有罪在予一人予一人有罪無以爾萬方説命曰一夫不獲時予之辜泰誓曰百姓有過在予一人無逸曰小人怨汝詈汝則皇自敬徳古之人君其責己如此之重故天下歸心焉昔屈建問士㑹之徳于趙武趙武曰夫子之家事治言于晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語楚康王曰神人無怨宜夫子之光輔五君以為諸侯主也齊侯疥痁期而不瘳梁丘據與裔欵曰是祝史之罪也君盍誅於祝固史嚚齊侯問晏子晏子曰若有徳之君外内不廢上下無怨動無違事其祝史薦信無愧心矣其適遇淫君外内頗邪上下怨疾動作辟違從欲厭私髙臺深池撞鐘舞女斬刈民力輸掠其聚肆行非度神怒民痛是以鬼神不饗其國以禍之祝史與焉君若欲誅于祝史修徳而後可齊侯説使有司寛政毁闗去禁薄斂已責邾文公卜遷于繹史曰利於民不利於君邾子曰茍利于民孤之利也民既利矣孤必與焉左右曰命可長也邾子曰命在養民死之短長時也遂遷於繹由是觀之凢君民者必能修徳自任然後能享其福焉未聞不修其徳而移過于人以徼福於己也暴秦之君不能修徳而誖於上下之情故設秘祝之官欲以移過于下雖三尺之童知其非也漢文帝能除之可謂明矣文帝十四年又詔曰先王逺施不求其報望祀不求其福右賢左戚先民後己今吾聞祠官祝釐皆歸福于朕躬不為百姓朕甚愧之其令祠官致敬毋有所祈嗚呼文帝推是心也庶無愧哉五數前漢律厯志曰數者一十百千萬也所以筭數事物順性命之理也本起于黄鍾之數始于一而三之三三積之歴十二辰之數十有七萬七千一百四十七而五數備矣觀國案易曰大衍之數當期之日二篇之策萬有一千五百二十當萬物之數也所謂萬有一千五百二十者一十百千萬皆備焉此五數之本也律厯志所謂歴十二辰之數十有七萬七千一百四十七者五數雖亦備然此乃生律之數非五數之本也生律之數亦自大衍而出盖黄鍾之數始於子之一以三乗之至丑而得三至寅而得九至卯而得二十七至辰而得八十一至巳而得二百四十三至午而得七百二十九至未而得二千一百八十七至申而得六千五百六十一至酉而得萬九千六百八十三至戌而得五萬九千四十九至亥而得十七萬七千一百四十七此自黄鍾之子歴十二辰而至亥之數也子者乾之初九黄鍾為天統未者坤之初六林鍾為地統寅者乾之九三太簇為人統三統既正則還相為宫而律吕生焉其法皆大衍之餘也二篇之末者陽爻三十六策隂爻二十四策六十四卦凡三百八十四爻隂陽各居其半故陽爻一百九十二隂爻一百九十二總計其策萬有一千五百二十古之造厯者本此而已班固不推大衍而論五數乃指十二辰之數而言之則非其本矣一三五為九九者老陽之能變者也二四為六六者老隂之能變者也乾純陽故乾言用九坤純隂故坤言用六老陽生少陽七是巳老隂生少隂八是巳九六七八乃揲蓍之變而為卦者也龍八十一鱗九九之數也鯉三十六鱗六六之數也龍者在天而能變者故得九九之數鯉者在地而能變者故得六六之數龍能隠能顯不可制畜故為在天之能變者鯉能神化飛越山湖故為在地之能變者大抵得九六之數者皆有變之理盖天地自然之道也辜孤書曰與其殺不辜又曰時予之辜詩曰民之無辜又曰無罪無辜禮曰救無辜伐有罪凡言辜者罪之異名也故字書曰辜罪也而辜負者是可罪可責之義也古人或以孤子之孤為負李陵荅蘇武書曰功大罪小不蒙明察辜負陵心五臣注文選曰國家辜負其心見誅母妻書又曰陵雖孤恩漢亦負徳五臣注曰力屈而降則孤恩也漢誅陵母亦負徳也後漢馬皇后紀曰孤恩不報章懐太子注曰孤負也蜀志劉備傳曰常恐殞沒孤負國恩凡此皆用孤字盖孤者不報之義其義亦與辜通故古人用孤字為孤負字不為失也前漢翟方進傳曰貴戚近臣子弟賓客多辜𣙜為姦利顔師古注曰辜𣙜者言己自専之他人取者輒有辜罪後漢靈帝紀光和四年初置騄驥廏丞領受郡國調馬豪右𣙜辜馬一匹至二百萬章懐太子注引漢書音義曰辜障也謂障餘人買賣而自取其利也又孝仁董皇后紀曰何進何苗等奏孝仁皇后使中常侍夏惲永樂太僕封諝等交通州郡辜𣙜所在珍寳貨賂悉入西省章懐太子注與靈帝紀注同觀國案此辜𣙜乃阻障而獨取其利漢書音義所訓是也而顔師古以為他人取者輒有辜罪所訓迂矣𣙜與較同音而義亦通周禮大宗伯以疈辜祭四方百物小子曰凡沈辜候禳飾其牲羊又曰凡沈辜候禳釁積鄭氏曰辜磔牲以祭也磔牲謂之辜者刑牲而用之猶刑有罪者故名曰辜也魯惠公啖趙春秋纂例魯十二公譜曰魯孝公卒子惠公弗湟立其下注八字曰惠公三年平王東遷觀國案史記十二諸侯年表曰周平王元年東徙雒邑嵗在辛未至平王三年嵗在癸酉魯惠公即位至平王四十九年嵗在己未魯隠公即位盖周平王既立三年然後魯惠公立也又史記魯世家曰魯孝公二十五年犬戎殺幽王二十七年孝公卒子弗湟立是為惠公惠公四十六年卒隠公立盖魯孝公二十五年犬戎殺幽王是年周平王立而東遷既東遷三年魯惠公始立也又案章衡編年通載曰周平王元年嵗在辛未東遷雒邑平王三年嵗在癸酉魯恵公立平王四十九年嵗在己未魯隠公立以此諸書考之則周平王東遷三年魯恵公始立明矣啖趙纂例云惠公三年平王東遷非也學林卷三
