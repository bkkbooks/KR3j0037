body:
  text: 學林卷一宋王觀國撰書篇揚子法言曰昔之説書者序以百而酒誥之篇俄空焉今亡矣觀國案古書百篇秦焚書至漢濟南伏生口傳裁二十餘篇魯共王壊孔子宅於壁中得所藏書皆科斗古文至孔安國始以𨽻古定之増多伏生二十五篇凡五十九篇蓋酒誥之篇不在伏生口傳之數而在科斗之文則有之揚雄見伏生口傳之書而未嘗見科斗書故曰酒誥之篇俄空焉孔安國尚書序曰科斗書廢已乆時人無能知者又曰并傳凡五十九篇悉上送官藏之書府則科斗古書當在秘府也魯共王者景帝之子壊孔子宅而得科斗書雄生西漢末科斗書出已乆矣雄又嘗校書天祿閣而於科斗書初未之見耶雄號為識竒字夫識竒字者必能讀古文茍不識科斗古文惡在其為識竒字也春秋莊公八年左氏傳引夏書曰臯陶邁種徳成公十六年傳引夏書曰怨豈在明不見是圗襄公十四年傳引夏書曰遒人以木鐸徇於路又二十一年傳引夏書曰念兹在茲釋茲在茲名言茲在兹允出兹在兹又引書曰聖有謨勲明證定保又二十六年傳引夏書曰與其殺不辜寧失不經昭公元年傳引太誓曰民之所欲天必從之又十七年傳引夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走哀公十八年傳引夏書曰官占唯能蔽志昆命于元龜以上左氏傳所引書杜預􅄙皆曰逸書也觀國按杜預所謂逸書者今書皆有之當是伏生口傳之書所無而在科斗古文則有之杜預亦未嘗見科斗書爾禮記坊記篇引君陳曰爾有嘉謀嘉猷入告爾后于内爾乃順之于外曰此謀此猷惟我君之徳鄭康成注曰君陳盖周公之子伯禽弟也名篇在尚書今亡觀國按今書君陳篇不亡是亦伏生書所無而科斗書有之鄭康成亦未見科斗書爾孟子引書曰洚水警予又引書曰湯一征自葛始又曰葛伯仇餉又引書曰后來其蘓又引書曰后來其無罰又引書曰丕顯哉文王謨丕承哉武王烈又引書曰天降下民作之君作之師又引書曰祗載見瞽瞍又引伊訓曰天誅造攻自牧宫朕載自亳又引太誓曰我武惟揚侵于之疆以上孟子所引書趙岐注皆曰尚書逸篇也觀國按孟子所引書今書皆有之是亦伏生書所無而科斗書有之趙岐亦未見科斗書爾當西漢時周之遺風未逺以揚雄之博學名儒於科斗書且不能究况於後世屢歴兵火識古文者愈少古文道㡬熄矣繫辭易曰聖人設卦觀象繫辭焉而明吉凶又曰繫辭焉以斷其吉凶是故謂之爻又曰易有四象所以示也繋辭焉所以告也又曰繫辭焉而命之動在其中矣觀國按孔子自言繫辭焉者乃卦爻彖象之辭也有卦故繋之以卦之辭有爻故繫之以爻之辭有彖故繫之以彖之辭有象故繋之以象之辭卦爻彖象皆繋之以辭然後占筮者即其辭而考吉凶也今世傳王弼易第七第八卷分繫辭上下者誤也此非繋辭也乃孔子所作易之大傳耳孔子自稱聖人設卦觀象繫辭者聖人謂虙犧文王也乾坤卦與大傳中有子曰之稱者乃孔子嘗為訓傳而門弟子纂集成書故有子曰之稱前漢儒林傳曰孔子晩而好易讀之韋編三絶而為之傳今繫辭當謂之易大傳而後世以治易名家者分其卷帙誤名以為繋辭耳諸卦六爻在彖與大象之後而乾六爻在彖與大象之前諸卦六爻有小象而乾六爻無小象者盖文言訓説已詳足以包小象也文言足以包小象而文言之辭不可析在諸爻故乾六爻無小象而列六爻於彖之前也坤亦有文言然坤見彖而後列六爻六爻復有小象與諸卦同者坤之文言一章也一章則簡而不足以包小象故坤與諸卦爻象之列同也乾之文言五章也五章則詳而足以包小象故獨於乾則無小象而列六爻於彖之前也諸卦惟六爻而乾坤於六爻之外復有用九用六者乾純陽而能變九者陽之能變者也坤純隂而能變六者隂之能變者也六十四卦三百八十四爻隂陽各居其半陽爻一百九十有二皆乾用九之所變也隂爻一百九十有二皆坤用六之所變也古之揲蓍者以九為老陽以六為老隂老陽生七為少陽老隂生八為少隂以蓍揲之十有八變觀九六七八辨隂陽而一卦成焉六十四卦咸如此也故於乾言用九於坤言用六諸卦皆由九六之變以生也九者何一三五是也六者何二四是也一二三四五天地之大萬物之多隂陽之妙不逃於此矣諸卦無文言而惟乾坤有文言者諸卦皆由乾坤九六而生則於乾坤訓說特致其詳也古本易彖象文言不分在諸卦案前漢藝文志曰虙犧氏始作八卦文王重易六爻作上下篇孔子為之彖象繫辭文言序卦之屬十篇以此觀之則彖象文言不分在諸卦盖别為篇簡者也歐陽文忠公崇文總目叙釋曰田何之易始自子夏傳之孔子卦象爻彖與文言説卦等離為十二篇費直之易專以彖象文言參解易爻凡以彖象文言雜入卦中者自費氏始古十二篇之易遂亡其本王弼為注亦用彖象相雜之經以此觀之則今世所行王弼易乃彖象相雜之易非古本易也盖教授之家各宗其師之説而自晉以後唯王弼之學獨傳故也詩書序詩序本自為一編不在衆篇之首至毛公為詩傳乃分序於衆篇之首詩序謂之義所謂有其義而亡其辭是也詩曰南陔孝子相戒以養也白華孝子之潔白也華黍時和嵗豐宜黍稷也有其義而亡其辭由庚萬物得由其道也崇丘萬物得極其髙大也由儀萬物之生各得其宜也有其義而亡其辭鄭氏曰孔子論詩雅頌各得其所時俱在耳遭戰國及秦之世而亡之其義則與衆篇之義合編故存至毛公為詁訓傳乃分衆篇之義各置於其篇端由此觀之則詩序本不在衆篇之首至毛公始分置於衆篇之首亦可知矣詩序子夏之所作而王荆公以謂讀江有汜之詩雖子夏無以知其美媵然子夏與孔子同時文籍未淪䘮必有所受而作也史記孔子世家曰古詩三千餘篇孔子取三百五篇歐陽文忠公崇文總目叙釋曰孔子刪詩三千餘篇取其三百十一篇著於經秦楚之際亡其六然則古詩三千而取者三百則十取其一耳餘皆逸詩也逸詩書史亦多引之書序本自為一篇不在衆篇之首至孔安國作傳乃分序於衆篇之首故孔安國尚書序曰并序凡五十九篇書序序所以為作者之意昭然義見宜相附近故引之各冠其篇首定五十八篇是也前漢藝文志有周書七十一篇顔師古注曰劉向云周時誥誓號令也盖孔子所論百篇之餘也今之存者四十五篇矣按班固作漢書時周書有七十一篇自後復經兵火書籍散亡至晉時盜發汲郡冡得竹簡書有周書束晳校讎而訛滅脫散不可考者甚多故顔師古曰今之存者四十五篇盖至於唐所存者四十五篇耳皆逸書也逸書者虞夏商書皆有之不特周書也故什箋今毛詩詁訓傳三十卷觀國按前漢藝文志曰毛詩故訓傳三十卷顔師古注曰故者通其指義也詩家又有魯故二十五卷齊后氏故二十卷孫氏故二十卷韓故三十六卷漢魯申公有詩訓故以此觀之則今毛詩當為故訓傳改故為詁者後人妄改之也國風不言什而雅頌言什者盖詩以十篇為什周南十一篇召南十四篇􅆁十九篇鄘十篇衞十篇王十篇鄭二十一篇齊十一篇魏七篇唐十二篇秦十篇陳十篇檜四篇曹四篇豳七篇凡此皆多寡不等故不稱什也雅頌皆十篇為聨故皆稱什惟魚藻之什十四篇蕩之什十一篇閔予小子之什十一篇亦謂之什者過乎十則亦稱什舉其成數耳若夫不及十則不稱什故駉頌止四篇那頌止五篇而皆不稱什此其可見也後漢衞宏傳曰鄭康成作毛詩箋章懐太子注曰箋薦也薦成毛義也引張華博物志曰鄭注毛詩曰箋不解此意或云毛公嘗為北海相鄭康成是郡人故以為敬云觀國按諸家字書箋子堅切表識書也亦作牋㮍盖古人牋牘以竹或木為之故箋字從竹牋字㮍字皆從木謂之牋表者以此牋牘而表出己意也西漢時傳詩有三家申公作魯詩后蒼作齊詩韓嬰作韓詩三家皆列於學官而毛公之學未得立及中興後謝曼􅀸衞宏鄭衆賈逵馬融鄭康成等皆宗毛公學於是毛詩盛行鄭康成作毛詩箋者盖毛公有不訓者鄭氏訓之毛公有訓未盡者鄭氏續之毛公有誤訓者鄭氏證之盖以箋牘顯出巳意而又不沒毛公之學也故謂之箋雖若薦成毛義而箋則非薦也毛公為北海相有年矣至鄭康成乃以郡人之故而以箋為敬此好事者為之辭也奚斯班孟堅兩都賦序曰臯陶歌虞奚斯頌魯同見采於孔氏列於詩書王文考魯靈光殿賦序曰詩人之興感物而作故奚斯頌僖歌其路寢而功績存乎辭徳音昭乎聲觀國按閟宫之詩曰松桷有舃路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若毛氏傳曰大夫公子奚斯者作是廟也鄭氏箋曰奚斯作者教䕶属功課章程也盖魯人新姜嫄之廟而公子奚斯董其事爾所謂作者作廟也非作頌也閟宫之頌非奚斯之作也班孟堅王文考賦序皆以魯頌為奚斯所作則誤矣揚子法言曰顔嘗晞夫子矣正考甫常晞尹吉甫矣公子奚斯嘗晞正考甫矣觀國按尹吉甫作大雅崧髙烝民之詩以美宣王考甫能得商頌十二篇歸以頌湯之徳二人皆有功於詩教者也若奚斯者徒能作魯廟而已於詩頌固無預焉當奚斯作廟之時閟宫之頌未作也廟成之後詩人始頌之則奚斯與正考甫二人非同類揚雄豈亦誤以閟宫之詩為奚斯所作耶不然何以言晞也李軌注揚子曰奚斯魯僖公之臣慕正考甫作魯頌此言正誤也獻犧周禮司尊彛曰其朝踐用兩獻尊其再獻用兩象尊鄭氏注曰獻讀為犧犧尊飾以翡翠象尊以象鳳凰陸徳明音義曰獻犧同素何反司尊彞曰凡六尊六彞之酌鬱齊獻酌鄭氏注曰獻讀為摩莎之莎摩莎泲之出其香汁也陸徳明音義曰獻素何反觀國案司尊彞曰春祠夏禴用獻尊象尊此兩尊相須之尊也秋嘗冬烝用著尊壺尊此兩尊相須之尊也追享朝享用大尊山尊此兩尊相須之尊也獻尊即犧尊是也舉其事則謂之獻尊舉其名則謂之犧尊一物而兩名爾春秋左氏傳曰犧象不出門禮記曰君兩酌犧象又曰尊用犧象又曰犧象周尊也然則犧象二尊相須可知矣盖犧尊為牛形象尊為象形犧音羲獻音憲二字各讀如本字其義灼然無可疑者毛詩疏引王肅注禮曰犧象二尊全刻牛象之形鑿背為尊其説是巳司尊彞變犧為獻者盖朝踐乃始獻之禮舉祀事言之故謂之獻尊若舉其名則謂之犧尊也鄭氏既讀獻為犧又以獻犧二字皆音莎既謂犧尊飾以翡翠又謂象尊以象鳳凰皆誤矣陸徳明循鄭氏之說以獻犧二字並音莎而於他經凡言獻言犧處悉音以為莎不能訂正其義而反播其疑於後世使後學愈疑良可怪也南史劉杳傳曰杳嘗於沈約坐語及宗廟犧尊約云鄭康成答張逸謂畫鳳凰尾婆娑然杳曰此言未必可信古者犧尊彞皆刻木為鳥獸鑿頂及背以出納酒魏時魯郡地中得齊大夫子尾送女器犧尊作犧牛形晉永嘉中賊曹嶷於青州發齊景公冢得二尊形亦為牛象二處皆古之遺器也約以為然以此觀之則犧尊為牛形可以不疑矣木𤓰詩詩曰投我以木𤓰報之以瓊琚投我以木桃報之以瓊瑶投我以木李報之以瓊玖毛氏傳曰木𤓰楙木可食之木也觀國按詩之意乃以木為𤓰為桃為李俗謂之假果者盖不可食不適用之物也亦猶畫餅土飯之義爾投我以不可食不適用之物而我報之以瓊玉可貴之物則投我之物雖薄而我報之實厚衞國有狄人之敗出處於􅒩齊桓公救而封之遺之車馬器服衞人思之欲厚報之則投我之物雖薄而我思報之實欲其厚此作詩者之意也鄭氏以木𤓰為楙木則是果實之木𤓰也誤矣爾雅曰楙木𤓰郭璞注曰實如小𤓰酢可食此即果實之木𤓰也後世文士多引木𤓰之詩以為果實之木𤓰皆誤矣如初學記六帖於果實木𤓰門類皆引衞風木𤓰之詩亦皆誤矣前軰有詠木𤓰詩曰翻思成實為嘉惠擬把瓊瑶作報章此正誤用之也昔之記言者謂孔子曰吾於木𤓰見苞苴之禮行焉觀國按木𤓰詩設投報之辭以為喻爾未嘗真有投報也而記言者遂以為苞苴恐非孔子之言也淇澳詩曰緑竹猗猗緑竹青青緑竹如簀毛氏傳曰緑王芻也竹萹竹也觀國按緑與竹二物也非笋竹之竹而世多誤用緑竹為笋竹之竹采緑詩曰終朝采緑不盈一匊毛氏傳曰緑王芻也盖爾雅曰菉王芻又曰竹萹蓄此乃詩所謂緑竹也禮記大學篇曰詩云瞻彼淇澳菉竹猗猗此正用菉字毛詩借用緑字其義則通也先達詩集中有緑竹詩曰自得東南號猗猗相悦同盖用東南之竹箭事乃用為笋竹之竹也誤矣宗彞書曰予欲觀古人之象日月星辰山龍華蟲作會宗彞藻火粉米黼黻絺繡盖日月星辰山龍華蟲此六章作會於衣也宗彞藻火粉米黼黻此六章絺繡於裳也此舜之十二章而孔安國乃以作會宗彞四字為一句又訓曰宗廟彝尊亦以山龍華蟲為飾觀國按宗彝者即周禮司尊彝所謂祼用虎彞蜼彞是也刻畫虎蜼之形於彞器之上祀宗廟則用此二彞故謂之宗彞若舜之十二章則絺繡彞器於裳而彞器之飾則以虎以蜼此禮有定制不可易也孔安國初不曉其義既誤合尚書句讀又誤訓以謂彞尊亦以山龍華蟲為飾其紊經也甚矣今世廟貎塑像及畫壁凡法服止畫一虎一蜼而不見彞器亦誤也當先畫彞器而後飾虎蜼之形於彞器之上乃為合禮盖自唐以來禮文寖弊畫工沿襲舊格初不識制度不足怪也禮記明堂位曰夏后氏以雞夷鄭氏注曰夷讀為彞此記禮者假借用字耳中庸引詩曰憲憲令徳表記引詩曰瑕不謂矣此類是也二王振鷺詩曰二王之後來助祭也毛氏傳曰二王夏商也其後把也宋也觀國按禮記曰武王克商未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於把封商之後於宋盖武王克商有天下而封黄帝堯舜夏商之後者繼絶世也方周人祭於廟之時黄帝堯舜之後皆在本國未來助祭而二王之後適來助祭周人美之故振鷺之詩所為作非萬世不易之法也後世不察乃以謂王者必當存二王後故漢魏南北隋唐之際皆舉二王之典夫繼絶世者奚必止於二代耶鄭氏曰王者存二代此盖未嘗深考其由也後漢百官志曰建武二年封周後姬常為周承休公五年封商後孔安為商紹嘉公且二王一體也漢不封夏而封商周何耶若曰繼絶世則髙帝滅秦而為漢則秦為絶國矣捨秦不封而逺取商周又何耶唐以周隋為二王後且拓拔之魏髙氏之齊與周隋同為絶國而專取周隋又何耶此皆循名而失實者也祥瑞賈誼新書曰詩云一發五豝于嗟乎騶虞騶者天子之囿也虞者囿之司獸者也歐陽文忠公五代史蜀書曰騶虞古不知其何物也詩曰于嗟乎騶虞賈誼以謂騶者文王之囿虞虞官也當誼之時其説如此然則以之為獸者其出於近世之說乎觀國按毛氏詩傳曰騶虞義獸也白質黑文不食生物有至信之徳則應之詳觀騶虞詩辭則獸是已詩曰仁如騶虞又曰徳如羔羊又曰徳如鳲鳩又曰信厚如麟趾盖皆指物而言也秦漢之際言詩者各自名家其説皆有異同賈誼必遵其師所授之說未必當也歐公曰以之為獸者其出於近世之說乎觀國按賈誼在文帝時為長沙傅前漢儒林傳曰毛公治詩為河間獻王博士則在景帝時為博士與賈誼同時人也然則以騶虞為獸者非出於近世之説矣五代時王建據蜀龜龍麟鳳騶虞之類畢出於其國歐陽文忠公修五代史破之以為非瑞白龍見於水是失職也可以為妖矣鳳凰或出於謬政危亡之時非瑞也麟人罕識之獸魯哀公西狩窮山竭澤獵而獲之非其自出春秋譏之非瑞也龜汙泥川澤不可勝數其死也貴於卜官觀國按易以龍喻君之徳取其神變也鳳者文明之物故曰鳳兮鳳兮何徳之衰傷無文明之時也麟信也故詩以麟之趾麟之定麟之角喻信厚之子龜夀而前知也此四物者以喻聖人之有徳者故禮以為四靈而史亦記之耳非謂治世必出而亂世必藏也譬猶玉者至貴之寳而君子比徳焉寧有治世則玉見而亂世則玉隠耶離騷以香草譬君子以惡鳥譬小人寧有治世則無惡鳥而亂世則無香草耶然則麟鳳龜龍頻出於五代亂世之蜀何傷乎勺藥溱洧詩曰維士與女伊其相謔贈之以勺藥毛氏傳曰勺藥香草也其别則送以勺藥結恩情也觀國按崔豹古今注曰勺藥一名將離將行則送之以勺藥以此觀之則勺藥離草也離别則贈之以見志也江淹别賦曰下有勺藥之詩淹用為離别事盖可見矣若曰香草則草之香者多矣奚必勺藥而後可以結恩情也司馬相如子虚賦曰勺藥之和具而後御之服䖍注曰勺藥以蘭桂調食文頴注曰五味之和也晉灼注曰南都賦云歸鴈鳴鵽香稻鮮魚以為勺藥酸甜滋味百種千名顔師古注曰諸家之說皆未當也勺藥藥草名其根主和五臟又辟毒氣故合之於蘭桂五味以助諸食因呼五味之和為勺藥耳今人食馬肝馬腸者猶合勺藥而煮之豈非遺法乎觀國按子虚南都二賦言勺藥者勺音酌藥音略乃以魚肉等物為醢醬食物也與溱洧詩所言勺藥異矣詩之勺藥乃草類也今勺藥花是已廣韻曰勺市若切又張略切藥以灼切又良約切二字各有二音子虚賦曰勺藥之和具而後御之所謂御者御食物也未有御五味者也南都賦曰歸鴈鳴鵽香稻鮮魚以為勺藥盖以鴈鵽魚稻為食也又按枚乗七發曰於是使伊尹煎熬易牙調和熊蹯之濡勺藥之醬薄耆之炙鮮鯉之鱠五臣注文選曰勺音酌藥音略又按張景陽七命曰窮海之錯極陸之毛伊公爨鼎庖子揮刀味重九沸和蒹勺藥晨鳬露鵠霜鵽黄雀五臣注文選曰勺音酌藥音略然則讀勺藥為酌略者是以魚肉等物為醢醬食物非溱洧之勺藥明矣子虚賦諸家注説皆誤以為溱洧之勺藥也韓退之偃城夜會聨句詩曰兩廂鋪氍毺五鼎調勺藥又曰但擲顧笑金仍祈却老藥盖前句勺藥字音酌略後句藥字音瀹二藥字不同音也箕子前漢儒林孟喜傳曰蜀人趙賔好小數書後為易飾易文以為箕子明夷陰陽氣亡箕子者萬物方荄茲也顔師古注云易明夷卦彖曰内難而能正其志箕子以之六五爻辭曰箕子之明夷利貞此箕子謂商父師說洪範者也賔妄為說耳觀國按虙犧作八卦而文王重之為六十四則爻辭乃文王所作也方文王重爻之時箕子之明未夷至紂不道箕子奴然後箕子之明始夷武王伐紂一戎衣而天下大定乃反商政釋箕子囚封比干墓式商容閭當此時箕子之明雖夷而利貞故明不可息也以此考之則箕子之明夷其在武王之時乎文王重爻之時於明夷六五之辭不應預言箕子之明夷此學者素以為疑也趙賔訓易欲避此疑故謂箕子者隂陽之氣萬物方荄茲非商紂之箕子也顔師古不悟其意乃引明夷卦爻之辭以釋之夫學者豈不知商之有箕子耶趙賔之說雖鑿而師古原不曉其因也或說謂文王重卦而其辭則周公孔子之作如此則明夷言箕子不礙矣介雞春秋昭公二十五年左氏傳曰季郈之雞鬭季氏介其雞郈氏為之金距杜預注曰𢷬芥子播其羽或曰以膠沙播之為介雞觀國觀史記魯世家曰季氏與郈氏鬭雞季氏介雞羽郈氏金距司馬遷改介為芥而杜預用其說以訓左傳耳觀國按介與芥不相通用介者介胄之介也介其雞者為甲以蔽雞之臆則可以禦彼之金距矣司馬遷誤改介為芥而杜預循其誤既自以為疑又増膠沙之説夫以膠浹沙而播其羽是自累也又惡能勝彼雞大率司馬遷好異而惡與人同觀史記用尚書戰國䇿國語世本左氏傳之文多改其正文改績用為功用改厥田為其田改肆覲為遂見改宵中為夜中改咨四嶽為嗟四嶽改協和為合和改方命為負命改九載為九嵗改格姦為至姦改慎徽為慎和改烈風為暴風改克從為能從改濬川為決川改恤哉為靜哉改四海為四方改熈帝為美堯改不遜為不訓改胄子為穉子改維清為維靜改天工為天事改底績為致功改降丘為下丘改納錫為入賜改孔修為甚修改夙夜為早夜改申命為重命改汝翼為汝輔改敕天為陟天改率作為率為改宅土為居土如此類甚多又用論語文分綴為孔子弟子傳亦多改其文改吾執為我執改毋固為無固改指諸掌為視其掌改性與天道為天道性命改未若為不如改便便為辯辯改滔滔為悠悠如此類又多子長但知好異而不知反有害於義也臧否臧否之否音鄙臧者善也否者不善也書曰格則承之庸之否則威之陸徳明音義曰否音鄙易遯卦九四好遯君子吉小人否王弼注曰否音臧否之否君子好遯故能舎之小人繫戀是以否也鼎卦初六鼎顛趾利出否王弼注曰否不善之物也抑詩曰於乎小子未知臧否烝民詩曰邦國若否仲山甫明之小旻詩曰國雖靡止或聖或否春秋昭公五年左氏傳曰一臧一否其誰能當之諸葛孔明出師表曰陟罰臧否不宜異同張平子西京賦曰街談巷議彈射臧否以上否字皆音鄙俗或讀音缶則誤矣􅄞叔夜幽憤詩曰民之多僻政不由己惟此􅄶心顯明臧否五臣注文選曰否平鄙切若如五臣注則平鄙切乃音備是泰否之否非臧否之否矣今禮部韻略上聲㫖字部内否音鄙注曰臧否也新制云按詩未知臧否釋文音鄙如此之類全句即詩於此韻内押如散押臧否之類即許於有字韻内否字通押觀國按有字韻内否字音缶若散押臧否亦是音鄙豈可遽變而音缶耶凡上有臧字則下當音鄙此一定不可易也新制乃元祐五年太學博士孫諤校對禮部韻略而奏請引周易師卦曰師出以律否臧凶釋音曰否鄙惡也馬鄭王肅曰否音方九反左傳隠公十一年曰師出臧否亦如之釋音曰否音鄙又方九反觀國按周易左傳皆存兩音者蓋陸徳明不能稽考訂正之而存兩音使後人自擇之也孫諤奏請又不能決於去取故有許通押之文且音鄙音缶二字音與義皆不同實不可通押胥靡史記儒林傳曰申公為楚太子戊傅戊不好學胥靡申公徐廣注曰胥靡腐刑前漢儒林傳曰胥靡申公顔師古注曰胥靡相係而作役前漢楚元王傳曰王戊與呉通謀申公白生諫不聴胥靡之應邵注曰詩云若此无罪淪胥以鋪胥靡刑名也晉灼注曰胥相也靡隨也古者相隨坐輕刑之名顔師古注曰聮繫使相隨而服役之故謂之胥靡猶今之役囚徒以鏁聨綴耳而云隨坐輕刑非也史記賈誼傳鵩鳥賦曰傅説胥靡兮乃相武丁徐廣注曰胥靡腐刑也前漢賈誼傳鵩鳥賦曰傅説胥靡兮乃相武丁張晏注曰胥靡刑名也傅說被刑築於傅巖顔師古注曰胥靡相隨之刑也觀國按書説命曰乃審厥象俾以形旁求于天下說築傅巖之野惟肖孔安國傳曰傅氏之巖在虞虢之界通道所經有澗水壊道常使胥靡刑人築䕶此道說賢而隠代胥靡築之以供食以此知鵩鳥賦云傅說胥靡者乃服役之刑也莊子曰胥靡登髙而不懼遺死生也又曰築十仞之城城者既十仞矣則又壊之此胥靡之所苦也咸元英疏曰胥靡徒役人也揚雄解難曰胥靡為宰寂寞為尸盖胥靡者刑役之人於死生則輕而無顧藉故登髙而不懼不畏險也胥靡為宰無重累也城既十仞而又壊之則築役之勞未已此胥靡之所苦也凡此又以見胥靡者服役之刑也腐刑无役若以胥靡為腐刑則傅說不應有版築之役矣史記佞幸傳曰李延年坐法腐然則史記正言腐不謂之胥靡也又胥靡亦邑名春秋哀公十八年左氏傳曰蒍子馮公子格率銳師侵費滑胥靡杜預注曰胥靡鄭邑又昭公二十六年左氏傳曰王入于胥靡杜預注曰胥靡周邑本鄭地又定公六年左氏傳曰鄭於是乎伐馮滑胥靡負黍狐人闕外晉閻沒戍周且城胥靡杜預注曰鄭伐周六邑諸史地理書亦不言胥靡地名之義盖不可考也孔子生史記孔子世家魯世家十二諸侯年表皆曰魯襄公二十二年嵗在庚戌孔子生魯哀公十六年嵗在壬戌孔子卒享年七十有三然公羊傳曰襄公二十一年十有一月庚子孔子生何休解曰嵗在己夘又榖梁傳曰襄公二十一年十月庚子孔子生然則公羊榖梁與史記世家年表皆不同也觀國按春秋襄公二十一年十月庚辰朔日有食之盖十月朔為庚辰則二十一日為庚子也十有一月無庚子矣公羊謂十有一月庚子者誤也魯襄公二十一年嵗在己酉而何休謂嵗在己夘者誤也孔子享年七十三以嵗計之當魯襄公二十二年生是嵗周靈王二十一年嵗在庚戌也而公羊榖梁皆云襄公二十一年誤矣史記五帝紀曰舜年二十以孝聞年三十堯舉之年五十攝行天子事年五十八堯崩年六十一代堯踐帝位踐帝位三十九年南廵狩崩於蒼梧之野觀國以史記文考之舜夀百嵗也然尚書舜典曰舜生三十登庸三十在位五十載陟方乃死盖三十登庸三十在位服堯䘮三年其一在三年之數為天子五十年凡夀一百一十有二嵗此孔子所定之書也則知史記為誤矣史記六國年表周元王元年徐廣曰元年乙丑皇甫謐曰元年癸酉又周貞定王元年徐廣曰元年癸酉皇甫謐曰元年癸亥觀國按章衡編年通載周元王元年嵗在乙丑周貞定王元年嵗在癸酉以此知徐廣之說為是而皇甫謐之說非也納幣禮有納采問名納吉納徴請期親迎謂之六禮而不謂之納幣春秋榖梁傳曰禮有納采有問名有納徴有告期四者備而後娶禮也范寗解曰納采者采擇女也問名者卜吉凶也納徴者納幣也吿期者告迎期也然則納幣者禮之納徴是已周官媒氏曰凡嫁子娶妻入幣純帛無過五兩鄭氏注曰納幣也五兩十端也引雜記曰納幣一束束五兩兩五尋然每端二丈觀國按束帛為十端毎端二丈則是以四丈為一兩中屈之成兩端五兩為十端矣不謂之十端而謂之五兩者盖用五兩而中屈之成十端其本則用五兩而束之則見其有十端也或曰入幣或曰納幣者周官媒氏通言嫁子娶妻用幣之數故曰入幣若夫問名納吉而後納幣者問名納吉則事已定矣事已定則男家納幣於女家致恭以成禮盖男下女之意也故春秋書納幣者皆親事已定而後納幣也春秋又書逆女乃先納幣而後逆女禮之序當如此耳春秋莊公二十二年冬公如齊納幣左氏無傳杜預解曰母䘮未再期而圗婚非禮也公羊榖梁曰親納幣非禮也觀國按僖公二十一年秋七月戊戌夫人姜氏薨至二十二年冬公如齊納幣方是時母䘮一年有半是母喪未再期而圗婚故春秋書納幣以見其非禮也又春秋文公二年冬公子遂如齊納幣左氏傳曰襄仲如齊納幣禮也凡君即位好舅甥修婚姻娶元妃以奉粢盛孝也孝禮之始也觀國按僖公三十三年十二月乙巳公薨文公二年冬公子遂如齊納幣則自僖公薨至文公二年冬未滿二十五月是亦居䘮而圗婚與莊公居喪納幣一也左氏乃曰襄仲如齊納幣禮也有以見左氏之誤也公羊傳曰公子遂如齊納幣譏長娶也榖梁傳曰公子遂如齊納幣范寗解曰喪制未畢而納幣非禮也以春秋文及三傳攷之左氏之誤昭昭矣古文唐李濟翁資暇録曰古文使字作􅡛左氏春秋傳言行李乃是行使後人誤變為李字觀國按春秋僖公三十年左氏傳曰若舎鄭以為東道主行李之徃來共其乏困杜預曰行李使人也又襄公八年左氏傳曰亦不使一介行李告于寡君杜預曰行李行人也又昭公十三年左氏傳曰諸侯靖兵好以為事行理之命無月不至杜預曰行理使人通聘問者然則左氏傳或言行李或言行理皆謂行使也但文其言謂之行李又謂之行理耳以此知非改古文􅡛字為李也古文字多矣李濟翁不言􅡛字出何書未可遽爾泛舉而改作也唐書藝文志曰今文尚書三十卷開元十四年明皇以洪範無偏無頗聲不協詔改為無偏無陂盖古文尚書曰無偏無頗遵王之義明皇以頗字與義字不協韻故改為無陂與義字協聲於文意雖亦通而於改作之譏未能免也明皇不好𨽻古天寳三載詔集賢學士衛包改古文尚書從今文故有今文尚書今世所傳尚書乃今文尚書也今文尚書多用俗字如改說為恱改景為影之類皆用後世俗書良因明皇不好𨽻古故有司亦隨俗鹵莽而改定也司馬遷班固作史亦或用古文字史記商本紀曰湯既勝夏歸仲􅣂作誥􅣂乃古文虺也又周本紀曰穆王命伯臩申誡太僕作臩命臩乃古文冏也又孔子弟子有曽蒧蒧乃古文㸃也前漢古今人表有伯㷩㷩乃古文􅂒也又百官公卿表曰作朕虞乃古文益也又郊祀志曰天墬神祗之物皆至墬乃古文地也又禮樂志曰屮木零落屮乃古文草也又刑法志曰􅋏之以行􅋏乃古文悚也又藝文志有大􅀢三十七篇􅀢乃古文禹也又地理志曰隨山栞木栞乃古文刊也又平原郡安惪縣惪乃古文徳也又清河郡􅟗題縣􅟗乃古文莎也又北地郡大縣乃古文要也又路温舒傳曰􅓟者不可復属􅓟乃古文絶也又叙傳曰東厸虐而殱仁厸乃古文鄰也又召信臣傳曰晝夜㸐藴火㸐乃古文然也又五行志曰王心弗􅨹􅨹乃古文堪也又揚雄傳反離騷曰纍既夫傅説兮乃古文攀也後漢輿服志曰乾巛有文巛乃古文坤也諸史如此類甚多然則作史者尚不忍廢古文而况古文經書其可輕改作乎許慎說文序曰依類象形謂之文形聲相益謂之字著於竹帛謂之書五帝三王之世改易殊體封於泰山者七十有二代靡有同焉盖古者帝王登封泰山必有金石之刻其文字形體各不同歴時既乆罕有傳者今世所傳秦皇時李斯所篆嶧山碑如御史大夫篆作御史夫夫竊意夫字亦必有大音李斯用古文篆後世不知其用字之因也又今世所得古器秦時鐘鼎篆銘有字皆篆為彐如有秦篆為彐秦之類後世字書彐字為又字諸字書未嘗讀又為有也許慎説文屮字丑列切兩艸相並為艸即今之草字而漢書乃用屮字為草字凡此類皆不可以字書考證之也其記已忌揚之水詩曰彼其之子不與我戍申彼其之子不與我戍甫彼其之子不與我戍許羔裘詩曰彼其之子舎命不渝彼其之子邦之司直彼其之子邦之彦兮汾沮洳詩曰彼其之子美無度彼其之子美如英彼其之子美如玉候人詩曰彼其之子三百赤芾彼其之子不稱其服彼其之子不遂其媾鄭氏箋曰其或作記或作已讀聲相似禮記表記篇曰彼記之子不稱其服韓詩外傳曰彼己之子舎命不渝彼己之子邦之司直彼己之子邦之彦兮彼己之子碩大且篤大叔于田詩曰叔善射忌又良御忌抑磬控忌抑縱送忌叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌鄭氏箋曰忌讀如彼己之子之巳陸徳明毛詩釋音曰其音記觀國按詩用其字忌字禮記用記字韓詩外傳用巳字四字雖不同然其原意則四字皆助辭也其義相附近故四字讀為四聲何傷乎若循鄭氏之箋陸氏之音則四字者當讀而為一音誤矣經書中用字如此類者尚多有之書曰聖有謨訓春秋左氏傳曰聖有謩勲訓字去聲勲字平聲二字不同音而義則通也詩曰顯顯令徳宜民宜人中庸曰憲憲令徳宜民宜人顯字上聲憲字去聲二字不同音而義則通也詩曰心乎愛矣遐不謂矣表記曰心乎愛矣瑕不謂矣變遐為瑕也詩曰有覺徳行四國順之緇衣曰有梏徳行四國順之變覺為梏也書曰自作孽不可逭孟子曰自作孽不可活變逭為活也書曰克明俊徳大學曰克明峻徳變俊為峻也詩曰駿命不易大學曰峻命不易詩曰駿極于天孔子閒居曰峻極于天變駿為峻也書曰髙宗亮隂喪服四制曰髙宗諒闇乃用闇字也詩曰假樂嘉成王左氏傳曰晉侯賦嘉樂變假為嘉也詩曰凡民有䘮匍服救之檀弓曰凡民有䘮扶服救之變匍為扶也書曰㒺有擇言在身表記曰罔有擇言在躬變身為躬也凡此雖或變其字然各從其音而讀之不害於義若必繩之以一音則将亂天下之字音非所以示後學也洒新臺詩曰新臺有洒河水浼浼毛氏曰洒髙峻也浼浼平地也陸徳明音義曰洒七罪反觀國按新臺詩第一章曰新臺有泚河水瀰瀰泚與瀰協韻故第二章曰新臺有洒河水浼浼毛氏欲以洒浼二字協韻乃讀洒為七罪反而訓之曰洒髙峻也然字書洒無七罪反之音亦無髙峻之義按字書洒字音先禮切與洗同而與浼字亦協韻盖泚者鮮明貎也洒亦有潔靜之意於詩之義通當讀洒為先禮切則音與義兩得之矣春秋哀公二十一年左氏傳曰在上位者洒濯其心音義曰洒先禮反前漢平帝紀曰洒心自新之意也又昌邑王賀傳曰以湔洒大王顔師古皆曰洒先禮反史記貨殖傳曰洒削薄技也孟子曰願為死者一洒之此皆讀與洗同而俗或讀作沙下反者非也洒又音先典反玉藻曰君子之飲酒也受一爵而色洒如也陸徳明音曰洒先典反史記范睢傳曰羣臣莫不洒然變色易容徐廣曰洒先典反盖洗字亦音先典反洒亦如之也洒又音色懈反與灑同為洒掃亦作灑埽東山詩曰洒埽穹窒伐木詩曰於粲洒埽抑詩曰洒埽庭内周禮𨽻僕曰掌五寢之埽除糞洒之事論語曰子夏之門人當洒埽應對禮記内則曰灑埽室堂凡此或用洒字或用灑字其義則一而皆讀音色懈反各隨其音而生義也如罄春秋僖公二十六年左氏傳曰齊孝公伐我北鄙公使展喜犒師齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐杜預曰如而也言居室而資糧垂盡觀國按字書如而也似也徃也若也經書用如字各有一義室如之如當訓似又此罄字非訓盡許慎説文曰罄器中空也室如懸罄者如懸一器其中空而無物耳罄亦訓盡詩曰缾之罄矣是也杜預以如訓而以罄訓盡則室而垂盡語不成文今以如字之義考之莊公七年夏夜中星隕如雨盖言星隕而且雨也此如字訓而者也左氏傳曰如火之燎于原又曰如農夫之務去草又曰今亦如之又曰邑亦如之凡此如字訓似者也公如齊觀社公如齊納幣公如齊逆女公如晉至河乃復夫人姜氏如齊凡此如字訓徃者也左氏傳曰同之不可也如是又曰唯有徳者能以寛服民其次莫如猛凡此如字訓若者也室如懸罄者如似也似懸空器若家徒四壁之義也於意則順而成文杜預所訓於字義雖通而於左氏文句則不順盖誤訓如為而故并與罄字訓誤也先達謂漢人如而通用盖如字所訓非一如而通用者特如字之義一端耳至於如齊觀社如農夫之務去草其次莫如猛之類又可以如而通用訓之耶蓐周禮夏官圉師掌養馬春除蓐釁廐鄭氏注曰蓐馬茲也觀國按爾雅釋器曰蓐謂之茲郭璞注曰茲者蓐席也又按春秋桓公十六年十有一月衞侯朔出奔齊公羊傳曰衞侯朔得罪于天子越在岱隂齊属負兹舎不即罪耳何休解曰諸侯有疾稱負茲士稱負薪由此觀之則馬茲者以草蓐為馬席以禦寒至春則除去之釁祭其廐以祓除疾疫也許慎説文曰蓐陳草復生也一曰蔟也玉篇廣韻蓐音辱草蓐也薦也然則所謂茲所謂蔟所謂薦皆席之異名盖皆以草蓐為之也春秋文公七年左氏傳曰秣馬蓐食濳師夜起杜預注曰早食於寢蓐中又宣公十二年左氏傳曰軍行右轅左追蓐杜預注曰追求草蓐為宿備又成公十六年左氏傳曰蓐食申禱又襄公十六年左氏傳曰簡兵蒐乗秣馬蓐食前漢韓信傳曰晨炊蓐食張晏注曰未起而牀蓐中食後漢廉范傳曰令軍中蓐食晨徃赴之章懐太子注曰蓐食早起食於寢蓐中也凡此皆謂以草蓐為席者也禮記月令秋曰其神蓐收者方秋時草已陳而收斂金之性也故謂之蓐收春曰勾芒者木性達生也夏曰祝融者火性昭􅄆也冬曰𤣥㝠者水性幽復也中央曰后土者土性專靜也五官之神其名各有義初不徒設釐禮記經解篇引易曰君子慎始差若豪釐繆以千里史記太史公自序引易曰失之豪釐差以千里前漢東方朔傳引易曰正其本萬事理失之毫釐差以千里前漢司馬遷傳引易曰差以豪釐繆以千里觀國按今易中無此語顔師古曰易象之别記者也盖古之以易名家者各有訓説而為之傳記故宗其學者皆以易曰稱之今其所引易其字有不同如禮記司馬遷皆言差若豪釐而太史公東方朔皆言失之豪釐禮記司馬遷皆言繆以千里而太史公東方朔皆言差以千里又班固作漢書於司馬遷傳言差以豪釐而於東方朔傳則言失之豪氂於司馬遷傳言繆以千里而於東方朔傳言差以千里班固所引兩傳用字皆不同以此知為易説者已久後人相傳襲而用之故其用字有不同也按字書釐字里之切理也福也氂字十毫也所謂毫氂者當用氂字而太史公用釐字者假借用之也世用毫氂絲忽者皆假釐字用盖釐氂二字古今通用之也前漢五行志曰天漢二年八月天雨白氂顔師古注曰凡言釐者毛之彊曲者志用氂字而顔師古注用釐字以此知氂釐二字通用久矣僖者諡也禧者福也史家於僖禧二字皆用釐字以代之故春秋僖公史家皆變為釐公漢文帝受釐宣室是也思文詩曰貽我來牟而劉向傳上封事引周頌曰飴我釐麰變來為釐顔師古注曰釐讀與來同觀國按鄭氏箋詩謂來者以榖俱來也盖天遺我祥榖之意劉向云釐麰義亦通然不謂讀釐音來也顔師古誤矣雅疋禮記緇衣篇引君雅曰夏暑雨冬祁寒鄭氏注曰君雅周穆王司徒書序作牙假借字也觀國按孔子作書序所謂穆王命君牙為周大司徒作君牙盖君牙本君雅也古文用牙字其實音雅後之變古文為𨽻者亦用牙字耳然許慎說文雅字烏加切楚烏也秦謂之雅則古人初不以雅字為大雅小雅之字也古文唯用疋字為大雅小雅之字故許慎說文曰疋所菹切古文以為大雅字以此觀之則古文以疋為大雅小雅字以雅為烏鳥而音烏加切及後世變古文為𨽻古又變𨽻古為今文遂各用他音字或俗字以易之而雅字遂專為大雅小雅之雅矣疋音雅又音所菹切是也胥字楚字疏字􅀈字皆從疋也疋又音山吕切與所字同音字書曰已也然則疋字一音雅一音疏一音所而後世文士不復用此字者盖後世書籍皆用今文而無古文此古文之所以不復用也容頌史記儒林傳曰學者多言禮而魯高堂生最本禮自孔子時其經不具至秦焚書於今獨有士禮髙堂生能言之而魯徐生善為容孝文時徐生以容為禮官大夫傳子至孫徐延徐襄襄善為容不能通經皆為禮官大夫及徐氏弟子公户滿意威生單次蕭奮皆為禮官是後能言禮為容者由徐氏前漢儒林傳曰漢興魯髙堂生傳士禮十七篇而魯徐生善為頌以頌為禮官諸言禮為頌者由徐氏蘇林注曰漢舊儀有二郎為此頌貎威儀事有徐氏後有張氏不知經但能盤辟為禮容天下郡國有容史皆詣魯學之顔師古注曰頌讀與容同觀國按字書頌字亦音容而頌亦作額有形容之義故詩序曰頌者美盛徳之形容史記用容字漢書用頌字其義一也漢書惠帝紀曰有罪當盜械者皆頌擊之顔師古注曰頌與容同又刑法曰當鞠繫者頌繫之顔師古注曰頌讀曰容寛容之也又揚雄傳河東賦曰麗鈎芒與驂蓐收兮服𤣥㝠及祝融敦衆神使式道兮奮六經以穗頌隃於穆之緝熈兮過清廟之雝雝賦以融字頌字雝字為韻則讀頌為容也容頌通用可知矣所謂士禮十七篇者今儀禮是也儀禮所載皆髙下俯仰疾徐疏數之節故漢書藝文志曰禮經三百威儀三千顔師古注曰禮經周禮是也威儀儀禮是也儀禮雖載髙下俯仰疾徐疏數之節而其名實皆道徳性命之理及措諸事業然後見於容貎威儀之際孔子曰禮云禮云玉帛云乎哉言以道徳性命為本而容貎威儀乃其末也漢之學者乃專以禮容為事至有不能通經而唯以容為禮官者乃祝史之能也亦何貴於禮官耶嗚呼禮學之敝久矣月令數祭月令春曰其數八夏曰其數七中央曰其數五秋曰其數九冬曰其數六鄭氏注引易曰天一地二天三地四天五地六天七地八天九地十木生數三成數八火生數二成數七金生數四成數九水生數一成數六但言八言七言九言六者舉其成數也土數五者土以生為本觀國按鄭氏謂月令舉五行之成數可也土生數五而成數十若曰舉其成數則中央土當言其數十而月令反言其數五則與四時舉成數異矣鄭氏知有此礙乃為之說曰土以生為本夫水火金木豈不以生為本奚獨土以生為本耶觀國按一二三四五者五行本生之數也土數五分旺於四時故月令舉五行本生之數而兼之以土數也春之木數三兼五為八也夏之火數二兼五為七也秋之金數四兼五為九也冬之水數一兼五為六也中央土數五分旺於四時無所兼也故其數五而已此皆五行之生數也而成數在其中矣豈有捨生數而遽舉其成數者乎此理灼然五行在天則配五方在人則配五臟是故春主木在人為肝夏主火在人為心秋主金在人為肺冬主水在人為腎中央主土在人為脾此不易之道也月令則不然春則祭先脾夏則祭先肺中央則祭先心秋則祭先肝冬則祭先腎乃與五行不相應觀國按月令所祭者五祀之神户竈門行中􅀢所陳之俎也非五臟之所配也春曰其祀户祭先脾者祀户之禮其俎以脾為先夏曰其祀竈祭先肺者祀竈之禮其俎以肺為先中央曰其祀中霤祭先心者祀中霤之禮其俎以心為先秋曰其祀門祭先肝者祀門之禮其俎以肝為先冬曰其祀行祭先腎者祀行之禮其俎以腎為先其在一人之身則脾在上肺次之心又次之肝又次之腎居下五祀之俎以此為次盖祭禮也非五行五臟相配之法也此其所以不同子卯春秋昭公九年左氏傳曰晉荀盈卒未葬晉侯飲酒樂膳宰屠蒯曰辰在子卯謂之疾日杜預注曰疾惡也紂以甲子䘮桀以乙夘亡故國君以為忌日檀弓曰知悼子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來歴階而升酌曰曠飲斯公曰爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣鄭氏注曰紂以甲子死桀以乙卯亡王者謂之疾日不以舉樂為吉事陸徳明音義引賈逵曰桀以乙卯日死紂以甲子日亡故以為戒又引張晏曰子刑卯卯刑子相刑之日故以為忌玉藻曰子卯稷食菜羮鄭氏注曰忌日貶也觀國按日之吉凶與嵗月遷轉固無常也禮云外事以剛日内事以柔日在人所擇耳不應常以子卯為忌日設有數十君如桀紂者何忌日之多也十二辰皆有刑有害不特子卯而張晏以謂子卯相刑之日非也後魏道武皇帝以甲子日出師討賊有言紂以甲子亡不宜出師者道武曰周武不以甲子日興乎遂出師有功唐李愬討蔡軍吏曰徃亡請避之愬曰賊以徃亡謂吾不來正可擊也及戰克捷宋髙宗為太傅日平江陵加領南蠻校尉將拜校尉遇四廢日佐史白遷日帝不許以此觀之則吉凶惟人所召不誠未有能動者也唐后妃傳曰憲宗懿安皇后郭氏元和元年進冊貴妃羣臣請立為后帝以嵗子午忌故報罷觀國竊謂憲宗意未欲立后故託子午忌為言耳古以正月五月九月為斷屠月著於刑統律書而時君生辰及祖宗忌日皆斷屠不舉樂唐書刑法志曰武徳二年頒新格五十三條凡斷屠日及正月五月九月不行刑又房𤣥齡等損益隋律斷屠月皆停死刑事固有歴世循襲毋傷於治道而不必削去者此類是也三易周禮大卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四杜子春注曰連山虙犠歸藏黄帝雖有此説而無據學者未然其說也觀國按隋書經籍志有歸藏十三卷注曰晉太尉參軍薛正注唐書藝文志有連山十卷司馬膺注歸藏十三卷南史梁元帝著連山三十卷以此觀之則連山歸藏周易乃三書也爾雅釋羊屬有牡羭郭璞注引歸藏曰兩壺兩羭初學記雲部引歸藏曰有白雲出蒼梧入于大梁舉此可以見矣禮記云孔子曰我欲觀夏道是故之把而不足徵也吾得夏時焉我欲觀商道是故之宋而不足徵也吾得坤乾焉鄭氏注曰得夏四時之書其書存者有小正得商陰陽之書其書存者有歸藏後之學者遂以三易繫之三代謂夏曰連山商曰歸藏周曰周易連山以艮為首歸藏以坤為首周易以乾為首而謂今之周易一書分其名為三若然則傳註所引連山歸藏之辭果何書耶大卜曰其經卦皆八其别皆六十有四言皆者三書皆有經有别也若以三代繫之則文王重卦為六十四夏商烏得有六十四耶盖三易自是三書不疑矣啖助唐啖助傳曰助愛公榖二家以左氏解義多謬其書乃出於孔氏門人且論語孔子所引率前世人老彭伯夷等類非同時而言左丘明恥之丘亦恥之丘明者盖如史佚遲任者又左氏傳國語屬綴不倫序事乖剌非一人所為盖左氏集諸國史以釋春秋後人便傳丘明著非也歐陽文忠公贊曰左氏與孔子同時以魯史附春秋作傳而公羊髙榖梁赤皆出子夏門人三家言經各有回舛然猶悉本之聖人其得與失盖十五義或謬誤先儒畏聖人不敢􅂺改也啖助摭訕三家不本所承自用名學慿私臆決趙陸從而唱之遂顯於時令後生穿鑿詭辨訕前人捨成説而自為紛紛助所階已觀國按啖助所疑者以論語左丘明恥之丘亦恥之謂左丘明在孔子前故孔子思其與己合而稱之非同時人既非同時人則左氏傳非丘明所為既非丘明所為則必有姓左而不得其名者為此傳也周末戰國以來著書之人無不傳其姓名者下至隂陽縱横巫醫卜祝雜技之書亦皆傳其姓名豈有作春秋傳顯顯如此而其名不傳者而况春秋傳非當時名儒不能作若謂姓左而失其名則所慮過矣雖然春秋經所書者左氏或無傳經所不書者左氏或列諸傳盖經所書而在魯史無他辭者左氏亦無傳經所不書而左氏亦列諸傳者託此以見諸國之史也左氏春秋傳内傳也國語外傳也内傳附於經故訛謬者鮮外傳世俗相傳訛謬且多栁宗元嘗改定其語然亦或與内傳乖異固不免也啖助乃以為屬綴不倫序事乖剌盖求瑕過矣自孔子作春秋後列國之史語唯有左氏内外傳其餘無聞焉何乖剌之多責耶疑異周禮考工記車人之事半矩謂之宣鄭氏注曰頭髪皓落為宣易曰巽為宣髪而今世所傳王弼易曰巽為寡髪盖俗書寡字下為四㸃作寡與宣字相疑考其義則宣髪之義為多也夬卦大象曰澤上於天夬君子以施祿及下居徳則忌王弼注曰夬者明法而決斷之象也忌禁也法明斷嚴不可以慢故居徳以明禁也弼乃以則字為明字考夬之義則明禁之義為多也前漢劉向上封事述災異引春秋曰七月降霜草木不死春秋無此文唯僖公三十三年冬十有二月隕霜不殺草劉向所引疑若春秋傳註之言也春秋昭公七年左氏傳曰晉侯夢黄熊入於寢門而國語則言黄能盖鼈三足為能與熊大異左氏傳國語皆左丘明所纂國語傳本訛謬最多春秋傳與經相傳當以春秋傳為正也許慎説文曰􅢚許介切忽也引孟子曰孝子心不若是􅢚今世所傳孟子曰孝子之心為不若是恝趙岐注曰恝無愁貎公明髙以為孝子不得意於父母自當怨悲豈可恝恝然無憂哉孟子音義曰張古黠切丁音界觀國按􅢚與恝義雖皆通然許慎作説文用前世古文字纂集成之所引孟子亦古文孟子當以許慎説文􅢚字為正也鶡冠子學問篇曰中流失舩一壺千金劉子隨時篇曰中流失舩一瓠千金按前漢藝文志有鶡冠子一篇韓愈讀鶡冠子文曰鶡冠子稱賤生於無所用中流失舩一壺千金予三讀其辭而悲之以此觀之則鶡冠子有是語乆矣劉晝竊其語也壺亦作瓠李瀚䝉求曰周勃織畚按史記漢書周勃傳皆曰勃以織薄曲為生未嘗言織畚而注䝉求者引史記周勃傳勃少以織畚為事史記烏有是言耶周禮挈畚以令糧畚草器可以貯糧而薄曲乃蠶具非類之物也孝經曰甫刑云一人有慶兆民賴之禮記緇衣篇引甫刑曰一人有慶兆民賴之按今在書吕刑篇者吕侯為穆王司冦作刑書曰吕刑後為甫侯故或稱為甫刑也禮記緇衣篇引尹吉曰惟尹躬及湯咸有壹徳尹吉曰惟尹躬先見于西邑夏按今在書太甲篇太甲者伊尹所作之書故禮記者或稱尹吉鄭氏謂吉當為告伊尹之誥也君奭曰在昔上帝割申勸寧王之徳禮記緇衣篇引君奭曰昔在上帝周申觀文王之徳鄭氏注曰古文為割申勸寧王之徳漢博士讀為厥亂勸寧王之徳三者皆異按今尚書乃變古文為𨽻者當以古文為是茷泮水詩曰魯侯戾止言觀其旂其旂茷茷鸞聲噦噦毛詩傳曰茷茷言有法度也鄭氏箋曰僖公來至於泮宫其旂茷茷然釋音曰茷蒲害反觀國按玉篇廣韻茷字分三音一音扶廢切與吠同聲一音博盖切與貝同聲一音房越切與伐同聲雖分三音而同訓以為草木葉茂多之貎也然則訓詩者乃以為有法度據詩曰其旂茷茷有盛多之義未見其有法度之義訓詩者思之未審耶又詩釋音曰茷蒲害反按蒲害反者讀與斾同音字書茷字亦無此音唯春秋定公四年左氏傳曰分康叔以大路少帛綪茷旃旌杜預注曰綪茷大赤取染草名也釋音曰茷步貝反案步貝反者亦與斾同音此與詩茷茷同義當讀音貝也若讀音斾則詩云其斾茷茷文不順矣左氏凡人名茷者皆音扶廢反成公二年傳曰宛茷為右又十六年傳曰囚楚公子茷又襄公十五年傳曰師茷師慧又哀公二十六年傳曰宋樂茷納衞侯凡此茷字皆人名陸徳明皆音作扶廢反其音是也成公十年傳曰晉侯使糴茷如楚釋音曰茷扶廢反又蒲發反案糴茷乃晉大夫名茷亦當音扶廢反陸徳明不能决而設兩音則非也文選有劉安招隠文曰木輪相紏兮茷骩五臣注曰茷蒲末反按此茷字亦當音貝骩與委通用茷骩者木之枝葉茂盛也五臣音非也上下上時亮切又時掌切下胡駕切又胡雅切上字時亮切下字胡駕切者定位之上下也上字時掌切下字胡雅者升降之上下也定位之上下一上一下不可易也升降之上下則有自上而下者有自下而上者自上而下則降而下也自下而上則升而上也其義大不同矣易曰本乎天者親上本乎地者親下又曰上天下澤履又曰有君臣然後有上下詩曰上以風化下下以風刺上又曰能慎㣲接下無不自盡以奉其上書曰光被四表格于上下又曰達于上下敬哉有土禮有上大夫下大夫上士下士凡此類皆定位之上下也詩曰雄雉于飛下上其音又曰燕燕于飛下上其音又曰紹庭上下陟降厥家周禮藳人以下上其食而誅賞司儀以二等從其爵而上下之凡此類皆升降之上下也易益卦彖曰自上下下其道大光天保詩曰君能下下以成其政所謂下下者降已以接下也前下字胡雅切後下字胡駕切凡言下下者二字當二音理之不易者也凱風詩曰爰有寒泉在浚之下有子七人母氏勞苦采苦詩曰采苦采苦首陽之下殷其靁詩曰殷其靁在南山之下何斯違斯莫或遑處宛丘詩曰坎其擊鼓宛丘之下無冬無夏值其鷺羽東門之枌詩曰東門之枌宛丘之栩子仲之子婆娑其下采蘋詩曰于以奠之宗室牖下誰其尸之有齊季女陸徳明釋音曰下字協韻則音户後皆倣此觀國案諸詩下字與苦字女字鼓字處字羽字栩字同章故云協韻則音户然擊鼓詩曰爰居爰處爰喪其馬于以求之于林之下東山詩曰蜎蜎者蠋烝在桑野敦彼獨宿亦在車下凡此下字與馬字野字同章未嘗與户字協韻則知餘詩下字不必讀音户也又七月詩曰十月蟋蟀入我牀下穹窒薰䑕塞向墐户此詩一章内同用下户二字則知下户二字當讀為兩音明矣聖洪範思曰睿睿作聖孔安國曰通㣲謂之睿於事無不通謂之聖盖土主思也五行唯土分王於四時五事唯思兼通於視聴言貎果能聰明睿智兼通乎天地萬物人倫性命之理斯為聖矣思有上達之義為其能至於聖也凡人能致思而通㣲則其明睿皆可至於聖苐患弗思耳書曰惟聖㒺念作狂惟狂克念作聖又曰凡人未見聖若不克見既見聖亦不克由聖爾其戒哉秦誓曰人之彦聖其心好之傅說告髙宗曰木從繩則正后從諫則聖盖后未必聖也惟從諫然後能兼天下之善而至於聖也春秋左氏傳曰春秋之稱㣲而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人誰能脩之聖人謂孔子也凡有聖徳者不必有天下故孟子曰伯夷聖之清伊尹聖之任栁下恵聖之和孔子聖之時然則聖其難矣仁次之故孔子自謙之辭曰若聖與仁則吾豈敢古之人精通一事者亦或謂之聖漢張芝精草書謂之草聖宋傅琰仕武康山隂令咸著能名謂之傅聖梁王志善書衞協張墨皆善史書皆謂之書聖隋劉臻精兩漢書謂之漢聖唐衞大經􅃉於易謂之易聖嚴子卿馬綏明皆善圍棋謂之碁聖張衡馬忠皆善刻削謂之木聖盖言精通其事而他人莫能及也後漢光武紀建武七年詔曰百僚各上封事無有所諱其上書者不得言聖明帝永平七年詔曰先帝詔曰禁人上事言聖而間者章奏頗多浮詞自今若有過稱虚譽尚書皆宜抑而不省觀國按謂有天下者當有聖徳以居之毋過稱虚譽可也禁言聖則非也五祀曲禮曰天子祭天地祭四方祭山川祭五祀嵗徧諸侯方祀祭山川祭五祀嵗徧大夫祭五祀嵗徧士祭其先祭法曰王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈鄭康成注曰五祀户竈中霤門行也曲禮商制祭法周制觀國按五祀在曲禮則天子諸侯大夫皆祭在祭法則諸侯立五祀而大夫則三祀者盖曲禮所言者嵗徧之祭也祭法所言者家祭也嵗徧之祭天子諸侯大夫皆有五祀為民祭也家祭則有等降之類故或七或五或三或二或一其祭止於家而已而言立者立其祀於家亦猶立廟也祭法又曰天子立七廟諸侯立五廟大夫立三廟適士二廟官師一廟庶士庶人無廟其等降之數亦與七祀五祀三祀二祀一祀之數同盖立廟者立家廟也立祀者立家祀也故祭法等降之數所以與曲禮之祭不同曲禮大夫祭五祀而祭法大夫立三祀者鄭康成釋王制曰大夫有地者祭五祀無地者祭三耳禮運曰降於五祀之謂制度又曰五祀所以本事也王制曰天子祭天地諸侯祭社稷大夫祭五祀前漢郊祀志曰天子祭天下名山大川諸侯祭其疆内名山大川大夫祭門户井竈中霤五祀後漢祭祀志曰國家亦有五祀之祭然則五祀之祭上下通未嘗有商周之别鄭氏乃以曲禮為商制祭法為周制非也周禮大宗伯以血祭祭社稷五祀五嶽鄭司農曰五祀五色之帝鄭康成曰五祀五官之神又小祝曰分禱五祀鄭康成曰王七祀祀五者司命泰厲平生出入不以告觀國按天子亦祭中霤户竈門行之五祀而諸家乃指他説以釋之何耶月令天子之令也曰其祀户其祀竈其祀中霤其祀門其祀行則天子正祭五祀或變行為井者行井皆属水神之祀乃其類也唐常棠何彼襛矣詩曰何彼襛矣唐棣之華常棣詩曰常棣之華鄂不韡韡甘棠詩曰蔽芾甘棠或曰唐棣或曰常棣或曰甘棠者觀國按爾雅釋木篇曰唐棣栘常棣棣郭璞注曰唐棣似白楊江東呼夫栘常棣今山中有棣木子如櫻桃可食爾雅又曰杜甘棠杜赤棠白者棠郭璞注曰杜甘棠今杜梨也赤棠白棠者棠色異異其名也以此觀之則唐棣者栘也常棣者棣也甘棠者杜也乃三物也玉篇曰榶徒郎切棣也栘余支切棣也棣徒計切栘也棠徒郎切棠梨也廣韻曰榶徒郎切榶棣木爾雅為唐棣栘栘扶栘木也棣徒計切子似櫻桃可食也棠徒郎切棠梨也以字書考之則唐棣亦為栘也常棣亦為棣也甘棠亦為杜也亦三物也然則唐也常也棠也三字同音而為三物其取義亦不同焉何彼襛矣美王姬之詩也何彼襛矣唐棣之華者襛猶戎戎也栘華戎戎然以喻王姬顔色之美此唐棣者栘也論語曰唐棣之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有此言道在邇而不思則求諸逺故有唐棣之喻也常棣之華鄂不韡韡此言有鄂以承葉則韡韡然盛喻兄弟之相親也蔽芾甘棠者南國之人思召伯教而欽愛其甘棠不忍翦伐之也此三事其義各有所指本不同也鄭康成箋常棣之詩曰鄂不韡韡不當作拊拊鄂足也鄂足得華之光明則韡韡然盛以喻兄弟恩義之顯古聲不跗同陸徳明釋音曰跗方于反觀國按文王詩曰有周不顯帝命不時凡周之士不顯亦世毛氏訓曰不顯顯也不時時也鄭氏箋曰周之徳不光明乎光明矣天命之不是乎又是矣大明詩曰造舟為梁不顯其光毛氏訓曰造舟為梁然後可以顯其光輝韓奕詩曰八鸞鏘鏘不顯其光鄭氏箋曰不顯顯也生民詩曰以赫厥靈上帝不寧不康禋祀居然生子毛氏訓曰不寧寧也不康康也那詩曰我有嘉客亦不夷懌鄭氏箋曰夷懌說懌也亦不說懌言說懌也推此例以觀之則鄂不韡韡者言韡韡也棫樸旱麓詩皆曰遐不作人言作人也下武詩曰不遐有佐言有佐也隰桑詩曰遐不謂矣言謂矣也南山有臺詩曰遐不眉夀言眉夀也遐不黄耉言黄耉也凡此不字與鄂不韡韡之不同鄂不韡韡者言韡韡也詩之用不字其義類皆同豈於鄂不韡韡特變跗為不耶古聲不跗雖同而鄂不韡韡則難於改易鄭氏此箋贅矣學林卷一
