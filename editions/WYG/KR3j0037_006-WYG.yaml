body:
  text: 學林卷六宋王觀國撰霍山爾雅曰泰山為東嶽崋山為西嶽霍山為南嶽常山為北嶽嵩髙為中嶽郭璞注曰霍山即天柱山潛水所出前漢郊祀志曰舜嵗二月東巡狩至於岱宗岱宗泰山也五月巡狩至南嶽者衡山也八月巡狩至西嶽者崋山也十一月巡狩至北嶽者常山也中嶽嵩髙也五載一巡狩觀國案南嶽者衡山也而爾雅以霍山為南嶽者前漢郊祀志曰武帝巡南郡至江陵而東登禮灊之天柱山號曰南嶽顏師古注曰灊廬江縣也蓋廬山有霍山即天柱山之别名灊水出焉所謂灊霍者也漢武南巡憚衡山之逺而東至霍山即祀以為南嶽爾雅當舉衡山以為南嶽而反舉霍山者非古也是以知爾雅非周公之作也丹陽前漢地理志丹陽郡有丹陽縣注曰楚之先熊繹所封十八世文王徙郢觀國案史記周成王封文武先師鬻熊之曽孫熊繹於荆蠻為楚子居丹陽後漢郡國志南郡枝江侯國有丹陽聚此楚之所封也史記曰秦齊破楚屈匄遂取丹陽乃此地也後楚文王徙郢即今之江陵也若丹陽郡者本奏之鄣郡漢武帝元封二年更鄣郡為丹陽郡屬揚州而丹陽縣乃其支縣今潤州之境是已非楚之丹陽也注以為楚熊繹所封者誤矣沈猶前漢王子侯表曰楚元王子嵗封沈猶夷侯顏師古注曰沈音審今沈亭是也前漢楚元王傳曰景帝封元王子嵗為沈猶侯晉灼注曰沈音審屬千乘觀國案廣韻平聲沈字直深切沒也漢複姓魯有沈猶氏常朝飲其羊引何氏姓苑曰今泰山人也又去聲沈字音審本周文王第十子􅆅食采於沈即汝南平輿沈亭是也子孫以國為氏漢書地理志汝南郡平輿縣注曰故沈子國也以此考之則沈猶之沈音直深切沈亭之沈音審沈猶屬千乗其地在齊東沈亭屬汝南其地在汝漢東西不相侔也顏師古晉灼皆以沈猶音審則誤矣又以沈猶為沈亭亦誤矣家語言沈猶氏孟子言沈猶行其沈字皆平聲浮沈之沈與音審者多相亂蓋不可不考也揚書曰淮海惟揚州廣韻訓說與唐人李濟翁資暇錄皆曰江南之性輕揚故謂之揚州觀國竊謂古人建立州縣或由山名或因水名或因事蹟而為之名非此三者而以意剏立則必取美名若以風俗輕揚而取州名是鄙之也九州揚居一焉豈有九州之大而揚獨得鄙名耶說文玉篇曰揚舉也當取明揚軒舉之義後漢揚雄傳其先封於晉之揚而得姓其地在河東揚縣若以江淮風俗輕揚而名揚州則河東之揚亦以輕揚而得名耶沈存中筆談曰予嘗使北至幽薊見路旁生薊茇甚大恐薊地因此得名亦如荆州宜荆揚州宜楊存中誤以揚州為從木之楊世俗亦多誤書揚雄為從木之楊蓋閩浙書籍字多誤鹵莽者因不省爾翼軫王勃滕王閣序曰星分翼軫地接衡廬觀國案史記天官書前漢天文志及諸天文書皆曰牽牛婺女揚州也翼軫荆州也前漢地理志曰楚地翼軫之分野南郡江夏零陵桂陽武陵長沙漢中汝南也吳地斗分野㑹稽九江丹陽豫章廬江廣陵六安臨淮也然則豫章實吳粤之分野於星則屬牛女於次則屬星紀滕王閣在豫章而勃序以為星分翼軫者誤矣蓋翼軫乃荆州之地於次則屬鶉尾古今州縣雖有分割而豫章未嘗屬荆州至於天星固有定次亦不為州縣分割而移改勃序頗為唐人所膾炙而首誤二字何耶歐陽文忠公嘗謂王勃滕王閣序類俳蓋唐人文格如此好古文者不取也京索前漢髙帝紀曰韓信亦收兵與漢王會兵復大振與楚戰滎陽南京索間破之應劭注曰京縣名今有大索小索亭晉灼注曰索音冊顏師古注曰索音束索之索前漢蕭何傳曰漢三年與項羽相距京索間韓信傳曰復擊破楚京索間顏師古注曰索音山客反觀國案後漢郡國志河南有京縣有索亭北征記有索水其字或作溹然則索音山客反是也文選陸士衡撰漢高祖功臣頌曰京索既振引師北討五臣注曰索桑各切案桑各切者乃以索為宵爾索綯之索誤矣韓退之偃城夜㑹聫句詩曰雪下收新息陽生過京索於咢字韻同押則知亦以索為宵爾索綯之索亦誤矣費春秋莊公十六年冬十有二月會滑伯滕子同盟於幽杜預注曰滑國都費河南緱氏縣陸徳明音義曰費扶味反又音秘閔公二年左氏傳曰莒人歸之及宻杜預注曰琅邪費縣北有密如亭陸徳明音義曰費音祕又扶味反觀國案費音祕又音翡二者皆地名也音祕者在東海郡費邑也音翡者在河南郡費亭也前漢地理志東海郡有費縣注曰費音祕魯季氏邑也後漢郡國志河南郡有緱氏縣注引左傳殄滅我費滑杜預曰滑國都於費今緱氏縣也然則春秋閔公二年莒人歸之及密杜預云費縣者音祕是也莊公十六年㑹滑伯盟於幽杜預云都費者音翡是也陸徳明初不稽考而每存兩音不能自決何以示後學也又僖公元年左氏傳公賜季友汶陽之田及費襄公七年左氏傳季氏城費昭公十二年左氏傳我以費為公田昭公十三年春叔弓帥師圍費昭公三十一年左氏傳季孫請囚於費昭公三十二年左氏傳受費以為上卿定公十二年左氏傳季氏將墮費公山不狃帥費人以襲魯凡此言費皆謂魯之費邑音祕者也襄十八年左氏傳蒍子馮公子格率銳師侵費滑昭十五年左氏傳楚費無極害朝吳之在蔡昭二十年左氏傳費遂將攻華氏前漢髙惠功臣年表陳賀封費侯顏師古注曰費扶味反後漢宦者傳曹騰以定策功封為費亭侯凡此言費皆謂河南費亭音翡者也祕翡二音其地東西異域不可易也作音義者貴在分别豈可一字而存兩音耶貰滇春秋僖公二年九月齊侯宋公江人黄人盟於貫杜預注曰梁國蒙縣有貰城貰與貫字相似陸徳明音義曰貰市夜反又音世觀國案前漢髙惠功臣表有貰侯胡害顏師古注曰貰音式制反然則蒙縣貰城當音世矣春秋書郭公夏五夫人氏之䘮皆闕文也則貫貰相似傳寫或誤焉前漢髙祖紀曰嘗從王媪武負貰酒顏師古曰貰賒也當音市夜反又地理志汝南郡有慎陽縣顏師古注曰慎字本作滇音真後誤為慎今猶有真丘真陽縣字並單作真知其音不改也闞駰曰永平五年失印更刻遂誤以水為心觀國案刻印而誤則縣當陳請改正既不能改正遂著圖經脩史者案圖經而纂集之之故誤莫之革也郢史記周成王封熊繹於荆蠻為楚子居丹陽楚文王自丹陽徙郢楚頃襄王自郢徙陳楚考烈王自陳徙夀春命曰郢觀國案前漢地理志曰江陵故楚郢都楚既屢徙至壽春則去郢逺矣地既非郢而猶命曰郢者蓋楚嘗居郢而霸則先世之威名已著於郢矣後雖東徙猶以先世威名自稱覬楚之復大也故雖東徙而猶命曰郢亦猶南朝蕭氏出於蘭陵而其後又剏南蘭陵各貴其所自出故也今之郢州乃楚之别邑號郢亭非楚都之郢舂陵古舂陵鄉屬零陵郡今道州之地是也而南陽亦有舂陵案後漢書光武紀曰景帝生長沙定王發發生舂陵節侯買章懷太子注曰舂陵鄉名本屬零陵泠道縣在今永州唐興縣北元帝時徙南陽仍號舂陵故城今在隨州棗陽縣東又案後漢宗室四王傳曰城陽㳟王祉光武族兄舂陵康侯敞之子也敞曽祖父節侯買封於零陵泠道之舂陵鄉為舂陵侯買卒子戴侯熊渠嗣熊渠卒子考侯仁嗣仁以舂陵地勢下濕山林毒氣上書求減邑内徙元帝初元四年徙封南陽之白水鄉猶以舂陵為國名觀國嘗怪考侯仁以舂陵濕毒而求内徙元帝許之徙於白水所徙之地既非始封舂陵之地而仍號舂陵者蓋仁之求徙非因功也有功而徙乃可改封今仁徙以地氣濕毒而求徙則當時無改封之例故雖許之徙而猶號舂陵蓋本封舂陵之爵不可改故也世祖改舂陵為章陵建武十八年使中郎將耿遵築章陵城自世祖有白水真人之應而南陽舂陵之名遂大著以此知地之興衰亦有時也前漢地理志零陵有泠道縣應劭注曰泠水出丹陽宛陵西北入江顏師古注曰宛陵在豫章案豫章與零陵相去南北逺甚水源亦不相通蓋宛陵自有泠水非泠道縣之泠水應劭誤矣曲逆史記陳平世家曰髙帝與功臣剖符定封平為户牖侯髙帝至平城為匈奴所圍七日用陳平竒計圍以得開髙帝既出南過曲逆上其城望見其屋室甚大曰壯哉縣吾行天下獨見洛陽與是耳乃詔御史更以陳平為曲逆侯盡食之陸士衡撰漢髙祖功臣頌曰曲逆宏達好謀能深五臣注文選曰曲音區句切逆音遇觀國案前漢地理志中山國有曲逆縣注曰蒲陽山蒲水所出東入濡濡水于城北曲而西流故曰曲逆章帝醜其名改曰蒲隂在蒲水之隂以此考之則曲逆當依本字音是也後漢郡國志曰安險縣章帝更名安憙苦陘縣章帝更名漢安曲逆縣章帝更名蒲隂蓋章帝惡險字苦字逆字而改之則知當時曲逆無他音也五臣何據而有去遇之音耶前漢髙祖紀曰三月攻開封未拔西與秦將楊熊㑹戰白馬又戰曲遇東文穎注曰曲遇地名也蘇林注曰曲音齲遇音顒顏師古注曰齲丘羽反或謂注文選者援此而音曲逆然曲逆在中山曲遇在河南不可援以爲證衡王荆公曰衡山謂之衡者以其與中國適平孫宗鑑東皋雜録曰予嘗至衡山觀水源北流數百里湍急而下則衡山地勢甚髙觀國案天傾西北地不滿東南是西北地勢髙而東南地勢下故水皆歸東此天下之勢也瀟湘之源甚細微至永衡而稍大北流過長沙而入於湖此三州之地勢也三州之水雖北流聚於湖至岳陽則與大江合而又東去矣孫氏不以天下南北地形而論水勢乃以三州之水北流而遽謂衡山之地髙則誤矣所謂與中國適平者衡山之巔與中國之地適平也其實南方耕桑之地則甚下此理灼然酇䣜史記蕭相國世家曰髙祖以蕭何功最盛封為酇侯文穎注曰酇音贊臣瓚注曰今南陽酇縣也孫檢注曰有二縣音字多亂其屬沛縣者音嵯屬南陽者音讚茂陵書蕭何國在南陽宜呼讚今呼嵯嵯舊字作䣜今皆作酇所由亂也前漢地理志南陽郡有酇縣顏師古注曰即蕭何所封又沛郡有酇縣顏師古注曰此縣本為䣜中古以來借酇字為之耳觀國案沛郡䣜縣中古以來雖借酇字其實酇亦音嵯玉篇廣韻皆曰䣜沛郡䣜縣亦作酇所謂亦作酇者亦讀作䣜也是則屬沛郡者音嵯屬南陽者音贊蕭何所封乃南陽之酇也二縣各有區别茍不考究則相亂矣後漢郡國志曰沛國有酇縣劉昭注曰曹騰封費亭是也觀國案費亭乃春秋所謂費滑蓋滑國都於費在河南緱氏縣亦嘗屬南陽之酇縣非沛國之酇也以酇字相亂故劉昭誤注耳朐䏰漢有朐䏰縣屬巴郡廣韻曰朐音蠢䏰音閏漢朐䏰縣名在巴東郡下濕多朐䏰蟲許慎說文曰朐音閏䏰音蠢說文與廣韻音正相反觀國案唐人李濟翁資暇集朐字又用作􅓃字從旬則􅓃宜音閏說文為是也前漢地理志巴郡有朐忍縣顏師古注曰朐音劬後漢郡國志巴郡有朐忍縣晉書地理志巴東郡有朐䏰縣晉書音義曰朐䏰音蠢閏然則兩漢謂之朐忍朐又音劬而晉書又謂之朐䏰疑有不同者蓋許慎說文已釋二字則漢當已有朐䏰之名班固用字多假借或省偏旁故以䏰為忍顏師古不稽考遽音朐為劬師古誤也巴東諸縣初無易名者唯後漢有分置者而古名固不廢也案前漢地理志齊郡有臨朐縣東郡亦有臨朐縣東海郡有朐縣此三縣顔師古皆音朐作劬盖此三縣音朐作劬是也獨巴郡朐䏰非劬音顏師古其必援三縣之音而誤音巴郡之朐耳河源史記大宛列傳太史公贊曰禹本紀言河出崑崙崑崙其髙二千五百餘里日月所相隱避為光明也其上有醴泉瑶池今自張騫使大夏之後也窮河源惡睹本紀所謂崑崙者乎鄧展注曰尚書導河積石是為河源出於積石積石在金城河關不言出於崑崙也觀國案史記張騫傳曰騫身所至者大宛大月氏大夏康居而傳聞其旁大國五六具為天子言之曰大宛在匈奴西南其北則康居西則大月氏西南則大夏東北則烏孫東則扞罙于闐其南則河源出焉然則烏孫扞罙于闐皆騫所傳聞未嘗身至其國也但聞河源出於于闐之南而已是雖有窮河源之文而其實騫未嘗至河源尚何崑崙之責耶尚書禹貢曰導河積石至於龍門或鑿山或穿地以通流然則禹導河水其功力始于積石耳而鄧展注史記乃謂河源出於積石則誤矣前漢西域傳曰河有兩源一出葱嶺一出于闐于闐河北流與葱嶺河合東注蒲昌海一名鹽澤者也南出於積石為中國河案張騫傳亦未嘗言兩源蓋班固得於他書類集而作史者也雒前漢地理志河南郡雒陽縣顏師古注曰魚豢云漢火行忌水故去洛水而加隹如魚氏說則光武以後改為雒字也觀國案史記河渠書曰東下砥柱及孟津雒汭又史記封禪書曰幽王為犬戎所敗周東徙雒邑又史記十二諸侯年表曰周平王元年東徙雒邑由此觀之則司馬遷作史記時已用雒字非光武以後改也漢雖火行然漢字亦從水未嘗改避豈於雒字獨改之哉本用洛字而司馬遷班固多假借用字故亦通用雒字耳魚豢之說非也鄭前漢地理志京兆尹有鄭縣班固曰周宣王弟鄭桓公邑應劭曰周宣王母弟友所封其子與平王東遷更稱新鄭臣瓚曰周自穆王以下都於西鄭不得以封桓公也初桓公為周司徒王室將亂故謀於史伯而寄帑與賄於虢檜之間幽王既敗二年而滅檜四年而滅􅉑居於鄭父之丘是以為鄭桓公無封京兆之文也顏師古曰春秋外傳云幽王既敗鄭桓公死之其子武公與平王東遷故左氏傳云我周之東遷晉鄭焉依又鄭莊公云吾先君新邑於此蓋道新鄭也穆王以下無都西鄭之事瓚說非也又地理志河南郡有新鄭縣班固曰詩鄭國鄭桓公之子武公所國應劭曰國語云鄭桓公為周司徒王室將亂寄帑與賄於􅉑檜之間幽王敗桓公死之其子武公與平王東遷洛邑遂伐􅉑檜而并其地而邑於此後漢郡國志京兆尹有鄭縣劉昭注曰鄭桓公封於此又郡國志河南郡有新鄭縣詩鄭世家曰桓公友初封於鄭為周司徒幽王以褒后故諸侯叛之公問周太史曰王室多故予安逃死乎對曰洛東􅉑檜之君貪而好利百姓不附今民皆愛公公居之􅉑檜之民皆公之民也卒徙洛東而􅉑檜果獻十邑觀國案詩鄭國風緇衣美武公也父子並為周司徒善於其職國人宜之蓋詩之鄭乃河南之新鄭武公之始邑也京兆之鄭乃桓公之封至於平王東遷洛邑武公始邑於新鄭故鄭莊公曰吾先君新邑於此先君謂武公也由此觀之則京兆之鄭實桓公所封而河南新鄭即武公所徙之邑明矣亦猶豐之有新豐也髙祖沛郡豐人及髙祖定天下都關中太上皇思東歸於是髙祖改築城市街里以象豐徙豐民以實之故謂之新豐亦如鄭之有新鄭也又漢中郡有南鄭縣者京兆之鄭在西河南之鄭在東則漢中之鄭在南故以南别之也武陵晉書良吏傳潘京武陵漢壽人太守趙廞甚器之嘗問曰貴郡何以名武陵京曰鄙郡本名義陵在沙陽界與夷相接為所攻光武時移東出遂得全共議易號傳曰止戈為武詩稱髙平曰陵於是名焉觀國案前漢地理志武陵郡注曰髙帝置又有義陵縣又志曰楚地翼軫之分野南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也以此觀之則武陵郡乃漢髙帝所置非後漢立號晉書潘京之談誤矣案後漢郡國志武陵郡劉昭注云先賢傳曰晉武陵太守趙廞問主簿潘京曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接為所攻破光武時移東出遂得見全共議易號傳曰止戈為武髙平曰陵於是改名焉然則晉書採先賢傳之語而作潘京傳者也夫採雜記之書而作史不免於誤也匡山杜子美懷李白詩曰匡山讀書處頭白好歸來注詩者曰匡山未詳觀國案後漢郡國志廬江郡尋陽縣劉昭注引釋惠逺廬山記曰有匡俗先生出商周之際居其下受道於仙人時謂所止為仙人之廬又引豫章舊志曰匡俗先生字君平夏商之苗裔又建康實録曰隆安六年桓𤣥移書於匡山惠逺法師然則匡山者廬山也李太白嘗遊廬山舊矣子美既不得志而太白復以譛出故子美詩曰頭白好歸來蓋欲招隱為廬山之遊也龜兹前漢地理志上郡龜兹縣應劭注曰龜兹音丘慈觀國案字書龜居逵切又居求切蓋居求切者音鳩亦收在鳩字韻中然則龜兹當音鳩慈而應劭音龜作丘者於字書居求切誤調入丘音也其餘史書並音龜兹作丘慈者實應劭倡其誤耳龜兹者西域之國名其國不在上郡而上郡取以為縣名者顏師古以為龜兹國人來降附者處之於此故以為名理或然也文士亦或用龜字作鳩音用之張平子西京賦曰摭紫貝搏耆龜搤水豹馽潛牛蓋用龜字作鳩音與牛字協聲韻也匈奴有休屠王而漢武威郡有休屠縣者蓋武威郡有休屠王故地漢武帝太初四年置武威郡故其縣以休屠為名此固當然與龜兹縣異矣畨夷名號與其地名多有他音不讀如本字故可汗音榼寒閼氏音煙支谷蠡音祿梨狋氏音權精浩亹音閤門畨汗音盤寒允吾音鉛牙先零音銑憐凡此皆變為他音字書亦有不載者交趾前漢武帝紀元鼎六年定越地以為南海交趾等郡前漢地理志交趾郡注曰武帝元鼎六年開後漢光武紀建武五年交趾牧鄧遜奉貢章懷太子注引輿地志曰其夷足大指開拆兩足並立指則相交應劭注曰始開北方遂交於南為子孫基阯故曰交阯又後漢郡國志交趾郡觀國今考漢武紀言交趾用阯字又地理志言交止用止字後漢光武紀言交阯用阯字又郡國志言交趾用趾字其用字既不同而注釋者或謂足指相交或謂子孫基阯亦不同觀國案禮記王制云南方曰蠻雕題交趾有不火食者矣鄭氏注曰交趾足相鄉蓋雕題者黥其額也交趾者足相鄉也其俗所生所習如此然則當用趾字而史或用阯止二字者假借用之也應劭以為子孫基阯蓋牽於從阜之阯遂誤訓耳著春秋襄公十年左氏傳曰晉侯懼而退入於房去旌卒享而還及著雍疾杜預注曰著雍晉地陸徳明音義曰著都慮反觀國案廣韻平聲曰著直魚切引爾雅曰太歳在戊曰著雍然則左傳著雍之著當為平聲直魚切陸徳明音誤矣前漢地理志濟南郡有著縣顔師古注曰著音竹庶反又直庶反韋昭以著為蓍龜之蓍音紀咨反觀國案前漢地理志後序曰竢我於著乎而顏師古注曰齊國風著詩之詞也著地名即濟南郡著縣音直庶反陸徳明毛詩音義曰著直屢反蓋直庶反直屢反同一音此音是也地名不可以呼兩音而顏師古於前漢志濟南郡著縣列兩音者非也春秋襄公二十一年左氏傳曰宣子使城著杜預曰著晉邑陸徳明音義曰著直據反又昭公四年九月取鄫左氏傳曰著丘公立而不撫鄫又昭公十四年左氏傳秋八月莒著丘公卒陸徳明音義皆曰著直居反蓋地名有字同而音各不同者此類是也非謂一縣而立兩音也觀國案許愼說文箸字亦作著廣韻曰著直魚切引爾雅太歳在戊曰著雍又音張慮切明也又音丁吕切任也又音遲倨切匙筯也又音直畧切附也又音張畧切服衣於身也諸音雖不同然本用箸字蓋篆文唯有從竹之箸亦或作著耳俗書有着字非是史記貨殖傳曰子貢仕於衛廢著鬻財於曹魯之間徐廣註曰子貢傳云廢居著猶居也著讀如貯又貨殖傳曰越王句踐用計然積著之理然則所謂廢著所謂積著皆讀音貯字書丁吕切者是也史記孔子弟子傳曰子貢好廢舉與時轉貨貲裴駰注曰廢舉謂停貯也物賤則買停貯貴即轉易貨賣史記平凖書曰富商大賈廢居居邑注曰廢居者貯蓄之名也然則所謂廢居所謂廢舉其義與廢著同司馬氏異其辭耳蔑春秋隱公元年三月公及邾儀父盟於蔑左氏傳曰公攝位而求好於邾故為蔑之盟杜預曰蔑姑蔑魯地魯國卞縣南有姑城左氏音義曰蔑亡結反公羊傳曰三月公及邾婁儀父盟於昧昧者何地期也公羊音義曰昧亡結反糓粱傳曰三月公及邾儀父盟於眛眛地名也范寗曰眛魯地糓梁音義曰眛音蔑觀國案左氏用蔑字公羊用昧字糓梁用眛字然字書蔑莫結切而昧眛二字音妹又音秣不與蔑同音也假借用字唯地名不可以立二音故亳或用薄粊或用費濟或用泲凡此皆一音無傷也昧眛二字與蔑分兩音亦非通用以此定地名豈不致疑耶陸徳眀以昧眜二字皆音蔑固不得不音以為蔑也若覈其聲韻則為無所據矣後漢郡國志魯國卞縣注曰縣南有姑城引春秋隱公元年盟於蔑然則當用蔑字不必改作也史家多慕此類假借字如周亞夫封條侯而或變條為修王莽傅曰信鄉侯佟上言顏師古曰王子侯表清河綱王子豹封新鄉侯古者新信同音凡此皆字書所不載者也君牙曰今命爾予翼作股肱心膂吕侯以穆王命作書訓夏禹輕刑之法作吕刑故許愼說文曰吕力舉切又作膂廣韻引字林曰吕脊骨也亦作膂此非假借也蓋自有通用如此類者無所疑也閿前漢戾太子傳曰戾太子死於湖宣帝詔以湖閿鄉邪里聚為戾園後漢郡國志𢎞農郡湖縣有䦩鄉章懷太子注曰戾太子南出葬在䦩鄉觀國案玉篇廣韻皆曰䦩音文𢎞農湖縣有䦩鄉汝南西平有䦩亭俗作閿以此知本用䦩字俗以閿字代之也䦩字門中從􅡚案字書􅡚火域切舉目使人也故􅡚字篆文為目下攴則􅡚固有篆文矣若閿字則無篆文不可遵用班固作史好用古文字而於戾太子傳用俗書閿字何耶台春秋襄公十二年三月莒人伐我東鄙圍台杜預注曰琅邪費縣南有台亭陸徳明音義曰台勅才反又音臺又音翼之反觀國案地名當從一音而陸徳明於台字列三音將何所從也今案前漢地理志琅邪郡横縣班固注曰台水所出東南至東武入淮顏師古注曰台音怡然則春秋書圍台當音怡在陸徳明音翼之反者是也後漢郡國志泰山郡有台亭屬費縣乃其地也若勅才反者所謂台栝所謂天台山是也若音臺者古人或以駑駘為駑台是也台字三音各有區别茍列三音於一字之下是自疑也何以取信於後學台音怡者其義則我也怡也尚書凡言台曰其如台之類皆訓我也史記太史公自序曰唐堯遜位虞舜不台又曰惠之早霣諸吕不台如此類皆訓悅也徐廣曰不台者無台輔之徳乃讀台為胎誤矣九州舜有十二州冀兖青徐荆揚豫梁雍幽并營也禹貢九州冀兖青徐揚荆豫梁雍也周禮職方氏九州揚荆豫青兖雍幽冀并也爾雅九州冀豫雍荆揚兖徐幽營也前漢地理志曰堯遭洪水懷山襄陵天下分絕為十二州使禹治之水土既平更制九州觀國案堯遭洪水鯀治九載績用弗成禹纉其事治水成功禹貢所言乃治水成功之實故禹貢惟列九州方禹治水成功之時堯尚在位則當堯之時天下惟九州耳及堯禪舜舜即位始分九州為十有二州則是禹别九州於前而舜肇十有二州於後也以書考之禹貢曰禹别九州隨山濬川任土作貢九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海㑹同六府孔修東漸於海西被於流沙朔南暨聲教訖於四海禹錫𤣥圭告厥成功此蓋堯在位之日禹功已成故錫元圭以吿成功及堯禪舜舜即位咨四岳曰有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉此蓋舜即位首咨四岳以禹前有治水之大功故用禹為司空乃宰相之任也舜典曰肇十有二州孔安國傳曰肇始也禹治水之後舜分冀州為幽州并州分青州為營州始置十有二州以此觀之則當堯之時禹别九州及舜即位始分十有二州固可知矣班固於漢書地理志以為堯遭洪水天下分絕為十二州使禹治之水土旣平更制九州班固誤也夏商周皆循九州之制周禮職方氏九州無徐梁而有幽并者蓋徐梁入於青雍而析冀部以為幽并也爾雅九州無青梁而有幽營郭璞注謂商制也世傳爾雅周公所作而其列九州則用商制何耶至漢武帝南置交趾北置朔方兼徐梁幽并之制改雍曰涼改梁曰益凡十三部置刺史斥地逺矣詩曰薄伐玁狁至於太原又曰淮夷攸服淮夷卒獲蓋今之河東在古為北狄今之淮甸在古為東夷周之時所經理者中原之地而已中原之地平而山澤少故井田之法以比閭族黨州鄉鄰里酇鄙縣遂寓之於井邑丘甸縣都之制自九夫為井積而至於百里為一同王畿千里積百同九百萬夫之地也其制軍也有伍兩卒旅師軍之法而寓之扵農萬有二千五百人為軍以當一鄉之軍六鄉七萬五千人以當六鄉之軍六鄉之軍出則無不勝此中原之定制也其外則有侯服甸服男服采服衛服蠻服夷服鎮服藩服山林川澤多而可耕之地少與中原之地不同然則後世無封建之法而欲井田肉刑以致太平斯亦難矣昔夏少康在虞思有田一成有衆一旅則井牧之制先古已有之周能損益變通至於大備故也山海經不知何人作其言皆九州之外耳目之所不及者頗怪而不可信古之聖人作書如六經者所以信於天下後世以為常經法如耳目之所不及者聖人固畧而不論也然則山海經者非聖人之所作可知矣史記孟軻傳曰騶衍作終始大聖之篇所謂中國者於天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州内自有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也其言謬悠不經殆未能籠陋民宜後世君子鄙其學蓋與田駢愼到之徒一體皆聖人之罪人也鄢春秋隱公元年夏五月鄭伯克段於鄢杜預曰鄢今潁川鄢陵縣陸徳明春秋釋音曰鄢於晚反又于建反又於然反觀國竊謂地名不可以呼兩音而今此開三音者案廣韻平聲鄢於乾切又於晚切鄢陵縣名也亦作傿上聲鄢於憲切引左傳晉侯鄭伯戰於鄢陵蓋字書雖亦三分音而於鄢之地則别無二義陸徳明見其有三音故皆列於釋音要當從一音讀可也前漢地理志陳畱郡有鄢縣應劭曰鄭伯克段於鄢是也又潁川郡有傿陵縣而後漢郡國志潁川郡有􅋣陵縣注曰春秋克段於鄢然則或用鄢字或用傿字或用􅋣字三字通用也春秋桓公十三年左氏傳曰及鄢亂次以濟成公十三年傳曰無禮必食言杜預曰為十六年鄢陵戰經十六年六月甲午晦晉侯及楚子鄭伯戰於鄢陵襄公十三年傳曰是以不徳而亡師於鄢昭公四年傳曰遷賴於鄢又曰楚無晉備以敗於鄢又十三年傳曰王㳂夏將欲入鄢凡此春秋及左氏傳或言鄢或言鄢陵陸德明釋音皆作於晚反而杜預皆以潁川郡鄢陵縣為訓蓋一地也史記韓世家宣惠王十四年秦伐敗我鄢徐廣曰潁川郡鄢陵縣鄢于乾反至今鄢陵縣呼鄢為平聲其音不改也然則當呼鄢作平聲順古今人所呼之音也前漢地理志潁川郡又有郾縣顏師古曰郾一戰反此别是一縣也縣同名前漢地理志齊郡有臨朐縣東萊郡又有臨朐縣應劭曰臨朐山也顏師古曰各以所近為名蓋二縣皆以臨朐山而同為名也九江郡有曲陽縣應劭曰在淮曲之陽東海郡又有曲陽縣應劭曰在淮曲之陽蓋二縣皆以在淮曲之陽而同為名也齊郡與東萊郡相附近九江郡與東海郡相附近故其取縣名則各以其山與水所近者為名理固然也若夫二郡相遠而縣名亦有同者東海郡有武陽縣犍為郡又有武陽縣臨淮郡有髙平縣安定郡又有髙平縣武都郡有武都縣五原郡又有武都縣平原郡有富平縣北地郡又有富平縣涿郡有髙陽縣琅邪郡又有髙陽縣桂陽郡有隂山縣四河郡又有隂山縣安定郡有安定縣交阯郡又有安定縣臨淮郡有廣平縣廣平國又有廣平縣千乗郡有平安縣廣陵國又有平安縣潁川郡有定陵縣汝南郡又有定陵縣東海郡有開陽縣臨淮郡又有開陽縣琅邪郡有平昌縣平原郡又有平昌縣平原郡有阿陽縣天水郡又有阿陽縣清河郡有東陽縣臨淮郡又有東陽縣豫章郡有宜春縣汝南郡又有宜春縣東海郡有新陽縣汝南郡又有新陽縣沛郡有建成縣勃海郡又有建成縣左馮翊有髙陵縣琅邪郡又有髙陵縣左馮翊有武城縣襄定郡又有武城縣鉅鹿郡有新市縣中山國又有新市縣東海郡有東安縣城陽國又有東安縣金城郡有金城縣隴西郡又有金城縣凡此皆二郡相逺而縣名同者也古之封爵多取縣名故前漢王子侯年表有平昌侯劉卬宜春侯劉成建成侯劉拾新市侯劉吉安定侯劉賢東陽侯劉洪東安侯劉彊建陽侯劉咸廣平侯劉徳新陽侯劉永又髙惠孝文功臣年表有廣平侯薛歐髙陵侯王虞景武昭宣功臣年表有新市侯王棄之外戚恩澤侯年表有建成侯吕釋之宜春侯王訢富平侯張安世髙陽侯薛宣髙陵侯翟方進凡此所封皆有兩縣同名既非鄉土悉係泛封應當食一縣未有食兩縣者不知當時所封獨取何縣考之漢書無所辨異則當時有司定封爵者率爾而然耶地名旁犯襄邑縣土人呼其地為襄陵案前漢地理志陳留郡襄邑縣顏師古注曰本承箱縣襄陵鄉宋襄公所葬故曰襄陵秦始皇以承箱卑濕故徙縣於襄陵謂之襄邑縣然則土人呼襄邑為襄陵是也然河東自有襄陵縣前漢地理志河東郡襄陵縣注曰晉襄公之陵名因以縣若呼襄邑之地為襄陵有同乎河東之襄陵是自設疑也毗陵縣土人呼其地為延陵案前漢地理志會稽郡毗陵縣注曰季札所居也舊延陵漢改之然則土人呼毗陵為延陵是也然代郡自有延陵縣前漢地理志代郡有延陵縣若呼毗陵之地為延陵有同乎代郡之延陵是自設疑也亦如關中有咸陽縣雲中郡正有咸陽縣宣州有南陵而京兆尹正有南陵縣鼎州之地有武陵而漢中郡正有武陵縣韶州之地有曲江而漢西都曲江之名甚著要當分别毋紐於疑似可也若蘭陵之有南蘭陵兖州之有南兖州不羮之有東不羮西不羮屈之有南屈北屈凡此類古人亦慮其重複故以東西南北别之也羮史記髙祖功臣侯年表有羮頡侯劉信前漢王子侯年表有頡羮侯劉信服䖍曰頡音戞擊之戛在史記言羮頡在漢書言頡羮不同者觀國案史記楚元王世家曰髙祖長兄伯蚤卒髙祖微時嘗辟事時時與賓客過丘嫂食嫂厭叔詐為羮盡轑釡賔客以故去已而視釜中尚有羮髙祖怨其嫂及髙祖為帝封昆弟而伯子獨不得封太上皇以為言髙祖曰非忘封之也為其母不長者耳於是乃封其子信為羮頡侯裴駰注曰羮頡侯以髙祖七年封由此觀之則史記年表謂羮頡侯者是也漢書年表顛倒其文為頡羮誤矣潁川郡地名有不羮者羮音郎春秋昭公十二年左氏傳曰今我大城陳蔡不羮諸侯其畏我乎子革對曰是四國者專足畏也杜預曰四國陳蔡二不羮陸徳明音義曰羮音郎又十三年傳曰楚公子比公子黒肱公子弃疾蔓成然蔡朝吳帥陳蔡不羮許葉之師音義曰羮音郎前漢地理志潁川郡定陵縣有東不羮襄城縣有西不羮顏師古曰羮音郎後漢郡國志潁川郡定陵縣有東不羮章懷太子注引杜預曰縣西北有不羮亭又襄城縣有西不羮注引杜預曰有不羮城則子革謂陳蔡不羮為四國者乃杜預所謂陳蔡二不羮也二不羮乃東西不羮以此知春秋時已分東不羮矣羮音郎者自古所呼如此宋玉招魂曰肥牛之腱胹若芳和酸若苦陳吳羮濡鼈炮羔有柘漿鵠酸臇鳬煎鴻鶬以音韻叶之亦讀羮曰郎也凡地名有他音者字書亦多不載羮音郎之類是也闕地地名有歴時既久文籍散失而不可考者春秋桓公十一年正月齊人衛人鄭人盟於惡曹九月柔㑹宋公陳侯蔡叔盟於折僖公十五年三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟於牡丘文公十年秋及蘇子盟於女栗冬楚子蔡侯次於厥貉十三年冬衛侯㑹公於沓成公十二年夏公㑹晉侯衛侯於瑣澤秋晉人敗狄於交剛十七年十有一月壬子公孫嬰齊卒於貍脤十八年冬十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔舒同盟於虗朾襄公五年夏仲孫蔑衛孫林父㑹吳子於善道二十一年冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子於商任昭公十一年五月仲孫貜會邾子盟於祲祥秋季孫意如會晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人於厥憗二十六年秋公會齊侯莒子邾子把伯盟於鄟陵定公三年冬仲孫何忌及邾子盟於拔十年冬齊侯衛侯鄭游速㑹於安甫威公十年左氏傳曰虞公出奔共池僖公二年左氏傳曰始漏師於多魚襄公十九年左氏傳曰齊及晉平盟於大隧凡此春秋及左氏傳所書地名杜預皆曰闕晉時去周秦漢未逺雖經秦火而漢人文籍甚備以杜預之博學於春秋闕地有所不能考況後世屢罹兵火書籍錯亂非特闕地而已也前漢地理志左馮翊徵縣顔師古曰徵音懲即今之澄城縣引左傳取北徵即此地而杜元凱未詳其處蓋改徵為澄遂昧而不可考耳右扶風有郁夷縣班固引詩周道郁夷顏師古曰四牡詩四牡騑騑周道逶遲韓詩作周道郁夷故班固因用郁夷字耳琅邪郡有計斤縣顏師古曰即左氏傳所謂介根也語音有輕重耳遼東郡有無慮縣顔師古曰慮音閭即所謂醫巫閭也西河郡有圜陽縣又有圜隂縣顔師古曰圜字本作圁圁陽在圁水之陽圁隂在圁水之隂後誤為圜字今有銀州銀水即是舊名猶在但字變耳漢右扶風之槐里縣在周時名犬丘秦更名廢丘漢髙祖三年更名槐里而王莽又改為槐治凡此類皆因更改而變易其字面又至於訛其聲音苟書籍湮亡則又闕軼而不可考毋足怪也前漢路温舒傅曰温舒舉孝廉為山邑丞顏師古曰山邑不知其處若此者雖博學不能措辭也改地名前漢地理志曲陽縣凡有五東海郡有曲陽縣九江郡有曲陽縣常山郡有上曲陽縣鉅鹿郡有下曲陽縣交阯郡有曲陽縣應劭曰東海九江曲陽縣皆在淮曲之陽然則常山鉅鹿之曲陽當為河曲之陽而交阯賔海當為海曲之陽也上曲陽在上流下曲陽在下流故以上下别之大抵地名同則分東西南北上下左右以别之王根在漢成帝時為大司馬封曲陽侯曲陽有五不知當時所食何地根嘗薦王莽自代及莽得志而根已死莽以曲陽非令稱乃追諡根為直道侯蓋莽心惡忌曲字而改之也廣平國有曲周縣又有曲梁縣王莽惡曲字改曲周為直周曲梁為直梁太原郡有陽曲縣隋文帝自以姓楊心惡陽曲之號乃改為陽直中山國有曲逆縣又有安險縣又有苦陘縣漢章帝心惡曲逆險苦之字故改曲逆為蒲隂改安險為安憙改苦陘為漢昌若此類皆出於心有惡忌而改之者凡内不足者外多疑醜其是之謂乎古人以曲險之字名縣者甚多山陽郡有曲鄉縣東萊郡有曲成縣琅邪郡有海曲縣東海郡有平曲縣會稽郡有曲河縣桂陽郡有曲江縣廣平國有南曲縣遼東郡有險瀆縣若此者又焉得悉改之哉春秋桓公六年左氏傳曰公問名於申繻對曰不以國不以官不以山川不以隱疾不以畜牲不以器幣以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山蓋不以國者慮廢國之號也不以山川者慮廢山川之號也魯有具山敖山魯獻公名具魯武公名敖魯既諱獻武之名則具敖二山其名廢矣魯周公禮義之國也而於曲禮或不能遵焉況於後世乎漢文帝名恆改恆山為常山漢光武叔父名良改壽良縣為壽張縣漢殤帝名隆改隆慮縣為林慮北齊文宣太子名商改商州為趙州隋煬帝名廣改廣平郡為永平凡此類皆以名而廢國邑山川之號也又有以率意而改作者秦始皇以望氣者言金陵有天子氣故東巡以厭之而改金陵為秣陵漢光武更芒縣為臨睢漢安帝以孝徳皇后葬於清河郡之厝縣而改名甘陵又改千乗郡之狄縣為臨濟始皇忌金陵之氣而不務修徳海内分崩漢安忌夷狄之稱而權歸鄧氏王度以愆然則率意改作果有益哉且地名者古所𫝊也既以惡忌而改之又以名諱而改之又以率意而改焉不亦太多事耶濟南郡有於陵縣而齊有庾於陵河内郡有野王縣而陳有顧野王此以國邑為名也一介寒士尚踰典禮得無愧哉檇春秋定公十四年五月於越敗吳於檇李杜預注曰檇李吳郡嘉興縣南醉李城陸徳明音義曰檇音醉前漢地理志會稽郡由拳縣注曰故就李鄉吳越戰地也應劭注曰古之檇李也啖助春秋纂例曰於越敗呉於雋李在春秋謂之檇李在杜預注謂之醉李在前漢地理志注謂之就李在春秋纂例謂之雋李蓋檇與醉同音可通用而就字與檇不同音前漢地理志注曰故就李鄉則先有鄉而後有城宜就在前檇在後也雋乃檇之省文耳後漢郡國志呉郡由拳縣章懐太子注曰左傳越敗呉於檇李引干寶搜神記曰秦始皇東巡望氣者云五百年後江東有天子氣始皇至令囚徒十萬人掘汙其地表以惡名故改曰由拳然則當自檇李改為由拳也檇李之名未見其善而表以惡名乃改為由拳然由拳之名亦未見其惡始皇之分美惡如此之未審何耶酈春秋僖公元年冬十月壬午公子友帥師敗莒師於酈杜預注曰酈魯地陸徳明音義曰酈力知反案字書平聲有酈字吕知切魯地也入聲有酈字郎擊切縣名在南陽亦姓也所謂吕知切魯地者即春秋敗莒於酈是也所謂郎擊切縣名在南陽者前漢地理志南陽郡酈縣如淳注曰酈音蹢躅之蹢蓋蹢躅之蹢音持益切與擲字同音乃與字書入聲郎擊切者音訓不同矣又𢎞農郡析縣注曰黄水出黄谷鞠水出析谷俱東至酈入湍水顏師古曰酈音持益反蓋持益反者音擲乃如淳所謂音蹢躅之蹢也顏師古用如淳之音耳然前漢酈商傳顏師古注曰酈音歴此乃字書入聲郎擊切為姓者也師古於酈商𫝊既已音酈為歴矣又於地理志析縣注音酈為持益反是音訓不相應也觀國案酈字在魯地者音力知反在南陽者音歴而姓亦音歴如酈商酈食其酈炎酈道元之類皆音歴也若夫音持益反者雖設此音與姓不合兹為贅矣􅂒􅂒字毗至切下從畀字書曰畀國名也此即舜封象於有􅂒者也庳字下從卑字書曰部弭切下也又中伏舎也又屋庳也於字書􅂒字在去聲與鼻字同韻庳字在上聲與婢字同韻二字音與義皆不同書史中用有􅂒多作庳字如孟子曰象至不仁封之有庳有庳之人奚罪焉用庳字者訛誤也然前漢昌邑王賀傳曰舜封象於有鼻顏師古注曰有鼻在零陵今鼻亭是也此用鼻字者􅂒與鼻皆從畀又同音通用之無嫌也鄒陽傳曰昔者舜之弟象日以殺舜為事及舜立為天子封之於有卑又用卑字者班固假借用之耳而服䖍注曰卑音畀與之畀非也雖借用卑字亦與􅂒同音會缶前漢髙祖紀曰十一年七月淮南王布反十二年十月上破布軍於會缶孟康注曰會缶音儈保邑名屬沛國蘄縣蘇林注曰缶音垂晉灼注曰鄉名也顏師古注曰會二外反缶丈瑞反缶本作垂觀國案前漢英布傳曰西與上兵遇蘄西會垂又案史記髙祖紀十一年七月淮南王黥布反十二年十月擊破布軍會甀又史記黥布傳曰西與上兵㑹蘄西會甀蓋前漢英布傳作垂字史記紀傳皆作甀字垂上從垂在字書為垂然則甀垂皆從垂其旁或從瓦或從缶其實一字也當依顏師古音丈瑞反而漢書髙祖紀作缶者省文也前漢地理志沛郡蘄縣有垂鄉顏師古注曰垂音直恚反後漢郡國志沛國蘄縣章懷太子注曰髙祖擊黥布於會甀然則地理志用垂字者亦省文也凡省文必存其母而省其枝葉垂者母也瓦缶枝葉也班固於地理志省瓦缶而用垂可也於髙祖紀乃省垂而存缶誤矣九夷旅獒曰惟克商遂通道於九夷八蠻論語曰子欲居九夷觀國案後漢東夷傳曰夷有九種曰畎夷于夷方夷黄夷白夷赤夷元夷風夷陽夷周康王時徐夷僭號乃率九夷以伐宗周西至河上穆王命徐偃王主之章懷太子注引竹書紀年曰九夷來御又曰后泄二十一年命畎夷白夷赤夷元夷風夷陽夷后相即位二年征黄夷七年于夷來賔少康即位方夷來賔此乃古九夷之名也至後世或彊或弱或為大國所滅周宣王命召公平淮夷春秋晉師滅赤夷郤缺獲白狄之類是也孔子欲居九夷或曰陋如之何子曰君子居之何陋之有言君子以道化民則雖夷貉之陋邦亦可行也采薇詩曰西有昆夷之患緜詩曰混夷駾矣史記周本紀曰西伯明年伐犬戎前漢匈奴傳曰周西伯昌伐畎夷周穆王伐畎戎申侯與畎戎攻幽王顏師古注曰畎工犬反畎夷即畎戎也又曰昆夷或作混又作緄混緄並工本反然則或言犬戎或言畎夷或言昆夷或言混夷或言緄夷或言徐夷或言淮夷其名與九夷不同蓋因事生名皆不出於九夷也前漢匈奴傳云晉文公攘戎翟有赤翟白翟變狄為翟者假借字也畎夷乃犬夷也二字當同音犬而顏師古云畎音工犬反非也瓡䣙史記漢楚以來侯者年表有瓡讘侯杆者又建元以來王子侯年表有城陽頃王子瓡侯劉息徐廣注曰瓡一作報觀國案前漢地理志河東郡有狐讘縣又景武昭宣功臣年表有瓡讘侯杆者顏師古注曰瓡讀與狐同讘之渉反以此知史記年表瓡讘侯乃狐讘侯也杆者乃姓杆名者也又王子侯年表有城陽頃王子劉息封瓡侯顏師古注曰瓡即瓠字也以此知史記年表瓡侯乃瓠侯也徐廣云瓡作報誤矣史記髙祖功臣侯年表有䣙城侯周緤而前漢髙祖功臣侯年表有䣙城侯周緤顏師古注曰䣙音陪又音普肯反觀國案前漢周緤傳曰十二年更封緤為䣙城侯服䖍注曰音菅蒯之蒯蘇林注曰䣙薄回反顏師古注曰䣙字從崩從邑音蒯非也吕忱音陪而楚漢春秋作憑城侯陪憑相近此其實也又音普肯反以此觀之則䣙字是也蒯字非也史記用蒯字故服䖍有菅蒯之音耳玉篇曰䣙薄梅切鄉名也廣韻平聲曰䣙薄回切鄉名在扶風上聲曰䣙普等切引穆天子傳云西征至䣙郭璞注云國名也以此知䣙城侯當音薄回切其地在扶風是也周古都鎬京而穆天子西征至䣙則䣙又在鎬京之西於字書音普等切者是也此自是一國名非扶風之䣙鄗蒿左氏春秋經曰威公十五年夏許叔入於許公㑹齊侯於艾左氏傳曰公㑹齊侯於艾謀定許也公羊春秋曰公會齊侯於鄗啖趙春秋纂例差繆略曰公㑹齊侯於蒿啖助曰若是艾不應誤為鄗若是鄗不應誤為艾未知孰是觀國案春秋隱公六年夏五月辛酉公㑹齊侯盟於艾左氏傳曰盟於艾始平於齊也杜預注曰泰山牟縣東南有艾山然則艾乃齊魯之境二君相見之地也威公十五年夏許叔入於許公㑹齊侯於艾左氏傳曰謀定許也蓋許國與齊魯相接齊魯二君㑹於艾謀在定許於地理皆順況隱公六年嘗盟於艾矣當以艾字為是鄗乃常山郡之鄗縣漢光武即位於鄗改為髙邑者也鄗非齊魯相㑹之地蒿亦未詳案啖趙春秋纂例地名譜於桓公十五年不著蒿地而盟㑹譜於桓公十五年曰公會齊侯於艾既於盟㑹譜言艾而於差繆略反曰公㑹齊侯於蒿則知蒿字為非矣啖氏乃曰未知孰是何耶學林卷六
